# plan_manager — TOOLING mechanics. Read ONLY by tool-using roles (researcher, context_former, coder, tester).
# Orchestrator and conscience do NOT use tools and do NOT read this file.

meta:
  file_access: local               # THIS PROJECT'S DEFAULT (laws.variables.file_access=local, standing user order 2026-07-18): editor=LOCAL Write/Edit, terminal=LOCAL bash; CA still used for search/analysis and as the REMOTE REPO for git sync. commit-after-edit applies (see laws.yaml local_mode).
  proxy: proxy-lan                 # MCP client namespace (address = mcp__proxy-lan__*); set client-side, no registry uuid. NAME can change; if it does, the tool namespace changes with it.
  call: 'mcp__proxy-lan__call_server(server_id, copy_number, command, params)'
  path: project-relative POSIX only; no host paths; no ".."
  # STABLE identity per server = uuid (changes very rarely). id (NAME) + copy_number can drift —
  # on SERVER_NOT_FOUND, re-resolve current id+copy_number from list_servers by matching the uuid. Authoritative per-server maps: servers/*.yaml.
  servers:
    ca:      {id: code-analysis-server-vvz, copy_number: 2, uuid: 4fd70962-ac0a-45b8-bd0c-bee666868d0d}
    editor:  {id: ai-editor-server-vvz,     copy_number: 1, uuid: 37830763-f58c-4046-95b5-8daf3ea3f2e0}
    term:    {id: mcp-terminal-vvz,         copy_number: 1, uuid: 1015751c-0502-4ffa-95e1-8b25a1c63c0e}
    planmgr: {id: planmgr,                  copy_number: 1, uuid: 8820e595-8ed4-43f2-b9bf-c99f48054fa6}

# Source of truth. Read on trigger; do not paraphrase from memory.
# SHIPPED WITH THE TEMPLATE (never delete): rules, coder_guide, modes, and the live
# server manuals fetched via info/help calls.
# PROJECT-SPECIFIC (the three docs/standards/planning entries below): fill the
# placeholder with your project's manual paths, or — if your project has no such
# document — delete the entry AND remove its name from the `standards` lists in
# roles/coder.yaml, roles/tester.yaml, roles/context_former.yaml: a dangling name
# there sends agents hunting for a file that does not exist.
manuals:
  rules:       roles/tooling-rules.yaml
  editor:      'call_server(editor,"info")'
  terminal:    'call_server(term,"info")'
  ca_search:   'docs/standards/planning/code_analysis_search_instructions.yaml'
  ca_fs:       'docs/standards/planning/code_analysis_fs_instructions.yaml'
  ca_edit:     'docs/standards/planning/code_analysis_universal_editing_instructions.yaml'
  coder_guide: roles/coder-guide.yaml
  cmd_help:    'call_server(<server>,"help",{cmdname:<command>})'
  modes:       modes.yaml
  delivery:    ops/delivery-release.yaml

# condition -> MUST read manual(s) BEFORE the first matching action
triggers:
  - when: always — before the first tool call of the task
    read: [rules]
  - when: before first open/edit/write/close of a project file
    read: [editor, ca_edit]
  - when: before first fs move/copy/remove or text-file create
    read: [ca_fs]
  - when: code analysis or code search
    read: [ca_search]
    order: {1_ast_and_code_analysis: first, 2_cross_search: only_if_step1_missed}
  - when: before first sandbox or host terminal command
    read: [terminal]
  - when: before first git operation on the server-side project
    read: [rules]   # cas_rules.git_via_ca — git ONLY through CA git_* commands
  - when: the task declares a mode (planning / analysis / refactoring)
    read: [modes]
  - when: before the first release action of a delivery (version bump, build, publish, deploy, real-server pipeline)
    read: [delivery]

# error taxonomy — exactly one branch per failure
errors:
  misuse:   'wrong/unknown params or bad usage (VALIDATION_ERROR-style) -> MANDATORY call_server(<same server>,"help",{cmdname:<failing command>}); fix to schema; retry once; still bad -> escalate.'
  tool_5xx: 'HTTP 500 / internal server error = the TOOL failed -> STOP; escalate to user; no retry, no workaround.'
  infra:    'transport/session/proxy down, timeout, conn refused, 502, WAF 403, -32602 -> STOP on first occurrence; escalate {exact_call, verbatim_error, question}.'
  law:      'Any tool error -> stop + escalate. Only "misuse" is self-fixable, only via cmd_help.'
