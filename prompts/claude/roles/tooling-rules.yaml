# {{PROJECT_NAME}} — TOOLING rules (tool-using roles only). Referenced from tooling.yaml manuals/triggers.
# Battle-tested gotchas; each entry exists because an agent lost work without it.

editor_rules:
  lifecycle: >-
    CA session_create -> open -> preview -> edit -> write(preview) -> write(commit) ->
    close ALWAYS, even on error; an unclosed session leaves a stale lock that blocks the pipeline.
  edit_signal_untrusted: >-
    known defect in editor as of editor 1.0.49 — re-verify on your install and record your
    own bug ids: universal_file_edit's error signal is uncorrelated with outcome ->
    after EVERY edit call re-preview the draft; landed -> do not re-apply; absent -> re-apply once.
  yaml_root_insert_broken: >-
    known defect in editor as of editor 1.0.49 — re-verify on your install and record your
    own bug ids: inserting a NEW top-level key into an existing YAML (tree-temp) fails with
    INVALID_OPERATION 'marked node missing ___id___'. Add new content via a NEW file
    (create:true + initial_content) or REPLACE an existing key's whole value.
  one_agent_one_step: one agent = one atomic step = one file; multiple steps per agent degrade focus into hallucinations.
  no_subagents: coders/testers NEVER spawn subagents; every needed value is inlined in the task prompt.
  python_reads: >-
    never CA get_file_lines on a healthy .py (USE_CST_COMMANDS) - read via
    universal_file_preview (one-shot, no session_id) or file_structure.
  toml: 'no .toml handler -> create as .txt, commit, then mv in terminal; remove the orphan .txt.lock.'
  coder_tool_error: >-
    a coder hitting a tool error STOPS and reports; NEVER falls back to local bash -
    it never reaches the remote CA (lost work).

sandbox_rules:
  waf: WAF returns 403 on complex shell (pipes, 2>&1, loops, command -v) -> simple single commands only.
  qa_tools: sandbox venv is bare (no mypy/flake8/pytest); the quality gate runs CAS-side tools, not the sandbox venv.
  host_exec: 'multi-step host commands: wrap in bash -c ''<chain>''; avoid redirects/heredocs (forbidden-pattern scan rejects them).'
  certs: >-
    NEVER run the full certificate-generation script that rebuilds the shared Root CA
    (it breaks every sibling's certs) - only a per-service cert helper script.

host_files:
  ownership: >-
    files under the CA server's watch catalog must be owned by the CA service's
    user:group; drift fix: chgrp -R <ca_group> <catalog>; dirs also need the owner-read
    bit for the CA daemon (symptom: "No Python files found" while exact-path reads work).

cas_rules:
  sequential_only: >-
    known defect in CAS as of CAS 1.6.53 — re-verify on your install and record your own
    bug ids: NEVER run CAS searches in parallel - the concurrent-search race corrupts
    JSON-RPC (-32600 "command is required", heartbeat stays green, "active" status lies).
    All CAS calls strictly sequential.
  copy_number: >-
    copy_number can flip after a backend service restart (a re-registration gets a new
    copy, e.g. copy 1 -> SERVER_NOT_FOUND, new registration lands as copy 2) — verify
    with list_servers rather than assuming a fixed copy_number per server.
  usages_index: >-
    a project's usages table can be EMPTY (find_usages returns 0 for everything) -
    rely on the AST/class index, not usage counts.
  git_via_ca: >-
    when working against the server-side project, ALL git operations go through CA git_*
    commands (git_status/git_add/git_commit/git_pull/git_push/git_branch_*/git_merge...) -
    never a local git workaround for server-side state, and NEVER git over console/ssh on
    the server without the user's explicit permission (user law — record the date your
    project's user granted this). In LOCAL mode (variables.file_access=local) CA acts as
    the REMOTE REPO: local edits are committed locally after every file edit
    (commit-after-edit), then synced via push / CA git_pull.

planmgr_gotchas:
  - 'hrs_import defaults dry_run=true - a success without dry_run:false writes NOTHING.'
  - 'step_update: concepts is a TOP-LEVEL param; fields.concepts is ignored by the gate.'
  - 'bug_list filters (re-verify on your install): plan = direct source_plan_uuid equality (project-anchored bugs excluded - correct); project = TRANSITIVE (matches source_project_id and plan-bound bugs). Use project filter for project-anchored records.'
  - 'anchor validation is weak (known defect in planmgr as of planmgr 0.1.44 — re-verify on your install and record your own bug ids): bug_create accepts a nonexistent source_project_id - double-check UUIDs before create; fix mistakes via bug_reanchor/todo_reanchor.'
