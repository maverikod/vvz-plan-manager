# plan_manager — standing LAWS (universal). Referenced from common.yaml spawn protocol;
# read by EVERY role once per session before acting.
# `variables` are pre-set per session by the user/orchestrator; defaults apply otherwise.

variables:
  file_access: local    # THIS PROJECT'S DEFAULT: files are local, edited with local tools (user order 2026-07-18). Options: mcp | local | local_ide. Governs mcp_only/local_mode/local_ide_mode and the profile-dependent parts of branch_discipline.
  escalation: strict    # strict (default) | off. User pre-sets 'off' -> law escalation_first_error is relaxed.

laws:
  branch_discipline: >-
    UNIVERSAL CORE (all profiles): three branches - 'cas' (server-side working tree),
    'local' (local checkout), 'main' (integration/deploy ONLY, nobody edits it
    directly); every deploy builds from main; only the orchestrator merges into main,
    and only after delivery_checks pass; server-side main is protected.
    [when variables.file_access=mcp] The changing branch is 'cas': all agent edits
    (editor auto-commits, CA git_commit) land there; agents NEVER commit to main;
    delivery = cas->main SQUASH merge (one commit per delivery); after every main
    update, merge main->cas (via CA git_merge) BEFORE agents continue.
    [when variables.file_access=local or local_ide] The changing branch is 'local':
    after completing each task or step - IMMEDIATELY and in THIS ORDER: (1) commit on
    'local', (2) git merge local->main, (3) git push origin main (pushing only the
    working branch is NOT delivery - the server syncs from main); never batched.
    main->local pull is allowed ONLY AFTER a completed deploy (local takes only
    deploy-verified states of main). If server-side agents work in parallel, the mcp
    clause above applies to them simultaneously.
  language: >-
    RUS is used ONLY for communicating with the user (user-facing messages, questions,
    reports addressed to the user). ENG for everything else: code, comments, commit
    messages, prompt/contract files, inter-agent tasks and reports, bug/todo records,
    logs. A subagent never writes Russian into artifacts; the orchestrator translates
    when reporting to the user.
  mcp_only: >-
    [unless variables.file_access=local] ALL project file ops (read AND write) via MCP proxy
    (code-analysis-server-vvz / ai-editor-server-vvz / mcp-terminal-vvz). Never local bash/Read/Write/Edit
    on project files, including quick checks (wc/grep). Sole local-read exception:
    roles/*. Paste this constraint into every subagent prompt.
  local_mode: >-
    [active when variables.file_access=local] Role split: editor = LOCAL tools (Write/Edit),
    terminal = LOCAL bash, CA = REMOTE REPO with analysis tools - git operations that touch
    the server-side project go through CA git_* commands (pull/push to sync the remote repo),
    and code analysis/search still uses CA tools. COMMIT-AFTER-EDIT: after every local file
    edit - git commit, immediately, no batching-up of uncommitted edits.
  local_ide_mode: >-
    [active when variables.file_access=local_ide] Files live locally and are edited by
    the HUMAN via the IDE; agents NEVER edit project files - they deliver proposed
    patches/diffs in their reports for the human to apply. Search and analysis still
    run on CA; sync local<->server via git (push from local, CA git_pull_safe on the
    server). Branch rules follow the 'local' clause of branch_discipline.
  escalation_first_error: >-
    [trigger: any infra/transport error; unless variables.escalation=off] STOP on the FIRST
    infra error (unavailable/timeout/502/WAF 403/session lost): no retries, no server or
    session switching, no workarounds. Report {exact_call, verbatim_error, concrete_question}
    up the chain agent -> orchestrator -> user. A plain validation error fixable via
    help(cmdname) may be self-corrected once.
  reproduce_before_claiming: >-
    Never declare tooling broken or file a bug off a single failure - the environment flaps.
    Read help/info, reproduce fresh; only a clean repeatable failure is a bug. Surface
    blockers explicitly; never silently work around them.
  verify_claims_independent_model: >-
    A blocking subagent claim (API missing / server down / no singleton) is not truth.
    Verify read-only with an INDEPENDENT different model before escalating or redirecting
    work. Unconfirmed -> claimant's glitch, proceed WITHOUT escalation. Confirmed -> act on
    the real defect; distinguish plan defect vs code defect. (Applies to spawn-capable
    roles: orchestrator, context_former, executor. Non-spawning roles report claims as
    claims, with evidence.)
  editor_gate_no_bypass: >-
    HARD RULE - no variable disables it. If the editor rejects a write due to QA errors
    (mypy/flake8/validation): STOP, analyze causes, FIX the errors, then continue. NEVER
    bypass (skip_quality_tools / validate_syntax_only / weakening gate config). The
    zero-tolerance gate is deliberate design against models multiplying garbage; tooling
    false positives are tooling bugs - fix the tool, still no bypass.
  ssh_repair: >-
    Server-side repair/deploy over ssh root@192.168.254.26 is decided by the ORCHESTRATOR
    ONLY, who holds the user's standing grant and exercises it with the conscience's
    approval. No other role ever uses ssh or asks for it: on a server-side problem,
    escalate to the orchestrator. CARVE-OUT (record the date your project's user granted
    this): GIT operations on the server are NEVER done over the console/ssh without the
    user's explicit permission - server-side git goes exclusively through CA git_* commands.
  delivery_checks: >-
    MANDATORY before handing any task result to the user: (1) auto-registration - the
    server is present in the mcp-proxy registry (list_servers); (2) live command check -
    every changed/added command AND its related commands respond correctly when invoked
    THROUGH the proxy (call_server), not only in isolation; (3) main pipeline script -
    the project contains ONE main pipeline script built on the server's own client (or,
    if none, the adapter's client) that tests ALL server commands against the REAL
    running server - if missing, that is a gap to close, not ignore; (4) deploy cycle -
    when the completed task MODIFIED a server: run the image-build script, deploy the
    server (new image up), then run the main pipeline test script AGAINST THE DEPLOYED
    instance; checks (1)-(3) are performed on that freshly deployed instance. A
    server-change task is complete only after all four pass. (Owner: the role that
    delivers to the user — orchestrator/executor level. Coders/testers are not gated
    on these checks; they gate DELIVERY, not individual steps.)
