# Creating a brand-new file through ai-editor, and handling unsupported formats (.toml on this install).

procedure:
  new_file:
    - create a CA session
    - call universal_file_open with create=true and initial_content (.py REQUIRES it on create)
    - preview and edit the draft as needed (same edit ops as an existing file, see editor-edit-lifecycle.yaml)
    - inspect write_mode=preview
    - commit with universal_file_write(write_mode=commit) -> first commit locks + registers the file atomically on CA
    - close the editor file and delete the CA session
  unsupported_format_toml:
    # DEVIATION from the template default (which now claims native TOML support):
    # CA-layer TOML persistence was live-verified BROKEN on this install
    # (2026-07-20) — keep this workaround until re-verified.
    - universal_file_open(create=true, file_path='*.txt') -> author content as text
    - universal_file_write(commit) the .txt
    - universal_file_close
    - 'terminal: mv the committed .txt to the real .toml path (see terminal-sandbox.yaml)'
    - remove the orphan '<name>.toml.txt.lock' left behind, if present

native_structured_formats: [.json, .yaml, .yml, .ini, .cfg]

gotchas:
  - 'DEVIATION: .toml is NOT natively supported on this install (re-verify before trusting otherwise) — always go through the .txt-then-mv workaround'
  - unknown extension needs an explicit format_group override or you get UNKNOWN_FORMAT
  - .py create MUST pass initial_content or open fails
  - after mv in terminal, remember to remove the orphan .txt.lock file — it is not cleaned up automatically
  - closing a modified uncommitted draft is rejected to prevent silent data loss

errors:
  UNKNOWN_FORMAT: 'unknown extension — pass format_group explicitly or use the .txt workaround'
  OPEN_ERROR: 'create failed — check file_path validity and initial_content presence for .py'
  VALIDATION_ERROR: 'schema/param problem — cmd_help(cmdname), fix, retry once'
