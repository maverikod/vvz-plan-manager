# ai-editor open/preview/edit/write/close lifecycle for an EXISTING project file.

procedure:
  - create a CA session and retain its session_id
  - open the project-relative file with universal_file_open
  - preview the current draft and select format-appropriate identifiers
  - >-
    apply one bounded batch with universal_file_edit -> re-preview after EVERY edit
    (edit outcome signal is not trustworthy on this install — see gotchas)
  - inspect universal_file_write(write_mode=preview) for exact placement
  - commit with universal_file_write(write_mode=commit)
  - close every opened file and delete the CA session, ALWAYS, even on abort

required_live_contract:
  edit_outcome: >-
    DEVIATION from the template default: do not assume a successful edit signal means
    the draft mutated — verify by re-preview every time (see gotchas)
  imports: sibling project imports are visible to isolated validation
  formats: [python, json, yaml, yml, ini, cfg, text, markdown]
  # DEVIATION: this project's tooling-rules.yaml intentionally drops the template's
  # python_headers/nested_statements contract items and TOML from `formats` — see
  # roles/tooling-rules.yaml for why (2026-07-20 pruned-note discipline).

commands:
  universal_file_open: 'project_id, file_path, session_id required; create/initial_content optional'
  universal_file_preview: 'no session_id needed for a one-shot preview of a healthy file'
  universal_file_node_at_line: 'resolve the current node and ancestors after structural changes'
  universal_file_edit: 'operations[] required; file_path required if multi_file_bundle.open_file_count > 1'
  universal_file_write: 'write_mode preview|commit, default preview; unchanged=true is a no-op'
  universal_file_close: 'write_before_close optional; refuses MODIFIED_NOT_WRITTEN unless set'

gotchas:
  - 'KEPT (established 2026-07-20, re-verify on your install and record your own bug ids): edit error signal UNTRUSTED — after EVERY edit, re-preview; if change landed do not reapply, if absent reapply once'
  - 'KEPT (established 2026-07-20, re-verify on your install and record your own bug ids): commit-gate QA sandbox can yield a false import-not-found'
  - 'unclosed session = stale lock blocking the whole pipeline — close on abort too'
  - 'never CA get_file_lines on a healthy .py (USE_CST_COMMANDS) — use one-shot preview or file_structure'
  - 'KEPT (commit-gate mypy stub friction): commit validates (.py: black-parseable/flake8/mypy/docstrings, ZERO TOLERANCE; JSON/YAML: parse) — third-party stub gaps surface here first'

errors:
  SESSION_NOT_FOUND: 'session_id invalid/expired — re-run CA session_create'
  SESSION_INVALID: 'session not usable for this op — check session state'
  FILE_ALREADY_OPEN: 'reuse the existing open handle, do not reopen'
  PARSE_ERROR: 'source unparsable at open or edit time — inspect file, may need is_invalid fallback'
  VALIDATION_ERROR: 'schema/param problem — cmd_help(cmdname), fix, retry once'
  SESSION_REJECTED: 'commit rejected by CA — inspect reason before retrying'
  UPSTREAM_UPLOAD_FAILED: 'CA-side upload failed on commit — STOP, escalate, no retry loop'
  WRITE_FAILED: 'local draft write failed'
  MODIFIED_NOT_WRITTEN: 'commit intentionally or restore the draft; never silently discard'
