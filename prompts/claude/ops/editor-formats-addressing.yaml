# Format-specific addressing for universal_file_edit.

format_groups:
  python_sidecar:
    extensions: [.py, .pyi, .pyw]
    address: MAP short_id string in node_id, target_node_id, or parent_node_id
    notes:
      - use parent_node_id __root__ for module-level insertion
      - use target_node_id plus before or after for sibling insertion
      - NESTED_BATCH_FORBIDDEN — never batch a parent op with its child op together
      - universal_file_node_at_line resolves the current node and ancestors
  marked_tree:
    extensions: [.json, .yaml, .yml, .md]
    address: node_ref int-string, from preview
    # DEVIATION (2026-07-20 pruned-note discipline): the template additionally claims
    # confirmed root-key YAML insertion and try/except-statement addressability as a
    # live contract here. Neither is re-verified on this install — do not carry those
    # two specific claims forward as facts; if you need them, re-verify live first.
  structured_ini_cfg:
    extensions: [.ini, .cfg]
    address: node_ref/json_pointer per preview; values are strings
  toml:
    # DEVIATION from the template (which now claims native TOML support): CA-layer
    # TOML persistence was live-verified BROKEN on this install (2026-07-20). Use the
    # .txt-then-mv workaround (ops/editor-new-file.yaml) until re-verified.
    address: UNSUPPORTED on this install — see ops/editor-new-file.yaml workaround
  text:
    extensions: [.txt, .rst, .adoc]
    address: >-
      0-based line index from preview -> convert to 1-based start_line/end_line for
      edit; optional anchor_head/anchor_tail for safety. NEVER reuse line numbers
      across an intervening edit — always re-preview first.
  parse_error_fallback:
    address: 'is_invalid=true -> forced into line-based editing until the file achieves one clean commit'

commands:
  universal_file_edit: 'operations[]; addressing scheme depends on format group above'

gotchas:
  - never reuse a line index/node_id after an intervening edit shifted the tree — re-preview
  - NESTED_BATCH_FORBIDDEN applies only to python_sidecar (.py) parent+child batches
  - inspect the preview diff before commit

errors:
  SESSION_FILE_PATH_REQUIRED: 'multi-file session — pass file_path explicitly'
  NESTED_BATCH_FORBIDDEN: 'split parent and child edits into separate calls'
  INVALID_OPERATION: 'op shape wrong for this format group — check addressing table above'
  STALE_NODE_ID: 're-preview, the tree shifted since you read this node_id'
  UNKNOWN_NODE_REF: 're-preview, node_ref does not exist in current tree'
  LINE_OUT_OF_RANGE: 're-preview, line index stale'
  ANCHOR_MISMATCH: 'anchor_head/anchor_tail no longer matches — re-preview'
  PARSE_ERROR: 'file unparsable — may need is_invalid line-based fallback'
