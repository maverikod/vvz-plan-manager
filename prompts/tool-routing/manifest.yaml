schema: codex.tool-routing-manifest/v1
library_root: prompts/tool-routing
generated_from_live_help:
  observed_at: "2026-07-10"
  servers:
    code_analysis:
      server_id: code-analysis-server-vvz
      copy_number: 1
      version: 1.6.50
    ai_editor:
      server_id: ai-editor-server-vvz
      copy_number: 1
      version: 1.0.7
    plan_manager:
      server_id: planmgr
      copy_number: 1
      version: 0.1.24

loading_contract:
  strategy: lazy
  runtime_adapter: CODEX_MCP_PROXY_ADAPTER.yaml
  before_task_execution:
    - for proxy-backed actions, read the runtime adapter and discover the exact currently exposed proxy callable schema
    - classify the task by trigger precedence
    - read exactly one primary trigger file
    - read only the help packs named by that trigger
    - place the loaded command cards in the executing child's context
    - use live command-specific help only when the card requires it or the live schema rejects the prepared call
  forbidden:
    - hardcode a Codex MCP tool namespace or generated callable name
    - load every help pack
    - replace prepared command names with remembered legacy names
    - use a different tool route than the one selected for the current action
    - invent parameters absent from the prepared or live schema

trigger_precedence:
  - id: server_error_recovery
    file: triggers/00-server-error-recovery.yaml
  - id: plan_verification
    file: triggers/07-plan-verification.yaml
  - id: plan_execution
    file: triggers/08-plan-execution.yaml
  - id: plan_authoring
    file: triggers/06-plan-authoring.yaml
  - id: plan_read
    file: triggers/05-plan-read.yaml
  - id: terminal_host_emergency
    file: triggers/12-terminal-host-emergency.yaml
  - id: refactoring
    file: triggers/09-refactoring.yaml
  - id: file_lifecycle
    file: triggers/10-file-lifecycle.yaml
  - id: project_edit
    file: triggers/04-project-edit.yaml
  - id: code_analysis
    file: triggers/03-code-analysis.yaml
  - id: detailed_view
    file: triggers/02-detailed-view.yaml
  - id: cross_search
    file: triggers/01-cross-search.yaml
  - id: terminal_project_sandbox
    file: triggers/11-terminal-project-sandbox.yaml

ambiguity_rule:
  action: ask_owner
  forbidden: choose a trigger by convenience
