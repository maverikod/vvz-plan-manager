schema: codex.tool-trigger/v1
id: plan_authoring
priority: 30
match:
  any:
    - create or change HRS, MRS, GS, TS, or AS
    - compile common and child-specific planning context
    - change plan dependencies
    - reopen or change frozen plan artifacts
route:
  server_id: planmgr
  help_packs:
    - ../help/plan-core.yaml
    - ../help/plan-authoring.yaml
mandatory_before_mutation:
  - obtain live help for the exact mutating command
  - preserve top-down cascade discipline
hard_rule: Never author normative plan files locally.

