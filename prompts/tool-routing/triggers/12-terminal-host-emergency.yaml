schema: codex.tool-trigger/v1
id: terminal_host_emergency
priority: 15
match:
  any:
    - host operating-system incident investigation
    - real-host service or deployment emergency
    - host daemon, journal, package, network, disk, or process investigation
    - explicit user request to execute on the real host
exclude:
  - ordinary project work
  - project tests or application execution
  - project file editing
  - convenience fallback from CAS or sandbox
route:
  server_id: mcp-terminal-vvz
  command: terminal_host_exec
  help_packs:
    - ../help/terminal-host-emergency.yaml
before_action:
  - obtain explicit current user authorization
  - state why CAS and sandbox cannot satisfy the task
  - state target host, user, command, and expected effect
hard_rules:
  - Prefer argv over shell.
  - Never inspect or reference SSH key material.
  - Always verify execution_target=host_ssh and process exit status.
  - terminal_kill cannot stop host jobs.

