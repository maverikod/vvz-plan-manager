schema: codex.tool-trigger/v1
id: project_edit
priority: 50
match:
  any:
    - modify an existing project file
    - create a project file with content
    - target nodes in an active edit draft
    - preview or commit a project-file diff
exclude:
  - local system or subordinate prompt files
  - read-only project inspection
  - search or code analysis
  - move, copy, remove, or rename without content editing
route:
  editor_server_id: ai-editor-server-vvz
  identity_server_id: code-analysis-server-vvz
  help_packs:
    - ../help/ai-editor-mutation.yaml
first_action: Create or reuse one Code Analysis client session, then open through AI Editor.
hard_rule: Project content mutation never uses local filesystem tools.

