schema: codex.tool-trigger/v1
id: detailed_view
priority: 70
match:
  any:
    - read or inspect a known project file
    - inspect a search result in detail
    - obtain exact source context
    - drill into a structured file
route:
  server_id: code-analysis-server-vvz
  help_packs:
    - ../help/cas-detailed-preview.yaml
first_command: universal_file_preview
hard_rules:
  - Always pass full_text_max_lines explicitly.
  - Use the integer node_ref returned by preview.
  - Never substitute local file reads or AI Editor preview for ordinary project inspection.

