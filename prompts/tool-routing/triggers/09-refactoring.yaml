schema: codex.tool-trigger/v1
id: refactoring
priority: 45
match:
  any:
    - refactor without changing required behavior
    - rename, move, extract, inline, split, or reorganize code
    - remove dead code or a project file
    - change signature or update call sites
    - restructure packages, imports, or dependencies
route:
  analysis_server_id: code-analysis-server-vvz
  editor_server_id: ai-editor-server-vvz
  help_packs:
    - ../help/cas-code-analysis.yaml
    - ../help/cas-refactoring.yaml
    - ../help/cas-file-lifecycle.yaml
    - ../help/ai-editor-mutation.yaml
mandatory_order:
  - CAS impact analysis
  - select a verified live structural mutator or AI Editor content workflow
  - mutate only with explicit authority
  - refresh indexes when filesystem structure changed
  - repeat impact checks and run quality verification
hard_rules:
  - CAS 1.6.50 has no specialized symbol rename, extract, inline, signature-change, or safe-delete command.
  - Never invent a refactoring command.
  - File move, copy, and remove commands do not rewrite imports or references.
