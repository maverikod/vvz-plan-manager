schema: codex.tool-trigger/v1
id: cross_search
priority: 80
match:
  any:
    - search the project
    - find text, topic, behavior, configuration, or marker
    - locate candidate files
    - semantic or full-text discovery
exclude:
  - known-file detailed inspection
  - AST, dependency, inheritance, usage, or structural question
  - command catalog discovery
route:
  server_id: code-analysis-server-vvz
  help_packs:
    - ../help/cas-cross-search.yaml
first_command: search
hard_rule: Generic project search is Code Analysis Server cross-search, never local grep or shell search.

