schema: codex.tool-trigger/v1
id: file_lifecycle
priority: 46
match:
  any:
    - list or discover project files
    - copy, move, rename, remove, delete, create, upload, or download a file
    - inspect file backups or versions
    - inspect deleted-file records
    - restore or purge deleted content
    - use project trash or recycle bin
    - clean or restore Git-managed files
route:
  server_id: code-analysis-server-vvz
  help_packs:
    - ../help/cas-file-lifecycle.yaml
first_action:
  trash_or_restore_request: determine object_kind as file or project
  ordinary_file_request: select the narrowest file lifecycle command
hard_rules:
  - File operations and project-trash operations are different command families.
  - Never route a file request to whole-project trash commands.
  - Destructive operations require explicit user authorization and live command-specific help.
  - Keep backup or dry-run safeguards enabled when supported.

