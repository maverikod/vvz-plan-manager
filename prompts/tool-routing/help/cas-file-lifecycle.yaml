schema: codex.command-help-pack/v1
id: cas_file_lifecycle
server:
  server_id: code-analysis-server-vvz
  copy_number: 1
  observed_version: 1.6.50

discovery:
  list_project_files:
    use: List on-disk project files and indexed file_id values.
    required: [project_id]
    key_optional:
      file_pattern: project-relative fnmatch or directory prefix
      glob: alias of file_pattern
      page_size: "default 20; maximum 200"
      block_position: "1-based"
      show_hidden: false
      show_venv: false
      python_only: false
    note: file_id is null when an on-disk file is not indexed.

file_mutations:
  fs_copy:
    use: Copy one file.
    required: [project_id, source_path, dest_path]
    critical_defaults:
      overwrite: false
      backup: true
    limitations:
      - no dry-run
      - no reference rewrite
      - no index update

  fs_move:
    use: Move or rename one file.
    required: [project_id, source_path, dest_path]
    critical_defaults:
      overwrite: false
      backup: true
    limitations:
      - no dry-run
      - no import or reference rewrite
      - no DB-row or index update

  fs_remove:
    use: Unlink one file after impact and deletion checks.
    required: [project_id, file_path]
    critical_defaults:
      backup: true
    limitations:
      - files only
      - no dry-run
      - no DB-row or index update
      - not recycle-bin deletion
    warning: Do not automatically run repair_database after intentional removal; it may restore from CST.

backup_history:
  list_backup_files:
    use: List project files with old_code history.
    required: [project_id]
    key_optional: [file_pattern, glob]
  list_backup_versions:
    use: List versions for one literal project-relative path.
    required: [project_id, file_path]
    ordering: newest first
  absent_restore_command:
    restore_backup_file: not published in live catalog

deleted_file_registry:
  list_deleted_files:
    use: Read DB deleted/tombstone rows.
    required: [project_id]
    key_optional: [file_pattern, glob]
    returns: [id, path, original_path, in_trash, updated_at, total]
    warning: A tombstone does not prove a recoverable file trash artifact exists.
  file_trash_mutations:
    published: false
    absent:
      - delete_file
      - restore_deleted_file
      - restore_file_from_trash
      - undelete_file
      - permanently_delete_file
      - purge_deleted_file
      - clear_deleted_files
    action: Escalate; never substitute project-trash commands.

large_file_transfer:
  project_file_transfer_download_begin:
    use: Start download for one indexed file_id, optionally with backup history and lock.
    required: [file_id, compression]
    key_optional: [project_id, include_backup_history, session_id, lock_mode]
  project_file_transfer_upload_save:
    use: Save a completed upload into an existing or new project file.
    required: [transfer_id]
    selector:
      update_existing: file_id
      create_new: [project_id, file_path]
    critical_defaults:
      dry_run: false
      diff: false
      backup: true
      unlock_after_write: true
    rule: Use transfer_upload_begin/status/complete before save.

consistency:
  update_indexes:
    use: Re-index after file-structure mutation when current indexed state is required.
    required: [project_id]
    execution: queued
  repair_database:
    use: Diagnose or repair DB/disk integrity, not ordinary deletion.
    required: [project_id]
    critical_rule: Always run dry_run=true first.

git_file_operations:
  git_restore:
    use: Restore tracked worktree/index state or unstage.
    required: [project_id]
    target: paths or all=true
    warning: worktree=true can discard uncommitted content.
  git_clean:
    use: Preview or remove untracked files and optionally directories.
    required: [project_id]
    critical_defaults:
      dry_run: true
      confirm: false
      directories: false
    deletion_gate: dry_run=false requires confirm=true

project_trash:
  object_kind: whole project only
  hard_rule: Never use these commands for an individual file.
  commands:
    project_set_mark_del:
      use: Move an entire project root to trash and update project state.
      required: [project_id]
      key_optional:
        dry_run: false
        delete_from_disk: false
    list_trashed_projects:
      use: List whole projects retained in trash.
      required: []
      key_optional: [trash_dir]
    restore_project_from_trash:
      use: Restore one whole project.
      required: [trash_folder_name]
      key_optional: [trash_dir]
    permanently_delete_from_trash:
      use: Permanently delete one whole trashed project.
      required: [trash_folder_name]
      key_optional: [trash_dir]
      dry_run: unsupported
    clear_trash:
      use: Clear all trashed projects and related orphan state.
      required: []
      critical_defaults:
        dry_run: false
      key_optional: [trash_dir]

destructive_gate:
  commands:
    - fs_remove
    - "fs_move overwrite=true"
    - "fs_copy overwrite=true"
    - "git_restore worktree=true"
    - "git_clean dry_run=false"
    - project_set_mark_del
    - permanently_delete_from_trash
    - clear_trash
  require:
    - explicit user authorization
    - live command-specific help
    - backup or dry-run when supported

hard_errors:
  PROJECT_NOT_FOUND: rediscover project_id
  FILE_NOT_FOUND: verify exact project-relative path
  FILE_DELETED: inspect tombstone and escalate recovery ambiguity
  VALIDATION_ERROR: obtain exact live command help
