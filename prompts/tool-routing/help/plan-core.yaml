schema: codex.command-help-pack/v1
id: plan_manager_core
server:
  server_id: planmgr
  copy_number: 1
  observed_version: 0.1.24
source_of_truth: Plan Manager database

ideology:
  semantic_reproduction: Children semantically reproduce their parent.
  levels:
    HRS: human-owned binding source specification
    MRS: concepts and typed relations; no implementation details or free prose
    GS: conceptual objects and operations; no file/function details
    TS: concrete entities and actions; no file/function implementation
    AS: one indivisible change touching exactly one file
  normative_change: top-down under cascade discipline
  context: common parent block plus child-specific delta
  zero_assumption: ambiguity escalates to the direct owner
  computed_views: derived, never normative files

bootstrap_when:
  - first planning action in a session
  - observed server version differs
  - prepared command card conflicts with a live schema

bootstrap_commands:
  - "info {section: identity}"
  - "info {section: planning_standards}"
  - "info {section: delegation_method_documentation}"

global_rules:
  - Use plan name or UUID exactly as returned by plan_list.
  - Do not infer plan state from local files or cached exports.
  - Use live command-specific help before any mutation not fully specified by a prepared card.
  - A transport or infrastructure error is escalated without local fallback.

