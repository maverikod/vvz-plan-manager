schema: codex.command-help-pack/v1
id: plan_manager_authoring
server:
  server_id: planmgr
  copy_number: 1

context_compilation:
  preferred:
    command: context_bundle
    required: [plan, node, child_level, children]
    key_optional: [shared_concepts, revision, cascade_uuid]
    children_shape:
      - ref: "<child reference>"
        concepts: ["C-NNN"]
  explicit_sequence:
    - command: context_common
      required: [plan, node, child_level]
      key_optional: [shared_concepts, revision, cascade_uuid]
      returns: common_block_id
    - command: context_specific
      required: [plan, common_block_id, concepts]
    - command: block_get
      required: [plan, block_id]
  invariants:
    - child_level is 3, 4, or 5
    - child concepts are a subset of common scope
    - revision and cascade_uuid are mutually exclusive
    - use cascade_uuid for open-cascade working state
    - context blocks are derived, not plan truth

mutation_routing:
  HRS:
    commands: [hrs_import, para_label_assign, para_mark_non_binding]
  MRS:
    commands: [concept_add, concept_update, concept_remove, relation_add, relation_remove]
  steps:
    commands: [step_create, step_update, step_move, step_delete, step_transition]
  dependencies:
    commands:
      - step_dependency_preview
      - step_dependency_apply
      - step_dependency_add
      - step_dependency_remove
      - step_dependency_set
      - step_dependency_clear
  cascade:
    commands: [cascade_begin, cascade_preview, cascade_commit, cascade_abort]

mandatory_mutation_law:
  - Obtain live help for the exact mutating command before constructing parameters.
  - Frozen or MRS-level normative change uses an open cascade.
  - Preview cascade/dependency impact before commit.
  - Commit only after the mechanical gate is green.
  - Never silently rewrite binding HRS.

stable_context_errors:
  CONCEPT_OUT_OF_SCOPE: return to parent and correct child scope
  COMMON_BLOCK_NOT_FOUND: rebuild common context from current plan state
  INVALID_LEVEL: correct child_level
  REVISION_NOT_FOUND: refresh plan status
  CASCADE_CONFLICT: refresh open cascade identity

