schema: codex.command-help-pack/v1
id: plan_manager_execution
server:
  server_id: planmgr
  copy_number: 1

entry_requirements:
  - committed plan revision
  - green plan_validate result for the same scope and revision
  - steps admitted by lifecycle status

command_cards:
  graph_order:
    use: Deterministic topological order.
    rule: A cycle is a hard blocker.

  graph_parallel_map:
    use: Dependency waves by prerequisite depth.
    rule: No ordering guarantee inside a wave.

  graph_deps:
    use: Dependency neighborhood for one step.

  graph_impact:
    use: Read-only transitive impact set.

  plan_prompt_chain:
    use: Compile deterministic deduplicated execution corpus.
    required: [plan, scope, role]
    key_optional:
      revision: "head when omitted"
      include_statuses: "defaults to frozen and ready_for_review"
    scope: "whole_plan | G-NNN | G-NNN/T-NNN"
    role: "coder | review | conscience"
    returns: [waves, blocks, assembly, meta]
    boundaries:
      - no model selection
      - no agent dispatch
      - no tokenization
      - no execution logging

  branch_prompt:
    use: Compile one exact branch prompt with token estimate and budget.

execution_rules:
  - Codex orchestration dispatches prompt-assigned owner/executor duties; model selection is unavailable and never required.
  - Pass only assembly selectors required by the child.
  - Same-file AS work is serialized by priority.
  - Independent files may run in parallel according to graph_parallel_map.
  - Runtime reporting does not imply lifecycle completion.
