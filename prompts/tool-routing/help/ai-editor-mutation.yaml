schema: codex.command-help-pack/v1
id: ai_editor_mutation
servers:
  identity:
    server_id: code-analysis-server-vvz
    copy_number: 1
  editor:
    server_id: ai-editor-server-vvz
    copy_number: 1
    observed_version: 1.0.7

identity_rules:
  project_id: obtain from Code Analysis Server list_projects
  file_path: project-relative POSIX literal; no absolute path, glob, or ..
  editor_file_id: forbidden
  session_id: one Code Analysis client session reused for the complete edit lifecycle

lifecycle:
  - command: session_create
    server: code-analysis-server-vvz
    required: [comment]
    returns: session_id

  - command: universal_file_open
    server: ai-editor-server-vvz
    required: [project_id, file_path, session_id]
    key_optional:
      create: "default false"
      initial_content: "required by policy when create=true"
    next: universal_file_preview
    rules:
      - Existing-file lock and transfer are internal; do not call them separately.
      - A new file becomes registered only on successful commit.
      - Do not emit format_group; it is absent from the live schema.

  - command: universal_file_preview
    server: ai-editor-server-vvz
    required: [project_id, file_path, session_id]
    critical_params:
      full_text_max_lines: "use 0 for mutation targeting and node drill-down"
      node_ref: "decimal form of the fresh integer node_ref"
    use: Inspect the active draft, not the general project.

  - command: universal_file_edit
    server: ai-editor-server-vvz
    required: [project_id, session_id, operations]
    conditional:
      file_path: required when the session has multiple open files
    effect: draft only
    rules:
      - The entire operation batch validates before any change.
      - Do not target a parent and descendant in one Python batch.
      - Re-preview after a line-shifting plain-text edit.

  - command: universal_file_write
    server: ai-editor-server-vvz
    phase: preview
    required: [project_id, session_id, write_mode]
    fixed:
      write_mode: preview
    effect: diff only; no upload
    mandatory: inspect diff before commit

  - command: universal_file_write
    server: ai-editor-server-vvz
    phase: commit
    required: [project_id, session_id, write_mode]
    fixed:
      write_mode: commit
    key_optional:
      format_python: "default false"
      verify_after_upload: "recommended true for high-risk changes"
    success_requirements:
      - uploaded=true for changed content
      - unchanged=true is acceptable only when the intended content already exists

  - command: universal_file_close
    server: ai-editor-server-vvz
    required: [project_id, session_id]
    conditional:
      file_path: required when the session has multiple open files
    critical_default:
      write_before_close: false
    rule: Close every opened file.
    unsaved_behavior: MODIFIED_NOT_WRITTEN and session remains open

  - command: session_delete
    server: code-analysis-server-vvz
    required: [session_id]
    fixed:
      force: false
    precondition: all editor files closed and no locks or subordinate links

hard_errors:
  SESSION_NOT_FOUND: create a fresh Code Analysis client session
  FILE_ALREADY_OPEN: escalate to the owning session/owner
  UNKNOWN_NODE_REF: refresh draft preview
  STALE_NODE_ID: refresh draft preview
  NESTED_BATCH_FORBIDDEN: split parent and descendant edits
  VALIDATION_ERROR: edit, preview, then retry commit
  UPSTREAM_UPLOAD_FAILED: escalate verbatim
  MODIFIED_NOT_WRITTEN: explicitly commit or obtain owner authorization

routing_guard:
  project_search: Code Analysis Server search
  project_detailed_view: Code Analysis Server universal_file_preview
  project_AST_analysis: Code Analysis Server AST/analysis commands
  active_draft_navigation: AI Editor preview/search
  content_mutation: AI Editor lifecycle
  move_copy_remove_rename: Code Analysis Server filesystem commands
