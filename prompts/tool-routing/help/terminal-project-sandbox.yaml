schema: codex.command-help-pack/v1
id: terminal_project_sandbox
server:
  server_id: mcp-terminal-vvz
  copy_number: 1
  observed_version: 0.1.39

admission:
  required:
    - registered Code Analysis project_id
    - proven absence of required CAS execution capability
    - task authorization for terminal execution
  defaults:
    mode: read_only
    network: none
    keep_container: false
  hard_rule: Never substitute host execution for project sandbox work.

lifecycle:
  discover:
    preferred: code-analysis-server-vvz.list_projects
    validate_with:
      command: terminal_list_watch
      critical_params:
        rescan: true
    registry_refresh:
      command: terminal_registry_refresh
      use_only_when: terminal registry is stale

  create_parent_session:
    server: code-analysis-server-vvz
    command: session_create
    required: [comment]
    returns: session_id

  create_terminal_session:
    command: terminal_session_create
    required: [project_id, session_id]
    critical_params:
      bootstrap_python_env: "default true"
      workspace_write: "request true only for authorized writes"
      use_venv: "prepends /workspace/.venv/bin when enabled"
      pid_namespace: "container by default; host only for explicit PID diagnostics"
    returns: [created, already_exists, workspace_write, use_venv, pid_namespace, bootstrap]

  poll_bootstrap:
    command: terminal_get_session_bootstrap
    required: [project_id, session_id]
    terminal_states: [completed, failed]
    use_when: bootstrap is pending

  run:
    command: terminal_run
    required: [project_id, session_id, execution_kind]
    conditional:
      shell: command
      argv: argv
    critical_params:
      cwd: "project-relative; no absolute path or .."
      mode: "read_only | workspace_write | scratch_write"
      network: "none | package_registry"
      image_profile: "python_dev_3_12 | node_dev_20 | base_tools"
      timeout_seconds: "default 600; range 1..86400"
      keep_container: "false for one-shot; true only for related runs or PTY"
    returns: [job_id, seq, stdout_file, stderr_file, meta_file]

  poll:
    command: terminal_get_status
    required: [project_id, session_id, seq]
    success_gate:
      queue_status: completed
      terminal_status: success
      exit_code: 0
      timed_out: false
      execution_target: sandbox

  inspect_output:
    terminal_tail:
      required: [project_id, session_id, seq, stream]
      lines: "default 100"
    terminal_read:
      required: [project_id, session_id, seq, stream]
      max_bytes: "default 65536; maximum 1048576"
    terminal_stat:
      required: [project_id, session_id, seq]
    terminal_get:
      required: [project_id, session_id, seq]
    terminal_search_output:
      required: [project_id, session_id, seq, stream, pattern]

  kill_if_stuck:
    command: terminal_kill
    required: [project_id, session_id, seq]
    precondition: terminal_get_status is still pending
    after: poll status again

  cleanup:
    - command: terminal_delete
      required: [project_id, session_id]
      critical_params:
        force: "default false"
    - server: code-analysis-server-vvz
      command: session_delete
      required: [session_id]
      critical_params:
        force: false

interactive_optional:
  use_only_for: [prompted command, REPL, debugger, interactive tool]
  sequence:
    - "terminal_run keep_container=true"
    - terminal_attach
    - terminal_send
    - terminal_read_shell
    - terminal_resize
    - terminal_detach
    - terminal_delete

hard_errors:
  CLIENT_SESSION_NOT_FOUND: create and reuse a CAS session
  SUBORDINATE_SESSION_NOT_LINKED: rerun terminal_session_create
  PROJECT_NOT_FOUND: rediscover with terminal_list_watch
  WORKSPACE_WRITE_NOT_ALLOWED: use read_only or resolve the writer
  INVALID_CWD: use a project-relative path without ..
  INVALID_COMMAND: align execution_kind with command or argv
  RUNTIME_IMAGE_STALE: rebuild through session bootstrap
  SESSION_RUNNING: wait or kill only if pending

