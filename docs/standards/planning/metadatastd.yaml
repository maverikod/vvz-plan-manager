meta:
  title: Command Metadata and Schema Standard
  version: '1.0'
  locale: en
  description: >
    Standard for describing MCP command input schemas and extended command
    metadata in [app_dir]. The external MCP/API surface is owned by
    mcp-proxy-adapter. [app_dir] is responsible for registering command
    classes and providing descriptions that the adapter exposes through
    help, OpenAPI, and MCP tooling.
  scope:
    applies_to: "[app_dir]/commands/**"
    covers:
      - get_schema()  — machine-readable input schema for validation and adapter help
      - metadata()    — extended AI/documentation metadata (behavior, examples, errors)
    rule: do not merge these two responsibilities into one structure

command_class_shape:
  description: Every new MCP command class must define these attributes and methods.
  required_attributes: [name, version, descr, category, author, email]
  required_methods:
    get_schema:
      signature: "@classmethod def get_schema(cls) -> Dict[str, Any]"
      rule: return get_some_command_schema() or inline schema for small commands
    validate_params:
      signature: "def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]"
      rule: call super().validate_params(params) first; add semantic validation after
    execute:
      signature: "def execute(self, ...) -> Dict[str, Any]"
    metadata:
      signature: "@classmethod def metadata(cls) -> Dict[str, Any]"
      rule: return get_some_command_metadata(cls)
  layout:
    small_commands: schema inline in get_schema()
    complex_commands:
      - "[app_dir]/commands/some_command.py"
      - "[app_dir]/commands/some_command_schema.py"
      - "[app_dir]/commands/some_command_metadata.py"
    large_metadata_split:
      - "some_command_metadata.py"
      - "some_command_metadata_descr_params.py"
      - "some_command_metadata_errors_return.py"
      - "some_command_metadata_examples.py"

get_schema:
  return_shape:
    type: object
    properties: "{param_name: {type, description, ...}}"
    required: "[list of required param names]"
    additionalProperties: false
  validator_enforced_keywords: [type, properties, required, additionalProperties, enum]
  supported_property_types: [string, integer, number, boolean, array, object]
  documentation_only_keywords:
    - default
    - description
    - items
    - nested properties
    - nested required
    - oneOf
  rules:
    - always set additionalProperties explicitly
    - prefer additionalProperties=false unless command intentionally accepts arbitrary keys
    - every public parameter accepted by execute() must be present in properties
    - every required runtime parameter must be listed in required
    - use enum for fixed modes, actions, status values, and output formats
    - use default only when implementation actually handles omitted value as that default
    - use clear description text for every property
    - use items for arrays
    - use nested properties and nested required for object elements in arrays
    - add semantic validation in validate_params() for anything the base validator cannot enforce
  project_and_path_params:
    project_id:
      type: string
      description: "Project UUID. Use list_projects to discover valid project_id values."
    file_path_literal:
      type: string
      description: "Literal project-relative file path. Wildcards are not allowed."
    file_pattern_glob:
      type: string
      description: "Optional project-relative fnmatch pattern. `*` may cross `/`."
  destructive_and_write_commands:
    rule: >
      Commands that modify files, database rows, queue state, or project lifecycle
      state must expose at least one safe preview/control field when technically possible.
    allowed_safety_fields: [dry_run, preview, backup, confirm, delete_from_disk, hard_delete]
    rule_description_explicit: schema description must make safety behavior explicit
  mutually_exclusive_or_conditional:
    rule: >
      Describe with oneOf in schema for documentation; enforce semantics in
      validate_params() because base validator does not fully enforce deep oneOf.
    examples_requiring_semantic_validation:
      - exactly one of node_id or selector
      - project_id and file_path must be provided together
      - delete_from_disk=True requires explicit test-project validation
      - start_line <= end_line
      - file suffix must be supported by the selected handler

metadata:
  purpose: >
    Documentation-oriented dictionary for AI models, generated docs, and rich help.
    More explanatory than get_schema(). Must not contradict get_schema().
  required_fields:
    [name, version, description, category, author, email,
     detailed_description, parameters, return_value,
     usage_examples, error_cases, best_practices]
  parameters_entry_required: [description, type, required]
  parameters_entry_optional: [default, examples, enum, items, notes]
  return_value:
    success:
      description: str
      data: "{field_name: field_description}"
      example: "{field_name: example_value}"
    error:
      description: str
      code: stable error code string
      message: human-readable message
      details: additional diagnostic fields when available
  usage_examples:
    rule: every non-trivial command must include at least one example
    format: parameter dictionaries, NOT transport-specific JSON-RPC envelopes
    good_example:
      description: "List active projects"
      command: {include_deleted: false}
      explanation: "Returns only non-deleted projects."
    avoid: wrapping in server_id/copy_number/command/params envelope
  error_cases:
    per_entry_required: [description, message, solution]
    rule: error codes must match codes actually returned by the command
    example:
      PROJECT_NOT_FOUND:
        description: "The project_id does not exist in the database."
        message: "Project not found: {project_id}"
        solution: "Call list_projects and retry with a valid project_id."
  safety_documentation:
    required_for: write and destructive commands
    required_in: [detailed_description, best_practices]
    topics:
      - whether the command supports dry_run or preview
      - whether backups are created
      - whether changes touch disk, database, queue state, or in-memory state
      - whether the operation can be undone
      - whether the command is safe for real projects or only for test projects
      - how to verify the result with a separate read command

validation_pattern:
  principle: get_schema() handles shallow structural validation; validate_params() handles semantics
  rule: validate before queuing long-running work so invalid input fails immediately
  pattern: |
    def validate_params(self, params):
        params = super().validate_params(params)
        # semantic checks: id existence, path safety, mutually exclusive params,
        # range constraints, destructive-op guards
        return params

naming_conventions:
  simple: "<command_name>_command.py / _schema.py / _metadata.py"
  grouped: "<group>_mcp_commands.py / _schema.py / _metadata.py"
  package: "[app_dir]/commands/<group>/<command>.py / _schema.py / _metadata.py"

registration:
  method: "reg.register(SomeCommand, 'custom')"
  entry_points:
    - "[app_dir]/hooks.py"
    - "[app_dir]/hooks_register_part1.py"
    - "[app_dir]/hooks_register_part2.py"
    - "[app_dir]/commands/registration.py"
  rule: do not implement external API routes in command modules; adapter owns the surface

documentation_generation:
  source_of_truth: [command class attributes, get_schema(), metadata(), help output via MCP]
  rule: do not maintain a separate hand-written schema that can drift from command code

review_checklist:
  - "[ ] class has name, version, descr, category, author, email"
  - "[ ] registered with reg.register(..., 'custom')"
  - "[ ] get_schema() returns type=object"
  - "[ ] all public parameters listed under properties"
  - "[ ] required matches actual runtime requirements"
  - "[ ] additionalProperties is explicit"
  - "[ ] enums used for fixed modes and actions"
  - "[ ] defaults match actual implementation behavior"
  - "[ ] validate_params() performs semantic validation schema cannot enforce"
  - "[ ] metadata() includes detailed_description, parameters, return_value, usage_examples, error_cases, best_practices"
  - "[ ] destructive/write behavior documented and guarded"
  - "[ ] command appears in help after server restart"
  - "[ ] command executes successfully through MCP"
  - "[ ] result verified through separate read command when command changes state"

