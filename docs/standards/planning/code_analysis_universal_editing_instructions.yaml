meta:
  locale: en
  source: MCP help inspected for universal_file_open, universal_file_preview, 
    universal_file_edit, universal_file_write, universal_file_close
  status: active
  title: Code Analysis Server Universal Editing Instructions
  version: '1.0'
project_discovery:
  examples:
    find_code_analysis:
      command: list_projects
      expected_use: Use the returned id in all project-scoped commands.
      params:
        name_contains: code
    list_all_active:
      command: list_projects
      params: {}
    list_all_including_deleted:
      command: list_projects
      params:
        include_deleted: true
  primary_command: list_projects
  purpose: Discover project UUIDs before any project-scoped command.
  rules:
  - The analysis server may contain multiple registered projects.
  - Never assume project_id from project name alone.
  - Use list_projects with name_contains for fast lookup by name.
  - Use list_projects with comment_contains for fast lookup by 
    description/comment.
  - Use list_projects with include_deleted=true only when trash/deleted state 
    must be inspected.
  - Use returned id as project_id; do not use name or root_path as project_id.
session_policy:
  chat_session_id:
    note: The edit lifecycle uses a Code Analysis client session.
    rule: Call session_create on Code Analysis Server and reuse the returned
      session_id unchanged for open, preview, edit, write, close, and cleanup.
  close_policy:
    close_when: No further work on the file is expected, or an error/abort 
      requires cleanup.
    keep_open_when: Further edits to the same file are expected in the current 
      task.
  lifecycle:
  - open
  - preview
  - drilldown
  - edit
  - preview_draft
  - write_preview
  - write_commit
  - verify_by_separate_read_or_preview
  - close_when_no_further_work_expected
  per_file_edit_session:
    owner_command: session_create on Code Analysis Server
    returned_field: session_id from session_create
    rule: universal_file_open validates and reuses the supplied session_id; the
      editor does not mint a separate session identity.
commands:
  universal_file_open:
    purpose: Open or create one project file for universal edit-session 
      workflow.
    required_params:
    - project_id
    - file_path
    - session_id
    optional_params:
      create:
        behavior: Create the file when it does not exist.
        default: false
        type: boolean
      initial_content:
        behavior: Used only with create=true; Python requires valid Python 
          source.
        type: string
    response_fields:
      available_operations:
        enum:
        - insert
        - delete
        - replace
      created: Optional; true when a missing file was created.
      fallback_reason: Optional; PARSE_ERROR for JSON/YAML text fallback.
      is_invalid: Optional syntax-invalid flag.
      original_format_group: Optional original handler before fallback.
      session_id: UUID for subsequent edit/write/close calls.
    format_groups:
      sidecar:
        file_types:
        - .py
        - .pyi
        - .pyw
        model: CST sidecar
        node_ref: stable UUID
      text:
        file_types:
        - .md
        - .txt
        - .rst
        - .adoc
        model: line based
        node_ref: zero-based line index
      tree-temp:
        file_types:
        - .json
        - .yaml
        - .yml
        model: in-memory tree
        node_ref: JSON Pointer
    rules:
    - Call universal_file_preview after open to obtain current node_refs.
    - If create=true for Python, initial_content must be valid Python source.
    - If fallback_reason=PARSE_ERROR, treat the file as syntactically invalid 
      and fix syntax before normal structured edits.
    - One edit session per file at a time.
    - Initial backup is created automatically when no backup history exists.
  universal_file_preview:
    purpose: Read-only structured preview of a file or node; also previews open 
      session drafts when session_id is provided.
    required_params:
    - project_id
    - file_path
    optional_params:
      full_text_max_lines: Python full-text fallback threshold; set 0 to force 
        CST structured output.
      node_ref: Focus node identifier from a previous preview.
      preview_lines: Block cap when selector is omitted.
      selector: Slice string, list of block indices, or list of node_ref values.
      session_id: Preview current draft instead of disk.
      tree_id: Existing in-memory tree session UUID.
      value_preview_len: Inline scalar/name length cap.
    navigation:
      drilldown: Pass node_ref from any returned block.
      large_files: Use selector="0:N" or preview_lines to limit response size.
      root: Omit node_ref to get file root.
    node_ref_by_format:
      sidecar: stable CST UUID for Python.
      text: zero-based line index string.
      tree-temp: JSON Pointer string for JSON/YAML.
    rules:
    - Always preview before edit to get valid node_refs.
    - For Python, set full_text_max_lines=0 when stable CST node UUIDs are 
      needed.
    - For JSON/YAML, pass node_ref into edit as json_pointer, not node_id.
    - 'For text, convert node_ref to 1-based line number: start_line = int(node_ref)
      + 1.'
    - Pass session_id after edits to preview the draft before commit.
  universal_file_edit:
    atomicity:
      rule: Multiple operations in one batch are validated together before any 
        modification is applied.
    operation_types:
    - replace
    - insert
    - delete
    purpose: Apply a batch of edits to the in-memory draft; does not write the 
      original file to disk.
    required_params:
    - project_id
    - session_id
    - operations
    sidecar_python_operations:
      delete:
        required:
        - type: delete
        - node_id: node_ref UUID from preview
      insert_container:
        required:
        - type: insert
        - parent_node_id: parent UUID or __root__ for module level
        - position: first | last
        - code_lines: list[string]
      insert_sibling_relative:
        required:
        - type: insert
        - target_node_id: sibling UUID
        - position: before | after
        - code_lines: list[string]
      replace:
        alternative: code string is accepted, but code_lines is recommended.
        required:
        - type: replace
        - node_id: node_ref UUID from preview
        - code_lines: list[string]
      restrictions:
      - Ancestor-descendant node pairs in one batch are rejected.
      - Use target_node_id + before/after for sibling insert.
      target_model: CST nodes by stable UUID.
    text_operations:
      delete:
        required:
        - type: delete
        - start_line: integer
        - end_line: integer
      insert_at_end:
        required:
        - type: insert
        - position: last
        - content: string
      replace:
        required:
        - type: replace
        - start_line: integer
        - end_line: integer
        - content: string
      rules:
      - Preview node_ref is zero-based; convert to 1-based start_line.
      - Use position=last to append without knowing line count.
      target_model: 1-based inclusive line ranges.
    tree_temp_json_yaml_operations:
      delete:
        required:
        - type: delete
        - json_pointer: pointer string
      insert_array:
        optional_ordering:
        - index
        - position: last
        - before_node_id
        - after_node_id
        required:
        - type: insert
        - parent_json_pointer: array pointer or pointer ending with /-
        - value: any JSON-compatible value
      insert_object:
        optional_ordering:
        - before_key
        - after_key
        required:
        - type: insert
        - parent_json_pointer: object pointer, empty string for document root
        - key: object key
        - value: any JSON-compatible value
      replace:
        required:
        - type: replace
        - json_pointer: pointer string
        - value: any JSON-compatible value
      rules:
      - Use json_pointer, not node_id, for pointers returned by preview.
      - parent_json_pointer ending in /- appends to an array.
      - 'Replace can change value type: scalar, array, object, null, boolean, number,
        string.'
      target_model: JSON Pointer or opaque UUID; preview returns JSON Pointer.
  universal_file_write:
    optional_params:
      write_mode:
        default: preview
        enum:
        - preview
        - commit
    protocols:
      sidecar_python:
        legacy_sequence_when_write_mode_omitted:
        - First call returns phase=preview and creates lockfile.
        - Second call with same session commits.
        recommended_sequence:
        - Call with write_mode=preview explicitly.
        - Inspect unified diff.
        - Call with write_mode=commit explicitly.
      tree_temp_and_text:
        sequence:
        - Call with write_mode=preview; inspect unified diff; no disk write.
        - Call with write_mode=commit; backup original and atomically write 
          draft.
    purpose: Persist draft changes to disk after preview.
    required_params:
    - project_id
    - session_id
    rules:
    - Always preview before commit.
    - Repeated write_mode=preview must never commit.
    - Backup is created before commit write.
    - After commit of Python code, run appropriate format/lint/type checks when 
      applicable.
    - Verify committed result with a separate read command or 
      universal_file_preview without relying only on write response.
  universal_file_close:
    behavior_by_format:
      sidecar: Verifies sidecar SHA-256 against source; rebuilds sidecar if 
        source differs; deletes write lockfile.
      text: Deletes draft file and lockfile; uncommitted edits are discarded.
      tree-temp: Deletes draft file, frees in-memory tree, deletes lockfile; 
        uncommitted edits are discarded.
    purpose: End the edit session and clean up session artifacts.
    required_params:
    - project_id
    - session_id
    rules:
    - Always close sessions when no further work on the file is expected.
    - Close even after write failure to clean partial artifacts.
    - Do not close before commit if the draft changes are still needed.
    - Uncommitted edits are silently discarded on close.
standard_edit_workflows:
  abort_or_error:
    steps:
    - Stop normal work.
    - Do not attempt destructive cleanup beyond closing the known session.
    - Close the open session if one exists and cleanup is safe.
    - Escalate to the user with command, expected, actual, error, root cause 
      hypothesis, next safe step.
  create_file:
    steps:
    - Resolve project_id with list_projects.
    - Open with universal_file_open create=true and initial_content if needed.
    - Preview created draft.
    - Edit if required.
    - Write preview.
    - Commit.
    - Verify by separate read/preview.
    - Close when done.
  existing_file_node_edit:
    steps:
    - Resolve project_id with list_projects.
    - Run search or another read-only locator to identify 
      candidate file and node evidence.
    - Open file with universal_file_open.
    - Preview root with universal_file_preview using session_id.
    - Drill down with universal_file_preview node_ref until exact node is 
      identified.
    - Edit the concrete node with universal_file_edit.
    - Preview draft with universal_file_preview using session_id.
    - Write preview with universal_file_write write_mode=preview.
    - Inspect diff.
    - Commit with universal_file_write write_mode=commit.
    - Verify by separate universal_file_preview or other read command.
    - Close with universal_file_close unless more edits are expected.
verification_policy:
  forbidden:
  - Do not edit .venv, site-packages, or installed packages.
  - Do not run destructive commands without explicit target validation.
  - Do not use unrelated or non-target projects for destructive testing.
  required:
  - Every write must be verified by a separate read command or preview after 
    commit.
  - Queue completion alone is not success; if queue is used, inspect 
    result.command.result.success.
  - Record behavior in observations when editing plans or implementation files.
