  def import_hrs(conn, plan_uuid, text: str, author: str, cascade) -> dict:
      """Wholly replace a plan's stored paragraphs from an HRS Markdown document.

      Parses `text`, assigns fresh unique labels to binding paragraphs lacking
      one (C-002), deletes the plan's previously stored paragraphs, inserts the
      new binding set in position order, and records the revision: under an
      open cascade (C-016) each inserted paragraph is recorded through one
      `cascade_write` call carrying its full paragraph snapshot; otherwise a
      single direct revision (C-018) advances the plan head and carries every
      paragraph snapshot.

      :param conn: An open psycopg 3 database connection.
      :param plan_uuid: The identity of the plan whose paragraphs are replaced.
      :param text: The HRS Markdown source document to ingest.
      :type text: str
      :param author: The attributed author of the resulting revision(s).
      :type author: str
      :param cascade: The open cascade record (a CascadeRecord instance) to
          write under, or None for a direct head-advancing revision.
      :return: A dict with key "paragraphs" mapping to the count of stored
          paragraphs.
      :rtype: dict
      :raises ValueError: If validate_hrs(text) returns any issues; the
          message is the issues joined by "; ".
      """
      issues = validate_hrs(text)
      if issues:
          raise ValueError("; ".join(issues))

      paragraphs = parse(text)
      labeled, _new_labels = assign_missing_labels(paragraphs)

      delete_paragraphs(conn, plan_uuid)
      row_uuids = insert_paragraphs(conn, plan_uuid, labeled)

      snapshots = [
          {
              "kind": "paragraph",
              "uuid": str(row_uuid),
              "plan_uuid": str(plan_uuid),
              "label": paragraph.label,
              "text": paragraph.text,
              "position": paragraph.position,
          }
          for row_uuid, paragraph in zip(row_uuids, labeled)
      ]

      if cascade is None:
          plan = get_plan(conn, plan_uuid)
          record_revision(
              conn,
              plan_uuid,
              author,
              "hrs import",
              changes=list(zip(row_uuids, snapshots)),
              parent_revision_uuid=plan.head_revision_uuid,
              ref_name=None,
          )
      else:
          for row_uuid, snapshot in zip(row_uuids, snapshots):
              cascade_write(
                  conn,
                  plan_uuid,
                  cascade,
                  row_uuid,
                  snapshot,
                  status_updates=[],
                  author=author,
                  message="hrs import",
              )

      return {"paragraphs": len(labeled)}

  Constraints (all binding, no deviation):
  - import_hrs calls validate_hrs(text) first and raises ValueError before
    any other statement executes if the issues list is non-empty; the
    ValueError message is "; ".join(issues) exactly.
  - No database call (delete_paragraphs, insert_paragraphs, get_plan,
    record_revision, cascade_write) occurs before the validate_hrs check
    has passed (issues is empty).
  - paragraphs = parse(text) and labeled, _new_labels =
    assign_missing_labels(paragraphs) are computed after the validation
    check, in that order.
  - delete_paragraphs is called before insert_paragraphs.
  - row_uuids from insert_paragraphs are zipped with labeled (same order)
    to build one snapshot dict per row using exactly the keys and value
    sources shown in the snapshot convention and in the function body above.
  - When cascade is None: exactly one record_revision call is made, whose
    changes argument is the full list of (row_uuid, snapshot) tuples for
    every inserted paragraph, whose parent_revision_uuid is
    get_plan(conn, plan_uuid).head_revision_uuid, whose message is the
    literal string "hrs import", and whose ref_name is None.
  - When cascade is not None: exactly one cascade_write call is made per
    (row_uuid, snapshot) pair, each with status_updates=[], author=author,
    and message="hrs import"; get_plan and record_revision are not called
    in this branch.
  - The function returns {"paragraphs": len(labeled)} in all success paths.
  - Use Python 3.12+ syntax throughout.
