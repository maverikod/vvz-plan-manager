      """Toggle the non-binding status of the block at ``position``.

      non_binding=True (wrap a stored block as non-binding): reads every
      stored paragraph of the plan through
      ``plan_manager.domain.paragraph_store.list_paragraphs(conn, plan_uuid)``
      and locates the row whose ``position`` field equals the given
      ``position``. When no such row exists, raises
      ``ValueError(f"no block at position {position}")``. Otherwise issues
      the plain SQL statement ``DELETE FROM paragraph WHERE uuid = %s`` with
      the row's uuid through a cursor obtained from ``conn.cursor()`` used as
      a context manager, builds the tombstone snapshot dict ``{"kind":
      "paragraph", "uuid": str(row.uuid), "plan_uuid": str(plan_uuid),
      "label": row.label, "text": row.text, "position": row.position,
      "deleted": True}`` from the row's pre-delete content, and records the
      revision per the attribution rule below with the literal message
      ``f"remove non-binding paragraph at position {position}"``. The row's
      text stays addressable in the append-only version store; only the live
      ``paragraph`` table row is deleted.

      non_binding=False (unwrap a block back to binding): always raises
      ``ValueError(f"no stored block at position {position}: non-binding
      blocks are not stored")`` without reading or writing anything, because
      non-binding blocks are excluded from storage by construction (C-002):
      there is never a stored row to unwrap.

      Revision attribution rule (binding, wrap branch only): when ``cascade``
      is None, call
      ``plan_manager.storage.version_store.record_revision(conn, plan_uuid,
      author, message, [(row.uuid, snapshot)],
      get_plan(conn, plan_uuid).head_revision_uuid, ref_name=None)``. When
      ``cascade`` is a ``plan_manager.cascade.record.CascadeRecord``, call
      ``plan_manager.cascade.write.cascade_write(conn, plan_uuid, cascade,
      row.uuid, snapshot, [], author, message)`` with ``status_updates=[]``.

      :param conn: an open psycopg 3 database connection.
      :param plan_uuid: uuid.UUID identifying the plan.
      :param position: int, the position of the block to toggle.
      :param non_binding: bool -- True wraps the stored block as non-binding
          (deletes its stored row with a tombstone revision); False always
          raises because non-binding blocks are never stored.
      :param author: str, the revision author.
      :param cascade: plan_manager.cascade.record.CascadeRecord | None -- the
          open cascade record, or None for direct head-advancing attribution.
      :return: None.
      """

