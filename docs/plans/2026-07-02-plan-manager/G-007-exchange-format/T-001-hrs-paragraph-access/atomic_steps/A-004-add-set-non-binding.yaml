  Explanation of the exact semantics (binding, not optional): when
  `non_binding` is False (the "unwrap" direction), the function ALWAYS
  raises `ValueError(f"no stored block at position {position}: non-binding
  blocks are not stored")` immediately, without reading or writing anything,
  because non-binding blocks are excluded from storage by construction
  (C-002): there is never a stored row to unwrap. This is unconditional —
  there is no case where non_binding=False succeeds.

  When `non_binding` is True (the "wrap" direction), the function reads all
  stored paragraphs via paragraph_store.list_paragraphs(conn, plan_uuid) and
  locates the row whose `position` field equals the given `position`
  argument using `next((p for p in rows if p.position == position), None)`.
  If no such row exists, it raises `ValueError(f"no block at position
  {position}")`. Otherwise it deletes the live row with the plain SQL
  statement `DELETE FROM paragraph WHERE uuid = %s`, executed through a
  cursor obtained via `conn.cursor()` used as a context manager (psycopg 3
  plain SQL; no ORM), builds the tombstone snapshot dict capturing the row's
  pre-delete content plus `"deleted": True`, and records the revision per
  the attribution rule below. The row's text stays addressable in the
  append-only version store even though the live `paragraph` table row is
  gone.

  Revision attribution rule (binding, shared with the sibling mutating
  function in this module, wrap branch only): when `cascade` is None, call
  `record_revision(conn, plan_uuid, author, message, [(row.uuid, snapshot)],
  get_plan(conn, plan_uuid).head_revision_uuid, ref_name=None)`. When
  `cascade` is a CascadeRecord, call `cascade_write(conn, plan_uuid, cascade,
  row.uuid, snapshot, [], author, message)` with `status_updates=[]`.
  `message` is the literal f-string `f"remove non-binding paragraph at
  position {position}"` in both branches.

