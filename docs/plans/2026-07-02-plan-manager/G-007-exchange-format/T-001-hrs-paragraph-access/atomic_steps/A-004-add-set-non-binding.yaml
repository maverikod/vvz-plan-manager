  MRS excerpt (concepts referenced by this AS):

    - concept_id: C-002
      name: Paragraph
      definition: Addressable binding unit of the HRS text carrying a stable four-character base36 label.
      properties:
      - label is position-independent, unique within one HRS, survives edits
      - non-binding blocks are excluded from labeling and coverage
      - HRS prose is human-owned; the server only assigns labels and toggles non-binding markup
      - parsing and label-assignment algorithms are normative

    - concept_id: C-018
      name: VersionStore
      definition: Git-like append-only version model of node versions, revisions, and refs inside the database.
      properties:
      - node versions content-addressed by SHA-256 of canonical JSON (sorted keys, UTF-8)
      - revisions carry parent, author, change set; one mutation produces one revision
      - any intermediate plan state is addressable by revision id
      - refs are plan head plus one per open cascade
      - operations log, diff, checkout-read, revert; history never rewritten

    - concept_id: C-016
      name: CascadeChange
      definition: Transactional top-down change set anchored at the plan head revision, published atomically on green gate.
      properties:
      - begin acquires the per-plan lock; commit advances head only when gate is green
      - automatic needs_review propagation per invalidation rule
      - one open cascade per plan; MRS mutations are cascade-only at any status

  C-002 grounds "non-binding blocks are excluded from labeling and
  coverage" — the reason the unwrap direction always raises, and the reason
  only a delete (not an update) is needed for the wrap direction. C-018
  grounds the tombstone recorded in the append-only version store (the
  row's text stays addressable by revision id even after the live row is
  deleted). C-016 grounds the cascade-mode branch via cascade_write.
