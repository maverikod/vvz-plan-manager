  - Atomic-step files are found via `sorted((ts_dir / "atomic_steps").glob("*.yaml"))`
    only when `(ts_dir / "atomic_steps").is_dir()` is true; each is checked
    with `validate_as_file(as_file)`. When the "atomic_steps" subdirectory
    is absent, no atomic-step files are checked for that T directory (this
    is not itself an issue).
  - After the directory walk, when `hrs_text is not None`, extend `issues`
    with `f"hrs: {issue}"` for every issue returned by `validate_hrs(hrs_text)`,
    preserving `validate_hrs`'s issue order.
  - The function always returns the full accumulated `issues` list (never
    raises); an empty list means the tree is ingestible.
  - Use Python 3.12+ syntax throughout.
  - Do not add any other functions, classes, or constants to this file in
