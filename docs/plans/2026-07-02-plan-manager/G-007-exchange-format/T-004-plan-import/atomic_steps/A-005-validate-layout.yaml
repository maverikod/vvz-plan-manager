     def validate_layout(source_root) -> list[str]:
         """Validate a candidate standard-layout export tree without touching the database.

         Pure filesystem and text computation; no database access. Checks, in
         order: `source_root` is a directory (otherwise returns immediately with
         a single issue); it contains a file "source_spec.md"; it contains a file
         "spec.yaml" that parses via yaml.safe_load into a dict with list-valued
         "concepts" and "relations" keys; every "G-*" child directory of the root
         is validated by `validate_descriptor_dir(dir_path, "G")`; every "T-*"
         child directory of each such G directory is validated by
         `validate_descriptor_dir(dir_path, "T")`; every "*.yaml" file under each
         T directory's "atomic_steps" subdirectory (when present) is validated by
         `validate_as_file(as_path)`; and finally `validate_hrs` is run on the
         text of "source_spec.md" (when present), with each of its returned
         issues prefixed "hrs: ".

         :param source_root: The path to the candidate export root directory.
         :return: A list of human-readable issue descriptions. An empty list
             means the tree is ingestible.
         :rtype: list[str]
         """
         root = pathlib.Path(source_root)
         if not root.is_dir():
             return [f"source root not found: {source_root}"]

         issues: list[str] = []

         hrs_path = root / "source_spec.md"
         if not hrs_path.is_file():
             issues.append("missing source_spec.md")
             hrs_text = None
         else:
             hrs_text = hrs_path.read_text(encoding="utf-8")

         mrs_path = root / "spec.yaml"
         if not mrs_path.is_file():
             issues.append("missing spec.yaml")
         else:
             try:
                 mrs_data = yaml.safe_load(mrs_path.read_text(encoding="utf-8"))
             except yaml.YAMLError as exc:
                 issues.append(f"spec.yaml: invalid YAML: {exc}")
                 mrs_data = None
             if mrs_data is not None and (
                 not isinstance(mrs_data, dict)
                 or not isinstance(mrs_data.get("concepts"), list)
                 or not isinstance(mrs_data.get("relations"), list)
             ):
                 issues.append(
                     "spec.yaml: must be a mapping with list-valued 'concepts' and 'relations' keys"
                 )

         gs_dirs = sorted(p for p in root.iterdir() if p.is_dir() and p.name.startswith("G-"))
         for gs_dir in gs_dirs:
             issues.extend(validate_descriptor_dir(gs_dir, "G"))
             ts_dirs = sorted(p for p in gs_dir.iterdir() if p.is_dir() and p.name.startswith("T-"))
             for ts_dir in ts_dirs:
                 issues.extend(validate_descriptor_dir(ts_dir, "T"))
                 as_dir = ts_dir / "atomic_steps"
                 if as_dir.is_dir():
                     for as_file in sorted(as_dir.glob("*.yaml")):
                         issues.extend(validate_as_file(as_file))

         if hrs_text is not None:
             issues.extend(f"hrs: {issue}" for issue in validate_hrs(hrs_text))

         return issues

  Constraints (all binding, no deviation):
  - The function is PURE: it performs no database access and takes no
    connection parameter of any kind.
  - When `root.is_dir()` is false, return immediately with exactly
    `[f"source root not found: {source_root}"]` — no further checks run.
  - `hrs_text` is `None` when "source_spec.md" is missing (with the issue
    "missing source_spec.md" appended); otherwise it is the file's text read
    with `encoding="utf-8"`.
  - When "spec.yaml" is missing, append "missing spec.yaml" and do not
    attempt to load it (no `mrs_data` checks run).
  - When "spec.yaml" exists but `yaml.safe_load` raises `yaml.YAMLError`,
    append f"spec.yaml: invalid YAML: {exc}" and set `mrs_data = None`
    (skipping the structural check below).
  - When `mrs_data` is not None (i.e. spec.yaml was present and parsed
    without raising), and it is not a dict, or `mrs_data.get("concepts")` is
    not a list, or `mrs_data.get("relations")` is not a list, append exactly
    "spec.yaml: must be a mapping with list-valued 'concepts' and
    'relations' keys". A `mrs_data` of `None` resulting from a YAML document
