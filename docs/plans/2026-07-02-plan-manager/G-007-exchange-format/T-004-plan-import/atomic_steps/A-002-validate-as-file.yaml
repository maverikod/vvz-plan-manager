  1. Immediately after the `_DIR_PATTERN` line, add exactly one new
     module-level constant (no blank line between `_DIR_PATTERN` and this
     new line):
     _AS_FILENAME_PATTERN = re.compile(r"^(A-\d{3})-[a-z0-9-]+\.yaml$")

  2. Append, after `validate_descriptor_dir`, separated by exactly two
