    ValueError with the joined issue messages and creates no plan. Calling it
    against a fully validated standard-layout tree creates exactly one new
    Plan named after the source root's directory name, ingests its
    source_spec.md paragraphs, inserts every concept and relation of
    spec.yaml, creates every step of its G-*/T-*/atomic_steps tree with
    identifiers matching the source tree, records one further "plan import"
    revision, and returns the new plan's uuid; a post-import re-read of
    stored concepts, relations, and steps matches the source tree's counts
    exactly. A source tree whose declared step identifiers cannot be
    reproduced by step auto-assignment causes import_plan to raise ValueError
    naming the expected and assigned identifiers, aborting before the
    revision is recorded.
status: done
