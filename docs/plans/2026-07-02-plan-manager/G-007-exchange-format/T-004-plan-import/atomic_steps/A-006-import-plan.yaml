  ```python
  """HRS text serialization: validation and ingestion of the human-authored Markdown source.

  Realizes ExchangeFormat (C-021) together with the normative paragraph parsing (C-002).
  Ingestion revision attribution follows VersionStore (C-018) directly, or CascadeChange
  (C-016) when an open cascade is supplied. Import is the single path from files to the
  source of truth; export never round-trips through import.
  """

  import pathlib

  import yaml

  from plan_manager.cascade.write import cascade_write
  from plan_manager.domain.labeling import assign_missing_labels
  from plan_manager.domain.paragraph import parse
  from plan_manager.domain.paragraph_store import delete_paragraphs, insert_paragraphs
  from plan_manager.domain.plan import get_plan
  from plan_manager.exchange.layout_import import validate_as_file, validate_descriptor_dir
  from plan_manager.storage.version_store import record_revision


  def validate_hrs(text: str) -> list[str]:
      """Validate a candidate HRS Markdown document without touching the database.

      Parses `text` through the normative paragraph parsing (C-002) and reports
      structural and semantic issues that would block ingestion.

      :param text: The candidate HRS Markdown source document.
      :type text: str
      :return: A list of human-readable issue descriptions. An empty list means
          the document is ingestible.
      :rtype: list[str]
      """
      try:
          paragraphs = parse(text)
      except ValueError as exc:
          return [str(exc)]

      if not paragraphs:
          return ["document contains no binding paragraphs"]

      issues: list[str] = []
      seen_labels: set[str] = set()
      for paragraph in paragraphs:
          if paragraph.label is not None:
              if paragraph.label in seen_labels:
                  issues.append(f"duplicate label: {paragraph.label}")
              else:
                  seen_labels.add(paragraph.label)
      return issues


  def import_hrs(conn, plan_uuid, text: str, author: str, cascade) -> dict:
      """Wholly replace a plan's stored paragraphs from an HRS Markdown document.

      Parses `text`, assigns fresh unique labels to binding paragraphs lacking
      one (C-002), deletes the plan's previously stored paragraphs, inserts the
      new binding set in position order, and records the revision: under an
      open cascade (C-016) each inserted paragraph is recorded through one
      `cascade_write` call carrying its full paragraph snapshot; otherwise a
      single direct revision (C-018) advances the plan head and carries every
      paragraph snapshot.

      :param conn: An open psycopg 3 database connection.
      :param plan_uuid: The identity of the plan whose paragraphs are replaced.
      :param text: The HRS Markdown source document to ingest.
      :type text: str
      :param author: The attributed author of the resulting revision(s).
      :type author: str
      :param cascade: The open cascade record (a CascadeRecord instance) to
          write under, or None for a direct head-advancing revision.
      :return: A dict with key "paragraphs" mapping to the count of stored
          paragraphs.
      :rtype: dict
      :raises ValueError: If validate_hrs(text) returns any issues; the
          message is the issues joined by "; ".
      """
      issues = validate_hrs(text)
      if issues:
          raise ValueError("; ".join(issues))

      paragraphs = parse(text)
      labeled, _new_labels = assign_missing_labels(paragraphs)

      delete_paragraphs(conn, plan_uuid)
      row_uuids = insert_paragraphs(conn, plan_uuid, labeled)

      snapshots = [
          {
              "kind": "paragraph",
              "uuid": str(row_uuid),
              "plan_uuid": str(plan_uuid),
              "label": paragraph.label,
              "text": paragraph.text,
              "position": paragraph.position,
          }
          for row_uuid, paragraph in zip(row_uuids, labeled)
      ]

      if cascade is None:
          plan = get_plan(conn, plan_uuid)
          record_revision(
              conn,
              plan_uuid,
              author,
              "hrs import",
              changes=list(zip(row_uuids, snapshots)),
              parent_revision_uuid=plan.head_revision_uuid,
              ref_name=None,
          )
      else:
          for row_uuid, snapshot in zip(row_uuids, snapshots):
              cascade_write(
                  conn,
                  plan_uuid,
                  cascade,
                  row_uuid,
                  snapshot,
                  status_updates=[],
                  author=author,
                  message="hrs import",
              )

      return {"paragraphs": len(labeled)}


  def validate_layout(source_root) -> list[str]:
      """Validate a candidate standard-layout export tree without touching the database.

      Pure filesystem and text computation; no database access. Checks, in
      order: `source_root` is a directory (otherwise returns immediately with
      a single issue); it contains a file "source_spec.md"; it contains a file
      "spec.yaml" that parses via yaml.safe_load into a dict with list-valued
      "concepts" and "relations" keys; every "G-*" child directory of the root
      is validated by `validate_descriptor_dir(dir_path, "G")`; every "T-*"
      child directory of each such G directory is validated by
      `validate_descriptor_dir(dir_path, "T")`; every "*.yaml" file under each
      T directory's "atomic_steps" subdirectory (when present) is validated by
      `validate_as_file(as_path)`; and finally `validate_hrs` is run on the
      text of "source_spec.md" (when present), with each of its returned
      issues prefixed "hrs: ".

      :param source_root: The path to the candidate export root directory.
      :return: A list of human-readable issue descriptions. An empty list
          means the tree is ingestible.
      :rtype: list[str]
      """
      root = pathlib.Path(source_root)
      if not root.is_dir():
          return [f"source root not found: {source_root}"]

      issues: list[str] = []

      hrs_path = root / "source_spec.md"
      if not hrs_path.is_file():
          issues.append("missing source_spec.md")
          hrs_text = None
      else:
          hrs_text = hrs_path.read_text(encoding="utf-8")

      mrs_path = root / "spec.yaml"
      if not mrs_path.is_file():
          issues.append("missing spec.yaml")
      else:
          try:
              mrs_data = yaml.safe_load(mrs_path.read_text(encoding="utf-8"))
          except yaml.YAMLError as exc:
              issues.append(f"spec.yaml: invalid YAML: {exc}")
              mrs_data = None
          if mrs_data is not None and (
              not isinstance(mrs_data, dict)
              or not isinstance(mrs_data.get("concepts"), list)
              or not isinstance(mrs_data.get("relations"), list)
          ):
              issues.append(
                  "spec.yaml: must be a mapping with list-valued 'concepts' and 'relations' keys"
              )

      gs_dirs = sorted(p for p in root.iterdir() if p.is_dir() and p.name.startswith("G-"))
      for gs_dir in gs_dirs:
          issues.extend(validate_descriptor_dir(gs_dir, "G"))
          ts_dirs = sorted(p for p in gs_dir.iterdir() if p.is_dir() and p.name.startswith("T-"))
          for ts_dir in ts_dirs:
              issues.extend(validate_descriptor_dir(ts_dir, "T"))
              as_dir = ts_dir / "atomic_steps"
              if as_dir.is_dir():
                  for as_file in sorted(as_dir.glob("*.yaml")):
                      issues.extend(validate_as_file(as_file))

      if hrs_text is not None:
          issues.extend(f"hrs: {issue}" for issue in validate_hrs(hrs_text))

      return issues
  ```

