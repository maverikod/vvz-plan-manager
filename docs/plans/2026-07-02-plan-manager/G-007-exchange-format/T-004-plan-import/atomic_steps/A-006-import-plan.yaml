     def import_plan(conn, source_root, author: str):
         """Ingest a validated standard-layout export tree into a new plan aggregate.

         Runs `validate_layout(source_root)`; a non-empty result raises
         ValueError("; ".join(issues)). Otherwise: creates a new Plan (C-001)
         named after `source_root`'s directory name with the default context
         budget via `create_plan(conn, name=root.name)`; ingests the text of
         "source_spec.md" through `import_hrs(conn, plan.uuid, hrs_text, author,
         None)`, storing the plan's paragraphs under a direct revision; parses
         "spec.yaml" and, for each entry of its "concepts" list in file order,
         builds a Concept and inserts it via `insert_concept`, collecting
         (concept_uuid, concept snapshot); for each entry of its "relations" list
         in file order, builds a Relation and inserts it via `insert_relation`,
         collecting (relation_uuid, relation snapshot); walks the G-*/T-*/atomic_steps
         step tree via `import_steps(conn, plan.uuid, root)`, collecting its
         (step.uuid, step snapshot) pairs (a declared/assigned step_id mismatch
         inside `import_steps` raises ValueError, aborting the import); records
         one further revision via `record_revision(conn, plan.uuid, author, "plan
         import", changes=<all collected concept, relation, and step pairs>,
         parent_revision_uuid=get_plan(conn, plan.uuid).head_revision_uuid,
         ref_name=None)`; and finally re-reads and verifies stored counts against
         the source tree: `len(list_concepts(conn, plan.uuid))` against the
         source concept count, `len(list_relations(conn, plan.uuid))` against the
         source relation count, and `len(load_steps(conn, plan.uuid))` against
         the source step count (the number of collected step pairs) — any
         mismatch raises ValueError naming the diverging count.

         :param conn: An open psycopg 3 database connection.
         :param source_root: The path to the validated export root directory.
         :param author: The attributed author of every revision created.
         :type author: str
         :return: The identity of the newly created plan.
         :rtype: uuid.UUID
         :raises ValueError: If validate_layout(source_root) returns any issues
             (message: the issues joined by "; "); if a created step's assigned
             step_id differs from its descriptor's declared step_id (raised by
             `import_steps`; message:
             f"identifier mismatch on import: expected {declared} got {assigned}");
             or if a post-import re-read count diverges from the source tree
             count (message names the diverging count: "concept count mismatch
             on import: expected {expected} got {actual}", "relation count
             mismatch on import: expected {expected} got {actual}", or "step
             count mismatch on import: expected {expected} got {actual}").
         """
         issues = validate_layout(source_root)
         if issues:
             raise ValueError("; ".join(issues))

         root = pathlib.Path(source_root)
         plan = create_plan(conn, name=root.name)

         hrs_text = (root / "source_spec.md").read_text(encoding="utf-8")
         import_hrs(conn, plan.uuid, hrs_text, author, None)

         mrs_data = yaml.safe_load((root / "spec.yaml").read_text(encoding="utf-8"))

         changes: list[tuple] = []

         for entry in mrs_data["concepts"]:
             concept = Concept(
                 concept_id=entry["concept_id"],
                 name=entry["name"],
                 definition=entry["definition"],
                 properties=list(entry.get("properties", [])),
                 source_labels=list(entry.get("source_labels", [])),
             )
             concept_uuid = insert_concept(conn, plan.uuid, concept)
             changes.append(
                 (
                     concept_uuid,
                     {
                         "kind": "concept",
                         "uuid": str(concept_uuid),
                         "plan_uuid": str(plan.uuid),
                         "concept_id": concept.concept_id,
                         "name": concept.name,
                         "definition": concept.definition,
                         "properties": concept.properties,
                         "source_labels": concept.source_labels,
                     },
                 )
             )

         for entry in mrs_data["relations"]:
             relation = Relation(
                 from_concept=entry["from_concept"],
                 to_concept=entry["to_concept"],
                 type=entry["type"],
             )
             relation_uuid = insert_relation(conn, plan.uuid, relation)
             changes.append(
                 (
                     relation_uuid,
                     {
                         "kind": "relation",
                         "uuid": str(relation_uuid),
                         "plan_uuid": str(plan.uuid),
                         "from_concept": relation.from_concept,
                         "to_concept": relation.to_concept,
                         "type": relation.type,
                     },
                 )
             )

         step_changes = import_steps(conn, plan.uuid, root)
         changes.extend(step_changes)

         record_revision(
             conn,
             plan.uuid,
             author,
             "plan import",
             changes=changes,
             parent_revision_uuid=get_plan(conn, plan.uuid).head_revision_uuid,
             ref_name=None,
         )

         stored_concepts = list_concepts(conn, plan.uuid)
         if len(stored_concepts) != len(mrs_data["concepts"]):
             raise ValueError(
                 f"concept count mismatch on import: expected {len(mrs_data['concepts'])} got {len(stored_concepts)}"
             )
         stored_relations = list_relations(conn, plan.uuid)
         if len(stored_relations) != len(mrs_data["relations"]):
             raise ValueError(
                 f"relation count mismatch on import: expected {len(mrs_data['relations'])} got {len(stored_relations)}"
             )
         stored_steps = load_steps(conn, plan.uuid)
         if len(stored_steps) != len(step_changes):
             raise ValueError(
                 f"step count mismatch on import: expected {len(step_changes)} got {len(stored_steps)}"
             )

         return plan.uuid

