     def _create_step_from_descriptor(conn, plan_uuid, descriptor_path: Path, name: str, level: int, parent_step_uuid):
         """Create one Step (C-005) from a parsed descriptor and verify its assigned identifier.

         Reads `descriptor_path` as YAML into a dict, derives the slug as the
         portion of `name` following ``f"{step_id}-"``, and calls
         ``create_step(conn, plan_uuid, parent_step_uuid, level, slug, fields,
         depends_on, concepts)`` where `fields` is the descriptor dict minus the
         keys "step_id", "depends_on", "concepts", and "status", and `depends_on`
         / `concepts` are the descriptor's same-named list values, defaulting to
         ``[]`` when absent.

         :param conn: An open psycopg 3 database connection.
         :param plan_uuid: The identity of the plan the step belongs to.
         :param descriptor_path: The README.yaml or atomic-step YAML file to read.
         :type descriptor_path: pathlib.Path
         :param name: The directory name (for level 3/4) or file stem (for level
             5) the declared step_id and slug are derived from.
         :type name: str
         :param level: The step level: 3, 4, or 5.
         :type level: int
         :param parent_step_uuid: The parent step's identity, or None for level 3.
         :return: The created Step (fields uuid, plan_uuid, parent_step_uuid,
             level, step_id, slug, fields, depends_on, concepts, status).
         :raises ValueError: If the step_id assigned by create_step differs from
             the descriptor's declared step_id; the message is
             f"identifier mismatch on import: expected {declared} got {assigned}".
         """
         data = yaml.safe_load(descriptor_path.read_text(encoding="utf-8"))
         declared_id = data["step_id"]
         slug = name[len(declared_id) + 1 :]
         fields = {k: v for k, v in data.items() if k not in {"step_id", "depends_on", "concepts", "status"}}
         step = create_step(
             conn,
             plan_uuid,
             parent_step_uuid,
             level,
             slug,
             fields,
             data.get("depends_on", []),
             data.get("concepts", []),
         )
         if step.step_id != declared_id:
             raise ValueError(f"identifier mismatch on import: expected {declared_id} got {step.step_id}")
         return step

