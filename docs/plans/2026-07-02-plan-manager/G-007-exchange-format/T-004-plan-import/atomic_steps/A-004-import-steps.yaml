  ```python
  """Filesystem helpers for validating and ingesting a standard-layout plan export tree.

  Supports importer.py's validate_layout and import_plan (ExchangeFormat, C-021):
  directory- and file-name pattern checks against declared step identifiers
  (PlanSchema, C-006), and step-tree ingestion through the validating Step
  (C-005) store during import.
  """

  import re
  from pathlib import Path

  import yaml

  from plan_manager.domain.step_store import create_step

  _DIR_PATTERN = re.compile(r"^([GT])-(\d{3})-[a-z0-9-]+$")
  _AS_FILENAME_PATTERN = re.compile(r"^(A-\d{3})-[a-z0-9-]+\.yaml$")


  def validate_descriptor_dir(dir_path: Path, expected_prefix: str) -> list[str]:
      """Validate one G-* or T-* step directory name and its README.yaml descriptor.

      Checks `dir_path.name` against the pattern ``^{prefix}-\\d{3}-[a-z0-9-]+$``
      and, when it matches, that ``dir_path / "README.yaml"`` exists, parses as
      YAML into a dict, and carries a ``"step_id"`` equal to the directory's
      ``{prefix}-NNN`` portion.

      :param dir_path: The candidate step directory.
      :type dir_path: pathlib.Path
      :param expected_prefix: The required directory-name prefix letter, "G" or "T".
      :type expected_prefix: str
      :return: A list of human-readable issue descriptions; empty when valid.
      :rtype: list[str]
      """
      match = _DIR_PATTERN.match(dir_path.name)
      if match is None or match.group(1) != expected_prefix:
          return [f"invalid directory name: {dir_path}"]

      declared_id = f"{match.group(1)}-{match.group(2)}"
      readme_path = dir_path / "README.yaml"
      if not readme_path.is_file():
          return [f"missing README.yaml: {readme_path}"]

      try:
          data = yaml.safe_load(readme_path.read_text(encoding="utf-8"))
      except yaml.YAMLError as exc:
          return [f"{readme_path}: invalid YAML: {exc}"]

      if not isinstance(data, dict) or "step_id" not in data:
          return [f"{readme_path}: missing step_id"]
      if data["step_id"] != declared_id:
          return [
              f"{readme_path}: step_id {data['step_id']!r} does not match directory {declared_id!r}"
          ]
      return []


  def validate_as_file(as_path: Path) -> list[str]:
      """Validate one atomic-step descriptor file name and content.

      Checks `as_path.name` against the pattern ``^(A-\\d{3})-[a-z0-9-]+\\.yaml$``
      and, when it matches, that the file parses as YAML into a dict carrying a
      ``"step_id"`` equal to the filename's ``A-NNN`` portion.

      :param as_path: The candidate atomic-step descriptor file.
      :type as_path: pathlib.Path
      :return: A list of human-readable issue descriptions; empty when valid.
      :rtype: list[str]
      """
      match = _AS_FILENAME_PATTERN.match(as_path.name)
      if match is None:
          return [f"invalid atomic step filename: {as_path}"]

      declared_id = match.group(1)
      try:
          data = yaml.safe_load(as_path.read_text(encoding="utf-8"))
      except yaml.YAMLError as exc:
          return [f"{as_path}: invalid YAML: {exc}"]

      if not isinstance(data, dict) or "step_id" not in data:
          return [f"{as_path}: missing step_id"]
      if data["step_id"] != declared_id:
          return [
              f"{as_path}: step_id {data['step_id']!r} does not match filename {declared_id!r}"
          ]
      return []


  def _create_step_from_descriptor(conn, plan_uuid, descriptor_path: Path, name: str, level: int, parent_step_uuid):
      """Create one Step (C-005) from a parsed descriptor and verify its assigned identifier.

      Reads `descriptor_path` as YAML into a dict, derives the slug as the
      portion of `name` following ``f"{step_id}-"``, and calls
      ``create_step(conn, plan_uuid, parent_step_uuid, level, slug, fields,
      depends_on, concepts)`` where `fields` is the descriptor dict minus the
      keys "step_id", "depends_on", "concepts", and "status", and `depends_on`
      / `concepts` are the descriptor's same-named list values, defaulting to
      ``[]`` when absent.

      :param conn: An open psycopg 3 database connection.
      :param plan_uuid: The identity of the plan the step belongs to.
      :param descriptor_path: The README.yaml or atomic-step YAML file to read.
      :type descriptor_path: pathlib.Path
      :param name: The directory name (for level 3/4) or file stem (for level
          5) the declared step_id and slug are derived from.
      :type name: str
      :param level: The step level: 3, 4, or 5.
      :type level: int
      :param parent_step_uuid: The parent step's identity, or None for level 3.
      :return: The created Step (fields uuid, plan_uuid, parent_step_uuid,
          level, step_id, slug, fields, depends_on, concepts, status).
      :raises ValueError: If the step_id assigned by create_step differs from
          the descriptor's declared step_id; the message is
          f"identifier mismatch on import: expected {declared} got {assigned}".
      """
      data = yaml.safe_load(descriptor_path.read_text(encoding="utf-8"))
      declared_id = data["step_id"]
      slug = name[len(declared_id) + 1 :]
      fields = {k: v for k, v in data.items() if k not in {"step_id", "depends_on", "concepts", "status"}}
      step = create_step(
          conn,
          plan_uuid,
          parent_step_uuid,
          level,
          slug,
          fields,
          data.get("depends_on", []),
          data.get("concepts", []),
      )
      if step.step_id != declared_id:
          raise ValueError(f"identifier mismatch on import: expected {declared_id} got {step.step_id}")
      return step
  ```

