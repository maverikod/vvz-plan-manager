  def export_plan(conn, plan_uuid, export_root, revision_uuid=None) -> dict:
      """Materialize a plan into the standard exchange-layout file tree.

      Reads plan = get_plan(conn, plan_uuid) and sets
      root = pathlib.Path(export_root) / plan.name. Assembles
      state = assemble_state(conn, plan_uuid, revision_uuid) (a
      VersionStoreError from an unknown revision_uuid propagates).

      Writes the HRS text to root / HRS_FILENAME: export_hrs(conn, plan_uuid)
      when revision_uuid is None, render_hrs_text(state["paragraphs"])
      otherwise — both produce the binding document (C-021).

      Writes root / MRS_FILENAME via emit_yaml with a dict of "concepts"
      (each reduced to the five keys concept_id, name, definition, properties,
      source_labels) and "relations" (each reduced to the three keys
      from_concept, to_concept, type), taken from state["concepts"] and
      state["relations"] in their assembled order.

      For every level-3 step in state["steps"], creates its directory
      root / f"{step_id}-{slug}" and emits STEP_README via
      emit_yaml(step_dir / STEP_README, step_descriptor(step)). For every
      level-4 step, resolves its parent directory via the parent step's uuid
      (recorded while creating level-3 directories) and nests its own
      directory f"{step_id}-{slug}" inside it, emitting STEP_README the same
      way. For every level-5 step, resolves its parent tactical step's
      directory the same way and emits its descriptor into
      parent_dir / ATOMIC_DIR as f"{step_id}-{slug}.yaml".

      Counts every file written (the HRS file, the MRS file, and every
      emitted STEP_README and atomic-step file) and returns
      {"root": str(root), "files": <count>}. Exported files are derived
      snapshots and are never read back as truth.

      :param conn: An open psycopg 3 database connection.
      :param plan_uuid: The identity of the plan to export.
      :param export_root: The configured export root directory under which
          the plan's named directory is created.
      :type export_root: str | pathlib.Path
      :param revision_uuid: The revision to export, or None to export the
          current stored state.
      :type revision_uuid: uuid.UUID | None
      :raises plan_manager.storage.version_store.VersionStoreError: If
          revision_uuid does not identify a known revision.
      :raises ExportError: If any emitted YAML file fails its round-trip
          check.
      :return: {"root": str(root), "files": <count>}.
      :rtype: dict
      """
      plan = get_plan(conn, plan_uuid)
      root = pathlib.Path(export_root) / plan.name
      state = assemble_state(conn, plan_uuid, revision_uuid)
      files = 0

      hrs_text = (
          export_hrs(conn, plan_uuid)
          if revision_uuid is None
          else render_hrs_text(state["paragraphs"])
      )
      root.mkdir(parents=True, exist_ok=True)
      (root / HRS_FILENAME).write_text(hrs_text, encoding="utf-8")
      files += 1

      mrs_concepts = [
          {
              "concept_id": c["concept_id"],
              "name": c["name"],
              "definition": c["definition"],
              "properties": c["properties"],
              "source_labels": c["source_labels"],
          }
          for c in state["concepts"]
      ]
      mrs_relations = [
          {
              "from_concept": r["from_concept"],
              "to_concept": r["to_concept"],
              "type": r["type"],
          }
          for r in state["relations"]
      ]
      emit_yaml(
          root / MRS_FILENAME, {"concepts": mrs_concepts, "relations": mrs_relations}
      )
      files += 1

      dir_by_uuid = {}
      for step in [s for s in state["steps"] if s["level"] == 3]:
          step_dir = root / f"{step['step_id']}-{step['slug']}"
          step_dir.mkdir(parents=True, exist_ok=True)
          emit_yaml(step_dir / STEP_README, step_descriptor(step))
          files += 1
          dir_by_uuid[step["uuid"]] = step_dir

      for step in [s for s in state["steps"] if s["level"] == 4]:
          parent_dir = dir_by_uuid[step["parent_step_uuid"]]
          step_dir = parent_dir / f"{step['step_id']}-{step['slug']}"
          step_dir.mkdir(parents=True, exist_ok=True)
          emit_yaml(step_dir / STEP_README, step_descriptor(step))
          files += 1
          dir_by_uuid[step["uuid"]] = step_dir

      for step in [s for s in state["steps"] if s["level"] == 5]:
          parent_dir = dir_by_uuid[step["parent_step_uuid"]]
          atomic_dir = parent_dir / ATOMIC_DIR
          atomic_dir.mkdir(parents=True, exist_ok=True)
          target = atomic_dir / f"{step['step_id']}-{step['slug']}.yaml"
          emit_yaml(target, step_descriptor(step))
          files += 1

      return {"root": str(root), "files": files}

  Constraints (all binding, no deviation):
  - The import block change and the function append are the only changes;
