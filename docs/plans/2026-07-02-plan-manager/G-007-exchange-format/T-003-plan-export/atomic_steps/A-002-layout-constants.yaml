  """HRS text serialization: regeneration of the human-authored Markdown source.

  Realizes ExchangeFormat (C-021) together with the normative paragraph parsing (C-002).
  Only binding paragraphs are ever stored (C-002), so the regenerated document is exactly
  the binding document; non-binding blocks of the original source are absent by
  construction and are never reconstructed.
  """

  from plan_manager.domain.paragraph_store import list_paragraphs


  def export_hrs(conn, plan_uuid) -> str:
      """Regenerate the binding HRS Markdown document byte-stably from stored rows.

      Reads the plan's stored paragraphs in position order (C-002) and renders
      each as its brace-wrapped label, one space, and its stored text
      byte-identically, paragraphs joined by exactly one blank line, with the
      document ending in a single trailing newline. Two calls over the same
      stored state return identical strings.

      :param conn: An open psycopg 3 database connection.
      :param plan_uuid: The identity of the plan whose paragraphs are rendered.
      :return: The regenerated binding Markdown document, byte-stable across
          repeated calls over the same stored state.
      :rtype: str
      """
      rows = list_paragraphs(conn, plan_uuid)
      rendered = ["{" + row.label + "} " + row.text for row in rows]
      return "\n\n".join(rendered) + "\n"


  class ExportError(RuntimeError):
      """Raised when an emitted export file fails the mandatory YAML round-trip check."""

  Required change: append exactly the following four constant assignments
  to the end of the file, after the ExportError class, separated from it by
  exactly two blank lines. Do not modify anything above. Do not add any
  import.

  HRS_FILENAME = "source_spec.md"
  MRS_FILENAME = "spec.yaml"
  STEP_README = "README.yaml"
  ATOMIC_DIR = "atomic_steps"

  Semantics (for context only, not additional code to write): HRS_FILENAME
  is the plan's binding Markdown source filename at the export root;
  MRS_FILENAME is the machine specification YAML filename at the export
  root; STEP_README is the descriptor filename inside every level-3 and
  level-4 step directory; ATOMIC_DIR is the subdirectory name inside a
  tactical step's directory holding one YAML file per atomic step. The
  directory name for a level-3 or level-4 step is the f-string
  f"{step_id}-{slug}"; the file name for a level-5 atomic step is the
  f-string f"{step_id}-{slug}.yaml" placed inside the parent tactical
  step's ATOMIC_DIR.

