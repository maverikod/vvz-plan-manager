  def emit_yaml(path, data: dict) -> None:
      """Serialize data as safe YAML to path, aborting on a round-trip mismatch.

      Dumps data with yaml.safe_dump using default_flow_style=False,
      allow_unicode=True, and sort_keys=False so that scalars containing a
      colon-space, a leading dash, quotes, a hash sign, or other YAML
      metacharacters are quoted or emitted as block scalars (C-021). Then
      re-parses the dumped text with yaml.safe_load and compares the result
      against data for exact equality; a mismatch means the dumped text would
      not restore the original value, so the emission is aborted.

      :param path: The filesystem path to write; parent directories are
          created if missing.
      :type path: str | pathlib.Path
      :param data: The plain-dict value to serialize.
      :type data: dict
      :raises ExportError: If the round-trip re-parse does not equal data.
      :return: None.
      :rtype: None
      """
      text = yaml.safe_dump(
          data, default_flow_style=False, allow_unicode=True, sort_keys=False
      )
      if yaml.safe_load(text) != data:
          raise ExportError(f"round-trip failed: {path}")
      target = pathlib.Path(path)
      target.parent.mkdir(parents=True, exist_ok=True)
      target.write_text(text, encoding="utf-8")

  Constraints (all binding, no deviation):
