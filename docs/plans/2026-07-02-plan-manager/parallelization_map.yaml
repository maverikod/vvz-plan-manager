meta:
  plan: 2026-07-02-plan-manager
  artifact: parallelization_map
  purpose: Execution scheduler for GS/TS/AS delegation with mini context agents and spark worker agents.
  source: computed from README.yaml and atomic_steps/A-*.yaml files
  production_code: not included; this file is a planning/execution-control artifact
agent_protocol:
  owner:
    role: orchestrator
    model: main
    scope: select exactly one GS/TS branch and assign it to mini
    context_allowed:
    - active plan root
    - one parent GS README
    - one TS README
    - AS list for that TS
    - phase standard
  mini:
    model: gpt-5.4-mini
    role: context_former_and_verifier
    must_not:
    - write production code
    - edit files directly
    - finish while spark children are running
    scope: one concrete GS/TS branch only
    duties:
    - form minimal AS context
    - spawn spark per unblocked independent AS
    - wait for all spark agents
    - verify outputs
    - escalate ambiguity to owner
  spark:
    model: gpt-5.3-codex-spark
    role: atomic_step_worker
    scope: one AS only
    write_scope: target_file of that AS only unless the AS explicitly says otherwise
    must_not:
    - read unrelated GS/TS branches
    - start sibling AS work
    - finish before its verification command/report is complete
parallelization_rules:
  gs_order: respect explicit G depends_on; waves can run in parallel only if owner chooses multiple mini agents
  ts_context: mini receives exactly one GS README and one TS README plus that TS atomic step files
  as_parallelism: AS can run in the same wave only when explicit dependencies and target_file locks allow it
  target_file_lock: all AS targeting the same file are serialized by ascending priority, then AS id
  ambiguity: escalate to owner; do not guess or broaden context
  dirty_worktree: agents must not revert unrelated changes
global_waves:
- - G-001
- - G-002
  - G-006
  - G-007
- - G-003
- - G-004
- - G-005
- - G-008
global_unresolved_cycles: []
