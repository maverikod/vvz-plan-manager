  - module plan_manager/domain/step.py: `@dataclass class Step:` with
    fields `uuid: uuid.UUID, plan_uuid: uuid.UUID, parent_step_uuid:
    uuid.UUID | None, level: int, step_id: str, slug: str, fields: dict,
    depends_on: list[str], concepts: list[str], status: str`.

  MRS EXCERPT (definitions and relations relevant to this AS only; quoted
