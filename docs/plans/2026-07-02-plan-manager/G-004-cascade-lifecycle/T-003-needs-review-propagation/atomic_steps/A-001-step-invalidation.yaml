  - No database access, no I/O, no persistence, no logging calls anywhere
    in this file.
  - No other functions, classes, or module-level code beyond what is shown
    between BEGIN/END FILE CONTENT above.

  IMPORTED SIBLING CONTRACTS (quote verbatim; import them, never
  reimplement their bodies in this file):
  - module plan_manager/domain/status_model.py: `def
    validate_transition(current: str, new: str, is_atomic_step: bool,
    via_cascade: bool) -> None` (raises StatusTransitionError(ValueError)
