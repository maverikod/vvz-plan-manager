  - Body logic, in order: (1) if origin_uuid not in nodes: raise
    ValueError("origin step not in tree"); (2) initialize updates as an
    empty list typed list[tuple[uuid.UUID, str]]; (3) iterate
    impact_set(nodes, origin_uuid) in the order returned — this order is
