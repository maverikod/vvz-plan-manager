    - states draft, ready_for_review, frozen, needs_review; atomic steps add in_progress, done
    - needs_review is set only by cascade propagation, never by direct request
    source_labels: ["{n1o3}", "{m2d9}", "{m4c2}"]

  - concept_id: C-009
    name: DependencyGraph
    definition: Computed projection set over steps covering execution order, parallelism, cycles, and impact.
    properties:
