  MRS excerpt (only the concepts and relations this AS realises):

  concept_id: C-016
  name: CascadeChange
  definition: Transactional top-down change set anchored at the plan head
    revision, published atomically on green gate.
  properties:
  - begin acquires the per-plan lock; commit advances head only when gate
    is green
  - automatic needs_review propagation per invalidation rule
  - one open cascade per plan; MRS mutations are cascade-only at any
    status

  concept_id: C-018
  name: VersionStore
  definition: Git-like append-only version model of node versions,
    revisions, and refs inside the database.
  properties:
  - node versions content-addressed by SHA-256 of canonical JSON (sorted
    keys, UTF-8)
  - revisions carry parent, author, change set; one mutation produces one
    revision
  - any intermediate plan state is addressable by revision id
  - refs are plan head plus one per open cascade
  - operations log, diff, checkout-read, revert; history never rewritten

  concept_id: C-007
  name: StatusModel
  definition: Lifecycle state machine for plan artifacts with enforced
    legal transitions.
  properties:
  - states draft, ready_for_review, frozen, needs_review; atomic steps add
    in_progress, done
  - needs_review is set only by cascade propagation, never by direct
    request

  concept_id: C-012
  name: MechanicalGate
  definition: Deterministic binary verification layer catching every
    mechanical defect before semantics.
  properties:
  - fixed check order parse, identity, uniqueness, references, coverage
  - byte-identical reports for the same tree state; fail-fast only at
    group boundary
  - per-branch gating; precondition for any semantic measurement
  - parser sanity gates make parsing regressions fail loudly instead of
    passing silently

  concept_id: C-020
  name: Verdict
  definition: Gate or score result bound to the exact revision and scope
    it was computed for.
  properties:
  - fresh iff recorded revision equals current revision; comparison never
    by timestamp

  concept_id: C-017
  name: Finding
  definition: Ephemeral result unit of gate and scoring runs with check
    id, severity, artifact path, and message.
  properties:
  - aggregated into reports; never stored as a plan artifact

  relevant relations:
  - { from_concept: C-016, to_concept: C-019, type: uses }
  - { from_concept: C-016, to_concept: C-018, type: uses }
