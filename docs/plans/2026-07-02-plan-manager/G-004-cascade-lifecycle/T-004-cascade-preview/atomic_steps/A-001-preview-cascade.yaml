  - The function raises no exception itself other than the CascadeError
    raised explicitly in step 1; it does not catch or wrap exceptions
    raised by the called functions.
  - No other function, class, constant, or top-level statement is added
    to the file.
  - The file contains no `__main__` guard, no CLI entry point, and no
    logging setup.
