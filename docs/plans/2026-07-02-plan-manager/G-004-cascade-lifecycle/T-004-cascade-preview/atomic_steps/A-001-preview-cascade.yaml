  Write exactly one module-level docstring as the first line of the file:

  """Read-only preview of the plan's open cascade (C-016)."""

  Then the imports listed above, then exactly one function with this exact
  signature, typing annotations included:

  def preview_cascade(conn: psycopg.Connection, plan_uuid: uuid.UUID) ->
  dict:

  Its docstring, verbatim, must be:

  """Return the read-only preview of the plan's open cascade.

      Resolves the plan's open cascade record, computes the accumulated
      change set between the cascade's base revision and its current tip,
      classifies the needs_review blast radius by artifact path, and runs
      the mechanical gate for a verdict and findings report. Performs no
      writes: it records no revision, changes no status, and does not
      move the head.

      Args:
          conn: An open psycopg 3 database connection.
          plan_uuid: The UUID identity of the plan whose open cascade is
              previewed.

      Returns:
          A dict with exactly these keys, in this order:
          "cascade_uuid": str -- the open cascade record's UUID.
          "base_revision_uuid": str -- the revision UUID anchored at
              cascade opening.
          "tip_revision_uuid": str -- the current UUID resolved from the
              cascade's ref.
          "change_set": dict -- the diff() result between
              base_revision_uuid and tip_revision_uuid, with keys
              "added", "removed", "changed", each a list of node uuids.
          "needs_review": list[str] -- artifact paths of steps whose
              status equals "needs_review", sorted ascending.
          "gate_green": bool -- whether the mechanical gate run is green.
          "gate_report_json": str -- the machine-checkable JSON rendering
              of the gate findings report.

      Raises:
          CascadeError: if the plan has no open cascade.
      """

  The function body must implement exactly this algorithm, with no
  additional behavior, no additional parameters, and no alternate control
  flow:

  1. Call `rec = get_open_cascade(conn, plan_uuid)`. If `rec is None`,
     raise `CascadeError("plan has no open cascade")`.
  2. Call `tip = get_ref(conn, plan_uuid, rec.name)`.
  3. Call `change_set = diff(conn, plan_uuid, rec.base_revision_uuid,
     tip)`.
  4. Call `nodes = load_steps(conn, plan_uuid)`. Build `blast = sorted(
     artifact_path_of(nodes, s) for s in nodes.values() if s.status ==
     "needs_review" )`.
  5. Call `report, verdict = run_gate(conn, plan_uuid)`. The `verdict`
     local variable is bound by this call but not otherwise used in the
     return value.
  6. Return exactly this dict literal, with these keys in this exact
     order: `{"cascade_uuid": str(rec.uuid), "base_revision_uuid":
     str(rec.base_revision_uuid), "tip_revision_uuid": str(tip),
     "change_set": change_set, "needs_review": blast, "gate_green":
     report.green, "gate_report_json": render_json(report)}`.

  Constraints:

  - The function makes no INSERT, UPDATE, or DELETE; it calls only the
    read functions listed above.
  - The function records no revision, changes no status, and does not
