  MRS excerpt (only the concepts relevant to this step):

  - concept_id: C-016
    name: CascadeChange
    definition: Transactional top-down change set anchored at the plan head revision, published atomically on green gate.
    properties:
    - begin acquires the per-plan lock; commit advances head only when gate is green
    - automatic needs_review propagation per invalidation rule
    - one open cascade per plan; MRS mutations are cascade-only at any status

  - concept_id: C-019
    name: PlanLock
    definition: Per-plan database advisory lock serializing cascades and identifier assignment.
    properties:
    - no lock files, no in-process lock state

  - concept_id: C-018
    name: VersionStore
    definition: Git-like append-only version model of node versions, revisions, and refs inside the database.
    properties:
    - node versions content-addressed by SHA-256 of canonical JSON (sorted keys, UTF-8)
    - revisions carry parent, author, change set; one mutation produces one revision
    - any intermediate plan state is addressable by revision id
    - refs are plan head plus one per open cascade
    - operations log, diff, checkout-read, revert; history never rewritten

  - concept_id: C-035
    name: Database
    definition: In-container PostgreSQL with pgvector serving as the single source of truth for all plan data.
    properties:
    - entities as rows; referential integrity at write time
    - every stored entity carries an immutable UUID identity; human-readable ids are scoped names mapped to it
    - hosts the version store, locks, and embedding cache
    - accessed via psycopg 3 with plain SQL; no ORM; runtime code never emits DDL

  Relevant relations:
  - { from_concept: C-016, to_concept: C-019, type: uses }
  - { from_concept: C-016, to_concept: C-018, type: uses }
  - { from_concept: C-035, to_concept: C-018, type: owns }
  - { from_concept: C-035, to_concept: C-019, type: owns }

  Context: begin_cascade is the opening operation of CascadeChange (C-016).
  It uses PlanLock (C-019) to serialize concurrent cascade opens on the same
  plan, anchors the new cascade at the plan's current head revision by
  creating a ref in the VersionStore (C-018) named "cascade/<cascade uuid>"
  pointing at that revision, and persists the cascade record as a row in the
  Database (C-035) via the record.py operations already implemented in this
  same package.
