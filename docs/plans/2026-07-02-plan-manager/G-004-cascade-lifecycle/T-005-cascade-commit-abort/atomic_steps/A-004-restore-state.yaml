  Modify the existing file `plan_manager/cascade/restore.py`. Its full
  current content (after all lower-priority atomic steps on this file have
  been applied) is exactly:

  ```python
  """Row restoration from the version store for cascade abort (C-018, C-035)."""

  import uuid

  import psycopg
  from psycopg.types.json import Jsonb

  from plan_manager.cascade.record import CascadeError


  def node_version_content(conn: psycopg.Connection, version_uuid: uuid.UUID) -> dict:
      """Fetch the content snapshot of a single node version.

      Executes ``SELECT content FROM node_version WHERE uuid = %s`` with
      ``version_uuid`` bound as the sole parameter, fetches at most one row
      via ``fetchone()``, and returns that row's ``content`` column value (a
      dict). If no row is found, raises ``CascadeError("node version not
      found")``.

      :param conn: open psycopg 3 database connection.
      :param version_uuid: UUID primary key of the node_version row to fetch.
      :return: the ``content`` dict stored on that node_version row.
      :raises CascadeError: when no node_version row has the given uuid.
      """
      cur = conn.execute(
          "SELECT content FROM node_version WHERE uuid = %s", (version_uuid,)
      )
      row = cur.fetchone()
      if row is None:
          raise CascadeError("node version not found")
      return row[0]


  def apply_snapshot(conn: psycopg.Connection, node_uuid: uuid.UUID, snapshot: dict) -> None:
      """Upsert one working row from a recorded node snapshot.

      Routes on ``snapshot["kind"]`` to the matching table and performs an
      ``INSERT ... ON CONFLICT (uuid) DO UPDATE`` so the working row for
      ``node_uuid`` matches the snapshot content exactly, whether or not a
      row currently exists.

      Supported kinds and their non-uuid columns, all read from ``snapshot``
      by key:

      - ``"step"``: plan_uuid, parent_step_uuid, level, step_id, slug,
        fields (wrapped in ``psycopg.types.json.Jsonb``), depends_on,
        concepts, status.
      - ``"concept"``: plan_uuid, concept_id, name, definition, properties,
        source_labels.
      - ``"relation"``: plan_uuid, from_concept, to_concept, type.
      - ``"paragraph"``: plan_uuid, label, text, position.

      :param conn: open psycopg 3 database connection.
      :param node_uuid: uuid of the node whose working row is being written;
          used as the row's ``uuid`` column value.
      :param snapshot: full node snapshot dict as read from a node_version's
          ``content`` column; must carry key ``"kind"``.
      :raises CascadeError: when ``snapshot["kind"]`` is not one of
          "step", "concept", "relation", "paragraph".
      """
      kind = snapshot["kind"]
      if kind == "step":
          conn.execute(
              "INSERT INTO step "
              "(uuid, plan_uuid, parent_step_uuid, level, step_id, slug, "
              "fields, depends_on, concepts, status) "
              "VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s) "
              "ON CONFLICT (uuid) DO UPDATE SET "
              "plan_uuid = EXCLUDED.plan_uuid, "
              "parent_step_uuid = EXCLUDED.parent_step_uuid, "
              "level = EXCLUDED.level, "
              "step_id = EXCLUDED.step_id, "
              "slug = EXCLUDED.slug, "
              "fields = EXCLUDED.fields, "
              "depends_on = EXCLUDED.depends_on, "
              "concepts = EXCLUDED.concepts, "
              "status = EXCLUDED.status",
              (
                  node_uuid,
                  snapshot["plan_uuid"],
                  snapshot["parent_step_uuid"],
                  snapshot["level"],
                  snapshot["step_id"],
                  snapshot["slug"],
                  Jsonb(snapshot["fields"]),
                  snapshot["depends_on"],
                  snapshot["concepts"],
                  snapshot["status"],
              ),
          )
      elif kind == "concept":
          conn.execute(
              "INSERT INTO concept "
              "(uuid, plan_uuid, concept_id, name, definition, properties, "
              "source_labels) "
              "VALUES (%s, %s, %s, %s, %s, %s, %s) "
              "ON CONFLICT (uuid) DO UPDATE SET "
              "plan_uuid = EXCLUDED.plan_uuid, "
              "concept_id = EXCLUDED.concept_id, "
              "name = EXCLUDED.name, "
              "definition = EXCLUDED.definition, "
              "properties = EXCLUDED.properties, "
              "source_labels = EXCLUDED.source_labels",
              (
                  node_uuid,
                  snapshot["plan_uuid"],
                  snapshot["concept_id"],
                  snapshot["name"],
                  snapshot["definition"],
                  snapshot["properties"],
                  snapshot["source_labels"],
              ),
          )
      elif kind == "relation":
          conn.execute(
              "INSERT INTO relation "
              "(uuid, plan_uuid, from_concept, to_concept, type) "
              "VALUES (%s, %s, %s, %s, %s) "
              "ON CONFLICT (uuid) DO UPDATE SET "
              "plan_uuid = EXCLUDED.plan_uuid, "
              "from_concept = EXCLUDED.from_concept, "
              "to_concept = EXCLUDED.to_concept, "
              "type = EXCLUDED.type",
              (
                  node_uuid,
                  snapshot["plan_uuid"],
                  snapshot["from_concept"],
                  snapshot["to_concept"],
                  snapshot["type"],
              ),
          )
      elif kind == "paragraph":
          conn.execute(
              "INSERT INTO paragraph "
              "(uuid, plan_uuid, label, text, position) "
              "VALUES (%s, %s, %s, %s, %s) "
              "ON CONFLICT (uuid) DO UPDATE SET "
              "plan_uuid = EXCLUDED.plan_uuid, "
              "label = EXCLUDED.label, "
              "text = EXCLUDED.text, "
              "position = EXCLUDED.position",
              (
                  node_uuid,
                  snapshot["plan_uuid"],
                  snapshot["label"],
                  snapshot["text"],
                  snapshot["position"],
              ),
          )
      else:
          raise CascadeError(f"unknown node snapshot kind: {kind!r}")


  def delete_node(conn: psycopg.Connection, node_uuid: uuid.UUID, kind: str) -> None:
      """Delete one working row identified by node uuid and kind.

      :param conn: open psycopg 3 database connection.
      :param node_uuid: uuid of the row to delete from its table.
      :param kind: one of "step", "concept", "relation", "paragraph";
          selects the target table via a fixed literal mapping (the table
          name is never built from external input).
      :raises CascadeError: when ``kind`` is not one of the four supported
          values.
      """
      tables = {
          "step": "step",
          "concept": "concept",
          "relation": "relation",
          "paragraph": "paragraph",
      }
      table = tables.get(kind)
      if table is None:
          raise CascadeError(f"unknown node kind: {kind!r}")
      conn.execute(f"DELETE FROM {table} WHERE uuid = %s", (node_uuid,))
  ```

  Apply exactly two changes to this content:

  1. Insert a new import line `from plan_manager.storage.version_ops import
     diff, state_at` immediately after the `from plan_manager.cascade.record
     import CascadeError` line, so the import block reads:

  ```python
  import uuid

  import psycopg
  from psycopg.types.json import Jsonb

  from plan_manager.cascade.record import CascadeError
  from plan_manager.storage.version_ops import diff, state_at
  ```

  2. Append the following new function to the end of the file, separated
     from `delete_node` by exactly two blank lines. Do not modify
     `node_version_content`, `apply_snapshot`, or `delete_node`:

  ```python
  def restore_state(
      conn: psycopg.Connection,
      plan_uuid: uuid.UUID,
      base_revision_uuid: uuid.UUID,
      tip_revision_uuid: uuid.UUID,
  ) -> None:
      """Restore working rows to the state recorded at a base revision.

      Computes the base and tip node-uuid -> node_version-uuid maps via
      ``state_at``, and the base-to-tip diff via ``diff``. The current
      version-store diff contract returns ``diff(...)["changed"]`` as dict
      entries with keys ``entity_uuid`` and ``fields``; the entity uuid is the
      node to restore. For every changed entity and every node uuid in
      ``diff(...)["removed"]``, writes back the base-revision snapshot with
      ``apply_snapshot``. For every node
      uuid in ``diff(...)["added"]``, deletes the working row with
      ``delete_node`` using the kind recorded in its tip-revision snapshot.
      Recorded revisions are never deleted or rewritten by this function;
      only working rows change.

      :param conn: open psycopg 3 database connection.
      :param plan_uuid: uuid of the plan being restored.
      :param base_revision_uuid: revision uuid to restore working rows to.
      :param tip_revision_uuid: revision uuid the cascade currently points
          at; used to resolve snapshots for added nodes so they can be
          deleted.
      """
      base_map = state_at(conn, plan_uuid, base_revision_uuid)
      tip_map = state_at(conn, plan_uuid, tip_revision_uuid)
      d = diff(conn, plan_uuid, base_revision_uuid, tip_revision_uuid)
      changed = [entry["entity_uuid"] for entry in d["changed"]]
      for node in changed + d["removed"]:
          apply_snapshot(conn, node, node_version_content(conn, base_map[node]))
      for node in d["added"]:
          snap = node_version_content(conn, tip_map[node])
          delete_node(conn, node, snap["kind"])
  ```

  Constraints, all binding:
  - `state_at` and `diff` are existing, separately authored functions in
    the sibling module `plan_manager/storage/version_ops.py`, declared
    there as: `def state_at(conn, plan_uuid, revision_uuid) -> dict[uuid.UUID,
    uuid.UUID]` (returns a mapping from node uuid to node_version uuid at
    that revision) and `def diff(conn, plan_uuid, revision_a, revision_b) ->
    dict` (returns `{"added": [...], "removed": [...], "changed": [...]}`:
    `added` and `removed` are lists of node uuids, while `changed` is a list
    of dicts with `entity_uuid` and `fields`, from `revision_a` to
    `revision_b`). Import and call them exactly as shown; do not redefine
    them in this file.
  - `base_map = state_at(conn, plan_uuid, base_revision_uuid)` and
    `tip_map = state_at(conn, plan_uuid, tip_revision_uuid)` must be
    computed exactly as shown, before computing `d`.
  - `d = diff(conn, plan_uuid, base_revision_uuid, tip_revision_uuid)` must
    be called with `base_revision_uuid` as `revision_a` and
    `tip_revision_uuid` as `revision_b`, exactly as shown.
  - Build `changed = [entry["entity_uuid"] for entry in d["changed"]]`.
    For every node uuid in `changed + d["removed"]` (list concatenation,
    iterated together in one loop), call `apply_snapshot(conn, node,
    node_version_content(conn, base_map[node]))` — i.e. fetch the snapshot
    content of the base-revision node_version for that node via
    `node_version_content`, then upsert it via `apply_snapshot`.
  - For every node uuid in `d["added"]` (a second, separate loop), fetch
    `snap = node_version_content(conn, tip_map[node])`, then call
    `delete_node(conn, node, snap["kind"])`.
  - Do not delete or rewrite any node_version or revision row anywhere in
    this function; only `apply_snapshot` and `delete_node` (which touch
    only the four working-row tables `step`, `concept`, `relation`,
    `paragraph`) are called.
  - The resulting file must contain these four public functions in this order:
    `node_version_content`, `apply_snapshot`, `delete_node`, `restore_state`.
    A private helper for extracting `entity_uuid` from changed diff entries is
    allowed if used only by `restore_state`.

  MRS excerpt (only the concepts referenced by this AS; quoted verbatim
  from `spec.yaml`):

  - concept_id: C-018
    name: VersionStore
    definition: Git-like append-only version model of node versions,
      revisions, and refs inside the database.
    properties:
    - node versions content-addressed by SHA-256 of canonical JSON (sorted
      keys, UTF-8)
    - revisions carry parent, author, change set; one mutation produces
      one revision
    - any intermediate plan state is addressable by revision id
    - refs are plan head plus one per open cascade
    - operations log, diff, checkout-read, revert; history never rewritten

  - concept_id: C-035
    name: Database
    definition: In-container PostgreSQL with pgvector serving as the
      single source of truth for all plan data.
    properties:
    - entities as rows; referential integrity at write time
    - every stored entity carries an immutable UUID identity;
      human-readable ids are scoped names mapped to it
    - hosts the version store, locks, and embedding cache
    - accessed via psycopg 3 with plain SQL; no ORM; runtime code never
      emits DDL
