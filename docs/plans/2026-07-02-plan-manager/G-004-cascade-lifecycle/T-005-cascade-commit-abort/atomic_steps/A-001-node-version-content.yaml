  MRS excerpt (only the concepts referenced by this AS; quoted verbatim
  from `spec.yaml`):

  - concept_id: C-018
    name: VersionStore
    definition: Git-like append-only version model of node versions,
      revisions, and refs inside the database.
    properties:
    - node versions content-addressed by SHA-256 of canonical JSON (sorted
      keys, UTF-8)
    - revisions carry parent, author, change set; one mutation produces
      one revision
    - any intermediate plan state is addressable by revision id
    - refs are plan head plus one per open cascade
    - operations log, diff, checkout-read, revert; history never rewritten

  - concept_id: C-035
    name: Database
    definition: In-container PostgreSQL with pgvector serving as the
      single source of truth for all plan data.
    properties:
    - entities as rows; referential integrity at write time
    - every stored entity carries an immutable UUID identity;
      human-readable ids are scoped names mapped to it
    - hosts the version store, locks, and embedding cache
    - accessed via psycopg 3 with plain SQL; no ORM; runtime code never
      emits DDL
