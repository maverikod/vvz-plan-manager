    the four constants (`BUILD_PACKAGE`, `BUILD_INFO_RESOURCE`,
    `OPERATOR_DOC_RESOURCE`, `REQUIRED_BUILD_KEYS`) are reproduced
    byte-identical to what is shown above.
  - Function signature, exact: `def _read_resource(name: str,
    missing_message: str) -> str:`. Both parameters and the return value
    are typed exactly as shown; no other parameters, no default values,
    no `*args`/`**kwargs`.
  - The docstring text of `_read_resource` is reproduced verbatim,
    character for character, exactly as shown above, using
    reStructuredText-style `:param:`, `:returns:`, and `:raises:` fields:
    one-line summary on the first line, blank line, then the field list.
  - The import statement `from importlib.resources import files` is
    placed INSIDE the function body, as the first line of the function
    body (after the docstring), NOT at module level. This is a local
    import local to `_read_resource`; do not move it to module scope and
    do not add any other import anywhere else in the file.
  - Body logic, exact: a `try` block whose only statement is `return
    (files(BUILD_PACKAGE) / name).read_text(encoding="utf-8")`, followed
    by `except (FileNotFoundError, ModuleNotFoundError, OSError):` whose
    only statement is `raise RuntimeError(missing_message)`. The
    `files(...)` call uses the module-level constant `BUILD_PACKAGE`
    (not a literal string) as its argument. The `/` operator on the
    result of `files(BUILD_PACKAGE)` is `importlib.resources.abc.Traversable.__truediv__`,
    joining the package resource root with `name` to address a specific
    resource file. `.read_text(encoding="utf-8")` reads that resource's
    full text content as a UTF-8 decoded string.
  - `_read_resource` never substitutes generated or default content: on
    any of the three caught exception types it raises `RuntimeError`
    carrying exactly the caller-supplied `missing_message` string and
    nothing else (no wrapping, no additional formatting, no chaining
    syntax such as `from`); it does not return a placeholder string, an
    empty string, or any fabricated content on failure.
  - No other functions, classes, or statements are added in this AS.
    Exactly two blank lines separate the end of the constants block
