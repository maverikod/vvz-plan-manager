prompt: |
  Modify the file plan_manager/runtime/context.py. Its full current
  content (after all lower-priority AS on this file have been applied) is
  exactly:

  """Runtime accessors for ServerRuntime (C-027): the database connection
  provider and the flat application-configuration projection consumed by
  every command of the surface.

  Runtime initialization happens once at startup: it loads and validates the
  custom configuration section (C-028) via plan_manager.runtime.config, reads
  the database password from the mounted secrets file, and holds the
  validated section and the password in module state. Using any accessor
  before init_runtime is an explicit runtime error. No accessor value is
  ever taken from request parameters.
  """

  import contextlib
  import os
  from dataclasses import dataclass

  import psycopg
  import psycopg.conninfo

  from plan_manager.runtime.config import ConfigError, PlanManagerSection, load_config

  SECRETS_ENV: str = "PLANMGR_SECRETS"
  DEFAULT_SECRETS_PATH: str = "/etc/planmgr/secrets/db_password"

  _SECTION: PlanManagerSection | None = None
  _PASSWORD: str | None = None

  Append exactly two blank lines after the last line shown (`_PASSWORD:
  str | None = None`), then append the following function definition at
  module level (no indentation):

  def init_runtime(config_path: str) -> None:
      """Initialize module-level runtime state from a configuration file.

      Loads and validates the custom plan_manager configuration section from
      ``config_path`` via ``load_config``, then reads the database password
      from the mounted secrets file. The secrets file path is taken from the
      environment variable named by ``SECRETS_ENV``, defaulting to
      ``DEFAULT_SECRETS_PATH`` when the environment variable is unset. Stores
      both the validated section and the password in module state.

      Args:
          config_path: Filesystem path to the JSON configuration file passed
              to ``load_config``.

      Returns:
          None.

      Raises:
          ConfigError: If ``load_config`` raises for invalid configuration;
              if the secrets file cannot be opened or read (missing or
              unreadable file), reported as "cannot read database secrets
              file: {secrets_path}"; or if the secrets file content is empty
              after stripping leading and trailing whitespace, reported as
              "database secrets file is empty: {secrets_path}".
      """
      global _SECTION, _PASSWORD
      section = load_config(config_path)
      secrets_path = os.environ.get(SECRETS_ENV, DEFAULT_SECRETS_PATH)
      try:
          with open(secrets_path, "r", encoding="utf-8") as f:
              text = f.read()
      except OSError as exc:
          raise ConfigError(
              f"cannot read database secrets file: {secrets_path}"
          ) from exc
      password = text.strip()
      if not password:
          raise ConfigError(f"database secrets file is empty: {secrets_path}")
      _SECTION = section
      _PASSWORD = password

  Constraints (all explicit, no open decisions):
  - Do not change any line that already exists in the file; only append
    the two blank lines and the function shown.
  - The function signature is exactly `def init_runtime(config_path: str)
    -> None:`.
  - `global _SECTION, _PASSWORD` must appear as the first statement in the
    function body, exactly as shown, so both module-level names declared
    in the existing file (`_SECTION`, `_PASSWORD`) can be reassigned.
  - `secrets_path` is computed with `os.environ.get(SECRETS_ENV,
    DEFAULT_SECRETS_PATH)`, using the two constants already defined in the
    file — do not hard-code either value again.
  - The secrets file is opened with `open(secrets_path, "r",
    encoding="utf-8")` inside a `try`/`except OSError as exc` block; on
    `OSError` it raises `ConfigError(f"cannot read database secrets file:
    {secrets_path}")` chained with `from exc`.
  - `password = text.strip()`; if `not password`, raise
    `ConfigError(f"database secrets file is empty: {secrets_path}")`.
  - On success, `_SECTION` is set to the object returned by `load_config`
    and `_PASSWORD` is set to the stripped password string; both
    assignments are the last two statements of the function, in that
    order.
  - Do not add any other function, class, or import. Do not read or
    modify any other file.

  Imported sibling contract (quote verbatim; already imported at the top
  of this file — do not reimplement): `class ConfigError(ValueError)`;
  `def load_config(path: str) -> PlanManagerSection` (raises ConfigError
  with the explicit report) from plan_manager/runtime/config.py.

  MRS excerpt (concept definitions relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-027
    name: ServerRuntime
    definition: Adapter-owned runtime hosting the command registry,
      transport, queue, and bootstrap sequence.
    properties:
    - entry point main --config; AppFactory create_app; hypercorn engine
    - adapter owns JSON-RPC, health, commands, heartbeat, OpenAPI surface
    - hook-based registration; auto-import modules for spawned workers
    - long operations use the adapter queue with job semantics
    - implemented in Python 3.12+; production package root plan_manager/
      at the repository root, modules as dotted paths beneath it

  - concept_id: C-028
    name: Configuration
    definition: Single JSON configuration with adapter sections plus one
      plan_manager section validated by a Pydantic model.
    properties:
    - fields database, embedding, scoring, schema_overrides, export_root
    - scoring carries published defaults (threshold 85, aggregation
      minimum, uniform concept weights, definition-only serialization,
      shared embedding vote, trust floor 0.2)
    - the per-plan context budget is plan data, not a configuration field
    - password only from mounted secrets; invalid config aborts startup
    - no configuration value is ever taken from request parameters

