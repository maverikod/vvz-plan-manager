verification:
  type: manual
  target: plan_manager.runtime.context.init_runtime
  expected: >
    Calling init_runtime with a config_path that load_config accepts, in
    an environment where the secrets file (resolved from PLANMGR_SECRETS
    or the default path) exists, is readable, and contains a non-empty
    value after stripping whitespace, sets the module-level _SECTION to
    the object returned by load_config and _PASSWORD to the stripped file
    content, and returns None. When load_config raises, the ConfigError
    propagates unchanged. When the secrets file is missing or unreadable,
    a ConfigError is raised with message "cannot read database secrets
    file: {secrets_path}". When the secrets file content is empty or
    whitespace-only, a ConfigError is raised with message "database
    secrets file is empty: {secrets_path}".
