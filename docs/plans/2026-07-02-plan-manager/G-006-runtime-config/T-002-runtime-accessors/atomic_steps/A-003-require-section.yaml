  - If `_SECTION is None`, raise exactly `RuntimeError("runtime not
    initialized: call init_runtime first")`.
  - Otherwise return `_SECTION` unchanged (no copy, no transformation).
  - Do not add any other function, class, or import. Do not read or
    modify any other file.

