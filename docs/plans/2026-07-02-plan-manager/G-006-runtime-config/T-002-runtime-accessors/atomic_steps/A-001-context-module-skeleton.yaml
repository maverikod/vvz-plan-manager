concepts: [C-027, C-028]
prompt: |
  Create the file plan_manager/runtime/context.py. It does not exist yet;
  do not assume any pre-existing content. Write exactly the following
  content, byte for byte (module docstring, imports, two public string
  constants, and two module-level state variables — no functions, no
  classes yet):

  """Runtime accessors for ServerRuntime (C-027): the database connection
  provider and the flat application-configuration projection consumed by
  every command of the surface.

  Runtime initialization happens once at startup: it loads and validates the
  custom configuration section (C-028) via plan_manager.runtime.config, reads
  the database password from the mounted secrets file, and holds the
  validated section and the password in module state. Using any accessor
  before init_runtime is an explicit runtime error. No accessor value is
  ever taken from request parameters.
  """

  import contextlib
  import os
  from dataclasses import dataclass

  import psycopg
  import psycopg.conninfo

  from plan_manager.runtime.config import ConfigError, PlanManagerSection, load_config

  SECRETS_ENV: str = "PLANMGR_SECRETS"
  DEFAULT_SECRETS_PATH: str = "/etc/planmgr/secrets/db_password"

  _SECTION: PlanManagerSection | None = None
  _PASSWORD: str | None = None

  Constraints (all explicit, no open decisions):
  - The file must contain exactly the content shown above, in this exact
    order: module docstring, then a blank line, then the three import
    statements/groups shown (with exactly one blank line between the
    stdlib group `import contextlib` / `import os` / `from dataclasses
    import dataclass`, the third-party group `import psycopg` / `import
    psycopg.conninfo`, and the local group `from plan_manager.runtime.config
    import ConfigError, PlanManagerSection, load_config`, matching the
    blank-line spacing shown), then a blank line, then the two constant
    assignments `SECRETS_ENV: str = "PLANMGR_SECRETS"` and
    `DEFAULT_SECRETS_PATH: str = "/etc/planmgr/secrets/db_password"`, then
    a blank line, then the two module-state assignments `_SECTION:
    PlanManagerSection | None = None` and `_PASSWORD: str | None = None`.
  - Do not add any function, class, or additional import beyond what is
    shown.
  - Do not add a trailing blank line beyond the single newline that ends
    the file.
  - Do not create, read, or modify any other file.
  - `SECRETS_ENV` is the name of the environment variable that, when set,
    overrides the default secrets file path used by a later accessor in
    this module.
  - `DEFAULT_SECRETS_PATH` is the fallback secrets file path used when the
    environment variable named by `SECRETS_ENV` is unset.
  - `_SECTION` and `_PASSWORD` are private module-level state written by
    an accessor defined in a later modification of this same file; at
    creation time both are `None`.

  Imported sibling contract (quote verbatim; import these names from
  plan_manager/runtime/config.py, never reimplement them in this file):
  `class ConfigError(ValueError)`; `class PlanManagerSection` (a pydantic
  model with attributes: database — with host: str | None, socket: str |
  None, port: int, dbname: str, user: str; embedding — with url: str |
  None, model: str | None, timeout: float; scoring — with threshold:
  float, aggregation: str, concept_weights: float, embedding_serialization:
  str, estimator_weights: dict[str, float], trust_floor: float;
  schema_overrides: dict; export_root: str); `def load_config(path: str)
  -> PlanManagerSection` (raises ConfigError with the explicit report).

  MRS excerpt (concept definitions relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-027
    name: ServerRuntime
    definition: Adapter-owned runtime hosting the command registry,
      transport, queue, and bootstrap sequence.
    properties:
    - entry point main --config; AppFactory create_app; hypercorn engine
    - adapter owns JSON-RPC, health, commands, heartbeat, OpenAPI surface
    - hook-based registration; auto-import modules for spawned workers
    - long operations use the adapter queue with job semantics
    - implemented in Python 3.12+; production package root plan_manager/
      at the repository root, modules as dotted paths beneath it

  - concept_id: C-028
    name: Configuration
    definition: Single JSON configuration with adapter sections plus one
      plan_manager section validated by a Pydantic model.
    properties:
    - fields database, embedding, scoring, schema_overrides, export_root
    - scoring carries published defaults (threshold 85, aggregation
      minimum, uniform concept weights, definition-only serialization,
      shared embedding vote, trust floor 0.2)
    - the per-plan context budget is plan data, not a configuration field
    - password only from mounted secrets; invalid config aborts startup
    - no configuration value is ever taken from request parameters

  Relation relevant to this AS, verbatim from spec.yaml:
  - { from_concept: C-027, to_concept: C-028, type: consumes }
verification:
  type: static_analysis
