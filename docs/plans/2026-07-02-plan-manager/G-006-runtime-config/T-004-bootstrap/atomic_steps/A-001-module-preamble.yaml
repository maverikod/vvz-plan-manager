    from plan_manager.runtime.config import ConfigError), one blank line,
    then the AUTO_IMPORT_MODULES assignment.
  - `AUTO_IMPORT_MODULES` is annotated exactly as `tuple[str, ...]` and is
    assigned a tuple literal holding exactly two string elements, in this
    order: "plan_manager.hooks" and "plan_manager.commands.registration".
  - Do not define build_app, main, or any other function, class, or
