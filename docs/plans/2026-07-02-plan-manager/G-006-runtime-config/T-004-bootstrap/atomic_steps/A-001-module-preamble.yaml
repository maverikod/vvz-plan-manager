  MRS excerpt (concept definitions relevant to this step, quoted from the
  machine specification):

  - C-027 ServerRuntime: "Adapter-owned runtime hosting the command
    registry, transport, queue, and bootstrap sequence." Properties:
    entry point `main --config`; AppFactory create_app; hypercorn engine.
    Adapter owns JSON-RPC, health, commands, heartbeat, OpenAPI surface.
    Hook-based registration; auto-import modules for spawned workers.
    Long operations use the adapter queue with job semantics. Implemented
    in Python 3.12+; production package root `plan_manager/` at the
    repository root, modules as dotted paths beneath it.
  - C-028 Configuration: "Single JSON configuration with adapter sections
    plus one plan_manager section validated by a Pydantic model."
    Property used here: password only from mounted secrets; invalid
    config aborts startup.

  Imported sibling contracts used by the import statements below (quote
  verbatim; these two modules already exist in the repository, are not
  created or modified by this step, and are not read — only their public
  signatures, given here, are needed):

  - `plan_manager/runtime/context.py` exposes
    `def init_runtime(config_path: str) -> None` (raises `ConfigError`
    with the explicit report on invalid configuration or unreadable
    secrets).
  - `plan_manager/runtime/config.py` exposes `class ConfigError(ValueError)`.

  Write the file with exactly the following content, byte for byte. Blank
  lines are significant and must be preserved exactly as shown (a blank
  line is an empty line with zero characters, not a line of spaces):

  """Server entry point and platform bootstrap for plan_manager.

  Realises ServerRuntime (C-027): the entry point receives a configuration
  file path, initializes the runtime (validating the custom configuration
  section, C-028, and aborting startup with an explicit report on invalid
  configuration or unreadable secrets), then creates the application through
  the platform application factory and runs it with the platform's server
  engine. The platform (mcp-proxy-adapter) owns the entire external surface:
  the JSON-RPC endpoint with single and batch calls, the asynchronous
  endpoint, health, command listing, heartbeat, WebSocket job push, and
  OpenAPI and help output. Supported protocols (http, https, mtls) follow
  the platform configuration unchanged. The server registers command classes
  only through the platform hook mechanism; it adds no custom route and
  patches no platform internal. The queue-manager section and the platform
  registration section (proxy registration URL, heartbeat, server id,
  instance UUID) are platform-owned and pass through untouched — the server
  functions identically with registration disabled.

  AUTO_IMPORT_MODULES declares, for the platform auto-import facility, the
  modules that spawned worker processes must import so that command classes
  and the registration hook are available in worker process memory.
  """

  import argparse
  import asyncio
  import sys

  import hypercorn.asyncio
  import hypercorn.config

  from plan_manager.runtime.context import init_runtime
  from plan_manager.runtime.config import ConfigError

  AUTO_IMPORT_MODULES: tuple[str, ...] = (
      "plan_manager.hooks",
      "plan_manager.commands.registration",
  )

  Constraints (all binding, no deviation):
