  Names already defined earlier in this same file (shown in the current
  file content above) and used by this guard without re-import or
  redefinition: `main(argv: list[str] | None = None) -> int`.

  Add exactly this guard, with no blank line inside it:

  if __name__ == "__main__":
      raise SystemExit(main())

  Constraints (all binding, no deviation):
  - Do not modify any character of the pre-existing content shown above;
    append only.
  - Exactly two blank lines separate `main`'s final `return 0` statement
    from the `if __name__ == "__main__":` line.
  - The guard body is exactly one statement, `raise SystemExit(main())`,
    indented four spaces; `main` is called with no arguments so `argv`
    defaults to `None` and argparse reads `sys.argv[1:]`.
  - Nothing follows the guard; the file ends immediately after the
    `raise SystemExit(main())` line, with a single trailing newline.
  - This step defines no command class, no configuration model, and no
    accessor; it only wires the existing `main` function to script
    execution.
