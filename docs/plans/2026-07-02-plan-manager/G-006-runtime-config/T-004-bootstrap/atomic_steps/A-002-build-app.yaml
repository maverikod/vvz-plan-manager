  VERIFIED PLATFORM CONTRACT (mcp-proxy-adapter 8.10.16): module
  `mcp_proxy_adapter.api.app` exposes
  `def create_app(title=None, description=None, version=None,
  app_config=None, config_path=None)` returning the ASGI application.
  Custom command hooks are not passed to `create_app`; they are registered
  beforehand through `mcp_proxy_adapter.commands.hooks`, and the adapter
  executes them while registering built-in commands. `create_app` does not
  read the JSON file from `config_path` into `app_config`; pass the parsed
