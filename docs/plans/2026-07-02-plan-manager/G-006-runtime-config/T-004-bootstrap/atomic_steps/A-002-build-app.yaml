  Add exactly this function (four-space indentation as shown):

  def build_app(config_path: str):
      """Create the platform ASGI application for the given configuration file.

      This is the only function that touches the platform API surface
      (mcp_proxy_adapter.core.app_factory.AppFactory); the import is placed
      inside the function body so that a mismatch against the assumed
      platform contract stays localized to this one function. The platform
      owns the entire external surface: JSON-RPC with single and batch
      calls, the asynchronous endpoint, health, command listing, heartbeat,
      WebSocket job push, and OpenAPI and help output. Supported protocols
      (http, https, mtls) follow the platform configuration unchanged. The
      server registers command classes only; it adds no route and patches
      no platform internal. The queue-manager section and the platform
      registration section (registration URL, heartbeat URL and interval,
      server id, instance UUID) are read by the platform from the same
      configuration file and passed through untouched — the server
      functions identically with registration disabled.

      Args:
          config_path: Path to the JSON configuration file containing the
              platform-owned sections (server, registration, auth, queue
              manager, and optional ssl/transport/security) plus the
              plan_manager custom section.

      Returns:
          The ASGI application created by the platform application factory.
      """
      from mcp_proxy_adapter.core.app_factory import AppFactory
      from plan_manager.hooks import register_custom_commands_hook

      factory = AppFactory()
      return factory.create_app(
          config_path=config_path,
          custom_commands_hook=register_custom_commands_hook,
      )

