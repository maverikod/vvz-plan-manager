  ```python
  """Label assignment for HRS binding paragraphs.

  Normative label-assignment algorithm (MRS concept C-002): draws unique
  four-character base36 labels for unlabeled binding paragraphs of an HRS
  document, in document order, and inserts them into the document text
  without disturbing any other content. Existing labels are never
  rewritten, reused, or reordered.
  """
  import random

  from plan_manager.domain.paragraph import Paragraph, parse_paragraphs

  BASE36_ALPHABET = "0123456789abcdefghijklmnopqrstuvwxyz"


  def _draw_label(existing_labels: set[str]) -> str:
      """Draw a new four-character base36 label not present in existing_labels.

      Args:
          existing_labels: The set of labels (four-character strings) that
              are already in use and must not be produced. Not mutated by
              this function.

      Returns:
          A four-character string drawn from BASE36_ALPHABET that is not a
          member of existing_labels.
      """
      while True:
          candidate = "".join(random.choice(BASE36_ALPHABET) for _ in range(4))
          if candidate not in existing_labels:
              return candidate


  def _binding_block_start_lines(document_text: str) -> list[int]:
      """Find the starting line index of each binding paragraph block.

      Args:
          document_text: The full HRS document text.

      Returns:
          A list of 0-based line indices into document_text.splitlines(),
          one per binding paragraph block, in document order: each entry
          is the index of that block's first line. The order and count of
          this list corresponds exactly, element for element, to the
          order and count of the list returned by
          plan_manager.domain.paragraph.parse_paragraphs(document_text),
          because both functions classify lines using the identical
          boundary rules.
      """
      lines = document_text.splitlines()
      in_non_binding = False
      in_fence = False
      block_open = False
      start_lines: list[int] = []

      for i, line in enumerate(lines):
          stripped = line.strip()
          if stripped == "<!-- non-binding -->":
              if not in_non_binding:
                  in_non_binding = True
              block_open = False
              continue
          if stripped == "<!-- /non-binding -->":
              if in_non_binding:
                  in_non_binding = False
              block_open = False
              continue
          if stripped.startswith("```"):
              in_fence = not in_fence
              block_open = False
              continue
          if in_fence:
              block_open = False
              continue
          if stripped.startswith("#"):
              block_open = False
              continue
          if stripped == "":
              block_open = False
              continue
          if not block_open:
              block_open = True
              if not in_non_binding:
                  start_lines.append(i)

      return start_lines


  def assign_labels(document_text: str) -> tuple[str, list[Paragraph]]:
      """Assign labels to every unlabeled binding paragraph of document_text.

      Args:
          document_text: The full HRS document text.

      Returns:
          A tuple (new_document_text, paragraphs):
          - new_document_text: document_text with a "{xxxx} " label prefix
            inserted, immediately before the first non-whitespace
            character of each previously-unlabeled binding paragraph's
            first line, for every newly assigned label. All other content
            (non-binding regions, heading lines, fenced code blocks,
            blank lines, already-labeled paragraphs, and all whitespace
            not at the insertion point) is left unchanged. Lines are
            rejoined with "\n"; this does not preserve a trailing newline
            if document_text ended with one, since str.splitlines()
            discards line terminators.
          - paragraphs: the list of Paragraph objects in the same
            document order as parse_paragraphs(document_text), except
            every Paragraph that had label=None is replaced by a new
            Paragraph with the same text and position and with label set
            to its newly assigned four-character label; paragraphs that
            already had a label are included unchanged. Existing labels
            are never rewritten, reused, or reordered.

      The document is first parsed into paragraphs, in document order,
      via parse_paragraphs; paragraphs that already carry a label are
      left unchanged. For each remaining unlabeled paragraph, a new
      unique label is drawn with _draw_label and inserted immediately
      before the first non-whitespace character of that paragraph's
      first line, preserving the line's existing indentation.
      """
      paragraphs = parse_paragraphs(document_text)
      start_lines = _binding_block_start_lines(document_text)
      existing_labels = {p.label for p in paragraphs if p.label is not None}
      lines = document_text.splitlines()
      result: list[Paragraph] = []

      for i, para in enumerate(paragraphs):
          if para.label is not None:
              result.append(para)
              continue
          new_label = _draw_label(existing_labels)
          existing_labels.add(new_label)
          line = lines[start_lines[i]]
          indent_len = len(line) - len(line.lstrip())
          prefix = line[:indent_len]
          rest = line[indent_len:]
          lines[start_lines[i]] = f"{prefix}{{{new_label}}} {rest}"
          result.append(Paragraph(label=new_label, text=para.text, position=para.position))

      new_document_text = "\n".join(lines)
      return new_document_text, result
  ```
