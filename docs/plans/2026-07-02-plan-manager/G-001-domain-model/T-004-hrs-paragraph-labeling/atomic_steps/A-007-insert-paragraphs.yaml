  MRS excerpt (C-002):
    concept_id: C-002
    name: Paragraph
    definition: Addressable binding unit of the HRS text carrying a stable
      four-character base36 label.
    properties:
    - label is position-independent, unique within one HRS, survives edits
    - non-binding blocks are excluded from labeling and coverage
    - HRS prose is human-owned; the server only assigns labels and toggles
      non-binding markup
    - parsing and label-assignment algorithms are normative

  Storage context (binding, not optional): the paragraph table has
  columns uuid (PostgreSQL uuid, immutable primary identity), plan_uuid
  (uuid), label (text; every stored row has a non-null label), text, and
  position (integer). The immutable uuid identity of each new row is
  generated in Python via uuid.uuid4() inside this insert function.
  Database access uses psycopg 3 with plain SQL strings; no ORM.

  Required change: add exactly one new module-level function to this
  file, after the existing delete_paragraphs function. Do not change the
  existing docstring, imports, or delete_paragraphs function in any way.
  Do not add any new import for this change (uuid, psycopg, and Paragraph
  are already imported).

  New function signature (exact):
    def insert_paragraphs(
        conn: psycopg.Connection,
        plan_uuid: uuid.UUID,
        paragraphs: list[Paragraph],
    ) -> None:

  Docstring: must describe args, returns (None), the ValueError raised on
  a missing label, and behavior, in prose.

  Behavior (normative, must be followed exactly):
    For each paragraph in paragraphs, in order:
      1. If paragraph.label is None, raise ValueError("paragraph has no
         label") immediately (before inserting anything for that
         paragraph; rows already inserted for earlier paragraphs in this
         call are not rolled back by this function — the caller controls
         the transaction).
      2. Otherwise, generate a new row identity via uuid.uuid4(), and
         execute, via conn.cursor(), the SQL statement
         "INSERT INTO paragraph (uuid, plan_uuid, label, text, position)
         VALUES (%s, %s, %s, %s, %s)" with parameters, in order: the
         newly generated uuid, the plan_uuid argument, paragraph.label,
         paragraph.text, paragraph.position.
    Do not call conn.commit(): the caller controls the transaction.

  Constraints:
    - Use conn.cursor() as a context manager (a "with" block) for each
      insert.
    - Use a parameterized query (the %s placeholders with a parameter
      tuple); do not interpolate any value into the SQL string.
    - The ValueError message must be exactly the string
      "paragraph has no label" (no other text).
    - Do not add any other function, class, or constant to this file in
      this operation.
    - The final file must not exceed 400 lines.

  After this change, the file's full content must be exactly:

  ```python
  """Storage of HRS binding paragraphs (MRS concept C-002).

  Wholesale replace/read operations against the paragraph table. The
  paragraph set of a plan is always replaced wholesale from a freshly
  parsed document: delete_paragraphs then insert_paragraphs. The server
  never authors or rewrites paragraph prose; these functions only persist
  already-labeled Paragraph objects.
  """
  import uuid

  import psycopg

  from plan_manager.domain.paragraph import Paragraph


  def delete_paragraphs(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> None:
      """Delete every stored paragraph row belonging to one plan.

      Args:
          conn: An open psycopg 3 database connection.
          plan_uuid: The uuid of the owning plan; rows where the
              paragraph table's plan_uuid column equals this value are
              deleted.

      Returns:
          None.
      """
      with conn.cursor() as cur:
          cur.execute("DELETE FROM paragraph WHERE plan_uuid = %s", (plan_uuid,))


  def insert_paragraphs(
      conn: psycopg.Connection,
      plan_uuid: uuid.UUID,
      paragraphs: list[Paragraph],
  ) -> None:
      """Insert a plan's binding paragraphs as new paragraph rows.

      Args:
          conn: An open psycopg 3 database connection.
          plan_uuid: The uuid of the owning plan; stored in each inserted
              row's plan_uuid column.
          paragraphs: The binding paragraphs to store. Every element must
              have a non-None label field (only binding paragraphs, all
              of which are labeled, are ever stored as paragraph rows).

      Returns:
          None.

      Raises:
          ValueError: if any paragraph in paragraphs has label equal to
              None. The message is exactly "paragraph has no label".
      """
      for paragraph in paragraphs:
          if paragraph.label is None:
              raise ValueError("paragraph has no label")
          with conn.cursor() as cur:
              cur.execute(
                  "INSERT INTO paragraph (uuid, plan_uuid, label, text, position) "
                  "VALUES (%s, %s, %s, %s, %s)",
                  (uuid.uuid4(), plan_uuid, paragraph.label, paragraph.text, paragraph.position),
              )
  ```
