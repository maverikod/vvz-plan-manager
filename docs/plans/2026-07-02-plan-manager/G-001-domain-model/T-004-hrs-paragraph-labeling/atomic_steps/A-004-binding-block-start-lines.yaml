  ```python
  """Label assignment for HRS binding paragraphs.

  Normative label-assignment algorithm (MRS concept C-002): draws unique
  four-character base36 labels for unlabeled binding paragraphs of an HRS
  document, in document order, and inserts them into the document text
  without disturbing any other content. Existing labels are never
  rewritten, reused, or reordered.
  """
  import random

  BASE36_ALPHABET = "0123456789abcdefghijklmnopqrstuvwxyz"


  def _draw_label(existing_labels: set[str]) -> str:
      """Draw a new four-character base36 label not present in existing_labels.

      Args:
          existing_labels: The set of labels (four-character strings) that
              are already in use and must not be produced. Not mutated by
              this function.

      Returns:
          A four-character string drawn from BASE36_ALPHABET that is not a
          member of existing_labels.
      """
      while True:
          candidate = "".join(random.choice(BASE36_ALPHABET) for _ in range(4))
          if candidate not in existing_labels:
              return candidate
  ```

  MRS excerpt (C-002), for context on the entity this module supports:
    concept_id: C-002
    name: Paragraph
    definition: Addressable binding unit of the HRS text carrying a stable
      four-character base36 label.
    properties:
    - label is position-independent, unique within one HRS, survives edits
    - non-binding blocks are excluded from labeling and coverage
    - HRS prose is human-owned; the server only assigns labels and toggles
      non-binding markup
    - parsing and label-assignment algorithms are normative

  Required change: add exactly one new module-level function to this file,
  after the existing _draw_label function. Do not change the existing
  docstring, import, constant, or _draw_label function in any way. Do not
  add any new import for this change (no new imports are needed).

  New function signature (exact):
    def _binding_block_start_lines(document_text: str) -> list[int]:

  Docstring: must describe args, returns, and the algorithm in prose, and
  must state that the returned list corresponds element-for-element, in
  order and count, to the list returned by
  plan_manager.domain.paragraph.parse_paragraphs(document_text), because
  both functions classify lines using the identical boundary rules (blank
  lines, "<!-- non-binding -->" / "<!-- /non-binding -->" markers, "```"
  fenced code, and "#" headings).

  Algorithm (normative, must be followed exactly — this is the only
  correct behavior, do not deviate or invent alternate rules):
    1. lines = document_text.splitlines().
    2. Maintain state across the whole walk: in_non_binding = False,
       in_fence = False, block_open = False, and
       start_lines: list[int] = [].
    3. For each line at 0-based index i, compute stripped = line.strip().
       Then, in this exact order of checks:
       a. If stripped == "<!-- non-binding -->": if not in_non_binding,
          set in_non_binding = True. Set block_open = False. Move to the
          next line.
       b. Else if stripped == "<!-- /non-binding -->": if in_non_binding,
          set in_non_binding = False. Set block_open = False. Move to the
          next line.
       c. Else if stripped starts with "```"
          (stripped.startswith("```")): toggle in_fence
          (in_fence = not in_fence). Set block_open = False. Move to the
          next line.
       d. Else if in_fence is True: set block_open = False. Move to the
          next line.
       e. Else if stripped starts with "#": set block_open = False. Move
          to the next line.
       f. Else if stripped == "" (a blank line): set block_open = False.
          Move to the next line.
       g. Else (a content line, not fenced, not blank, not a heading, not
          a marker): if block_open is False, set block_open = True, and
          if in_non_binding is False, append i to start_lines. If
          block_open is already True, do nothing further for this line
          (it continues the already-open block and is not itself a block
          start).
    4. Return start_lines.

