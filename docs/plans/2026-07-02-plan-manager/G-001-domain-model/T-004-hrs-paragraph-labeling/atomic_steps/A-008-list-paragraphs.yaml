  New function signature (exact):
    def list_paragraphs(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> list[Paragraph]:

  Docstring: must describe args, returns, and behavior in prose.

  Behavior (normative, must be followed exactly):
    Execute, via conn.cursor(), the SQL statement
