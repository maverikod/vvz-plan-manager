  MRS excerpt (C-002), for context on the entity this module represents:
    concept_id: C-002
    name: Paragraph
    definition: Addressable binding unit of the HRS text carrying a stable
      four-character base36 label.
    properties:
    - label is position-independent, unique within one HRS, survives edits
    - non-binding blocks are excluded from labeling and coverage
    - HRS prose is human-owned; the server only assigns labels and toggles
      non-binding markup
    - parsing and label-assignment algorithms are normative

  Required imports (exact, top of file, in this order):
    from dataclasses import dataclass
    from typing import Optional

  Required class:
    A dataclass named Paragraph, decorated with @dataclass, with exactly
    three fields, in this order:
      label: Optional[str]
      text: str
      position: int

  Field semantics (must appear in the class docstring, in prose):
    - label: the four-character base36 label (without surrounding curly
      braces) already present on this paragraph, or None if the paragraph
      has not yet been assigned a label.
    - text: the paragraph's prose text. If the paragraph already carried a
      label, the "{xxxx} " label prefix has been stripped off; if it did
      not, text is the paragraph's block text unchanged.
    - position: zero-based integer document order among binding paragraphs
      only (non-binding paragraphs, heading lines, and fenced code block
      lines are not counted).

  Constraints:
