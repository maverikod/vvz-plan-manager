  MRS excerpt (C-002), for context on the entity this module represents:
    concept_id: C-002
    name: Paragraph
    definition: Addressable binding unit of the HRS text carrying a stable
      four-character base36 label.
    properties:
    - label is position-independent, unique within one HRS, survives edits
    - non-binding blocks are excluded from labeling and coverage
    - HRS prose is human-owned; the server only assigns labels and toggles
      non-binding markup
    - parsing and label-assignment algorithms are normative

  Required change: add one new module-level import, one new module-level
  constant, and one new module-level function to this file, after the
  existing Paragraph class. Do not change the existing docstring, imports,
  or Paragraph class in any way.

  New import to add (insert as the first import line, before
  "from dataclasses import dataclass"):
    import re

  New constant to add (module level, after the Paragraph class):
    _LABEL_PATTERN = re.compile(r"^\{[0-9a-z]{4}\} ")
  This is the exact regular expression for detecting an existing label: an
  opening curly brace, exactly four characters from the base36 alphabet
  "0123456789abcdefghijklmnopqrstuvwxyz" (lowercase digits and letters),
  a closing curly brace, and one literal space, all at the start of the
  string being matched.

  New function signature (exact):
    def parse_paragraphs(document_text: str) -> list[Paragraph]:

  Docstring (must appear on the function, verbatim in meaning, describing
  args, returns, and the algorithm below in prose).

  Algorithm (normative, must be followed exactly — this is the only
  correct behavior, do not deviate or invent alternate rules):
    1. lines = document_text.splitlines() (this drops line terminators and
       produces no trailing empty entry for a final newline).
    2. Walk lines in order (0-based index i). Maintain state across the
       whole walk: in_non_binding = False, in_fence = False,
       block_open = False, block_lines: list[str] = [],
       block_start_non_binding = False, and
       binding_block_texts: list[str] = [].
    3. Define "closing the current block" as: if block_open is True and
       block_start_non_binding is False, append "\n".join(block_lines) to
       binding_block_texts; then reset block_lines = [] (regardless of
       block_open or block_start_non_binding).
    4. For each line, compute stripped = line.strip(). Then, in this exact
       order of checks:
       a. If stripped == "<!-- non-binding -->": if not in_non_binding,
          set in_non_binding = True. Close the current block (step 3). Set
          block_open = False. Move to the next line.
       b. Else if stripped == "<!-- /non-binding -->": if in_non_binding,
          set in_non_binding = False. Close the current block (step 3).
          Set block_open = False. Move to the next line.
       c. Else if stripped starts with "```" (stripped.startswith("```")):
          toggle in_fence (in_fence = not in_fence). Close the current
          block (step 3). Set block_open = False. Move to the next line.
       d. Else if in_fence is True: close the current block (step 3). Set
          block_open = False. Move to the next line.
       e. Else if stripped starts with "#": close the current block (step
          3). Set block_open = False. Move to the next line.
       f. Else if stripped == "" (a blank line): close the current block
          (step 3). Set block_open = False. Move to the next line.
       g. Else (a content line, not fenced, not blank, not a heading, not
          a marker): if block_open is False, open a new block: set
          block_open = True, block_lines = [],
          block_start_non_binding = in_non_binding (the current value).
          Then (whether the block was just opened or was already open)
          append the original unmodified line to block_lines.
    5. After the loop over all lines finishes, close the current block one
       final time (step 3), to flush a block that reaches end of document
       without a trailing boundary line.
    6. binding_block_texts now holds every binding paragraph's raw text,
       in document order.
    7. Build the result list: for each block_text in binding_block_texts,
       with position equal to its 0-based index in binding_block_texts:
       a. lstripped = block_text.lstrip()
       b. match = _LABEL_PATTERN.match(lstripped)
       c. If match is not None: label = lstripped[1:5] (the four matched
          base36 characters); text = lstripped[7:] (lstripped with the
          matched 7-character prefix "{" + 4 chars + "}" + " " removed).
       d. Else: label = None; text = block_text (unchanged, not
          lstripped).
       e. Append Paragraph(label=label, text=text, position=position) to
          the result list.
    8. Return the result list.

