  Relevant MRS concept excerpts (verbatim from spec.yaml):

  - concept_id: C-001
    name: Plan
    definition: Root aggregate of one development plan with identity, name,
      status, and head revision.
    properties:
    - hosts the five-level hierarchy HRS -> MRS -> GS -> TS -> AS
    - multiple plans live in one database, listed by catalog query
    - head revision advances per revision in draft editing, on publication
      for cascades
    - carries a user-set context budget in tokens (default 4000) consumed
      by prompt assembly

  - concept_id: C-018
    name: VersionStore
    definition: Git-like append-only version model of node versions,
      revisions, and refs inside the database.
    properties:
    - node versions content-addressed by SHA-256 of canonical JSON (sorted
      keys, UTF-8)
    - revisions carry parent, author, change set; one mutation produces one
      revision
    - any intermediate plan state is addressable by revision id
    - refs are plan head plus one per open cascade
    - operations log, diff, checkout-read, revert; history never rewritten

