  - concept_id: C-001
    name: Plan
    definition: Root aggregate of one development plan with identity, name,
      status, and head revision.
    properties:
    - hosts the five-level hierarchy HRS -> MRS -> GS -> TS -> AS
    - multiple plans live in one database, listed by catalog query
    - head revision advances per revision in draft editing, on publication
      for cascades
    - carries a user-set context budget in tokens (default 4000) consumed
