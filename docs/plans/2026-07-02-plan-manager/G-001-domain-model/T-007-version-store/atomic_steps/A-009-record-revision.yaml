      if ref_name is None:
          set_head_revision(conn, plan_uuid, revision_uuid)
      else:
          conn.execute(
              "UPDATE ref SET revision_uuid = %s WHERE plan_uuid = %s AND name = %s",
              (revision_uuid, plan_uuid, ref_name),
          )
      return revision_uuid
