  - C-035 Database: in-container PostgreSQL with pgvector serving as the single source of truth for all plan data; entities are stored as rows; accessed via psycopg 3 with plain SQL, no ORM; runtime code never emits DDL.

  Required change: append the following function definition to the end of the file, after `insert_concept`, separated from it by exactly two blank lines. Do not change any existing line in the file shown above.

  ```python



  def get_concept(
      conn: psycopg.Connection, plan_uuid: uuid.UUID, concept_id: str
  ) -> Concept | None:
      """Fetch one full Concept row by concept_id within one plan.

      Args:
          conn: Open psycopg database connection.
          plan_uuid: UUID of the owning plan.
          concept_id: The concept_id to look up.

      Returns:
          The matching Concept, or None if no row with this concept_id
          exists for the given plan_uuid.
      """
      with conn.cursor() as cur:
          cur.execute(
              "SELECT concept_id, name, definition, properties, source_labels "
              "FROM concept WHERE plan_uuid = %s AND concept_id = %s",
              (plan_uuid, concept_id),
          )
          row = cur.fetchone()
      if row is None:
          return None
      return Concept(
          concept_id=row[0],
          name=row[1],
          definition=row[2],
          properties=row[3],
          source_labels=row[4],
      )
  ```

