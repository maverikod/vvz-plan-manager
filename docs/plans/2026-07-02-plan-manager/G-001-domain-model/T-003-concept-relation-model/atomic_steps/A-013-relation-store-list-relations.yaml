  - Return a list comprehension over `rows` constructing one `(row[0], row[1], row[2])` tuple per row, in the exact form shown in the code above.
  - Do not catch or translate any exception raised by psycopg during `cur.execute` or `cur.fetchall`; let it propagate unmodified.
