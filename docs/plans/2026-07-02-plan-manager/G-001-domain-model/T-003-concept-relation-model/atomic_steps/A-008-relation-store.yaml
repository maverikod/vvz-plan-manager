  MRS excerpt (concept definitions relevant to this file):

  - C-004 Relation: "Typed directed edge between two concepts restricted to
    seven allowed types." Properties: types are uses, owns, implements,
    extends, depends_on, produces, consumes; free-form types rejected at
    write time.

  - C-003 Concept: identifier pattern is C-NNN, unique within the plan. A
    Relation depends on the existence of the Concepts (identified by
    concept_id) it connects.

  - C-035 Database: "In-container PostgreSQL with pgvector serving as the
    single source of truth for all plan data." Properties: entities are
    stored as rows; referential integrity is enforced at write time; every
    stored entity carries an immutable UUID identity generated at creation;
    accessed via psycopg 3 with plain SQL, no ORM; runtime code never emits
    DDL (schema DDL is owned exclusively by migrations outside this code).


  Binding project conventions for this file:

  - Python 3.12+. Database access uses psycopg 3 (`import psycopg`) with
    plain SQL strings; no ORM.

  - The database connection is passed explicitly as a `psycopg.Connection`
    parameter to each function; no module-level connection state.

  - Table `relation` has columns: `uuid` (PostgreSQL uuid, primary
    identity), `plan_uuid` (uuid, scopes rows to the owning plan),
    `from_concept`, `to_concept`, `type`.

  - The row's primary identity `uuid` is generated in Python via
    `uuid.uuid4()` at insert time; it is never supplied by the caller.

  - Runtime code in this file never emits DDL (no CREATE/ALTER/DROP) and
    never catches or translates psycopg exceptions; such exceptions
    propagate unmodified to the caller.


