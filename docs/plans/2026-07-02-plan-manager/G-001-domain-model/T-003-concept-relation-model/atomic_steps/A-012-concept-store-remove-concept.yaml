  - C-003 Concept: MRS basis axis with canonical name, one-sentence definition, properties, and source labels; identifier pattern is C-NNN, unique within the plan.
  - C-035 Database: entities are stored as rows; accessed via psycopg 3 with plain SQL, no ORM; runtime code never emits DDL.

  This AS uses `get_concept`, defined earlier in this same file by a lower-priority AS, with signature `def get_concept(conn: psycopg.Connection, plan_uuid: uuid.UUID, concept_id: str) -> Concept | None:`, which returns the matching Concept or None when absent.

  Required change: append the following function definition to the end of the file, after `update_concept`, separated from it by exactly two blank lines. Do not change any existing line in the file shown above.

  ```python



  def remove_concept(
      conn: psycopg.Connection, plan_uuid: uuid.UUID, concept_id: str
  ) -> Concept:
      """Delete a Concept row and return the pre-delete row.

      Args:
          conn: Open psycopg database connection.
          plan_uuid: UUID of the owning plan.
          concept_id: concept_id of the row to delete.

      Returns:
          The Concept row exactly as it existed immediately before
          deletion.

      Raises:
          ValueError: If no row with this concept_id exists for the given
              plan_uuid (message is f"concept not found: {concept_id}").
      """
      existing = get_concept(conn, plan_uuid, concept_id)
      if existing is None:
          raise ValueError(f"concept not found: {concept_id}")
      with conn.cursor() as cur:
          cur.execute(
              "DELETE FROM concept WHERE plan_uuid = %s AND concept_id = %s",
              (plan_uuid, concept_id),
          )
      return existing
  ```

