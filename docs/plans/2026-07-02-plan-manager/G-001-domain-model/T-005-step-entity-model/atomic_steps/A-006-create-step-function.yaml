     import psycopg

     with exactly:

     import uuid

     import psycopg
     from psycopg.types.json import Jsonb

     from plan_manager.domain.step import Step, next_free_step_id, validate_step
     from plan_manager.storage.plan_lock import acquire_plan_lock, release_plan_lock

     i.e. insert `from psycopg.types.json import Jsonb` directly below
     `import psycopg` (no blank line between them), then one blank line,
     then the two `from plan_manager...` lines directly below each other
     (no blank line between them). The two blank lines that already
     separate this import block from `def list_step_ids(` are unchanged.

     `from psycopg.types.json import Jsonb` imports the `Jsonb` wrapper
     type used to pass a Python dict as a PostgreSQL JSON value.
     `from plan_manager.domain.step import Step, next_free_step_id,
     validate_step` imports:
       - `Step`, a dataclass with fields uuid: UUID, plan_uuid: UUID,
         parent_step_uuid: UUID | None, level: int, step_id: str,
         slug: str, fields: dict[str, Any], depends_on: list[str],
