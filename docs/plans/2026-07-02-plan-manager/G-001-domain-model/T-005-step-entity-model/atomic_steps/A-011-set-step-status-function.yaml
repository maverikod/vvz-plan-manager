     `from plan_manager.domain.status_model import validate_transition`
     imports a function with exactly this signature, defined in
     `plan_manager/domain/status_model.py`:

     def validate_transition(
         current: str, new: str, is_atomic_step: bool, via_cascade: bool
     ) -> None:

     Its behavior: raises `plan_manager.domain.status_model
     .StatusTransitionError` (a subclass of the built-in `ValueError`)
     when the transition from `current` to `new` is not legal; otherwise
