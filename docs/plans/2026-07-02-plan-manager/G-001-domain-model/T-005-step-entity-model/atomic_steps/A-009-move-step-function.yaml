  - The function body must implement exactly the algorithm shown above,
    in this exact order:
    1. `step = get_step(conn, step_uuid)`; `old_parent_uuid =
       step.parent_step_uuid`.
    2. If `new_parent_uuid == old_parent_uuid`: `return step` immediately
