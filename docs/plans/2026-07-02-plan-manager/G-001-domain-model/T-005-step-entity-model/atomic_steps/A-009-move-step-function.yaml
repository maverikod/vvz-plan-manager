       old_parent_uuid, step.level, step.uuid)`. For each `(sibling_uuid,
       sibling_depends_on)` row where `step.step_id in
       sibling_depends_on`, build `new_depends_on` as the list
       comprehension `[d for d in sibling_depends_on if d !=
       step.step_id]` and execute an UPDATE with SQL text exactly
       `"UPDATE step SET depends_on = %s WHERE uuid = %s"` and params
       exactly `(new_depends_on, sibling_uuid)`.
    5. Compute `existing_step_ids = list_step_ids(conn, step.plan_uuid,
       new_parent_uuid, step.level)` then `new_step_id =
       next_free_step_id(existing_step_ids, step.level)`.
    6. Execute the moved-row UPDATE with SQL text exactly (the
       whitespace-joined concatenation of the string literals shown
       above) `"UPDATE step SET parent_step_uuid = %s, step_id = %s,
       depends_on = %s WHERE uuid = %s"` and params exactly
       `(new_parent_uuid, new_step_id, [], step.uuid)` — the empty list
       `[]` clears depends_on.
    7. `return get_step(conn, step_uuid)`.
  - The `step` table referenced by this SQL has columns: uuid,
    plan_uuid, parent_step_uuid, level, step_id, slug, fields,
    depends_on, concepts, status.
  - Do not catch `ValueError` inside this function; both raises
    propagate to the caller.
  - Do not add any other names, functions, classes, or imports beyond
