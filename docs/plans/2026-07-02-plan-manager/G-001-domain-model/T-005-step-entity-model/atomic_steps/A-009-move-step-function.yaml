    3. Level guard: if `new_parent_uuid is None`, raise
       `ValueError("invalid parent level")` unless `step.level == 3`.
       Otherwise call `new_parent = get_step(conn, new_parent_uuid)` and
       raise `ValueError("invalid parent level")` unless
       `new_parent.level == step.level - 1`.
    4. Old-scope reference scrub: execute the SQL SELECT shown above
       (the whitespace-joined concatenation of the string literals must
       be exactly `"SELECT uuid, depends_on FROM step WHERE plan_uuid =
       %s AND parent_step_uuid IS NOT DISTINCT FROM %s AND level = %s
