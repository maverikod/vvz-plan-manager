    - nothing project-specific is hard-coded in the engine

  Constraints (all binding, no deviation):
  - Target Python version is 3.12+. Use the built-in generic syntax
    `dict[int, str]`, `dict[int, list[str]]`, `dict[str, str]` for type
    annotations; do not import anything from the `typing` module.
  - The only imports in the file are `from __future__ import annotations`
    and `from dataclasses import dataclass`.
  - `PlanSchema` must be decorated with `@dataclass` and must declare
    exactly the three fields shown above, in that order, each with the
    exact type annotation shown.
  - `default_plan_schema()` must take no parameters, must be annotated to
    return `PlanSchema`, and must return a `PlanSchema` instance whose
    field values are exactly the literal dict values shown above — no
    additional keys, no omitted keys, no reordering of list elements.
  - Do not add any other functions, classes, constants, or code to this
    file beyond what is specified above.
  - Do not add any code related to status models, transitions, or any
    concept other than C-006 PlanSchema.
