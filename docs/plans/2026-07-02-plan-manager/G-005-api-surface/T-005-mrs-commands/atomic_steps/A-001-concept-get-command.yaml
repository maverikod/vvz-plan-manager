    properties:
    - identifier pattern C-NNN, unique within plan
    - selected to be as orthogonal as possible; basis quality is measured
    - embedding serialization default is the definition field only

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema, metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email, result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to on

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case declared

  Imported foundation contracts used by this file (quote verbatim; import them, never
  reimplement their bodies):

  - Module `mcp_proxy_adapter.commands.base`: `class Command` — the base command
    class; subclasses define class attributes name/version/descr/category/author/
    email/result_class/use_queue, and methods get_schema (classmethod), validate_params,
    execute.
  - Module `mcp_proxy_adapter.commands.result`: `class SuccessResult` (constructed as
    `SuccessResult(data=<dict>)`) and `class ErrorResult`.
  - Module `plan_manager.commands.errors`:
    `def domain_error(code: str, message: str, details: dict | None = None) -> ErrorResult`
    and `def map_exception(exc: Exception) -> ErrorResult` (maps psycopg.errors.UniqueViolation
    to code "DUPLICATE_ID" and other exceptions to a stable error result).
  - Module `plan_manager.commands.resolve`:
    `def resolve_plan(conn, plan: str) -> Plan` — resolves a plan identifier (UUID or
    unique name) against the database catalog; the returned Plan has fields uuid,
    name, status, context_budget, head_revision_uuid; raises a domain error mapped to
    code "PLAN_NOT_FOUND" when the plan cannot be resolved (caught by the generic
    exception handler below, via map_exception).
  - Module `plan_manager.runtime.context`:
    `def db_connection()` — a context manager yielding a psycopg.Connection; use as
    `with db_connection() as conn:`.
  - Module `plan_manager.domain.concept_store`:
    `@dataclass class Concept:` with fields `uuid: uuid.UUID`, `plan_uuid: uuid.UUID`,
    `concept_id: str`, `name: str`, `definition: str`, `properties: list[str]`,
    `source_labels: list[str]`; and
    `def get_concept(conn, plan_uuid, concept_id: str) -> Concept | None` — returns
    None when no concept with that concept_id exists in the plan.

  Write the file with exactly this content:

  ```python
  """Command: return one concept by identifier (concept_get)."""

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  from plan_manager.commands.errors import domain_error, map_exception
  from plan_manager.commands.resolve import resolve_plan
  from plan_manager.runtime.context import db_connection
  from plan_manager.domain.concept_store import get_concept


  class ConceptGetCommand(Command):
      """Return one MRS concept (C-003) of a resolved plan by its concept_id.

      Read-only command: never mutates plan state.
      """

      name = "concept_get"
      version = "1.0.0"
      descr = "Return one concept of a plan by concept_id."
      category = "mrs"
      author = "Vasiliy Zdanovskiy"
      email = "vasilyvz@gmail.com"
      result_class = SuccessResult
      use_queue = False

      @classmethod
      def get_schema(cls) -> dict:
          """Return the strict input schema for concept_get."""
          return {
              "type": "object",
              "properties": {
                  "plan": {
                      "type": "string",
                      "description": "Plan identifier (UUID or unique plan name) to resolve.",
                  },
                  "concept_id": {
                      "type": "string",
                      "description": "Concept identifier in pattern C-NNN.",
                  },
              },
              "required": ["plan", "concept_id"],
              "additionalProperties": False,
          }

      def validate_params(self, params: dict) -> dict:
          """Validate params: shallow schema checks only; no further semantics needed."""
          params = super().validate_params(params)
          return params

      async def execute(self, plan: str, concept_id: str) -> SuccessResult | ErrorResult:
          """Return the concept with concept_id in plan, or CONCEPT_NOT_FOUND.

          Args:
              plan: Plan identifier (UUID or unique plan name) to resolve.
              concept_id: Concept identifier in pattern C-NNN.

          Returns:
              SuccessResult with the concept fields, or ErrorResult with code
              PLAN_NOT_FOUND or CONCEPT_NOT_FOUND.
          """
          try:
              with db_connection() as conn:
                  p = resolve_plan(conn, plan)
                  concept = get_concept(conn, p.uuid, concept_id)
                  if concept is None:
                      return domain_error(
                          "CONCEPT_NOT_FOUND",
                          f"concept not found: {concept_id}",
                      )
                  return SuccessResult(data={
                      "uuid": str(concept.uuid),
                      "plan_uuid": str(concept.plan_uuid),
                      "concept_id": concept.concept_id,
                      "name": concept.name,
                      "definition": concept.definition,
                      "properties": concept.properties,
                      "source_labels": concept.source_labels,
                  })
          except Exception as exc:
              return map_exception(exc)
  ```

  Constraints:
  - Exactly this file content; no additional methods, imports, or attributes.
  - Do not read, create, or modify any other file.
  - The class must be named ConceptGetCommand and inherit from Command.
  - get_schema must return an object schema with additionalProperties: false and
    required exactly ["plan", "concept_id"].
  - execute is an async method with the exact parameter list (self, plan: str,
    concept_id: str) and return type `SuccessResult | ErrorResult`.
  - The final exception handler must be exactly `except Exception as exc: return
    map_exception(exc)`.
