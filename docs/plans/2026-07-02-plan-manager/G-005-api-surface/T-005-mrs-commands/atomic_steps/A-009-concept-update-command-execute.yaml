  ```python
  def _concept_row_uuid(conn, plan_uuid, concept_id: str) -> uuid.UUID:
      """Return the stored row uuid of concept_id in plan_uuid.

      Args:
          conn: Open psycopg.Connection.
          plan_uuid: UUID of the owning plan.
          concept_id: Concept identifier to look up.

      Returns:
          The uuid.UUID primary key of the concept row, or None if no such
          row exists.
      """
      with conn.cursor() as cur:
          cur.execute(
              "SELECT uuid FROM concept WHERE plan_uuid = %s AND concept_id = %s",
              (plan_uuid, concept_id),
          )
          row = cur.fetchone()
          return row[0] if row else None
  ```

