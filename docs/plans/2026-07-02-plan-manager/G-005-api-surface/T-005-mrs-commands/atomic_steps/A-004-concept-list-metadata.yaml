  Target file: `plan_manager/commands/concept_list_metadata.py`. Operation: create_file
  (the file does not exist yet; create it with exactly the content specified below).

  MRS excerpt (verbatim from spec.yaml, only the concepts relevant to this file):

  - concept_id: C-003
    name: Concept
    definition: MRS basis axis with canonical name, one-sentence definition, properties, and source labels.
    properties:
    - identifier pattern C-NNN, unique within plan

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema, metadata, and semantic validation.
    properties:
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case declared

  Context: this module documents the ConceptListCommand class defined in
  `plan_manager/commands/concept_list_command.py` (a sibling file, already created;
  do not read or modify it — the facts you need about it are restated here). That
  class has: name = "concept_list", version = "1.0.0", descr = "Return the concept
  list of a plan.", category = "mrs". Its get_schema() requires one string
  parameter "plan" (Plan identifier (UUID or unique plan name) to resolve.). Its
  execute resolves the plan via resolve_plan (raising an exception mapped to
  PLAN_NOT_FOUND when the plan cannot be resolved) then returns SuccessResult with
  data {"concepts": [...]}, one dict per stored concept with keys concept_id, name,
  definition, properties, source_labels — exactly the five fields of the stored
  Concept dataclass (the dataclass has no uuid and no plan_uuid field, so the
  result carries none either).

  Write the file with exactly this content:

  ```python
  """Extended AI/documentation metadata for the concept_list command."""

  from typing import Any, Dict


  def get_concept_list_metadata(cls) -> Dict[str, Any]:
      """Return extended metadata for ConceptListCommand.

      Args:
          cls: The ConceptListCommand class (passed by its classmethod metadata()).

      Returns:
          A metadata dictionary with keys name, version, description, category,
          author, email, detailed_description, parameters, return_value,
          usage_examples, error_cases, best_practices.
      """
      return {
          "name": cls.name,
          "version": cls.version,
          "description": cls.descr,
          "category": cls.category,
          "author": cls.author,
          "email": cls.email,
          "detailed_description": (
              "Returns the full MRS concept (C-003) list of a resolved plan. "
              "Read-only: never mutates plan state."
          ),
          "parameters": {
              "plan": {
                  "description": "Plan identifier (UUID or unique plan name) to resolve.",
                  "type": "string",
                  "required": True,
              },
          },
          "return_value": {
              "success": {
                  "description": "The concept list of the plan.",
                  "data": {
                      "concepts": "List of concept objects, each with concept_id, name, definition, properties, source_labels.",
                  },
                  "example": {
                      "concepts": [
                          {
                              "concept_id": "C-003",
                              "name": "Concept",
                              "definition": "MRS basis axis with canonical name, one-sentence definition, properties, and source labels.",
                              "properties": ["identifier pattern C-NNN, unique within plan"],
                              "source_labels": ["{f6s2}", "{k7r9}"],
                          },
                      ],
                  },
              },
              "error": {
                  "description": "Error result with a stable domain code.",
                  "code": "stable error code string",
                  "message": "human-readable message",
                  "details": "additional diagnostic fields when available",
              },
          },
          "usage_examples": [
              {
                  "description": "List every concept of a plan.",
                  "command": {"plan": "plan-manager"},
                  "explanation": "Returns all stored concepts of the resolved plan.",
              },
          ],
          "error_cases": {
              "PLAN_NOT_FOUND": {
                  "description": "The plan identifier does not resolve to a stored plan.",
                  "message": "plan not found: {plan}",
                  "solution": "List plans and retry with a valid plan identifier or UUID.",
              },
          },
          "best_practices": [
              "Use concept_list before concept_get or concept_coverage to discover valid concept_id values.",
              "concept_list never mutates plan state; safe to call at any plan or cascade status.",
          ],
      }
  ```

  Constraints:
  - Exactly this file content; no additional functions or imports.
  - Do not read, create, or modify any other file.
  - The function must be named get_concept_list_metadata and accept exactly one
    positional parameter named cls.
  - error_cases must contain exactly the key PLAN_NOT_FOUND with description,
    message, solution.
  - The returned dict must contain all of: name, version, description, category,
    author, email, detailed_description, parameters, return_value, usage_examples,
    error_cases, best_practices.
