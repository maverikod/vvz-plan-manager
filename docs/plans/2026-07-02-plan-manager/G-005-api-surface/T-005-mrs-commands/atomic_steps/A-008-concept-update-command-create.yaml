  Write the file with exactly this content:

  ```python
  """Command: update fields of an existing concept (concept_update)."""

  import uuid

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  _UPDATABLE_FIELDS = {"name", "definition", "properties", "source_labels"}


  class ConceptUpdateCommand(Command):
      """Update fields of an existing MRS concept (C-003) under an open cascade (C-016).

      MRS entities are cascade-only at any plan status: every call must carry the
      UUID of an already-open cascade in cascade_uuid.
      """

      name = "concept_update"
      version = "1.0.0"
      descr = "Update fields of an existing concept under an open cascade."
      category = "mrs"
      author = "Vasiliy Zdanovskiy"
      email = "vasilyvz@gmail.com"
      result_class = SuccessResult
      use_queue = False

      @classmethod
      def get_schema(cls) -> dict:
          """Return the strict input schema for concept_update."""
          return {
              "type": "object",
              "properties": {
                  "plan": {
                      "type": "string",
                      "description": "Plan identifier (UUID or unique plan name) to resolve.",
                  },
                  "cascade_uuid": {
                      "type": "string",
                      "description": "UUID of the open cascade admitting this mutation. Required: MRS entities are cascade-only at any status.",
                  },
                  "concept_id": {
                      "type": "string",
                      "description": "Concept identifier of the concept to update.",
                  },
                  "fields": {
                      "type": "object",
                      "description": "Partial field set to update. Keys must be a non-empty subset of name, definition, properties, source_labels.",
                      "properties": {
                          "name": {
                              "type": "string",
                              "description": "New concept canonical name.",
                          },
                          "definition": {
                              "type": "string",
                              "description": "New concept one-sentence definition.",
                          },
                          "properties": {
                              "type": "array",
                              "items": {"type": "string"},
                              "description": "New free-form property statements.",
                          },
                          "source_labels": {
                              "type": "array",
                              "items": {"type": "string"},
                              "description": "New HRS paragraph labels; each must resolve to a stored binding paragraph.",
                          },
                      },
                      "required": [],
                  },
              },
              "required": ["plan", "cascade_uuid", "concept_id", "fields"],
              "additionalProperties": False,
          }

      def validate_params(self, params: dict) -> dict:
          """Validate params: shallow schema checks, cascade_uuid format, and fields semantics.

          Raises:
              ValueError: if cascade_uuid is not a well-formed UUID string, or if
                  fields is not a non-empty dict whose keys are a subset of
                  {"name", "definition", "properties", "source_labels"}.
          """
          params = super().validate_params(params)
          uuid.UUID(params["cascade_uuid"])
          fields = params.get("fields")
          if not isinstance(fields, dict) or not fields:
              raise ValueError("fields must be a non-empty object")
          extra = set(fields.keys()) - _UPDATABLE_FIELDS
          if extra:
              raise ValueError(f"fields contains unsupported keys: {sorted(extra)}")
          return params
  ```

  Constraints:
  - Exactly this file content; no execute method, no additional imports.
  - Do not read, create, or modify any other file.
  - The class must be named ConceptUpdateCommand and inherit from Command.
  - The module-level constant _UPDATABLE_FIELDS must be exactly
    `{"name", "definition", "properties", "source_labels"}`.
  - get_schema must return an object schema with additionalProperties: false and
    required exactly ["plan", "cascade_uuid", "concept_id", "fields"]; the nested
    "fields" schema documents name/definition/properties/source_labels with
    "required": [] (documentation-only nesting; enforcement is in validate_params).
  - validate_params calls super().validate_params(params) first, validates
    cascade_uuid format, then validates fields is a non-empty dict whose keys are
    a subset of _UPDATABLE_FIELDS, raising ValueError otherwise.
