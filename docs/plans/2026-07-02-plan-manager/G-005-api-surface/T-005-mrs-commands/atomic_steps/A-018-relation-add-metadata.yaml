  - concept_id: C-016
    name: CascadeChange
    definition: Transactional top-down change set anchored at the plan head revision, published atomically on green gate.
    properties:
    - one open cascade per plan; MRS mutations are cascade-only at any status

  - concept_id: C-004
    name: Relation
    definition: Typed directed edge between two concepts restricted to seven allowed types.
    properties:
    - types are uses, owns, implements, extends, depends_on, produces, consumes
    - free-form types rejected at write time

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema, metadata, and semantic validation.
    properties:
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case declared

  Context: this module documents the RelationAddCommand class defined in
  `plan_manager/commands/relation_add_command.py` (a sibling file, already
  created; do not read or modify it — the facts you need about it are restated
  here). That class has: name = "relation_add", version = "1.0.0", descr =
  "Add a new relation between two concepts under an open cascade.", category =
  "mrs". Its get_schema() requires plan, cascade_uuid, from_concept, to_concept
