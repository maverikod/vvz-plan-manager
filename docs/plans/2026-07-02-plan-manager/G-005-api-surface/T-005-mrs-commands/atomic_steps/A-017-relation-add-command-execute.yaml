  ```python
      async def execute(
          self,
          plan: str,
          cascade_uuid: str,
          from_concept: str,
          to_concept: str,
          type: str,
      ) -> SuccessResult | ErrorResult:
          """Add a new relation under an open cascade and verify by re-read.

          Args:
              plan: Plan identifier (UUID or unique plan name) to resolve.
              cascade_uuid: UUID string of the open cascade admitting this mutation.
              from_concept: Concept identifier of the relation source endpoint.
              to_concept: Concept identifier of the relation target endpoint.
              type: Relation type; one of the seven allowed types.

          Returns:
              SuccessResult with from_concept, to_concept, type, and
              revision_uuid, or ErrorResult with code PLAN_NOT_FOUND,
              CASCADE_CONFLICT, or CONCEPT_NOT_FOUND.
          """
          try:
              with db_connection() as conn:
                  p = resolve_plan(conn, plan)
                  parsed_cascade = uuid.UUID(cascade_uuid)
                  try:
                      rec = check_admission(conn, p.uuid, "relation", None, parsed_cascade)
                  except CascadeError as exc:
                      return domain_error("CASCADE_CONFLICT", str(exc))
                  relation = Relation(from_concept=from_concept, to_concept=to_concept, type=type)
                  try:
                      relation_uuid = insert_relation(conn, p.uuid, relation)
                  except RelationValidationError as exc:
                      msg = str(exc)
                      if from_concept in msg or to_concept in msg:
                          return domain_error("CONCEPT_NOT_FOUND", msg)
                      raise
                  nodes = load_steps(conn, p.uuid)
                  status_updates = mrs_invalidation(nodes)
                  snapshot = {
                      "kind": "relation",
                      "uuid": str(relation_uuid),
                      "plan_uuid": str(p.uuid),
                      "from_concept": from_concept,
                      "to_concept": to_concept,
                      "type": type,
                  }
                  revision_uuid = cascade_write(
                      conn, p.uuid, rec, relation_uuid, snapshot, status_updates,
                      "api", f"relation_add: {from_concept}-{type}->{to_concept}",
                  )
                  found = any(
                      r == (from_concept, to_concept, type)
                      for r in list_relations(conn, p.uuid)
                  )
                  if not found:
                      raise RuntimeError("relation_add: write verification failed")
                  return SuccessResult(data={
                      "from_concept": from_concept,
                      "to_concept": to_concept,
                      "type": type,
                      "revision_uuid": str(revision_uuid),
                  })
          except Exception as exc:
              return map_exception(exc)
  ```

