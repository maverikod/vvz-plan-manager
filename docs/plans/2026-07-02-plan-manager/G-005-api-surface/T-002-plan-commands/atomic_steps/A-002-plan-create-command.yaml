  PURPOSE: this module defines the `plan_create` MCP command class. It is a
  mutating command that creates a new plan aggregate (C-001) at revision
  zero with empty HRS and MRS, then verifies its own result by re-reading
  the created row, per the CommandContract (C-023) discipline that mutating
  commands verify by re-read.

  EXACT IMPORTS (all used, nothing else):

  ```python
