prompt: |
  Create the file `plan_manager/commands/plan_create_metadata.py` with exactly
  the content specified below. This is a brand-new file; it does not exist yet
  and no other file's content should be assumed.

  PURPOSE: this module provides the extended documentation metadata for the
  `plan_create` MCP command, per the Command Metadata and Schema Standard.
  The command class itself (in a different file, not part of this task)
  calls `get_plan_create_metadata(cls)` from its `metadata()` classmethod and
  returns the result unchanged. The dictionary must be internally consistent
  with the command's `get_schema()`, which is:

  ```python
  {
      "type": "object",
      "properties": {
          "name": {
              "type": "string",
              "description": "Unique plan name.",
          },
          "context_budget": {
              "type": "integer",
              "description": (
                  "Context budget in tokens for prompt assembly; must "
                  "be at least 1. Defaults to 4000."
              ),
              "default": 4000,
          },
      },
      "required": ["name"],
      "additionalProperties": False,
  }
  ```

  The command's semantic validation (in `validate_params`, not part of this
  file) raises a plain `ValueError` when `name` is empty after stripping
  whitespace, or when `context_budget` is not an integer >= 1; these are
  parameter-shape violations, not domain conditions, so they carry no
  domain string code and are not part of `error_cases`. The command's
  execution creates the plan then re-reads it; on a duplicate plan name,
  the underlying `psycopg.errors.UniqueViolation` is mapped by
  `map_exception` to a `DomainCommandError` with code `"DUPLICATE_ID"`,
  returned as an `ErrorResult`. This is the only domain error code this
  command can return, so `error_cases` must contain exactly one key,
  `"DUPLICATE_ID"`, nothing else.

  MRS EXCERPT (concept definitions relevant to this file):

  - C-001 Plan: "Root aggregate of one development plan with identity, name,
    status, and head revision." Properties: hosts the five-level hierarchy
    HRS -> MRS -> GS -> TS -> AS; multiple plans live in one database, listed
    by catalog query; head revision advances per revision in draft editing,
    on publication for cascades; carries a user-set context budget in tokens
    (default 4000) consumed by prompt assembly.
  - C-023 CommandContract: "Adapter-conformant command class shape with
    schema, metadata, and semantic validation." Properties: class attributes
    name, version, descr, category, author, email, result_class, use_queue;
    get_schema strict subset with explicit additionalProperties false;
    shallow adapter validation compensated by validate_params semantics;
    metadata dictionary must never contradict the schema; read commands never
    mutate, mutating commands verify by re-read; destructive or bulk
    operations expose a dry-run mode defaulting to on.
  - C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes and
    stable domain string codes." Property: every declared error case
    returnable and every returnable case declared.

  REQUIRED FILE CONTENT (exact):

  ```python
  """Metadata for the plan_create command."""

  from typing import Any


  def get_plan_create_metadata(cls: Any) -> dict:
      """Return the full metadata dictionary for PlanCreateCommand.

      Args:
          cls: The PlanCreateCommand class, providing name, version, descr,
              category, author, email class attributes.

      Returns:
          dict: Metadata dictionary conforming to metadatastd.yaml
              required_fields: name, version, description, category,
              author, email, detailed_description, parameters,
              return_value, usage_examples, error_cases, best_practices.
      """
      return {
          "name": cls.name,
          "version": cls.version,
          "description": cls.descr,
          "category": cls.category,
          "author": cls.author,
          "email": cls.email,
          "detailed_description": (
              "Creates a new plan aggregate (C-001) at revision zero with "
              "empty HRS and MRS. The plan name must be unique across the "
              "catalog; a duplicate name is rejected with the DUPLICATE_ID "
              "domain code. The context budget in tokens governs prompt "
              "assembly for this plan and defaults to 4000 when omitted; "
              "an empty name or a context_budget below 1 is rejected as a "
              "parameter-shape violation before any database access. This "
              "command mutates the database: it verifies its own result by "
              "re-reading the created plan row before returning. There is "
              "no dry-run mode; plan creation has no partial or "
              "destructive side effects to preview."
          ),
          "parameters": {
              "name": {
                  "description": (
                      "Unique plan name. Must be non-empty after "
                      "stripping surrounding whitespace."
                  ),
                  "type": "string",
                  "required": True,
                  "examples": ["my-plan"],
              },
              "context_budget": {
                  "description": (
                      "Context budget in tokens consumed by prompt "
                      "assembly. Must be an integer >= 1."
                  ),
                  "type": "integer",
                  "required": False,
                  "default": 4000,
                  "examples": [4000, 8000],
              },
          },
          "return_value": {
              "success": {
                  "description": (
                      "The created plan identity, verified by re-reading "
                      "the stored row after creation."
                  ),
                  "data": {
                      "uuid": "Plan UUID as a string.",
                      "name": "Plan name as stored.",
                      "status": "Plan lifecycle status immediately after creation.",
                      "context_budget": "Context budget in tokens as stored.",
                  },
                  "example": {
                      "uuid": "3fae3c1e-2b0e-4a1a-9e2a-6f6b1a2c3d4e",
                      "name": "my-plan",
                      "status": "draft",
                      "context_budget": 4000,
                  },
              },
              "error": {
                  "description": "A domain error result carrying a stable string code.",
                  "code": "DUPLICATE_ID",
                  "message": "A plan with this name already exists.",
              },
          },
          "usage_examples": [
              {
                  "description": "Create a plan with the default context budget.",
                  "command": {"name": "my-plan"},
                  "explanation": "Creates a plan named 'my-plan' with context_budget 4000.",
              },
              {
                  "description": "Create a plan with an explicit context budget.",
                  "command": {"name": "my-plan", "context_budget": 8000},
                  "explanation": "Creates a plan named 'my-plan' with context_budget 8000.",
              },
          ],
          "error_cases": {
              "DUPLICATE_ID": {
                  "description": "The requested plan name already exists in the catalog.",
                  "message": "A plan with this name already exists.",
                  "solution": "Call plan_list to inspect existing names and retry with a unique name.",
              },
          },
          "best_practices": [
              "Call plan_list first to confirm the desired name is not already taken.",
              "Use the default context_budget of 4000 unless prompt assembly for this plan is known to need more headroom.",
              "After creation, use the returned uuid for all subsequent operations on this plan.",
          ],
      }
  ```

  CONSTRAINTS:
  - The file must contain exactly one module-level function,
    `get_plan_create_metadata(cls: Any) -> dict`, with the docstring shown
    above verbatim.
  - The only import is `from typing import Any`.
  - The returned dict's top-level keys must be exactly: name, version,
    description, category, author, email, detailed_description, parameters,
    return_value, usage_examples, error_cases, best_practices — in that
    order.
  - `error_cases` must contain exactly one key, "DUPLICATE_ID", with
    "description", "message", "solution" string values.
  - `parameters` must contain exactly the keys "name" and "context_budget",
    each with "description", "type", "required" (bool), and, where shown
    above, "default" and/or "examples".
  - Do not add a module-level docstring other than
    `"""Metadata for the plan_create command."""`.
  - Do not import PlanCreateCommand or any command module from this file.
