  - `def list_plans(conn) -> list[Plan]` ‚Äî returns every plan row. Each
    `Plan` dataclass has fields `uuid`, `name`, `status`, `context_budget`,
    `head_revision_uuid`.
  - `def db_connection()` ‚Äî a context manager yielding an open
    `psycopg.Connection`; use as `with db_connection() as conn:`.
  - `SuccessResult` is constructed as `SuccessResult(data=<dict>)`.

  MRS EXCERPT (concept definitions relevant to this file):

