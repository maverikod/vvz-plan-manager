  IMPORTED CONTRACTS (signatures; import and use exactly as given, do not
  reimplement):

  - `def map_exception(exc: Exception) -> ErrorResult` ‚Äî maps a caught
    exception to an `ErrorResult`; re-raises exceptions it does not
    recognize.
  - `def get_plan_list_metadata(cls) -> dict` ‚Äî from the sibling metadata
