  ```python
      def execute(self, **kwargs: Any):
          """Run the mechanical gate over the requested scope and return the report.

          :param kwargs: Validated parameters: plan (str, plan identifier),
              scope (str, 'plan' or 'branch', default 'plan'), gs_step_id
              (str | None), ts_step_id (str | None), as_step_id (str | None),
              fail_fast (bool, default False), format (str, 'text' or
              'json', default 'json').
          :type kwargs: Any
          :returns: A SuccessResult with data {green, scope, revision_uuid,
              format, report} on success; an ErrorResult with code
              STEP_NOT_FOUND when scope is 'branch' and the branch cannot be
              resolved; otherwise an ErrorResult produced by map_exception
              for any exception raised while resolving the plan or running
              the gate (in particular PLAN_NOT_FOUND when the plan does not
              resolve).
          :rtype: SuccessResult | ErrorResult
          """
          plan = kwargs["plan"]
          scope = kwargs.get("scope", "plan")
          gs_step_id = kwargs.get("gs_step_id")
          ts_step_id = kwargs.get("ts_step_id")
          as_step_id = kwargs.get("as_step_id")
          fail_fast = kwargs.get("fail_fast", False)
          output_format = kwargs.get("format", "json")
          try:
              with db_connection() as conn:
                  p = resolve_plan(conn, plan)
                  branch = None
                  if scope == "branch":
                      try:
                          branch = resolve_branch(
                              conn, p.uuid, gs_step_id, ts_step_id, as_step_id
                          )
                      except ValueError as exc:
                          return domain_error("STEP_NOT_FOUND", str(exc))
                  report, verdict = run_gate(
                      conn, p.uuid, branch=branch, fail_fast=fail_fast
                  )
                  rendered = (
                      render_text(report)
                      if output_format == "text"
                      else render_json(report)
                  )
                  data = {
                      "green": report.green,
                      "scope": verdict.scope,
                      "revision_uuid": (
                          str(verdict.revision_uuid) if verdict.revision_uuid else None
                      ),
                      "format": output_format,
                      "report": rendered,
                  }
                  return SuccessResult(data=data)
          except Exception as exc:
              return map_exception(exc)
  ```

  Constraints:
  - `db_connection()` (imported from `plan_manager.runtime.context`) is a
    context manager over a live database connection; use it exactly as
    `with db_connection() as conn:` and perform all work for this command
    inside that `with` block, exactly as shown.
  - `resolve_plan(conn, plan: str) -> Plan` (imported from
    `plan_manager.commands.resolve`) resolves the plan identifier against
    the database catalog and returns a `Plan` with fields `uuid`, `name`,
    `status`, `context_budget`, `head_revision_uuid`; it raises on an
    unresolvable plan (caught by the outer `except Exception as exc: return
    map_exception(exc)`, which maps an unresolvable plan to the
    `PLAN_NOT_FOUND` domain code).
  - `resolve_branch(conn, plan_uuid, gs_step_id, ts_step_id, as_step_id) ->
    Branch` (imported from `plan_manager.views.branch`) resolves the three
    branch step ids into a `Branch` (dataclass fields `plan_uuid`, `gs`,
    `ts`, `atomic`, `hrs_slice`); it raises `ValueError` naming the missing
    step id when any of the three does not resolve. That `ValueError` is
    caught locally and converted to `domain_error("STEP_NOT_FOUND",
    str(exc))` exactly as shown — do not let it propagate to the outer
    `except Exception`.
  - `run_gate(conn, plan_uuid, branch: Branch | None = None, fail_fast: bool
    = False) -> tuple[Report, Verdict]` (imported from
    `plan_manager.verify.gate`) runs the mechanical gate. `Report` has
    fields `checks: list[CheckResult]` (each `CheckResult` has `check_id`,
    `passed`, `findings: list[Finding]`, each `Finding` having `check_id`,
    `severity`, `artifact_path`, `message`) and `green: bool`. `Verdict` has
    fields `kind`, `scope`, `revision_uuid: uuid.UUID | None`, `green`,
    `payload`. Pass `branch=None` for plan scope and the resolved `Branch`
    for branch scope, exactly as shown.
  - `render_text(report: Report) -> str` and `render_json(report: Report) ->
    str` (both imported from `plan_manager.verify.finding`) render the
    report; call `render_text(report)` when `output_format == "text"`,
    otherwise call `render_json(report)`, exactly as shown.
  - `domain_error(code, message, details=None) -> ErrorResult` and
    `map_exception(exc) -> ErrorResult` (both imported from
    `plan_manager.commands.errors`) are the only two error-construction
    calls used in this method; do not construct `ErrorResult` directly and
    do not catch `plan_manager.commands.errors.DomainCommandError`
    explicitly — it is handled generically by `map_exception` inside the
    outer `except Exception` clause.
  - The outer `try`/`except Exception as exc: return map_exception(exc)`
    wraps the entire body of `execute` starting from the `with
    db_connection()` line, exactly as shown; this is the command's final
    exception handler.
  - `SuccessResult` and `ErrorResult` are already imported at module level
    (from `mcp_proxy_adapter.commands.result`); do not re-import them.
  - Return `SuccessResult(data=data)` on success with the exact five keys
    `green`, `scope`, `revision_uuid`, `format`, `report` shown above and no
    other keys. `execute` performs no database write of any kind: it is a
    pure read that stores nothing.
  - Do not add any other method, import, or module-level statement.

  MRS excerpt (concept definitions relevant to this change):

  - C-012 MechanicalGate: "Deterministic binary verification layer catching
    every mechanical defect before semantics." Properties: fixed check order
    parse, identity, uniqueness, references, coverage; byte-identical reports
    for the same tree state; fail-fast only at group boundary; per-branch
    gating; precondition for any semantic measurement; parser sanity gates
    make parsing regressions fail loudly instead of passing silently.
  - C-017 Finding: "Ephemeral result unit of gate and scoring runs with check
    id, severity, artifact path, and message." Properties: aggregated into
    reports; never stored as a plan artifact.
  - C-020 Verdict: "Gate or score result bound to the exact revision and
    scope it was computed for." Properties: fresh iff recorded revision
    equals current revision; comparison never by timestamp.
  - C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes and
    stable domain string codes." Properties: every declared error case
    returnable and every returnable case declared.
  - C-023 CommandContract: "Adapter-conformant command class shape with
    schema, metadata, and semantic validation." Properties: read commands
    never mutate; mutating commands verify by re-read; shallow adapter
    validation compensated by validate_params semantics.
