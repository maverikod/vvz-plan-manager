  ```python
      def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
          """Validate and normalize the parameters for this command.

          Calls the platform validator first, then enforces the scope
          selector semantics that the JSON schema cannot express: when scope
          is 'branch', gs_step_id, ts_step_id, and as_step_id must all be
          present and non-empty; when scope is 'plan', all three must be
          absent.

          :param params: Raw parameter dict as received from the platform.
          :type params: Dict[str, Any]
          :returns: The validated (and platform-normalized) parameter dict.
          :rtype: Dict[str, Any]
          :raises ValueError: When the scope selector semantics above are
              violated. This is a platform invalid-params failure, not a
              domain error code.
          """
          params = super().validate_params(params)
          scope = params.get("scope", "plan")
          gs_step_id = params.get("gs_step_id")
          ts_step_id = params.get("ts_step_id")
          as_step_id = params.get("as_step_id")
          if scope == "branch":
              if not gs_step_id or not ts_step_id or not as_step_id:
                  raise ValueError(
                      "gs_step_id, ts_step_id, and as_step_id are all required "
                      "and must be non-empty when scope is 'branch'"
                  )
          elif scope == "plan":
              if gs_step_id or ts_step_id or as_step_id:
                  raise ValueError(
                      "gs_step_id, ts_step_id, and as_step_id must be absent "
                      "when scope is 'plan'"
                  )
          return params
  ```

  Constraints:
  - Do not add, remove, or reorder any import. Do not modify the class
    attributes, get_schema, or metadata already present in the file.
  - `super().validate_params(params)` calls the base class
    `mcp_proxy_adapter.commands.base.Command.validate_params`, which performs
    the platform's shallow schema-driven validation (per metadatastd.yaml
    `validation_pattern.pattern`: "params = super().validate_params(params)"
    called first, semantic checks added after, and the method returns
    params).
  - Raise a plain built-in `ValueError` (not a `plan_manager.commands.errors.
    DomainCommandError`) for scope-selector violations: per metadatastd.yaml
    `validation_pattern.rule`, "validate before queuing long-running work so
    invalid input fails immediately", and per the project's platform
    contract, semantic validation failures caught by the platform validator
    layer are raised as ValueError (platform invalid params), not returned as
    a domain error code — this is distinct from a domain error such as
    STEP_NOT_FOUND, which is returned (not raised) later, from execute.
  - Do not add a `try`/`except` around the raise; let ValueError propagate.
  - Do not implement `execute` in this change; it is added by a later change
    to this same file.

  MRS excerpt (concept definitions relevant to this file):

  - C-023 CommandContract: "Adapter-conformant command class shape with schema,
