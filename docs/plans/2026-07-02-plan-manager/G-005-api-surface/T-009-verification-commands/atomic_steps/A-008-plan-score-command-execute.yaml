  MRS excerpt (concept definitions relevant to this change):

  - C-013 SemanticIndex: "Normalized 0..100 completeness measure of a
    branch computed as cosine between required and actual concept
    vectors." Properties: runs only on scopes that passed the mechanical
    gate at the current revision; ensemble of weak independent estimators,
    same-physics votes share weight; one number and color for the human,
    internals surface only on miss; plan aggregation defaults to minimum
    branch index.
  - C-014 TrustEstimate: "Confidence in the semantic measurement itself
    derived from concept basis geometry and service liveness." Properties:
    Gram determinant, pairwise cosines, spectrum; monotone mapping is
    configuration; drops to a declared floor when embeddings are
    unavailable; distinguishes weak plan from unmeasurable plan.
  - C-020 Verdict: "Gate or score result bound to the exact revision and
    scope it was computed for." Properties: fresh iff recorded revision
    equals current revision; comparison never by timestamp.
  - C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes
    and stable domain string codes." Properties: every declared error case
    returnable and every returnable case declared.
  - C-012 MechanicalGate: "Deterministic binary verification layer catching
    every mechanical defect before semantics." Properties: per-branch
    gating; precondition for any semantic measurement. (Scoring a scope
    that has not passed this gate at the current revision is refused with
    GATE_RED.)
  - C-023 CommandContract: "Adapter-conformant command class shape with
    schema, metadata, and semantic validation." Properties: read commands
    never mutate; mutating commands verify by re-read; shallow adapter
    validation compensated by validate_params semantics.
