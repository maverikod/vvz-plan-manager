  MRS excerpt (concept definitions relevant to this file):

  - C-023 CommandContract: "Adapter-conformant command class shape with schema,
    metadata, and semantic validation." Properties: class attributes name, version,
    descr, category, author, email, result_class, use_queue; get_schema strict
    subset with explicit additionalProperties false; shallow adapter validation
    compensated by validate_params semantics; metadata dictionary must never
    contradict the schema; read commands never mutate; mutating commands verify
    by re-read; destructive or bulk operations expose a dry-run mode defaulting
    to on.
  - C-012 MechanicalGate: "Deterministic binary verification layer catching every
    mechanical defect before semantics." Properties: fixed check order parse,
    identity, uniqueness, references, coverage; byte-identical reports for the
    same tree state; fail-fast only at group boundary; per-branch gating;
    precondition for any semantic measurement.
  - C-017 Finding: "Ephemeral result unit of gate and scoring runs with check id,
    severity, artifact path, and message." Properties: aggregated into reports;
    never stored as a plan artifact.
  - C-020 Verdict: "Gate or score result bound to the exact revision and scope it
    was computed for." Properties: fresh iff recorded revision equals current
    revision; comparison never by timestamp.
  - C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes and
    stable domain string codes." Properties: every declared error case returnable
    and every returnable case declared.
