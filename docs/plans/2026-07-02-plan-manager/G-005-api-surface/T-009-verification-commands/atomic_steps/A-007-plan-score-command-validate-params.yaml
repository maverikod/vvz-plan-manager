      def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
          """Validate and normalize the parameters for this command.

          Calls the platform validator first, then enforces the scope
          selector semantics that the JSON schema cannot express (when
          scope is 'branch', gs_step_id, ts_step_id, and as_step_id must
          all be present and non-empty; when scope is 'plan', all three
          must be absent), and parses expected_revision as a UUID when it
          is supplied.

          :param params: Raw parameter dict as received from the platform.
          :type params: Dict[str, Any]
          :returns: The validated (and platform-normalized) parameter dict.
          :rtype: Dict[str, Any]
          :raises ValueError: When the scope selector semantics above are
              violated, or when expected_revision is supplied but is not a
              valid UUID string. This is a platform invalid-params failure,
              not a domain error code.
          """
          params = super().validate_params(params)
          scope = params.get("scope", "plan")
          gs_step_id = params.get("gs_step_id")
          ts_step_id = params.get("ts_step_id")
          as_step_id = params.get("as_step_id")
          if scope == "branch":
              if not gs_step_id or not ts_step_id or not as_step_id:
                  raise ValueError(
                      "gs_step_id, ts_step_id, and as_step_id are all required "
                      "and must be non-empty when scope is 'branch'"
                  )
          elif scope == "plan":
              if gs_step_id or ts_step_id or as_step_id:
                  raise ValueError(
                      "gs_step_id, ts_step_id, and as_step_id must be absent "
                      "when scope is 'plan'"
                  )
          expected_revision = params.get("expected_revision")
          if expected_revision is not None:
              try:
                  uuid.UUID(expected_revision)
              except ValueError as exc:
                  raise ValueError(
                      f"expected_revision is not a valid UUID: {expected_revision}"
                  ) from exc
          return params
  ```

  Constraints:
  - Do not add, remove, or reorder any other import beyond inserting
    `import uuid` as specified. Do not modify the class attributes,
    get_schema, or metadata already present in the file.
  - `super().validate_params(params)` calls the base class
    `mcp_proxy_adapter.commands.base.Command.validate_params`, which
    performs the platform's shallow schema-driven validation (per
    metadatastd.yaml `validation_pattern.pattern`: "params =
    super().validate_params(params)" called first, semantic checks added
    after, and the method returns params).
  - `uuid.UUID(expected_revision)` is the standard library constructor from
    the `uuid` module; it raises `ValueError` when its argument is not a
    valid UUID string. Only the parse result's validity matters here; do
    not store or reassign the constructed `uuid.UUID` object back into
    `params` — `params["expected_revision"]` remains the original string.
  - Raise a plain built-in `ValueError` for every violation in this method
    (scope-selector violations and invalid expected_revision alike), never
    a `plan_manager.commands.errors.DomainCommandError`: per
    metadatastd.yaml `validation_pattern.rule`, "validate before queuing
    long-running work so invalid input fails immediately", and per the
    project's platform contract, semantic validation failures caught by
    the platform validator layer are raised as ValueError (platform invalid
    params), not returned as a domain error code — this is distinct from
    the domain errors PLAN_NOT_FOUND, STEP_NOT_FOUND, GATE_RED,
    VERDICT_STALE, EMBEDDINGS_UNAVAILABLE, which are returned (not raised)
    later, from execute.
  - Do not implement `execute` in this change; it is added by a later
    change to this same file.

  MRS excerpt (concept definitions relevant to this file):

  - C-023 CommandContract: "Adapter-conformant command class shape with
    schema, metadata, and semantic validation." Properties: get_schema
    strict subset with explicit additionalProperties false; shallow adapter
    validation compensated by validate_params semantics; metadata
    dictionary must never contradict the schema.
  - C-020 Verdict: "Gate or score result bound to the exact revision and
    scope it was computed for." Properties: fresh iff recorded revision
    equals current revision; comparison never by timestamp. (This is why
    expected_revision must be a syntactically valid revision identifier
    before it can ever be compared against the current head revision in
    execute.)
  - C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes
    and stable domain string codes." Properties: every declared error case
    returnable and every returnable case declared. (The platform's own
    invalid-params JSON-RPC layer, raised here as ValueError, is the first
    of the two layers; the second layer — stable domain string codes such
    as VERDICT_STALE — is returned only from execute, not raised from
    validate_params.)
