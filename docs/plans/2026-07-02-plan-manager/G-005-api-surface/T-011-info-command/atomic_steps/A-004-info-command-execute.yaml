  MRS excerpt (concept definitions relevant to this change):

  C-025 InfoCommand: "Self-description API command returning identity,
  build metadata, runtime summary, and embedded operator documentation."
  Properties: documentation payload embedded at build time from the
  single documentation source; same source renders man and info pages;
  divergence fails the build.

  C-023 CommandContract: "Adapter-conformant command class shape with
  schema, metadata, and semantic validation." Property used here: "read
  commands never mutate" — this execute method performs only reads (a
  SELECT 1 probe, a SELECT count(*) query, an embedding probe call, and
  reads of embedded build/documentation data); it writes nothing.

  C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes
  and stable domain string codes." Property used here: "every declared
  error case returnable and every returnable case declared" — this
  command declares no domain error cases (error_cases is {}), so it must
  never raise a domain-coded error itself; the single outer
  except Exception as exc: return map_exception(exc) is the only path
  that turns any failure into a result, and unknown exceptions surface
  through the platform's JSON-RPC internal error layer, not a domain code.
