  - Do not add any other functions, classes, constants, or imports.
  - Do not add a module-level `__all__` or any other boilerplate not shown above.

  MRS excerpt (concept definitions relevant to this file):

  C-025 InfoCommand: "Self-description API command returning identity,
  build metadata, runtime summary, and embedded operator documentation."
  Properties: documentation payload embedded at build time from the single
  documentation source; same source renders man and info pages; divergence
  fails the build.

  C-023 CommandContract: "Adapter-conformant command class shape with
  schema, metadata, and semantic validation." Properties used here: the
  metadata dictionary must never contradict the schema; class attributes
  name, version, descr, category, author, email are read from the command
  class and must not be duplicated as literals.

  C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes
  and stable domain string codes." Property used here: every declared
  error case must be actually returnable and every returnable case must
  be declared; this command returns no domain error case, so error_cases
  is the empty dict {} and return_value.error documents that failures
  surface as a platform-level internal error instead of a domain code.
