  - `return_value` has exactly the keys `success` and `error`, structured
    as shown.
  - `error_cases` has exactly the keys `PLAN_NOT_FOUND` and
    `STEP_NOT_FOUND`, each with exactly `description`, `message`,
    `solution` — these are the only two error codes the graph_impact
    command can return: `PLAN_NOT_FOUND` when the `plan` parameter cannot
    be resolved, `STEP_NOT_FOUND` when no step with the given `step_id`
    exists in the resolved plan.
  - No imports beyond `from __future__ import annotations` are needed or
    permitted; the function only reads attributes off `cls` and returns a
    literal dict.
  - Do not add any other function, class, or module-level statement.

  MRS excerpt (concept definitions relevant to this AS):

  C-023 CommandContract: "Adapter-conformant command class shape with
