  MRS excerpt (concept definitions relevant to this AS):

  C-009 DependencyGraph: "Computed projection set over steps covering
  execution order, parallelism, cycles, and impact." Relevant property:
  "edges from depends_on at every level plus priority pairs within
  (target_file, TS)" — build_edges() materializes exactly this edge set,
  and prerequisites_of()/dependents_of() read it to classify the target
  step's depends_on and dependents.

  C-023 CommandContract: "Adapter-conformant command class shape with
  schema, metadata, and semantic validation." Relevant property: "read
  commands never mutate; mutating commands verify by re-read" — execute
  only opens a connection to read the plan and step projection, and never
  writes.

  C-026 ErrorModel: "Two-layer error contract of adapter JSON-RPC codes and
  stable domain string codes." Relevant property: "every declared error
  case returnable and every returnable case declared" — execute can raise
  exactly the two domain codes PLAN_NOT_FOUND (from resolve_plan) and
  STEP_NOT_FOUND (from the step lookup), both converted to an ErrorResult
  by map_exception via the final except handler.
