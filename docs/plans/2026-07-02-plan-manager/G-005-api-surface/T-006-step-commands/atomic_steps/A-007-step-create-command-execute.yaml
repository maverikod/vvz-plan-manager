  expected: >
    Against a live plan and database: creating a level-3 step with no
    parent_step_id succeeds directly when the plan has no admitting
    cascade requirement and returns SuccessResult data containing uuid,
    step_id, slug, level, status "draft", and revision_uuid, with the
    created step's fields equal to a fresh copy of SKELETON_FIELDS[3] (and
    analogously SKELETON_FIELDS[4] / SKELETON_FIELDS[5] for level 4 and 5
    creation) and its depends_on and concepts both empty; creating a
    level-4 or level-5 step under a valid, non-frozen parent_step_id
    succeeds the same way; an unknown parent_step_id returns ErrorResult
    with code STEP_NOT_FOUND; a duplicate slug under the same parent
    returns ErrorResult with code DUPLICATE_ID; attempting direct creation
    under a frozen parent without cascade_uuid returns CASCADE_REQUIRED,
    with FROZEN_ARTIFACT returned instead when frozen_at_or_below reports
    the parent frozen; a cascade_uuid that check_admission rejects returns
    CASCADE_CONFLICT; a subsequent step_get on the returned uuid confirms
    the step is present with the expected fields.
