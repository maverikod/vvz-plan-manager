  MRS excerpt (concept definitions relevant to this AS):

  ```yaml
  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema, metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email, result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to on

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case declared

  - concept_id: C-006
    name: PlanSchema
    definition: Declarative configuration object describing identifier patterns, per-level required fields, and exchange-layout naming.
    properties:
    - defaults match plan_standard_machine.yaml; overrides only for exotic layouts
    - nothing project-specific is hard-coded in the engine

  - concept_id: C-016
    name: CascadeChange
    definition: Transactional top-down change set anchored at the plan head revision, published atomically on green gate.
    properties:
    - begin acquires the per-plan lock; commit advances head only when gate is green
    - automatic needs_review propagation per invalidation rule
    - one open cascade per plan; MRS mutations are cascade-only at any status
  ```
