  3.
  ```python
  async def execute(self, plan: str, step_id: str) -> SuccessResult | ErrorResult:
      """Return one step of the plan with its resolved parent path.

      Args:
          plan: Plan identifier (UUID or name).
          step_id: Human-readable step identifier to look up.

      Returns:
          SuccessResult with the step's fields on success, or ErrorResult
          with a stable domain error code on failure.
      """
      try:
          with db_connection() as conn:
              p = resolve_plan(conn, plan)
              nodes = load_steps(conn, p.uuid)
              target = next((s for s in nodes.values() if s.step_id == step_id), None)
              if target is None:
                  raise DomainCommandError("STEP_NOT_FOUND", f"step not found: {step_id}")
              parent_path = None
              if target.parent_step_uuid is not None:
                  parent = nodes.get(target.parent_step_uuid)
                  if parent is not None:
                      parent_path = artifact_path_of(nodes, parent)
              data = {
                  "uuid": str(target.uuid),
                  "step_id": target.step_id,
                  "slug": target.slug,
                  "level": target.level,
                  "status": target.status,
                  "parent_path": parent_path,
                  "fields": target.fields,
                  "depends_on": target.depends_on,
                  "concepts": target.concepts,
                  "path": artifact_path_of(nodes, target),
              }
              return SuccessResult(data=data)
      except Exception as exc:
          return map_exception(exc)
  ```

