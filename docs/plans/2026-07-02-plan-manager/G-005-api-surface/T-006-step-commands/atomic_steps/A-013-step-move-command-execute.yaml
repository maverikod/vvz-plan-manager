    Against a live plan and database: moving an existing, non-frozen step
    to a valid new parent in direct mode succeeds and returns SuccessResult
    data with the moved step's uuid, unchanged step_id, the new
    parent_step_uuid, status, and a revision_uuid; every reference to the
    moved step_id elsewhere in the plan is rewritten by move_step in the
    same operation; an unknown step_id or new_parent_step_id returns
    ErrorResult with code STEP_NOT_FOUND; attempting a direct move of a
    frozen step without cascade_uuid returns CASCADE_REQUIRED, with
    FROZEN_ARTIFACT returned instead when frozen_at_or_below reports the
    step frozen; a cascade_uuid that check_admission rejects returns
    CASCADE_CONFLICT; a subsequent step_get on the moved step confirms the
    new parent.
