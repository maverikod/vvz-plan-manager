  ```python
          try:
              with db_connection() as conn:
                  p = resolve_plan(conn, plan)
                  nodes = load_steps(conn, p.uuid)
                  target = next((s for s in nodes.values() if s.step_id == step_id), None)
                  if target is None:
                      raise DomainCommandError("STEP_NOT_FOUND", f"step not found: {step_id}")
                  if dry_run:
                      status_updates = step_invalidation(nodes, target.uuid)
                      impact = []
                      for node_uuid, _new_status in status_updates:
                          node = nodes.get(node_uuid)
                          if node is not None:
                              impact.append(artifact_path_of(nodes, node))
                      data = {
                          "dry_run": True,
                          "would_delete": artifact_path_of(nodes, target),
                          "impact": impact,
                      }
                      return SuccessResult(data=data)
                  if any(s.parent_step_uuid == target.uuid for s in nodes.values()):
                      return domain_error(
                          "INVALID_TRANSITION",
                          f"step {step_id} has children; delete or move them first",
                      )
                  parsed_cascade_uuid = uuid.UUID(cascade_uuid) if cascade_uuid is not None else None
                  try:
                      rec = check_admission(conn, p.uuid, "step", target.uuid, parsed_cascade_uuid)
                  except CascadeError as exc:
                      if cascade_uuid is not None:
                          return domain_error("CASCADE_CONFLICT", str(exc))
                      if frozen_at_or_below(nodes, target.uuid):
                          return domain_error("FROZEN_ARTIFACT", str(exc))
                      return domain_error("CASCADE_REQUIRED", str(exc))
                  status_updates = step_invalidation(nodes, target.uuid)
                  snapshot = step_snapshot(target, target.status)
                  snapshot["deleted"] = True
                  target_uuid = target.uuid
                  target_step_id = target.step_id
                  delete_step(conn, target_uuid)
                  if rec is not None:
                      revision = cascade_write(
                          conn, p.uuid, rec, target_uuid, snapshot, status_updates, "api",
                          f"step_delete: {target_step_id}",
                      )
                  else:
                      revision = record_revision(
                          conn, p.uuid, "api", f"step_delete: {target_step_id}",
                          [(target_uuid, snapshot)], p.head_revision_uuid, ref_name=None,
                      )
                  try:
                      get_step(conn, target_uuid)
                  except DomainCommandError:
                      pass
                  else:
                      raise DomainCommandError(
                          "STEP_NOT_FOUND",
                          f"delete verification failed: step still present: {target_step_id}",
                      )
                  data = {
                      "dry_run": False,
                      "deleted_step_id": target_step_id,
                      "revision_uuid": str(revision),
                  }
                  return SuccessResult(data=data)
          except Exception as exc:
              return map_exception(exc)
  ```

  Constraints:
  - Do not change the module docstring, imports, class attributes,
    `get_schema`, `validate_params`, or `metadata` — they remain
    byte-identical to the content shown above.
  - The dry-run branch computes `step_invalidation` and impact paths and
    returns immediately without any admission check, snapshot, or write.
  - Immediately after the dry-run branch, before any admission check, the
    real-run path pre-checks for children: `any(s.parent_step_uuid ==
    target.uuid for s in nodes.values())` using the `nodes` loaded at the
    top of `execute`. If any step in the plan has `target.uuid` as its
    `parent_step_uuid`, `execute` returns immediately with
    `domain_error("INVALID_TRANSITION", f"step {step_id} has children;
    delete or move them first")`, without checking admission, taking a
    snapshot, or calling `delete_step`. This pre-check is why
    `delete_step`'s own `ValueError("step has children")` never escapes
    from this command in practice: `delete_step` is only ever called after
    this pre-check has already confirmed the step has no children.
  - `status_updates` for the real-run branch is computed from `step_invalidation(nodes,
    target.uuid)` before the delete, using the `nodes` loaded at the top of
    `execute` (which still contains `target`), because the node must exist
    in the graph for propagation to be computed.
  - The tombstone snapshot is `step_snapshot(target, target.status)` with
    the key `"deleted"` set to `True` after snapshot construction, taken
    before `delete_step` is called.
  - `rec` being non-`None` means the mutation is admitted under an open
    cascade (cascade mode); `rec` being `None` means direct-mode admission,
    which writes a revision via `record_revision` with `ref_name=None`.
  - After the write, `get_step(conn, target_uuid)` is called to verify
    absence: if it raises `DomainCommandError`, that confirms the step is
    gone and the flow proceeds; if it does not raise, that is treated as a
    verification failure and a `DomainCommandError("STEP_NOT_FOUND", ...)`
    is raised, which is caught by the outer `except Exception` and mapped
    by `map_exception`.
  - Do not add, remove, or reorder any other method or statement in the
    file.

