  MRS excerpt (only the concept relevant to this AS):

  concept_id: C-024, name: CommandInventory, definition: "Closed normative
  set of API commands enforced by a startup self-check.", properties:
  "registry compared against inventory at startup; any difference aborts
  start", "no-stub probe of schema, metadata, and descr for every
  registered command", "the editing subset is enumerated exhaustively".


  Platform contract used by this AS (exact, verbatim): the platform
  command registry object exposes a method `get_all_commands(self) ->
  dict[str, type]` returning a mapping of registered command name to
  registered command class.


  Append exactly one new function at the end of the file, after a single
  blank line separating it from the end of register_all, with this exact
  signature:

  `def check_inventory(registry) -> None:`


  with this exact docstring (triple double-quoted string):

  "Verify the registry exactly matches the normative inventory.

  Compares the set of registered command names against INVENTORY and
  raises if INVENTORY itself contains a duplicate name, or if there is
  any missing name or any extra name in the registry. The server must
  never start with a partial or drifted API surface.

  :param registry: The platform command registry object, exposing a
  ``get_all_commands() -> dict[str, type]`` method mapping registered
  command name to command class (``from
  mcp_proxy_adapter.commands.command_registry import registry``).
  :raises RuntimeError: If INVENTORY contains a duplicate name, naming
  the duplicates; or if the registered command set does not exactly
  equal the set of names in INVENTORY, naming the exact difference.
  :return: None"


  Function body, in this exact order and logic:

  1. Compute `if len(INVENTORY) != len(set(INVENTORY)):` and, if true,
  compute `duplicates = sorted({name for name in INVENTORY if
  INVENTORY.count(name) > 1})` and raise
  `RuntimeError(f"command inventory mismatch: duplicates={duplicates}")`.

  2. Otherwise (no duplicates), compute `registered =
  set(registry.get_all_commands().keys())`, `expected = set(INVENTORY)`,
  and `missing = sorted(expected - registered)`. The mcp-proxy-adapter may
  pre-register platform builtin commands in the same registry; those are not
  plan_manager inventory drift. If the registry exposes `_command_types` as a
  dict, compute `extra` only from names whose command type is `"custom"`;
  otherwise fall back to `extra = sorted(registered - expected)`.

  3. `if missing or extra:` raise
  `RuntimeError(f"command inventory mismatch: missing={missing}
  extra={extra}")`.

  4. Otherwise return None (implicit).


  Constraints: use exactly the two RuntimeError message formats given
  above, with an f-string, no other wording. Do not add any other
  function, class, or import. Do not add comments beyond the docstring.
  Do not modify any existing line above the new function.
