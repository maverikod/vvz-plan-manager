  check_inventory, exactly the following two top-level items in this
  order:


  1. A module-level constant with this exact signature and content:

  ```python

  _REQUIRED_METADATA_KEYS: tuple[str, ...] = (
      "name",
      "version",
      "description",
      "category",
      "author",
      "email",
      "detailed_description",
      "parameters",
      "return_value",
      "usage_examples",
