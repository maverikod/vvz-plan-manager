  Platform contract used by this AS (exact, verbatim): every registered
  command class exposes `@classmethod def get_schema(cls) -> Dict[str,
  Any]` returning a JSON-schema-like dict, and `@classmethod def
  metadata(cls) -> Dict[str, Any]` returning a documentation dict, and a
  class attribute `descr` holding a one-line summary string. The
  metadatastd required metadata keys are exactly: name, version,
  description, category, author, email, detailed_description,
  parameters, return_value, usage_examples, error_cases, best_practices
  (error_cases is the declared half of the C-026 ErrorModel contract for
  that command).


