  )

  ```


  2. A function with this exact signature:

  `def probe_commands(registry) -> None:`


  with this exact docstring (triple double-quoted string):

  "Probe every registered command for schema, metadata, and descr
  completeness.

  For each registered (name, command_class) pair, verifies that
  get_schema() returns type \"object\" with a properties dict where every
  property has a non-empty type and description, a required list, and
  additionalProperties present and equal to False; that metadata()
  contains every key in _REQUIRED_METADATA_KEYS with non-empty content;
  and that descr is a non-empty string. A command is either implemented
  completely or not registered at all; any failing check aborts startup.

  :param registry: The platform command registry object, exposing a
  ``get_all_commands() -> dict[str, type]`` method mapping registered
  command name to command class (``from
  mcp_proxy_adapter.commands.command_registry import registry``).
  :raises RuntimeError: On the first failing command/key, with message
  ``f"no-stub probe failed: command={name} key={key}"`` where key names
  the specific failing check.
  :return: None"


  Function body, iterating `for name, cls in
  registry.get_all_commands().items():` and, for each pair, in this exact
  order:

  1. `schema = cls.get_schema()`; if `schema.get("type") != "object"`,
  raise `RuntimeError(f"no-stub probe failed: command={name} key=type")`.

  2. `properties = schema.get("properties")`; if not
  `isinstance(properties, dict)`, raise `RuntimeError(f"no-stub probe
  failed: command={name} key=properties")`.

  3. For each `prop_name, prop_schema in properties.items():` if not
  `isinstance(prop_schema, dict)` or `not prop_schema.get("type")`, raise
  `RuntimeError(f"no-stub probe failed: command={name}
  key=properties.{prop_name}.type")`; else if `not
  prop_schema.get("description")`, raise `RuntimeError(f"no-stub probe
  failed: command={name} key=properties.{prop_name}.description")`.

  4. If not `isinstance(schema.get("required"), list)`, raise
  `RuntimeError(f"no-stub probe failed: command={name} key=required")`.

  5. If `"additionalProperties" not in schema or schema["additionalProperties"]
  is not False`, raise `RuntimeError(f"no-stub probe failed: command={name}
  key=additionalProperties")`.

  6. `meta = cls.metadata()`; for each `key in _REQUIRED_METADATA_KEYS:`
  if `not meta.get(key)`, raise `RuntimeError(f"no-stub probe failed:
  command={name} key={key}")`.

  7. If not `isinstance(cls.descr, str)` or `not cls.descr`, raise
  `RuntimeError(f"no-stub probe failed: command={name} key=descr")`.

  8. After the loop completes for every command with no failure, return
  None (implicit).


  Constraints: use exactly the RuntimeError message format given above
  in every case, with an f-string; the `key=` value must be exactly the
  literal shown for each check (`type`, `properties`,
  `properties.{prop_name}.type`, `properties.{prop_name}.description`,
  `required`, `additionalProperties`, the metadata key name itself, or
  `descr`). Do not add any other function, class, or import. Do not add
  comments beyond the docstring. Do not modify any existing line above
  the new constant and function.
