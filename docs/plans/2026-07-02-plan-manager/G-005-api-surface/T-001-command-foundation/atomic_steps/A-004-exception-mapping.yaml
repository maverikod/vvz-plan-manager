  ```python
  """Domain error registry for plan_manager commands (C-026).

  Defines the closed set of stable domain string codes returnable by command
  error results.
  """

  import psycopg

  from mcp_proxy_adapter.commands.result import ErrorResult
  from plan_manager.cascade.close import CommitRefusedError
  from plan_manager.cascade.record import CascadeError
  from plan_manager.domain.status_model import StatusTransitionError
  from plan_manager.scoring.embedding import EmbeddingUnavailable
  from plan_manager.scoring.index import ScoreRefusedError
  from plan_manager.storage.version_store import VersionStoreError

  DOMAIN_CODES: frozenset[str] = frozenset({
      "PLAN_NOT_FOUND",
      "STEP_NOT_FOUND",
      "CONCEPT_NOT_FOUND",
      "RELATION_NOT_FOUND",
      "PARAGRAPH_NOT_FOUND",
      "REVISION_NOT_FOUND",
      "CASCADE_REQUIRED",
      "CASCADE_CONFLICT",
      "FROZEN_ARTIFACT",
      "INVALID_TRANSITION",
      "DUPLICATE_ID",
      "CYCLE_DETECTED",
      "GATE_RED",
      "VERDICT_STALE",
      "EMBEDDINGS_UNAVAILABLE",
      "IMPORT_INVALID",
  })


  class DomainCommandError(Exception):
      """Domain-level command error carrying a stable code from DOMAIN_CODES.

      Raised by command implementations, and by wrapped domain operations
      that already know the exact domain code that applies, to signal a
      failure that must be reported to the caller as one of the codes in
      DOMAIN_CODES.
      """

      def __init__(self, code: str, message: str, details: dict | None = None) -> None:
          if code not in DOMAIN_CODES:
              raise ValueError(f"unknown domain error code: {code}")
          super().__init__(message)
          self.code = code
          self.message = message
          self.details = details if details is not None else {}


  def domain_error(code: str, message: str, details: dict | None = None) -> ErrorResult:
      """Build an adapter-compatible ErrorResult for a stable domain error code."""
      if code not in DOMAIN_CODES:
          raise ValueError(f"unknown domain error code: {code}")
      payload = {"domain_code": code}
      if details:
          payload.update(details)
      return ErrorResult(message=message, code=-32000, details=payload)


  def map_exception(exc: Exception) -> ErrorResult:
      """Deterministically map a wrapped-operation exception to a domain
      ErrorResult (C-026).

      Checks isinstance(exc, ...) in exactly this order and returns on the
      first match:

      1. DomainCommandError -> domain_error(exc.code, exc.message, exc.details)
      2. CommitRefusedError -> domain_error("GATE_RED", str(exc), {})
      3. ScoreRefusedError -> domain_error("GATE_RED", str(exc), {})
      4. StatusTransitionError -> domain_error("INVALID_TRANSITION", str(exc), {})
      5. VersionStoreError -> domain_error("REVISION_NOT_FOUND", str(exc), {})
      6. CascadeError -> domain_error("CASCADE_CONFLICT", str(exc), {})
      7. EmbeddingUnavailable -> domain_error("EMBEDDINGS_UNAVAILABLE", str(exc), {})
      8. psycopg.errors.UniqueViolation -> domain_error("DUPLICATE_ID", str(exc), {})

      Any exception matching none of the above is re-raised unchanged, so
      unknown failures stay platform errors and are never reported as
      domain codes.

      Args:
          exc: The exception raised by a wrapped storage, lifecycle,
              verification, or scoring operation.

      Returns:
          An ErrorResult for the first matching exception type above.

      Raises:
          Exception: the original exc, unchanged, when it matches none of
              the listed types.
      """
      if isinstance(exc, DomainCommandError):
          return domain_error(exc.code, exc.message, exc.details)
      if isinstance(exc, CommitRefusedError):
          return domain_error("GATE_RED", str(exc), {})
      if isinstance(exc, ScoreRefusedError):
          return domain_error("GATE_RED", str(exc), {})
      if isinstance(exc, StatusTransitionError):
          return domain_error("INVALID_TRANSITION", str(exc), {})
      if isinstance(exc, VersionStoreError):
          return domain_error("REVISION_NOT_FOUND", str(exc), {})
      if isinstance(exc, CascadeError):
          return domain_error("CASCADE_CONFLICT", str(exc), {})
      if isinstance(exc, EmbeddingUnavailable):
          return domain_error("EMBEDDINGS_UNAVAILABLE", str(exc), {})
      if isinstance(exc, psycopg.errors.UniqueViolation):
          return domain_error("DUPLICATE_ID", str(exc), {})
      raise exc
  ```

