  ```python
  """Domain error registry for plan_manager commands (C-026).

  Defines the closed set of stable domain string codes returnable by command
  error results.
  """

  from mcp_proxy_adapter.commands.result import ErrorResult

  DOMAIN_CODES: frozenset[str] = frozenset({
      "PLAN_NOT_FOUND",
      "STEP_NOT_FOUND",
      "CONCEPT_NOT_FOUND",
      "RELATION_NOT_FOUND",
      "PARAGRAPH_NOT_FOUND",
      "REVISION_NOT_FOUND",
      "CASCADE_REQUIRED",
      "CASCADE_CONFLICT",
      "FROZEN_ARTIFACT",
      "INVALID_TRANSITION",
      "DUPLICATE_ID",
      "CYCLE_DETECTED",
      "GATE_RED",
      "VERDICT_STALE",
      "EMBEDDINGS_UNAVAILABLE",
      "IMPORT_INVALID",
  })


  class DomainCommandError(Exception):
      """Domain-level command error carrying a stable code from DOMAIN_CODES.

      Raised by command implementations, and by wrapped domain operations
      that already know the exact domain code that applies, to signal a
      failure that must be reported to the caller as one of the codes in
      DOMAIN_CODES.
      """

      def __init__(self, code: str, message: str, details: dict | None = None) -> None:
          if code not in DOMAIN_CODES:
              raise ValueError(f"unknown domain error code: {code}")
          super().__init__(message)
          self.code = code
          self.message = message
          self.details = details if details is not None else {}


  def domain_error(code: str, message: str, details: dict | None = None) -> ErrorResult:
      """Build an ErrorResult for a stable domain error code (C-026).

      Args:
          code: A domain error code; must be a member of DOMAIN_CODES.
          message: Human-readable error message.
          details: Optional diagnostic details; None is treated as no details.

      Returns:
          An ErrorResult constructed with keyword arguments code, message,
          and details (empty dict when details is None or falsy).

      Raises:
          ValueError: if code is not a member of DOMAIN_CODES.
      """
      if code not in DOMAIN_CODES:
          raise ValueError(f"unknown domain error code: {code}")
      return ErrorResult(code=code, message=message, details=details or {})
  ```

