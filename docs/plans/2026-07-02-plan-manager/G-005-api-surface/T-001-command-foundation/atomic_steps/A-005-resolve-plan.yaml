prompt: |
  Create the file `plan_manager/commands/resolve.py` with EXACTLY the
  following content (this is a new file; it does not exist yet, so assume no
  prior content):

  ```python
  """Plan identity resolution shared by every command (C-023, C-001)."""

  import uuid

  import psycopg

  from plan_manager.commands.errors import DomainCommandError
  from plan_manager.domain.plan import Plan, get_plan


  def resolve_plan(conn: psycopg.Connection, plan: str) -> Plan:
      """Resolve a plan by UUID string or unique name (C-001).

      Args:
          conn: Open database connection. Always supplied by the runtime;
              never constructed or configured from request parameters.
          plan: The plan identifier from the request: either a UUID string
              or a unique plan name.

      Returns:
          The resolved Plan aggregate.

      Raises:
          DomainCommandError: with code "PLAN_NOT_FOUND" when no plan
              matches the given UUID or name.
      """
      try:
          plan_uuid = uuid.UUID(plan)
      except ValueError:
          with conn.cursor() as cur:
              cur.execute("SELECT uuid FROM plan WHERE name = %s", (plan,))
              row = cur.fetchone()
          if row is not None:
              return get_plan(conn, row[0])
          raise DomainCommandError("PLAN_NOT_FOUND", f"plan not found: {plan}")
      try:
          return get_plan(conn, plan_uuid)
      except ValueError:
          raise DomainCommandError("PLAN_NOT_FOUND", f"plan not found: {plan}")
  ```

  Imported contracts quoted verbatim (import only, never reimplement):
  - module `plan_manager/domain/plan.py`: `def get_plan(conn, plan_uuid) -> Plan`;
    `Plan` is a dataclass with fields uuid, name, status, context_budget,
    head_revision_uuid. Raises ValueError when the plan row does not exist.
  - module `plan_manager/commands/errors.py` (already created by a
    lower-priority atomic step on that file): `class DomainCommandError(Exception):`
    constructor `def __init__(self, code: str, message: str, details: dict | None = None)`.

  Constraints (all binding, no deviation):
  - The module docstring is exactly the one line shown above, verbatim.
  - Imports, in exactly this order and grouping (one blank line between the
    stdlib group, the third-party group, and the first-party group):
    `import uuid`, blank line, `import psycopg`, blank line,
    `from plan_manager.commands.errors import DomainCommandError`,
    `from plan_manager.domain.plan import Plan, get_plan`.
  - `def resolve_plan(conn: psycopg.Connection, plan: str) -> Plan:` is the
    exact signature.
  - The docstring text is exactly as shown above.
  - Behavior, in exactly this control flow:
    1. Attempt `uuid.UUID(plan)`.
    2. If that raises `ValueError`: execute
       `SELECT uuid FROM plan WHERE name = %s` with `plan` as the sole
       parameter via `conn.cursor()`, fetch one row; if a row exists,
       `return get_plan(conn, row[0])`; otherwise
       `raise DomainCommandError("PLAN_NOT_FOUND", f"plan not found: {plan}")`.
    3. If `uuid.UUID(plan)` succeeds: call `get_plan(conn, plan_uuid)` and
       return its result; if that call raises `ValueError`, raise
       `DomainCommandError("PLAN_NOT_FOUND", f"plan not found: {plan}")`
       instead.
  - `conn` is never constructed, configured, or derived from `plan` or any
    other request parameter inside this function; it is always the
    caller-supplied connection.
  - The SQL string is passed exactly as
    `"SELECT uuid FROM plan WHERE name = %s"` with parameters as a tuple
