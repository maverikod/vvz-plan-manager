  try:
      plan = kwargs["plan"]
      with db_connection() as conn:
          p = resolve_plan(conn, plan)
          paragraphs = list_paragraphs(conn, p.uuid)
      return SuccessResult(data={"paragraphs": paragraphs})
  except Exception as exc:
      return map_exception(exc)
  ```
