  - `def list_paragraphs(conn, plan_uuid) -> list[dict]` (module
    `plan_manager.hrs.paragraphs`) — every paragraph of the plan's HRS as
    `{"label": str | None, "binding": bool, "position": int, "text": str}`,
    in position order.
  - `def map_exception(exc) -> ErrorResult` (module
    `plan_manager.commands.errors`) — maps any exception, including a
