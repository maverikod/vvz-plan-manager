  MRS excerpt (concept definitions relevant to this file):

  ```
  - concept_id: C-002
    name: Paragraph
    definition: Addressable binding unit of the HRS text carrying a stable
      four-character base36 label.
    properties:
    - label is position-independent, unique within one HRS, survives edits
    - non-binding blocks are excluded from labeling and coverage
    - HRS prose is human-owned; the server only assigns labels and toggles
      non-binding markup
    - parsing and label-assignment algorithms are normative

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema,
      metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email,
      result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to on

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and
      stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case
      declared
  ```
