prompt: |
  Modify the file plan_manager/commands/hrs_export_command.py. Its full
  current content (after all lower-priority AS on this file have been
  applied) is exactly:

  """HrsExportCommand: read-only export of a plan's HRS Markdown text."""

  from typing import Any, ClassVar, Dict, Type

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  from plan_manager.commands.errors import map_exception
  from plan_manager.commands.resolve import resolve_plan
  from plan_manager.commands.hrs_export_metadata import get_hrs_export_metadata
  from plan_manager.exchange.exporter import export_hrs
  from plan_manager.runtime.context import db_connection


  class HrsExportCommand(Command):
      """Return the byte-identical HRS Markdown text of a resolved plan."""

      name: ClassVar[str] = "hrs_export"
      version: ClassVar[str] = "1.0.0"
      descr: ClassVar[str] = "Export the byte-identical HRS Markdown text of a plan."
      category: ClassVar[str] = "exchange"
      author: ClassVar[str] = "Vasiliy Zdanovskiy"
      email: ClassVar[str] = "vasilyvz@gmail.com"
      result_class: ClassVar[Type[SuccessResult]] = SuccessResult
      use_queue: ClassVar[bool] = False

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the machine-readable input schema for hrs_export.

          Returns:
              A JSON-schema-shaped dictionary with an explicit
              additionalProperties=False and an exact required list.
          """
          return {
              "type": "object",
              "properties": {
                  "plan": {
                      "type": "string",
                      "description": "Plan identifier resolved against the catalog.",
                  },
              },
              "required": ["plan"],
              "additionalProperties": False,
          }

      @classmethod
      def metadata(cls) -> Dict[str, Any]:
          """Return the extended documentation metadata for hrs_export.

          Returns:
              The dictionary produced by get_hrs_export_metadata(cls).
          """
          return get_hrs_export_metadata(cls)

  Append exactly one blank line after the line `        return
  get_hrs_export_metadata(cls)`, then append the following method,
  indented 4 spaces as a member of class HrsExportCommand:

  def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
      """Validate hrs_export parameters.

      Args:
          params: Raw parameter dictionary received from the platform.

      Returns:
          The validated parameter dictionary, unchanged beyond the base
          validator's own normalization.
      """
      params = super().validate_params(params)
      return params

  Constraints (all explicit, no open decisions):
  - Do not change any line that already exists in the file; only append
    the blank line and the method shown.
  - The method signature is exactly `def validate_params(self, params:
    Dict[str, Any]) -> Dict[str, Any]:` (instance method), per
    docs/standards/planning/metadatastd.yaml,
    command_class_shape.required_methods.validate_params: "call
    super().validate_params(params) first; add semantic validation
    after".
  - The method body calls `super().validate_params(params)`, reassigns
    the result to `params`, and returns `params`. hrs_export has exactly
    one required string parameter ("plan") with no further semantic
    constraints beyond the base schema validation, so no additional
    semantic check is added after the super() call.
  - Do not add any other method, import, or class to this file. Do not
    read or modify any other file.

  MRS excerpt (concept definition relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema,
      metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email,
      result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to
      on
verification:
  type: manual
  target: plan_manager.commands.hrs_export_command.HrsExportCommand.validate_params
  expected: >
    Calling validate_params with {"plan": "p"} returns a dict containing
    "plan": "p" without raising, delegating structural checks to
    super().validate_params().
