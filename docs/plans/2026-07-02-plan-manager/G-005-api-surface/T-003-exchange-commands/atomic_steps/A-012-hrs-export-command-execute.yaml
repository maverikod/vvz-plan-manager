verification:
  type: manual
  target: plan_manager.commands.hrs_export_command.HrsExportCommand.execute
  expected: >
    Calling execute(plan="known-plan") returns a SuccessResult with data
    {"markdown": <str>} equal to the plan's stored HRS text. Calling
