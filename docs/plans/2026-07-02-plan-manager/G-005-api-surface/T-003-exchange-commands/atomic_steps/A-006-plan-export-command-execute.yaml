verification:
  type: manual
  target: plan_manager.commands.plan_export_command.PlanExportCommand.execute
  expected: >
    Calling execute(plan="known-plan") on a plan that exists returns a
    SuccessResult with data containing "root" (str), "files" (int), and
    "revision" equal to "head". Calling execute(plan="unknown") returns
    an ErrorResult with code PLAN_NOT_FOUND. Calling execute(plan="known-plan",
    revision="<unknown-uuid>") returns an ErrorResult with code
    REVISION_NOT_FOUND. The command never mutates plan data (read-only
    over plan truth).
