prompt: |
  Modify the file plan_manager/commands/plan_export_command.py. Its full
  current content (after all lower-priority AS on this file have been
  applied) is exactly:

  """PlanExportCommand: read-only export of a plan to the standard file layout."""

  import uuid
  from typing import Any, ClassVar, Dict, Optional, Type

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  from plan_manager.commands.errors import map_exception
  from plan_manager.commands.resolve import resolve_plan
  from plan_manager.commands.plan_export_metadata import get_plan_export_metadata
  from plan_manager.exchange.exporter import export_plan
  from plan_manager.runtime.context import app_config, db_connection


  class PlanExportCommand(Command):
      """Render one resolved plan into the standard file layout, read-only."""

      name: ClassVar[str] = "plan_export"
      version: ClassVar[str] = "1.0.0"
      descr: ClassVar[str] = "Export a plan to the standard file layout under the configured export root."
      category: ClassVar[str] = "exchange"
      author: ClassVar[str] = "Vasiliy Zdanovskiy"
      email: ClassVar[str] = "vasilyvz@gmail.com"
      result_class: ClassVar[Type[SuccessResult]] = SuccessResult
      use_queue: ClassVar[bool] = True

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the machine-readable input schema for plan_export.

          Returns:
              A JSON-schema-shaped dictionary with an explicit
              additionalProperties=False and an exact required list.
          """
          return {
              "type": "object",
              "properties": {
                  "plan": {
                      "type": "string",
                      "description": "Plan identifier resolved against the catalog.",
                  },
                  "revision": {
                      "type": "string",
                      "description": (
                          "Optional revision UUID to export instead of the "
                          "plan head revision."
                      ),
                  },
              },
              "required": ["plan"],
              "additionalProperties": False,
          }

  Append exactly one blank line after the closing brace of get_schema
  (the line `        }`), then append the following method, indented
  4 spaces as a member of class PlanExportCommand:

  @classmethod
  def metadata(cls) -> Dict[str, Any]:
      """Return the extended documentation metadata for plan_export.

      Returns:
          The dictionary produced by get_plan_export_metadata(cls).
      """
      return get_plan_export_metadata(cls)

  Constraints (all explicit, no open decisions):
  - Do not change any line that already exists in the file; only append
    the blank line and the method shown.
  - The method is decorated @classmethod with exact signature
    `def metadata(cls) -> Dict[str, Any]:` per
    docs/standards/planning/metadatastd.yaml,
    command_class_shape.required_methods.metadata: "signature:
    '@classmethod def metadata(cls) -> Dict[str, Any]'"; "rule: return
    get_some_command_metadata(cls)".
  - The method body is exactly one return statement calling
    get_plan_export_metadata(cls) — the function already imported at the
    top of this file as `from plan_manager.commands.plan_export_metadata
    import get_plan_export_metadata`. Do not inline the metadata dict
    here.
  - get_plan_export_metadata has signature
    `def get_plan_export_metadata(cls) -> Dict[str, Any]:` and returns a
    dict with the metadatastd.yaml required_fields (name, version,
    description, category, author, email, detailed_description,
    parameters, return_value, usage_examples, error_cases,
    best_practices), including error_cases keyed "PLAN_NOT_FOUND" and
    "REVISION_NOT_FOUND".
  - Do not add any other method, import, or class to this file. Do not
    read or modify any other file.

  MRS excerpt (concept definitions relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema,
      metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email,
      result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to
      on

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and
      stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case
      declared
verification:
  type: import
  target: plan_manager.commands.plan_export_command.PlanExportCommand.metadata
  expected: >
    PlanExportCommand.metadata() returns the same dict as
    get_plan_export_metadata(PlanExportCommand), containing the twelve
    metadatastd.yaml required keys and not contradicting get_schema()
    (parameters "plan" and "revision" match the schema properties).
