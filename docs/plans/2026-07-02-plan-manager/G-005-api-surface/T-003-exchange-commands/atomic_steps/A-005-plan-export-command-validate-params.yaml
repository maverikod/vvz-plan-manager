prompt: |
  Modify the file plan_manager/commands/plan_export_command.py. Its full
  current content (after all lower-priority AS on this file have been
  applied) is exactly:

  """PlanExportCommand: read-only export of a plan to the standard file layout."""

  import uuid
  from typing import Any, ClassVar, Dict, Optional, Type

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  from plan_manager.commands.errors import map_exception
  from plan_manager.commands.resolve import resolve_plan
  from plan_manager.commands.plan_export_metadata import get_plan_export_metadata
  from plan_manager.exchange.exporter import export_plan
  from plan_manager.runtime.context import app_config, db_connection


  class PlanExportCommand(Command):
      """Render one resolved plan into the standard file layout, read-only."""

      name: ClassVar[str] = "plan_export"
      version: ClassVar[str] = "1.0.0"
      descr: ClassVar[str] = "Export a plan to the standard file layout under the configured export root."
      category: ClassVar[str] = "exchange"
      author: ClassVar[str] = "Vasiliy Zdanovskiy"
      email: ClassVar[str] = "vasilyvz@gmail.com"
      result_class: ClassVar[Type[SuccessResult]] = SuccessResult
      use_queue: ClassVar[bool] = True

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the machine-readable input schema for plan_export.

          Returns:
              A JSON-schema-shaped dictionary with an explicit
              additionalProperties=False and an exact required list.
          """
          return {
              "type": "object",
              "properties": {
                  "plan": {
                      "type": "string",
                      "description": "Plan identifier resolved against the catalog.",
                  },
                  "revision": {
                      "type": "string",
                      "description": (
                          "Optional revision UUID to export instead of the "
                          "plan head revision."
                      ),
                  },
              },
              "required": ["plan"],
              "additionalProperties": False,
          }

      @classmethod
      def metadata(cls) -> Dict[str, Any]:
          """Return the extended documentation metadata for plan_export.

          Returns:
              The dictionary produced by get_plan_export_metadata(cls).
          """
          return get_plan_export_metadata(cls)

  Append exactly one blank line after the line `        return
  get_plan_export_metadata(cls)`, then append the following method,
  indented 4 spaces as a member of class PlanExportCommand:

  def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
      """Validate plan_export parameters.

      Args:
          params: Raw parameter dictionary received from the platform.

      Returns:
          The validated parameter dictionary, unchanged beyond the base
          validator's own normalization.

      Raises:
          ValueError: When the optional 'revision' parameter is present
              but does not parse as a UUID.
      """
      params = super().validate_params(params)
      revision = params.get("revision")
      if revision is not None:
          uuid.UUID(revision)
      return params

  Constraints (all explicit, no open decisions):
  - Do not change any line that already exists in the file; only append
    the blank line and the method shown.
  - The method signature is exactly `def validate_params(self, params:
    Dict[str, Any]) -> Dict[str, Any]:` (instance method, not a
    classmethod), per docs/standards/planning/metadatastd.yaml,
    command_class_shape.required_methods.validate_params: "signature:
    'def validate_params(self, params: Dict[str, Any]) -> Dict[str,
    Any]'"; "rule: call super().validate_params(params) first; add
    semantic validation after".
  - The first statement calls `super().validate_params(params)` and
    reassigns the result to `params` — this delegates to the base
    Command.validate_params, which performs schema-based structural
    checks against get_schema().
  - `uuid.UUID(revision)` uses the `uuid` module already imported at the
    top of this file (`import uuid`); it is called only for its
    side-effect of raising ValueError on an invalid UUID string — the
    parsed value is not stored (execute() will re-parse it).
  - When revision is absent (None), no UUID parsing is attempted.
  - The method returns the params dict unchanged in content beyond
    whatever super().validate_params() itself normalizes.
  - This is platform-level invalid-params validation (ValueError), not a
    domain error code: per the packet, "validate uuid parse in
    validate_params via uuid.UUID, ValueError propagates as invalid
    params".
  - Do not add any other method, import, or class to this file. Do not
    read or modify any other file.

  MRS excerpt (concept definition relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema,
      metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email,
      result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to
      on
verification:
  type: manual
  target: plan_manager.commands.plan_export_command.PlanExportCommand.validate_params
  expected: >
    Calling validate_params with {"plan": "p"} returns a dict containing
    "plan": "p" without raising. Calling validate_params with {"plan":
    "p", "revision": "not-a-uuid"} raises ValueError from the uuid.UUID
    parse. Calling validate_params with {"plan": "p", "revision":
    "3fa85f64-5717-4562-b3fc-2c963f66afa6"} returns without raising.
