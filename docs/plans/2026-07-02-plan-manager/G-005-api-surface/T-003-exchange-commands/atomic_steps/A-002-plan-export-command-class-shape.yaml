  """PlanExportCommand: read-only export of a plan to the standard file layout."""

  import uuid
  from typing import Any, ClassVar, Dict, Optional, Type

  from mcp_proxy_adapter.commands.base import Command
  from mcp_proxy_adapter.commands.result import SuccessResult, ErrorResult

  from plan_manager.commands.errors import map_exception
  from plan_manager.commands.resolve import resolve_plan
  from plan_manager.commands.plan_export_metadata import get_plan_export_metadata
  from plan_manager.exchange.exporter import export_plan
  from plan_manager.runtime.context import app_config, db_connection


  class PlanExportCommand(Command):
      """Render one resolved plan into the standard file layout, read-only."""

      name: ClassVar[str] = "plan_export"
      version: ClassVar[str] = "1.0.0"
      descr: ClassVar[str] = "Export a plan to the standard file layout under the configured export root."
      category: ClassVar[str] = "exchange"
      author: ClassVar[str] = "Vasiliy Zdanovskiy"
      email: ClassVar[str] = "vasilyvz@gmail.com"
      result_class: ClassVar[Type[SuccessResult]] = SuccessResult
      use_queue: ClassVar[bool] = True

  Constraints (all explicit, no open decisions):
  - Reproduce the content above byte-for-byte, including blank lines and
    indentation (4 spaces).
  - The class PlanExportCommand extends
    mcp_proxy_adapter.commands.base.Command (imported exactly as
    `from mcp_proxy_adapter.commands.base import Command`).
  - The class attributes are declared with ClassVar type annotations in
    exactly the order shown: name, version, descr, category, author,
    email, result_class, use_queue.
  - result_class is typed ClassVar[Type[SuccessResult]] and set to
    SuccessResult (the class object, not an instance), imported exactly
    as `from mcp_proxy_adapter.commands.result import SuccessResult,
    ErrorResult`.
  - use_queue is True because plan_export is queue-bound (rendering a
    full layout to disk can exceed an interactive request budget).
  - category is the literal string "exchange".
  - author is the literal string "Vasiliy Zdanovskiy"; email is the
    literal string "vasilyvz@gmail.com".
  - descr is a non-empty one-line summary string as shown.
  - Do not add get_schema, validate_params, metadata, or execute methods
    in this AS; the class body contains only the eight ClassVar
    attributes shown, nothing else.
  - Do not add any other import, function, or class to this file.
  - Do not read or modify any other file.

