  target: plan_manager.commands.plan_import_command.PlanImportCommand.metadata
  expected: >
    PlanImportCommand.metadata() returns the same dict as
    get_plan_import_metadata(PlanImportCommand), containing the twelve
    metadatastd.yaml required keys and not contradicting get_schema()
    (parameters "source" and "dry_run" match the schema properties).
