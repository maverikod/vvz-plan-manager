verification:
  type: manual
  target: plan_manager.commands.hrs_import_command.HrsImportCommand.execute
  expected: >
    Calling execute(plan="known-plan", source="hrs.md") (dry_run default
    True) with valid Markdown returns a SuccessResult with data
    {"dry_run": True, "valid": True} and performs no admission check and
    no database write. Calling execute with a source whose text fails
    validate_hrs returns an ErrorResult with code IMPORT_INVALID and
    details.issues equal to the issue list, without any write. Calling
    execute with dry_run=False on a plan that requires a cascade and no
    cascade_uuid, with no frozen step, returns an ErrorResult with code
    CASCADE_REQUIRED. The same call on a plan with a frozen step returns
    an ErrorResult with code FROZEN_ARTIFACT. Calling execute with
    dry_run=False and an explicit cascade_uuid that check_admission
    rejects returns an ErrorResult with code CASCADE_CONFLICT. Calling
    execute with dry_run=False and admission granted replaces the HRS
    text, verifies it by re-reading via export_hrs, and returns a
    SuccessResult with data {"dry_run": False, "paragraphs": <int>}.
    Calling execute(plan="unknown", ...) returns an ErrorResult with
    code PLAN_NOT_FOUND.
