  Append exactly one blank line after the line `        return
  get_hrs_import_metadata(cls)`, then append the following method,
  indented 4 spaces as a member of class HrsImportCommand:

  def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
      """Validate hrs_import parameters.

      Args:
          params: Raw parameter dictionary received from the platform.

      Returns:
          The validated parameter dictionary, unchanged beyond the base
          validator's own normalization.

      Raises:
          ValueError: When 'source' is empty or contains '/', '\\' or
              '..', or when 'cascade_uuid' is present but does not
              parse as a UUID.
      """
      params = super().validate_params(params)
      source = params["source"]
      if not source or "/" in source or "\\" in source or ".." in source:
          raise ValueError("source must be a bare file name without path separators")
      cascade_uuid = params.get("cascade_uuid")
      if cascade_uuid is not None:
          uuid.UUID(cascade_uuid)
      return params

  Constraints (all explicit, no open decisions):
  - Do not change any line that already exists in the file; only append
    the blank line and the method shown.
  - The method signature is exactly `def validate_params(self, params:
    Dict[str, Any]) -> Dict[str, Any]:` (instance method), per
    docs/standards/planning/metadatastd.yaml,
    command_class_shape.required_methods.validate_params: "call
    super().validate_params(params) first; add semantic validation
    after".
  - The first statement calls `super().validate_params(params)` and
    reassigns the result to `params`.
  - `source = params["source"]` reads the already-schema-validated
    required "source" key; the guard condition is exactly `if not
    source or "/" in source or "\\" in source or ".." in source:` and
    raises `ValueError("source must be a bare file name without path
    separators")` — platform-level invalid-params validation, not a
    domain error code, per the packet: "the source selector must be
    validated in validate_params: non-empty, no '/', no '\\\\', no
    '..', else raise ValueError (platform invalid-params, not a domain
    code)".
  - `cascade_uuid = params.get("cascade_uuid")` reads the optional key;
    when not None, `uuid.UUID(cascade_uuid)` is called using the `uuid`
    module already imported at the top of this file (`import uuid`)
    only for its side-effect of raising ValueError on an invalid UUID
    string — the parsed value is not stored (execute() will re-parse
    it), matching the packet: "cascade_uuid (string, optional — open
    cascade identity; validate uuid parse when present)".
  - The method returns the params dict unchanged in content beyond
    whatever super().validate_params() itself normalizes.
  - Do not add any other method, import, or class to this file. Do not
    read or modify any other file.

