step_id: A-019
parent_tactical_step: T-003
name: hrs-import-metadata
target_file: plan_manager/commands/hrs_import_metadata.py
operation: create_file
priority: 1
depends_on: []
concepts: [C-023, C-026, C-021]
prompt: |
  Create the file plan_manager/commands/hrs_import_metadata.py with the
  exact full content below (operation: create_file — the file does not
  exist yet, assume no pre-existing content).

  Required imports (exact module paths):
    from typing import Any, Dict

  Required function signature:
    def get_hrs_import_metadata(cls) -> Dict[str, Any]:

  Docstring for the function (Google style, exact wording of purpose):
  "Build the extended documentation metadata for HrsImportCommand." with
  an Args section documenting `cls` as "The HrsImportCommand class
  (passed as ``cls`` from a classmethod)." and a Returns section
  documenting the return value as "A dictionary conforming to the
  metadatastd.yaml required_fields."

  Constraints (all explicit, no open decisions):
  - The module must start with a one-line module docstring:
    "Extended metadata for the hrs_import command."
  - The function returns a dict literal built directly in the return
    statement (no intermediate variables).
  - The returned dict has exactly these top-level keys, in this order:
    name, version, description, category, author, email,
    detailed_description, parameters, return_value, usage_examples,
    error_cases, best_practices.
  - "name": cls.name
  - "version": cls.version
  - "description": cls.descr
  - "category": cls.category
  - "author": cls.author
  - "email": cls.email
  - "detailed_description": the string:
    "Replaces the HRS text of a resolved plan from a Markdown source
    selected by name under the server-configured export root. The source
    text is validated before any write, and a malformed source is
    rejected with IMPORT_INVALID without touching the database. Exposes
    a dry_run mode that defaults to True (safety default on): a dry run
    only validates the text and reports whether it would succeed. When
    dry_run is False and validation passes, admission is checked: an
    open cascade is required unless the change is admissible directly.
    When an explicit cascade_uuid was supplied and admission is
    rejected, the command returns CASCADE_CONFLICT; when no cascade_uuid
    was supplied and any step of the plan is frozen, it returns
    FROZEN_ARTIFACT; otherwise it returns CASCADE_REQUIRED. On successful
    admission the HRS text is replaced and the result is verified by
    re-reading the HRS text and asserting it equals the imported text —
    a mismatch is treated as an internal defect. The source parameter is
    a bare file name resolved under app_config().export_root; it never
    carries a filesystem path (no '/', no '\\', no '..')."
  - "parameters" is a dict with exactly four keys:
    - "plan": {"description": "Plan identifier resolved against the
      catalog.", "type": "string", "required": True}
    - "source": {"description": "Name of the Markdown source file under
      the configured export root. Must not contain '/', '\\' or '..'.",
      "type": "string", "required": True}
    - "dry_run": {"description": "When true (the default), only validate
      the HRS text without writing to the database.", "type": "boolean",
      "required": False, "default": True}
    - "cascade_uuid": {"description": "Identifier of an already-open
      cascade to scope this import to. Must parse as a UUID when
      present.", "type": "string", "required": False}
  - "return_value" is a dict with exactly two keys "success" and "error":
    - "success": {"description": "The dry-run report or the paragraph
      count of the replaced HRS, verified by re-read.", "data":
      {"dry_run": "Whether this call was a dry run.", "valid": "Present
      on dry-run success; always true.", "paragraphs": "Present on a
      real import; the number of paragraphs written."}, "example":
      {"dry_run": True, "valid": True}}
    - "error": {"description": "Domain error result.", "code": "stable
      domain error code", "message": "human-readable message", "details":
      "additional diagnostic fields when available"}
  - "usage_examples" is a list of exactly two dicts:
    1. {"description": "Preview an HRS replacement without writing to
       the database.", "command": {"plan": "my-plan", "source":
       "hrs.md"}, "explanation": "Validates the Markdown source only;
       dry_run defaults to true."}
    2. {"description": "Replace the HRS text inside an already-open
       cascade.", "command": {"plan": "my-plan", "source": "hrs.md",
       "dry_run": False, "cascade_uuid":
       "3fa85f64-5717-4562-b3fc-2c963f66afa6"}, "explanation": "Writes
       the new HRS text scoped to the given open cascade."}
  - "error_cases" is a dict with exactly five keys:
    - "PLAN_NOT_FOUND": {"description": "The plan identifier does not
      exist in the catalog.", "message": "Plan not found: {plan}",
      "solution": "Call the plan catalog command and retry with a valid
      plan identifier."}
    - "IMPORT_INVALID": {"description": "The HRS Markdown source failed
      structural validation.", "message": "hrs validation failed",
      "solution": "Inspect the returned issues list, fix the Markdown
      source, and retry."}
    - "CASCADE_REQUIRED": {"description": "The HRS replacement is not
      admissible directly and no cascade_uuid was supplied.", "message":
      "an open cascade is required for this change", "solution": "Begin
      a cascade for the plan and retry with its cascade_uuid."}
    - "CASCADE_CONFLICT": {"description": "The supplied cascade_uuid does
      not admit this change.", "message": "the supplied cascade does not
      admit this change", "solution": "Verify the cascade is open and
      scoped correctly, or begin a new cascade."}
    - "FROZEN_ARTIFACT": {"description": "The plan has frozen steps and
      the change requires a cascade.", "message": "the plan has frozen
      artifacts; a cascade is required", "solution": "Begin a cascade for
      the plan and retry with its cascade_uuid."}
  - "best_practices" is a list of exactly four strings:
    1. "dry_run defaults to True; callers must explicitly pass
       dry_run=False to write."
    2. "The HRS text is always validated before any database write; a
       malformed source never touches the database."
    3. "After a real import, the command itself verifies the result by
       re-reading the HRS text and asserting equality."
    4. "source is a bare name under server-configured export_root; it is
       never a filesystem path."

  These required top-level metadata keys come from
  docs/standards/planning/metadatastd.yaml, section `metadata`:
  `required_fields: [name, version, description, category, author, email,
  detailed_description, parameters, return_value, usage_examples,
  error_cases, best_practices]`; `parameters_entry_required:
  [description, type, required]`; `parameters_entry_optional: [default,
  examples, enum, items, notes]`; `error_cases.per_entry_required:
  [description, message, solution]`; `safety_documentation.required_for:
  write and destructive commands`; `safety_documentation.required_in:
  [detailed_description, best_practices]`.

  MRS excerpt (concept definitions relevant to this AS, verbatim from
  spec.yaml):

  - concept_id: C-021
    name: ExchangeFormat
    definition: File import/export representation of a plan in the
      standard layout; HRS as Markdown, all other artifacts as YAML.
    properties:
    - export optionally at a named revision; import is the only
      file-to-truth path
    - safe YAML emission with mandatory round-trip; hrs_export
      byte-identical

  - concept_id: C-023
    name: CommandContract
    definition: Adapter-conformant command class shape with schema,
      metadata, and semantic validation.
    properties:
    - class attributes name, version, descr, category, author, email,
      result_class, use_queue
    - get_schema strict subset with explicit additionalProperties false
    - shallow adapter validation compensated by validate_params semantics
    - metadata dictionary must never contradict the schema
    - read commands never mutate; mutating commands verify by re-read
    - destructive or bulk operations expose a dry-run mode defaulting to
      on

  - concept_id: C-026
    name: ErrorModel
    definition: Two-layer error contract of adapter JSON-RPC codes and
      stable domain string codes.
    properties:
    - every declared error case returnable and every returnable case
      declared

  Do not add any other function, class, or import to this file. Do not
  read or modify any other file.
verification:
  type: import
  target: plan_manager.commands.hrs_import_metadata.get_hrs_import_metadata
  expected: >
    Importing plan_manager.commands.hrs_import_metadata succeeds and
    exposes a callable get_hrs_import_metadata(cls) that, given an
    object with attributes name, version, descr, category, author,
    email, returns a dict containing exactly the twelve required
    metadatastd.yaml keys, with parameters containing "plan", "source",
    "dry_run" (default True), and "cascade_uuid" entries, and
    error_cases containing PLAN_NOT_FOUND, IMPORT_INVALID,
    CASCADE_REQUIRED, CASCADE_CONFLICT, and FROZEN_ARTIFACT entries.
status: done
