verification:
  type: manual
  target: plan_manager.commands.plan_import_command.PlanImportCommand.execute
  expected: >
    Calling execute(source="my-plan") (dry_run default True) on a valid
    layout returns a SuccessResult with data {"dry_run": True, "valid":
    True, "source": "my-plan"} and performs no database write. Calling
    execute(source="malformed", dry_run=True) on an invalid layout
    returns an ErrorResult with code IMPORT_INVALID and details.issues
    equal to the non-empty issue list, without any database write.
    Calling execute(source="my-plan", dry_run=False) on a valid layout
    creates the plan, then verifies it by re-reading it via resolve_plan,
    and returns a SuccessResult with data {"dry_run": False, "plan_uuid":
    <str>, "name": <str>}.
