    1. If model_output is None, return None immediately.
    2. Otherwise assign `candidates = extract_candidates(model_output)`;
       if `candidates` is empty (falsy), return None immediately.
    3. Otherwise assign `survivors = surviving_candidates(model_output,
       prompt_text)`; if `survivors` is empty (falsy), return None
       immediately.
    4. Otherwise return `1.0 - surviving_fraction(model_output,
       prompt_text)`.
  - extract_candidates, surviving_candidates, and surviving_fraction are
