  """Executor simulation detector (C-015).

  Deterministically filters a cheap generative model's answer about entities
  an assembled prompt (C-011) uses but does not define. The raw model output
  is treated only as suspicion: every survival judgement is a deterministic
  text computation against the prompt text, never a model opinion.
  """

  import re

  SIMULATION_QUESTION = "Name every entity this prompt uses but does not define. Answer with one entity name per line and nothing else."


  def build_simulation_input(prompt_text: str) -> str:
      r"""Build the text sent to the cheap model for executor simulation.

      :param prompt_text: The assembled prompt text (C-011) to inspect.
      :return: SIMULATION_QUESTION concatenated with prompt_text, separated
          by a blank line: SIMULATION_QUESTION + "\n\n" + prompt_text.
      """
      return SIMULATION_QUESTION + "\n\n" + prompt_text


  def extract_candidates(model_output: str) -> list[str]:
      """Extract candidate entity names from the raw model output.

      Splits model_output on newlines. For each line: strip whitespace, then
      strip a leading list marker if present (one of "-", "*", or digits
      followed by "." or ")") plus the whitespace following the marker. Lines
      that are empty after stripping are dropped. Remaining candidates are
      deduplicated, preserving first-occurrence order. Case is preserved.

      :param model_output: The raw text answer returned by the cheap model.
      :return: Ordered list of unique, non-empty candidate entity names.
      """
      marker_re = re.compile(r"^(?:[-*]|\d+[.)])\s*")
      seen: set[str] = set()
      candidates: list[str] = []
      for line in model_output.split("\n"):
          stripped = line.strip()
          stripped = marker_re.sub("", stripped)
          if not stripped:
              continue
          if stripped not in seen:
              seen.add(stripped)
              candidates.append(stripped)
      return candidates


  def occurs_in_prompt(candidate: str, prompt_text: str) -> bool:
      r"""Determine whether candidate occurs as a whole word in prompt_text.

      :param candidate: The candidate entity name to search for.
      :param prompt_text: The prompt text to search within.
      :return: True iff re.search(r"\b" + re.escape(candidate) + r"\b",
          prompt_text) is not None.
      """
      return re.search(r"\b" + re.escape(candidate) + r"\b", prompt_text) is not None

  Required change: append exactly one new function at the end of the file,
  separated from the last line above (the "return re.search(...)" line) by
  exactly two blank lines. Do not modify any existing line. The new
  function, exact signature, typing annotations, docstring, and body:

  def is_defined_in_prompt(candidate: str, prompt_text: str) -> bool:
      r"""Determine whether candidate is deterministically defined in prompt_text.

      With E = re.escape(candidate), candidate is defined iff any of:
      re.search(r"(def|class)\s+" + E + r"\b", prompt_text) is truthy, or
      re.search(r"^\s*" + E + r"\s*=", prompt_text, re.MULTILINE) is truthy, or
      re.search(r"^\s*" + E + r"\s*:", prompt_text, re.MULTILINE) is truthy.

      :param candidate: The candidate entity name to check.
      :param prompt_text: The prompt text to check within.
      :return: True iff candidate is defined in prompt_text by any of the
          three rules above.
      """
      escaped = re.escape(candidate)
      if re.search(r"(def|class)\s+" + escaped + r"\b", prompt_text):
          return True
      if re.search(r"^\s*" + escaped + r"\s*=", prompt_text, re.MULTILINE):
          return True
      if re.search(r"^\s*" + escaped + r"\s*:", prompt_text, re.MULTILINE):
          return True
      return False

