  - Check 1 pattern (built by string concatenation): r"(def|class)\s+" +
    escaped + r"\b", searched with re.search(pattern, prompt_text) (no
    flags argument).
  - Check 2 pattern: r"^\s*" + escaped + r"\s*=", searched with
    re.search(pattern, prompt_text, re.MULTILINE).
  - Check 3 pattern: r"^\s*" + escaped + r"\s*:", searched with
    re.search(pattern, prompt_text, re.MULTILINE).
