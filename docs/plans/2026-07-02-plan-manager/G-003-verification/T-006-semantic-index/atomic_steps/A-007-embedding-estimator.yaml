  ```python
  def embedding_estimator(
      conn,
      base_url: str,
      branch: Branch,
      concept_rows,
      required: set[str],
      concept_weight: float,
  ) -> float:
      """Embedding-cosine estimator computed in the concept basis.

      v = embed_text(conn, base_url, branch_text(branch)). For each
      (concept_id, definition, _) in concept_rows, in order: e_i =
      embed_text(conn, base_url, definition); c_required_i = concept_weight
      if concept_id in required else 0.0; c_actual_i = max(0.0, cosine(v,
      e_i)), where cosine(a, b) = dot(a, b) / (norm(a) * norm(b)) and is 0.0
      when either norm is 0. Returns max(0.0, cosine(c_required, c_actual))
      over the two n-dimensional vectors indexed by concept
      (n = len(concept_rows)); 0.0 when either vector is all-zero.
      Propagates plan_manager.scoring.embedding.EmbeddingUnavailable to the
      caller unchanged.

      Args:
          conn: an open psycopg 3 database connection.
          base_url: the embedding service base URL.
          branch: the resolved Branch to embed via branch_text(branch).
          concept_rows: the list returned by load_concept_rows, in
              concept_id order.
          required: concept_ids required by the branch, from
              required_concepts.
          concept_weight: the per-concept weight applied to required
              concepts.

      Returns:
          A float in [0.0, 1.0].

      Raises:
          plan_manager.scoring.embedding.EmbeddingUnavailable: propagated
              unchanged from embed_text.
      """

      def _cosine(a: list[float], b: list[float]) -> float:
          dot = sum(x * y for x, y in zip(a, b))
          norm_a = math.sqrt(sum(x * x for x in a))
          norm_b = math.sqrt(sum(y * y for y in b))
          if norm_a == 0.0 or norm_b == 0.0:
              return 0.0
          return dot / (norm_a * norm_b)

      v = embed_text(conn, base_url, branch_text(branch))

      c_required: list[float] = []
      c_actual: list[float] = []
      for concept_id, definition, _source_labels in concept_rows:
          e_i = embed_text(conn, base_url, definition)
          c_required.append(concept_weight if concept_id in required else 0.0)
          c_actual.append(max(0.0, _cosine(v, e_i)))

      if not any(c_required) or not any(c_actual):
          return 0.0
      return max(0.0, _cosine(c_required, c_actual))
  ```

