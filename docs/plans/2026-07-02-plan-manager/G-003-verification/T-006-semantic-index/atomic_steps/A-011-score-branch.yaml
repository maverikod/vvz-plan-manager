  Ensemble fold (normative): estimator names "coverage", "references",
  "embedding", "simulation". Deterministic estimators coverage and
  references always vote, weight 1.0 each. The two model-based
  estimators (embedding, simulation) share ONE down-weighted vote: each
  present member of that pair has weight 1.0/len(present pair members);
  an abstaining/unavailable member is excluded and the pair weight
  recomputed over the remaining member; when both absent the pair
  contributes nothing. index = 100.0 * sum(w_i * v_i) / sum(w_i) over
  present estimators.
