  - concept_id: C-013
    name: SemanticIndex
    definition: Normalized 0..100 completeness measure of a branch computed as cosine between required and actual concept vectors.
    properties:
    - runs only on scopes that passed the mechanical gate at the current revision
    - ensemble of weak independent estimators; same-physics votes share weight
    - one number and color for the human; internals surface only on miss
    - plan aggregation defaults to minimum branch index
    source_labels: ["{l9b4}", "{p4g6}", "{v6t8}", "{i3g8}", "{i7h2}", "{f1w9}", "{h7u3}"]

  - concept_id: C-036
    name: NormativeAlgorithmSet
    definition: The binding algorithm specifications that lower levels refine into code without semantic deviation.
    properties:
    - deviations escalate to the HRS; open parameters have named defaults and are configuration
    source_labels: ["{w5e2}"]

  - concept_id: C-008
    name: Branch
    definition: Addressable derived view of one path HRS-slice -> GS -> TS -> AS; the unit of verification and prompt assembly.
    properties:
    - never materialized as a stored artifact
    - a mechanically clean branch is measurable while siblings are broken
    source_labels: ["{c9a6}", "{f1w9}", "{r9f1}"]

  - concept_id: C-012
    name: MechanicalGate
    definition: Deterministic binary verification layer catching every mechanical defect before semantics.
    properties:
    - fixed check order parse, identity, uniqueness, references, coverage
    - byte-identical reports for the same tree state; fail-fast only at group boundary
    - per-branch gating; precondition for any semantic measurement
    - parser sanity gates make parsing regressions fail loudly instead of passing silently
    source_labels: ["{m9x4}", "{x8m3}", "{s2z9}", "{j5k7}", "{c6f9}", "{z2b5}", "{f1w9}", "{h7u3}"]

  - concept_id: C-020
    name: Verdict
    definition: Gate or score result bound to the exact revision and scope it was computed for.
    properties:
    - fresh iff recorded revision equals current revision; comparison never by timestamp
    source_labels: ["{g3o6}", "{m7w3}"]

  - concept_id: C-022
    name: EmbeddingService
    definition: Sole optional external integration providing text embeddings through a configured URL.
    properties:
    - unavailability degrades only semantic scoring, with explicit low trust
    - vectors cached in the database keyed by content hash; no vector files
    source_labels: ["{q1w8}", "{b8j5}", "{l4u8}"]

  - concept_id: C-014
    name: TrustEstimate
    definition: Confidence in the semantic measurement itself derived from concept basis geometry and service liveness.
    properties:
    - Gram determinant, pairwise cosines, spectrum; monotone mapping is configuration
    - drops to a declared floor when embeddings are unavailable
    - distinguishes weak plan from unmeasurable plan
    source_labels: ["{o3v8}", "{l2q6}"]

  - concept_id: C-015
    name: ExecutorSimulation
    definition: Detector estimator asking a cheap model the closed question of undefined entities in a prompt.
    properties:
    - output filtered deterministically against prompt text
    - can only raise suspicion, never mark green
    source_labels: ["{i7h2}", "{o7d4}"]

