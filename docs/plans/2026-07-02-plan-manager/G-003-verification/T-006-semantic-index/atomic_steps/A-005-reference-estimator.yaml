  ```python
  def reference_estimator(conn, branch: Branch, concept_rows) -> float:
      """Deterministic reference-resolution estimator.

      Counts total and resolved references across branch.gs, branch.ts, and
      branch.atomic (each a Step). For every step: each concepts entry is
      resolved iff it is among the concept_id values in concept_rows; each
      depends_on entry is resolved iff a sibling step exists with the same
      plan_uuid, the same parent_step_uuid (NULL-safe), the same level, and
      that step_id. For branch.gs only, additionally: each entry of
      branch.gs.fields.get("relations", []) is resolved iff both
      from_concept and to_concept are among the concept_id values in
      concept_rows and type is one of uses, owns, implements, extends,
      depends_on, produces, consumes; each entry of
      branch.gs.fields.get("source_labels", []) is resolved iff a paragraph
      row exists with that bare label (value[1:-1]).

      Formula: 1.0 when the total reference count is 0; otherwise
      resolved / total.

      Args:
          conn: an open psycopg 3 database connection.
          branch: the resolved Branch.
          concept_rows: the list returned by load_concept_rows.

      Returns:
          A float in [0.0, 1.0].
      """
      allowed_relation_types = {
          "uses",
          "owns",
          "implements",
          "extends",
          "depends_on",
          "produces",
          "consumes",
      }
      concept_ids = {row[0] for row in concept_rows}
      total = 0
      resolved = 0

      for step in (branch.gs, branch.ts, branch.atomic):
          for concept_id in step.concepts:
              total += 1
              if concept_id in concept_ids:
                  resolved += 1
          for dep_step_id in step.depends_on:
              total += 1
              with conn.cursor() as cur:
                  cur.execute(
                      "SELECT 1 FROM step WHERE plan_uuid = %s AND level = %s "
                      "AND parent_step_uuid IS NOT DISTINCT FROM %s "
                      "AND step_id = %s",
                      (branch.plan_uuid, step.level, step.parent_step_uuid, dep_step_id),
                  )
                  if cur.fetchone() is not None:
                      resolved += 1

      for relation in branch.gs.fields.get("relations", []):
          total += 1
          from_concept = relation.get("from_concept")
          to_concept = relation.get("to_concept")
          relation_type = relation.get("type")
          if (
              from_concept in concept_ids
              and to_concept in concept_ids
              and relation_type in allowed_relation_types
          ):
              resolved += 1

      for source_label in branch.gs.fields.get("source_labels", []):
          total += 1
          bare_label = source_label[1:-1]
          with conn.cursor() as cur:
              cur.execute(
                  "SELECT 1 FROM paragraph WHERE plan_uuid = %s AND label = %s",
                  (branch.plan_uuid, bare_label),
              )
              if cur.fetchone() is not None:
                  resolved += 1

      if total == 0:
          return 1.0
      return resolved / total
  ```

