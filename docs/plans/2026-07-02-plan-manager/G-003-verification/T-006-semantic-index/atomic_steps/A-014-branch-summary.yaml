  ```python
  def branch_summary(score: BranchScore, verbose: bool = False) -> dict:
      """Build the output-discipline summary dict for one BranchScore.

      Always includes branch_path, index, and color. Includes
      estimator_vector and trust only when score.below_threshold or
      verbose is True: the internal estimator vector and trust value
      surface only for a branch below threshold or on explicit request.

      Args:
          score: the BranchScore to summarize.
          verbose: when True, always include estimator_vector and trust.

      Returns:
          A dict with keys "branch_path", "index", "color", and, only when
          score.below_threshold or verbose is True, also
          "estimator_vector" and "trust".
      """
      summary: dict = {
          "branch_path": score.branch_path,
          "index": score.index,
          "color": score.color,
      }
      if score.below_threshold or verbose:
          summary["estimator_vector"] = score.estimator_vector
          summary["trust"] = score.trust
      return summary
  ```

