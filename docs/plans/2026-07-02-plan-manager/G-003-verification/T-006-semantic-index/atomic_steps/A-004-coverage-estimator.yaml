  ```python
  """Deterministic and embedding-based branch estimators for SemanticIndex (C-013).

  Implements the normative estimator formulas of NormativeAlgorithmSet (C-036)
  consumed by plan_manager.scoring.index.score_branch. Read-only on plan data:
  every function here returns computed values to its caller and stores nothing.
  """

  from __future__ import annotations

  from plan_manager.views.branch import Branch


  def load_concept_rows(conn, plan_uuid) -> list[tuple[str, str, list[str]]]:
      """Load all concepts of a plan ordered by concept_id.

      Args:
          conn: an open psycopg 3 database connection.
          plan_uuid: the plan identity to scope the query to.

      Returns:
          A list of (concept_id, definition, source_labels) tuples, one per
          concept row, ascending by concept_id. source_labels entries keep
          their enclosing braces, e.g. "{abcd}".
      """
      with conn.cursor() as cur:
          cur.execute(
              "SELECT concept_id, definition, source_labels FROM concept "
              "WHERE plan_uuid = %s ORDER BY concept_id",
              (plan_uuid,),
          )
          return [(row[0], row[1], list(row[2])) for row in cur.fetchall()]


  def required_concepts(branch: Branch, concept_rows) -> set[str]:
      """Compute the concept_ids required by the branch's HRS slice.

      A concept is required iff at least one of its source_labels, stripped
      of its enclosing braces (value[1:-1]), equals the label of a paragraph
      in branch.hrs_slice. Paragraphs whose label is None are ignored.

      Args:
          branch: the resolved Branch; uses branch.hrs_slice: list[Paragraph].
          concept_rows: the list returned by load_concept_rows.

      Returns:
          The set of required concept_id values.
      """
      slice_labels = {p.label for p in branch.hrs_slice if p.label is not None}
      required: set[str] = set()
      for concept_id, _definition, source_labels in concept_rows:
          stripped = {label[1:-1] for label in source_labels}
          if stripped & slice_labels:
              required.add(concept_id)
      return required


  def declared_concepts(branch: Branch) -> set[str]:
      """Compute the concept_ids declared by the branch.

      The union of branch.gs.concepts, branch.ts.concepts, and
      branch.atomic.concepts (each a Step.concepts: list[str] field).

      Args:
          branch: the resolved Branch.

      Returns:
          The set of declared concept_id values.
      """
      return set(branch.gs.concepts) | set(branch.ts.concepts) | set(branch.atomic.concepts)
  ```

  Required change: append this new function at the end of the file (after
  declared_concepts, separated by exactly two blank lines). Do not change
  anything above it.

  ```python
  def coverage_estimator(required: set[str], declared: set[str]) -> float:
      """Deterministic concept-coverage estimator.

      Formula: 1.0 when required is empty; otherwise
      len(required & declared) / len(required).

      Args:
          required: concept_ids required by the branch, from required_concepts.
          declared: concept_ids declared by the branch, from declared_concepts.

      Returns:
          A float in [0.0, 1.0].
      """
      if not required:
          return 1.0
      return len(required & declared) / len(required)
  ```

  Constraints (all binding, none optional):
  - The signature is exactly
    `def coverage_estimator(required: set[str], declared: set[str]) -> float:`.
  - If `required` is the empty set, return exactly `1.0` (a Python float).
  - Otherwise return exactly `len(required & declared) / len(required)`
    using the `&` set-intersection operator and true division `/`
    (Python 3 `/` already produces a float).
  - This function performs no I/O: no database access, no network access,
