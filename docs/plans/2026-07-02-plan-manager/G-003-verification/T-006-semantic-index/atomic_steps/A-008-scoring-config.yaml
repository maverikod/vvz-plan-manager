prompt: |
  Create the file plan_manager/scoring/index.py (it does not exist yet; do
  not assume any pre-existing content). This file will hold the
  SemanticIndex (C-013) branch and plan-level ensemble measurement; this
  AS writes only its module docstring, its `from __future__ import
  annotations` import line, an `import dataclasses` line, and one
  dataclass, ScoringConfig. Do not add any other function, class, or
  import. Do not create, read, or modify any other file.

  Write the file with exactly this content:

  ```python
  """SemanticIndex (C-013) scoring: branch and plan-level ensemble measurement.

  Implements the normative fold and refusal discipline of NormativeAlgorithmSet
  (C-036). Results are returned to the caller and never stored.
  """

  from __future__ import annotations

  import dataclasses


  @dataclasses.dataclass
  class ScoringConfig:
      """Published-default configuration consumed by the SemanticIndex fold.

      Attributes:
          threshold: branch/plan index threshold, published default 85.0.
          aggregation: plan-level aggregation mode, "minimum" or
              "fraction_above_threshold". Published default "minimum".
          concept_weight: per-concept weight applied to required concepts in
              embedding_estimator. Published default 1.0.
          trust_floor: declared trust floor used when the embedding service
              is unavailable. Published default 0.2.
          embedding_url: the embedding service base URL, or None when the
              embedding service is not configured.

      Raises:
          ValueError: raised by __post_init__ when aggregation is not
              "minimum" or "fraction_above_threshold".
      """

      threshold: float = 85.0
      aggregation: str = "minimum"
      concept_weight: float = 1.0
      trust_floor: float = 0.2
      embedding_url: str | None = None

      def __post_init__(self) -> None:
          if self.aggregation not in ("minimum", "fraction_above_threshold"):
              raise ValueError(
                  "aggregation must be 'minimum' or 'fraction_above_threshold', "
                  f"got {self.aggregation!r}"
              )
  ```

  Constraints (all binding, none optional):
  - The class is declared exactly as `@dataclasses.dataclass\nclass
    ScoringConfig:` using the `dataclasses` module imported as
    `import dataclasses` (not `from dataclasses import dataclass`).
  - Field order, names, types, and default values are exactly:
    `threshold: float = 85.0`, `aggregation: str = "minimum"`,
    `concept_weight: float = 1.0`, `trust_floor: float = 0.2`,
    `embedding_url: str | None = None`. These are the published defaults:
    threshold 85, minimum aggregation, uniform concept weights (1.0),
    trust floor 0.2 — matching Configuration (C-028)'s scoring section
    defaults exactly.
  - `__post_init__(self) -> None` validates `self.aggregation`: it must be
    one of the two literal strings `"minimum"` or
    `"fraction_above_threshold"`; any other value raises `ValueError` with
    exactly the message
    `f"aggregation must be 'minimum' or 'fraction_above_threshold', got {self.aggregation!r}"`.
    No other validation is performed on any other field by this AS.
  - Do not add any method other than `__post_init__`.
  - No other function, class, or import may appear in this file for this
    AS.

