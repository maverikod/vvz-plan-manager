  ```python
  def branch_text(branch: Branch) -> str:
      """Concatenate the branch's descriptive text into one string.

      Formula: "\n\n".join of (branch.gs.fields.get("description", ""),
      branch.ts.fields.get("description", ""),
      branch.atomic.fields.get("prompt", "")).

      Args:
          branch: the resolved Branch.

      Returns:
          The concatenated branch text.
      """
      return "\n\n".join(
          [
              branch.gs.fields.get("description", ""),
              branch.ts.fields.get("description", ""),
              branch.atomic.fields.get("prompt", ""),
          ]
      )
  ```

  Constraints (all binding, none optional):
  - The signature is exactly `def branch_text(branch: Branch) -> str:`.
  - Return exactly `"\n\n".join([branch.gs.fields.get("description", ""), branch.ts.fields.get("description", ""), branch.atomic.fields.get("prompt", "")])`
    — a two-character separator (one literal newline character
    repeated twice, i.e. a blank line between parts when rendered), joining
    exactly three strings in exactly this order: GS description, TS
    description, AS prompt. Use `.get(key, "")` (default empty string) in
    all three lookups, never `[key]` direct indexing, so a missing key
    does not raise `KeyError`.
  - `branch.gs.fields`, `branch.ts.fields`, `branch.atomic.fields` are
    each the `fields: dict` attribute of a `Step` (see sibling contract
    below). Per branch conventions, level-3 (GS) fields keys include
    `description`; level-4 (TS) fields keys include `description`;
    level-5 (AS) fields keys include `prompt`.
  - This function performs no I/O: no database access, no network access,
    no file access. It must not call any other function in this module.
  - Do not add any import.
  - No other function, class, or import may be added by this AS beyond
