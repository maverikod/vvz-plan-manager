    properties:
    - identifier pattern C-NNN, unique within plan
    - selected to be as orthogonal as possible; basis quality is measured
    - embedding serialization default is the definition field only
    source_labels: ["{f6s2}", "{k7r9}", "{j8b2}"]

  relations:
  - { from_concept: C-013, to_concept: C-036, type: implements }
