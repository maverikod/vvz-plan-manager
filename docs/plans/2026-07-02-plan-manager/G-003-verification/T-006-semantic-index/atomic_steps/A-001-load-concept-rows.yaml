prompt: |
  Create the file plan_manager/scoring/estimators.py (it does not exist yet;
  do not assume any pre-existing content). This file will hold deterministic
  and embedding-based branch estimators for SemanticIndex (C-013); this AS
  writes only its module docstring, its `from __future__ import annotations`
  import line, and one function, load_concept_rows. Do not add any other
  function, class, or import. Do not create, read, or modify any other file.

  Write the file with exactly this content:

  ```python
  """Deterministic and embedding-based branch estimators for SemanticIndex (C-013).

  Implements the normative estimator formulas of NormativeAlgorithmSet (C-036)
  consumed by plan_manager.scoring.index.score_branch. Read-only on plan data:
  every function here returns computed values to its caller and stores nothing.
  """

  from __future__ import annotations


  def load_concept_rows(conn, plan_uuid) -> list[tuple[str, str, list[str]]]:
      """Load all concepts of a plan ordered by concept_id.

      Args:
          conn: an open psycopg 3 database connection.
          plan_uuid: the plan identity to scope the query to.

      Returns:
          A list of (concept_id, definition, source_labels) tuples, one per
          concept row, ascending by concept_id. source_labels entries keep
          their enclosing braces, e.g. "{abcd}".
      """
      with conn.cursor() as cur:
          cur.execute(
              "SELECT concept_id, definition, source_labels FROM concept "
              "WHERE plan_uuid = %s ORDER BY concept_id",
              (plan_uuid,),
          )
          return [(row[0], row[1], list(row[2])) for row in cur.fetchall()]
  ```

  Constraints (all binding, none optional):
  - The signature is exactly `def load_concept_rows(conn, plan_uuid) -> list[tuple[str, str, list[str]]]:`
    with no additional type annotations on `conn` or `plan_uuid` (they are
    intentionally unannotated, matching the normative sibling contract).
  - `conn` is an open psycopg 3 database connection (package plan_manager/
    is Python 3.12+, psycopg 3, plain SQL, no ORM; runtime code never emits
    DDL). Use `conn.cursor()` as a context manager exactly as shown; do not
    call `conn.commit()` (this is a read-only SELECT).
  - The SQL text must be exactly
    `"SELECT concept_id, definition, source_labels FROM concept WHERE plan_uuid = %s ORDER BY concept_id"`
    (the two literal strings concatenated by adjacency exactly as shown, or
    written as one single string with identical content — the executed SQL
    text and parameter binding must be identical either way), bound with the
    single parameter tuple `(plan_uuid,)`.
  - The `concept` table has columns `concept_id` (text), `definition`
    (text), and `source_labels` (text[], a PostgreSQL text array whose
    entries include their enclosing braces, e.g. the stored value
    `"{abcd}"`), plus `uuid` and `plan_uuid` columns not selected here.
  - Return exactly a list comprehension over `cur.fetchall()` producing
    3-tuples `(row[0], row[1], list(row[2]))` — `list(row[2])` normalizes
    the driver-returned array-like value for `source_labels` into a plain
    Python `list[str]`.
  - Do not catch or suppress any exception. Do not log anything. Do not
    cache anything. The result is returned to the caller and never stored
    (Database C-035 is the single source of truth; this function is a pure
    read).
  - No other function, class, constant, or import may appear in this file
    for this AS.

  MRS excerpt (only the concepts and relations relevant to this AS):

