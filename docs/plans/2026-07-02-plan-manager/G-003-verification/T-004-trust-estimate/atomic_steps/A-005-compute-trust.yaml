  - Do not add any other function, class, or constant in this change.

  Relevant MRS excerpt (concept definitions relevant to this AS):
  - C-014 TrustEstimate: "Confidence in the measurement itself derived from
    concept basis geometry and service liveness." Properties: Gram
    determinant, pairwise cosines, spectrum; monotone mapping is
    configuration; drops to a declared floor when embeddings are
    unavailable; distinguishes weak plan from unmeasurable plan.
    `compute_trust` is the integration point: it produces the floor-trust
    report on unavailability and the geometry-derived report otherwise.
  - C-022 EmbeddingService: "Sole optional external integration providing
    text embeddings through a configured URL." Properties: unavailability
    degrades only semantic scoring, with explicit low trust; vectors cached
    in the database keyed by content hash; no vector files. `compute_trust`
    is the site where this unavailability is caught and converted to the
    declared trust floor.
  - C-003 Concept: "MRS basis axis with canonical name, one-sentence
    definition, properties, and source labels." Property relevant here:
    embedding serialization default is the definition field only —
    `concept_definitions` are exactly these definition-field strings, one
    per plan concept.
