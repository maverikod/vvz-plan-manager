  The full current content of the file, exactly as it exists before this
  change, is:

  ```python
  """Trust estimate: confidence in the semantic measurement itself (C-014).

  Computes the geometry of the concept embedding basis (pairwise cosines, Gram
  determinant, eigenvalue spectrum) and maps it to a monotone 0..1 trust value,
  falling back to a declared floor when the embedding service is unavailable.
  """

  from dataclasses import dataclass

  import numpy as np


  @dataclass
  class TrustReport:
      """Confidence report for the semantic measurement.

      Attributes:
          trust: 0..1 confidence value, decreasing monotonically with basis
              collinearity; equal to the declared floor when available is
              False.
          available: True when the embedding service produced vectors for
              every concept definition; False when embeddings could not be
              obtained.
          pairwise_cosines: Pairwise cosine matrix of the normalized concept
              embeddings as a nested list; empty when available is False.
          gram_determinant: Determinant of the Gram matrix of the normalized
              concept embeddings; 0.0 when available is False.
          spectrum: Eigenvalue spectrum of the Gram matrix, sorted descending;
              empty when available is False.
      """

      trust: float
      available: bool
      pairwise_cosines: list[list[float]]
      gram_determinant: float
      spectrum: list[float]


  def normalize_rows(vectors: list[list[float]]) -> np.ndarray:
      """Row-normalize a list of vectors to unit L2 norm.

      Args:
          vectors: A list of equal-length numeric vectors.

      Returns:
          A 2-D numpy array of dtype float64 with the same shape as the
          input, where each row is divided by its L2 norm. A row whose L2
          norm is zero is left as all-zero (no division by zero).
      """
      array = np.asarray(vectors, dtype=np.float64)
      norms = np.linalg.norm(array, axis=1, keepdims=True)
      safe_norms = np.where(norms == 0.0, 1.0, norms)
      return array / safe_norms


  def basis_geometry(
      vectors: list[list[float]],
  ) -> tuple[list[list[float]], float, list[float]]:
      """Compute pairwise cosines, Gram determinant, and eigenvalue spectrum.

      Args:
          vectors: A list of equal-length numeric vectors (concept
              embeddings).

      Returns:
          A 3-tuple (cosines, determinant, spectrum):
              cosines: The pairwise cosine matrix of the row-normalized
                  vectors, as a nested list of floats. For unit-norm rows
                  the Gram matrix IS the pairwise cosine matrix; this is
                  that Gram matrix converted to a nested list.
              determinant: The determinant of the Gram matrix, as a float.
              spectrum: The eigenvalues of the Gram matrix, sorted
                  descending, as a list of floats.

      Raises:
          ValueError: If vectors is empty or the rows are not all the same
              length (ragged rows).
      """
      if not vectors:
          raise ValueError("basis_geometry requires a non-empty vector list")
      lengths = {len(row) for row in vectors}
      if len(lengths) != 1:
          raise ValueError(
              "basis_geometry requires all rows to have equal length"
          )
      normalized = normalize_rows(vectors)
      gram = normalized @ normalized.T
      determinant = float(np.linalg.det(gram))
      spectrum = sorted(np.linalg.eigvalsh(gram).tolist(), reverse=True)
      cosines = gram.tolist()
      return cosines, determinant, spectrum


  def trust_from_geometry(gram_determinant: float, n: int) -> float:
      """Map Gram determinant and basis size to a 0..1 trust value.

      Published-default monotone mapping: the n-th root of the non-negative
      part of the determinant, clamped to [0.0, 1.0]. More collinearity in
      the concept basis produces a smaller determinant and therefore a
      lower trust value.

      Args:
          gram_determinant: The determinant of the Gram matrix of the
              normalized concept embeddings.
          n: The number of concept embeddings (basis size).

      Returns:
          0.0 when n == 0; otherwise
          clamp(max(gram_determinant, 0.0) ** (1.0 / n), 0.0, 1.0).
      """
      if n == 0:
          return 0.0
      base = max(gram_determinant, 0.0)
      value = base ** (1.0 / n)
      return min(max(value, 0.0), 1.0)
  ```

  Make two changes to this file:

  1. Insert two new import lines immediately after the existing
     `import numpy as np` line and before the two blank lines that precede
