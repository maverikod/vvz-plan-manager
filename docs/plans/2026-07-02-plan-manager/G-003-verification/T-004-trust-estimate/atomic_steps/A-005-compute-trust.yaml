     ```python
     from dataclasses import dataclass

     import numpy as np
     import psycopg

     from plan_manager.scoring.embedding import EmbeddingUnavailable, embed_text
     ```

     These two symbols are defined in the sibling module
     `plan_manager/scoring/embedding.py` with exactly these signatures
     (quoted verbatim; this AS does not create or modify that module):
     - `class EmbeddingUnavailable(Exception)`
     - `def embed_text(conn: psycopg.Connection, base_url: str, text: str) -> list[float]`

  2. Append exactly the following to the end of the file, separated from
     the `trust_from_geometry` function by two blank lines (the file must
     end with a single trailing newline after the function body, no extra
     blank lines beyond that):

     ```python
     def compute_trust(
         conn: psycopg.Connection,
         base_url: str,
         concept_definitions: list[str],
         trust_floor: float,
     ) -> TrustReport:
         """Compute the TrustEstimate for a set of concept definitions.

         Embeds every definition via embed_text. If any call raises
         EmbeddingUnavailable, returns a TrustReport with trust equal to
         trust_floor and available False (pairwise_cosines empty,
         gram_determinant 0.0, spectrum empty) — the declared floor
         distinguishing "cannot be measured" from "weak". Otherwise computes
         the basis geometry of the embedded vectors and maps it to a trust
         value.

         Args:
             conn: An open psycopg 3 database connection, passed through to
                 the embedding client. This function issues no SQL of its
                 own.
             base_url: The base URL of the embedding service.
             concept_definitions: The definition text of each plan concept
                 (C-003), in the order the vectors are requested. Per the
                 published default embedding serialization, this is the
                 concept's definition field only.
             trust_floor: The declared trust value used when the embedding
                 service is unavailable.

         Returns:
             A TrustReport with either the floor trust (available False) or
             the trust computed from the basis geometry (available True).
         """
         vectors: list[list[float]] = []
         for definition in concept_definitions:
             try:
                 vectors.append(embed_text(conn, base_url, definition))
             except EmbeddingUnavailable:
                 return TrustReport(
                     trust=trust_floor,
                     available=False,
                     pairwise_cosines=[],
                     gram_determinant=0.0,
                     spectrum=[],
                 )
         cosines, determinant, spectrum = basis_geometry(vectors)
         trust = trust_from_geometry(determinant, len(vectors))
         return TrustReport(
             trust=trust,
             available=True,
             pairwise_cosines=cosines,
             gram_determinant=determinant,
             spectrum=spectrum,
         )
     ```

  Constraints:
  - Do not modify the module docstring, the `TrustReport` class,
