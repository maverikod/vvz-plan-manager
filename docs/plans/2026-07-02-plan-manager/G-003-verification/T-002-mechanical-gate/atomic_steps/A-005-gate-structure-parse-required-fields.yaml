    make parsing regressions fail loudly instead of passing silently.
  - C-006 PlanSchema — Declarative configuration object describing identifier
    patterns, per-level required fields, and exchange-layout naming.
    Properties: defaults match plan_standard_machine.yaml; overrides only for
    exotic layouts; nothing project-specific is hard-coded in the engine.
  - C-005 Step — Single stored entity for plan levels 3-5 with level, step id,
    slug, level-specific fields, and status. Properties: uniform operations
    across levels, per-level required fields are declarative schema;
    scaffolded creation auto-assigns the next free zero-padded id; mutation
