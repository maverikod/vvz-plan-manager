  This AS writes exactly this file content (module docstring, three imports,
  one constant, one function — nothing else):

  ```python
  """Parse and identity check groups for the mechanical gate (C-012)."""

  from plan_manager.domain.step import Step
  from plan_manager.verify.finding import Finding
  from plan_manager.verify.gate_data import GateTree, artifact_path_of

  _REQUIRED_FIELDS_BY_LEVEL: dict[int, list[str]] = {
      3: ["name", "description", "relations", "source_labels"],
      4: ["name", "description", "inputs", "outputs"],
      5: ["name", "target_file", "operation", "priority", "prompt", "verification"],
  }


  def check_parse_required_fields(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "parse.required_fields".

      For every step in ``steps``, look up its required field keys in
      ``_REQUIRED_FIELDS_BY_LEVEL`` by ``step.level`` (the level-5 optional
      ``objects`` key is never required and is not in this table; unknown
      levels have an empty required list). For each required key, the step's
      ``fields`` dict must contain a non-empty value: not None, not "", not
      [], not {}. Every violation produces one Finding with check_id
      "parse.required_fields", severity "error", artifact_path
      artifact_path_of(tree.steps, step), and a message naming the missing
      or empty field.
      """
      findings: list[Finding] = []
      for step in steps:
          required = _REQUIRED_FIELDS_BY_LEVEL.get(step.level, [])
          path = artifact_path_of(tree.steps, step)
          for key in required:
              value = step.fields.get(key)
              if value in (None, "", [], {}):
                  findings.append(
                      Finding(
                          "parse.required_fields",
                          "error",
                          path,
                          f"required field '{key}' is missing or empty",
                      )
                  )
      return findings
  ```

  The imported Step, Finding, GateTree, artifact_path_of are existing sibling
  entities; import them, do not redefine them. Exact signatures, for
