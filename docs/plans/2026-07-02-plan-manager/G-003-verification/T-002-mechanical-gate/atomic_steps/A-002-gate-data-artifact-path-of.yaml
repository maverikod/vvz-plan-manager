  def artifact_path_of(nodes: dict[uuid.UUID, Step], step: Step) -> str:
      """Return the artifact path of ``step`` within ``nodes``.

      For level 4 and level 5 steps the path is
      ``parent_path(nodes, step) + "/" + step.step_id``.
      For level 3 steps the path is ``step.step_id`` (``parent_path`` returns
      ``""`` for level 3).
      """
      if step.level == 3:
          return step.step_id
      prefix = parent_path(nodes, step)
      return f"{prefix}/{step.step_id}"
  ```

