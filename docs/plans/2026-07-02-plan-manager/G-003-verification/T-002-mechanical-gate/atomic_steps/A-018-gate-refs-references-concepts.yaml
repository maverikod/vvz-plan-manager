  def check_references_concepts(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "references.concepts".

      Every entry of step.concepts, for every step in ``steps``, must exist
      in tree.concept_ids. For every entry that does not, produce one Finding
      with check_id "references.concepts", severity "error", artifact_path
      artifact_path_of(tree.steps, step), and a message naming the dangling
      concepts entry.
      """
      findings: list[Finding] = []
      concept_id_set = set(tree.concept_ids)
      for step in steps:
          path = artifact_path_of(tree.steps, step)
          for concept_id in step.concepts:
              if concept_id not in concept_id_set:
                  findings.append(
                      Finding(
                          "references.concepts",
                          "error",
                          path,
                          f"concepts entry '{concept_id}' does not exist in the MRS",
                      )
                  )
      return findings
  ```

