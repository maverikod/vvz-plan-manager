  """Uniqueness and reference-resolution check groups for the mechanical gate (C-012)."""

  from plan_manager.domain.step import Step
  from plan_manager.verify.finding import Finding
  from plan_manager.verify.gate_data import GateTree, artifact_path_of


  def check_uniqueness_step_id(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "uniqueness.step_id".

      Within ``steps``, no two steps may share the triple
      (step.parent_step_uuid, step.level, step.step_id) — parent_step_uuid is
      compared NULL-safely (two None values are treated as equal for this
      grouping). Group ``steps`` by this triple; for every group with more
      than one member, every member of that group produces one Finding with
      check_id "uniqueness.step_id", severity "error", artifact_path
      artifact_path_of(tree.steps, step), and a message naming the duplicated
      step_id.
      """
      findings: list[Finding] = []
      seen: dict[tuple, list[Step]] = {}
      for step in steps:
          key = (step.parent_step_uuid, step.level, step.step_id)
          seen.setdefault(key, []).append(step)
      for group in seen.values():
          if len(group) > 1:
              for step in group:
                  path = artifact_path_of(tree.steps, step)
                  findings.append(
                      Finding(
                          "uniqueness.step_id",
                          "error",
                          path,
                          f"step_id '{step.step_id}' is not unique within its scope",
                      )
                  )
      return findings


  def check_uniqueness_concept_id(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "uniqueness.concept_id".

      concept_ids must be unique within the plan. Count occurrences of every
      string in tree.concept_ids; for every concept_id occurring more than
      once, produces one Finding with check_id "uniqueness.concept_id",
      severity "error", artifact_path equal to the concept_id string itself,
      and a message stating the concept_id is not unique within the plan.
      The ``steps`` parameter is accepted for call-signature uniformity with
      the other check functions in this module but is not used by this
      check.
      """
      findings: list[Finding] = []
      seen: dict[str, int] = {}
      for concept_id in tree.concept_ids:
          seen[concept_id] = seen.get(concept_id, 0) + 1
      for concept_id, count in seen.items():
          if count > 1:
              findings.append(
                  Finding(
                      "uniqueness.concept_id",
                      "error",
                      concept_id,
                      f"concept_id '{concept_id}' is not unique within the plan",
                  )
              )
      return findings


  def check_uniqueness_label(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "uniqueness.label".

      Paragraph labels must be unique within the plan. Count occurrences of
      every bare label string in tree.labels; for every label occurring more
      than once, produces one Finding with check_id "uniqueness.label",
      severity "error", artifact_path equal to "{" + label + "}" (the braced
      form), and a message stating the label is not unique within the plan.
      The ``steps`` parameter is accepted for call-signature uniformity with
      the other check functions in this module but is not used by this
      check.
      """
      findings: list[Finding] = []
      seen: dict[str, int] = {}
      for label in tree.labels:
          seen[label] = seen.get(label, 0) + 1
      for label, count in seen.items():
          if count > 1:
              findings.append(
                  Finding(
                      "uniqueness.label",
                      "error",
                      "{" + label + "}",
                      f"label '{label}' is not unique within the plan",
                  )
              )
      return findings
  ```

