  2. Append the following constant and function at the end of the file,
     separated from check_parse_sanity_counts by two blank lines:

  ```python
  _STEP_ID_PATTERN_BY_LEVEL: dict[int, re.Pattern[str]] = {
      3: re.compile(r"^G-\d{3}$"),
      4: re.compile(r"^T-\d{3}$"),
      5: re.compile(r"^A-\d{3}$"),
  }


  def check_identity_step_id(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "identity.step_id".

      For every step in ``steps``, look up the compiled regex for its level
      in ``_STEP_ID_PATTERN_BY_LEVEL``. step.step_id must fully match that
      pattern (zero-padded three-digit number, correct prefix letter per
      level: G- for level 3, T- for level 4, A- for level 5). If the level has
      no entry in the table, or the pattern does not match, produces one
      Finding with check_id "identity.step_id", severity "error",
      artifact_path artifact_path_of(tree.steps, step), and a message naming
      the offending step_id.
      """
      findings: list[Finding] = []
      for step in steps:
          pattern = _STEP_ID_PATTERN_BY_LEVEL.get(step.level)
          path = artifact_path_of(tree.steps, step)
          if pattern is None or not pattern.match(step.step_id):
              findings.append(
                  Finding(
                      "identity.step_id",
                      "error",
                      path,
                      f"step_id '{step.step_id}' does not match the level {step.level} pattern",
                  )
              )
      return findings
  ```

