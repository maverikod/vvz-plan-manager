  def check_parse_sanity_counts(
      tree: GateTree, steps: list[Step], branch: Branch | None
  ) -> list[Finding]:
      """Check id "parse.sanity_counts": the parser sanity gate.

      Plan scope (``branch`` is None): tree.counts["steps"] must be >= 1,
      tree.counts["concepts"] must be >= 1, and tree.counts["paragraphs"]
      must be >= 1. Each violated bound produces one Finding with check_id
      "parse.sanity_counts", severity "error", artifact_path "plan", and a
      message naming the zero-count entity kind.

      Branch scope (``branch`` is not None): branch.hrs_slice must be
      non-empty. If it is empty, produces one Finding with check_id
      "parse.sanity_counts", severity "error", artifact_path
      artifact_path_of(tree.steps, branch.gs), and a message stating that the
      branch hrs_slice is empty.
      """
      findings: list[Finding] = []
      if branch is None:
          if tree.counts["steps"] < 1:
              findings.append(
                  Finding("parse.sanity_counts", "error", "plan", "plan has zero steps")
              )
          if tree.counts["concepts"] < 1:
              findings.append(
                  Finding("parse.sanity_counts", "error", "plan", "plan has zero concepts")
              )
          if tree.counts["paragraphs"] < 1:
              findings.append(
                  Finding("parse.sanity_counts", "error", "plan", "plan has zero paragraphs")
              )
      else:
          if not branch.hrs_slice:
              gs_path = artifact_path_of(tree.steps, branch.gs)
              findings.append(
                  Finding(
                      "parse.sanity_counts",
                      "error",
                      gs_path,
                      "branch hrs_slice is empty",
                  )
              )
      return findings
  ```

