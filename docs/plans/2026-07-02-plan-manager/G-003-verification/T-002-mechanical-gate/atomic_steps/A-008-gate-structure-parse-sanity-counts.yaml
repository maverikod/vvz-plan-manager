  ```python
  """Parse and identity check groups for the mechanical gate (C-012)."""

  from plan_manager.domain.step import Step
  from plan_manager.verify.finding import Finding
  from plan_manager.verify.gate_data import GateTree, artifact_path_of

  _REQUIRED_FIELDS_BY_LEVEL: dict[int, list[str]] = {
      3: ["name", "description", "relations", "source_labels"],
      4: ["name", "description", "inputs", "outputs"],
      5: ["name", "target_file", "operation", "priority", "prompt", "verification"],
  }


  def check_parse_required_fields(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "parse.required_fields".

      For every step in ``steps``, look up its required field keys in
      ``_REQUIRED_FIELDS_BY_LEVEL`` by ``step.level`` (the level-5 optional
      ``objects`` key is never required and is not in this table; unknown
      levels have an empty required list). For each required key, the step's
      ``fields`` dict must contain a non-empty value: not None, not "", not
      [], not {}. Every violation produces one Finding with check_id
      "parse.required_fields", severity "error", artifact_path
      artifact_path_of(tree.steps, step), and a message naming the missing
      or empty field.
      """
      findings: list[Finding] = []
      for step in steps:
          required = _REQUIRED_FIELDS_BY_LEVEL.get(step.level, [])
          path = artifact_path_of(tree.steps, step)
          for key in required:
              value = step.fields.get(key)
              if value in (None, "", [], {}):
                  findings.append(
                      Finding(
                          "parse.required_fields",
                          "error",
                          path,
                          f"required field '{key}' is missing or empty",
                      )
                  )
      return findings


  def check_parse_inputs_outputs(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "parse.inputs_outputs".

      Applies only to level-4 steps. For each level-4 step, fields["inputs"]
      and fields["outputs"] must each be a Python list. Every item of each
      list must be a dict whose key set is exactly {"name", "type",
      "description"} (no more, no fewer keys), and every one of those three
      values must be a non-empty str. Every violation produces one Finding
      with check_id "parse.inputs_outputs", severity "error", artifact_path
      artifact_path_of(tree.steps, step), and a message naming the offending
      key ("inputs" or "outputs"), the item index, and the offending sub-key
      when applicable.
      """
      findings: list[Finding] = []
      for step in steps:
          if step.level != 4:
              continue
          path = artifact_path_of(tree.steps, step)
          for key in ("inputs", "outputs"):
              value = step.fields.get(key)
              if not isinstance(value, list):
                  findings.append(
                      Finding(
                          "parse.inputs_outputs",
                          "error",
                          path,
                          f"field '{key}' is not a list",
                      )
                  )
                  continue
              for index, item in enumerate(value):
                  if not isinstance(item, dict) or set(item.keys()) != {
                      "name",
                      "type",
                      "description",
                  }:
                      findings.append(
                          Finding(
                              "parse.inputs_outputs",
                              "error",
                              path,
                              f"{key}[{index}] does not have exactly keys name, type, description",
                          )
                      )
                      continue
                  for field_key in ("name", "type", "description"):
                      field_value = item.get(field_key)
                      if not isinstance(field_value, str) or not field_value:
                          findings.append(
                              Finding(
                                  "parse.inputs_outputs",
                                  "error",
                                  path,
                                  f"{key}[{index}].{field_key} is not a non-empty string",
                              )
                          )
      return findings


  def check_parse_target_file(tree: GateTree, steps: list[Step]) -> list[Finding]:
      """Check id "parse.target_file".

      Applies only to level-5 steps. fields["target_file"] must be a
      non-empty str that does not start with "/" (project-relative path).
      Every violation produces one Finding with check_id "parse.target_file",
      severity "error", artifact_path artifact_path_of(tree.steps, step), and
      a message stating that target_file is not a non-empty project-relative
      path.
      """
      findings: list[Finding] = []
      for step in steps:
          if step.level != 5:
              continue
          path = artifact_path_of(tree.steps, step)
          value = step.fields.get("target_file")
          if not isinstance(value, str) or not value or value.startswith("/"):
              findings.append(
                  Finding(
                      "parse.target_file",
                      "error",
                      path,
                      "field 'target_file' is not a non-empty project-relative path",
                  )
              )
      return findings
  ```

