  ```python
  def scope_steps(tree: GateTree, branch: Branch | None) -> list[Step]:
      """Return the steps in scope for a gate run.

      When ``branch`` is None, returns all steps in ``tree`` sorted by
      ``(level, artifact_path_of(tree.steps, step))``. Otherwise returns
      exactly ``[branch.gs, branch.ts, branch.atomic]`` in that order.
      """
      if branch is None:
          return sorted(
              tree.steps.values(),
              key=lambda s: (s.level, artifact_path_of(tree.steps, s)),
          )
      return [branch.gs, branch.ts, branch.atomic]
  ```

