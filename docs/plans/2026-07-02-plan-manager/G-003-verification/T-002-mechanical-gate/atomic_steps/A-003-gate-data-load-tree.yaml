  ```python
  def load_tree(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> GateTree:
      """Load the full read-only tree for ``plan_uuid`` needed by the mechanical gate.

      Issues plain read-only SELECT statements against the step, concept,
      relation, and paragraph tables. Stores nothing; returns a fully
      populated GateTree. This function performs no writes and no DDL.
      """
      steps: dict[uuid.UUID, Step] = {}
      with conn.cursor() as cur:
          cur.execute(
              "SELECT uuid, plan_uuid, parent_step_uuid, level, step_id, slug, "
              "fields, depends_on, concepts, status FROM step WHERE plan_uuid = %s",
              (plan_uuid,),
          )
          for row in cur.fetchall():
              (
                  s_uuid, s_plan_uuid, s_parent_step_uuid, s_level, s_step_id,
                  s_slug, s_fields, s_depends_on, s_concepts, s_status,
              ) = row
              steps[s_uuid] = Step(
                  uuid=s_uuid,
                  plan_uuid=s_plan_uuid,
                  parent_step_uuid=s_parent_step_uuid,
                  level=s_level,
                  step_id=s_step_id,
                  slug=s_slug,
                  fields=s_fields,
                  depends_on=list(s_depends_on) if s_depends_on else [],
                  concepts=list(s_concepts) if s_concepts else [],
                  status=s_status,
              )

          cur.execute("SELECT concept_id FROM concept WHERE plan_uuid = %s", (plan_uuid,))
          concept_ids = [row[0] for row in cur.fetchall()]

          cur.execute(
              "SELECT from_concept, to_concept, type FROM relation WHERE plan_uuid = %s",
              (plan_uuid,),
          )
          relations = [(row[0], row[1], row[2]) for row in cur.fetchall()]

          cur.execute(
              "SELECT label FROM paragraph WHERE plan_uuid = %s ORDER BY position",
              (plan_uuid,),
          )
          labels = [row[0] for row in cur.fetchall()]

          cur.execute("SELECT count(*) FROM paragraph WHERE plan_uuid = %s", (plan_uuid,))
          paragraph_count = cur.fetchone()[0]

      counts = {
          "steps": len(steps),
          "concepts": len(concept_ids),
          "paragraphs": paragraph_count,
      }
      return GateTree(
          steps=steps,
          concept_ids=concept_ids,
          relations=relations,
          labels=labels,
          counts=counts,
      )
  ```

  Database schema this function reads (plain SQL, psycopg 3, no ORM, no DDL,
  read-only — this function never writes and never emits DDL):
  - step(uuid, plan_uuid, parent_step_uuid, level, step_id, slug, fields,
    depends_on, concepts, status)
  - concept(uuid, plan_uuid, concept_id, name, definition, properties,
    source_labels)
  - relation(uuid, plan_uuid, from_concept, to_concept, type)
  - paragraph(uuid, plan_uuid, label, text, position) — label is the four
    base36 characters without braces; only binding paragraphs are stored, so
    every row has a non-null label.

  conn is a psycopg.Connection; use conn.cursor() as a context manager
  exactly as shown, cur.execute(sql, params) with a tuple of parameters, and
  cur.fetchall() / cur.fetchone() to read rows. Do not use an ORM.

