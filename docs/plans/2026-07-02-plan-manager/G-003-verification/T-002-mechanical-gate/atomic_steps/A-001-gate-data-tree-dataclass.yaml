  ```python
  """Read-only tree loader and scoping helpers for the mechanical gate (C-012)."""

  import uuid
  from dataclasses import dataclass

  from plan_manager.domain.step import Step


  @dataclass
  class GateTree:
      steps: dict[uuid.UUID, Step]
      concept_ids: list[str]
      relations: list[tuple[str, str, str]]
      labels: list[str]
      counts: dict[str, int]
  ```

  GateTree field semantics (all five fields are mandatory dataclass fields,
  add no other fields, no methods, no default values):
  - steps: dict[uuid.UUID, Step] — every Step row belonging to one plan, keyed
    by its uuid field.
  - concept_ids: list[str] — every concept_id string of the plan's concept
    table, in the order they were read.
  - relations: list[tuple[str, str, str]] — every (from_concept, to_concept,
    type) triple of the plan's relation table, in the order they were read.
  - labels: list[str] — the bare label (four base36 characters, no braces) of
    every stored paragraph belonging to the plan, in paragraph position
    order. Only binding paragraphs are ever stored, so every row has a label.
  - counts: dict[str, int] — a dict populated later (by a different AS in
    this same file) with exactly the keys "steps", "concepts", "paragraphs".
    This AS does not populate it; it is only a dataclass field declaration.

  The imported Step is an existing sibling dataclass; import it, do not
