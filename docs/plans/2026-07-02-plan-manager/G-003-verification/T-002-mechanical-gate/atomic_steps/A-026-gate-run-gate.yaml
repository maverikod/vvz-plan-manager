  ```python
  """Mechanical gate orchestrator (C-012): fixed check-group order, byte-identical reports."""

  import uuid

  import psycopg

  from plan_manager.verify.finding import Finding
  from plan_manager.views.coverage import (
      concept_coverage,
      gs_coverage,
      label_coverage,
      relation_coverage,
  )

  GROUP_ORDER = ["parse", "identity", "uniqueness", "references", "coverage"]

  CHECK_IDS: dict[str, list[str]] = {
      "parse": [
          "parse.required_fields",
          "parse.inputs_outputs",
          "parse.target_file",
          "parse.sanity_counts",
      ],
      "identity": [
          "identity.step_id",
          "identity.slug",
          "identity.concept_id",
          "identity.label",
      ],
      "uniqueness": [
          "uniqueness.step_id",
          "uniqueness.concept_id",
          "uniqueness.label",
          "uniqueness.priority",
      ],
      "references": [
          "references.depends_on",
          "references.concepts",
          "references.relations",
          "references.source_labels",
      ],
      "coverage": [
          "coverage.concepts",
          "coverage.gs",
          "coverage.labels",
          "coverage.relations",
      ],
  }


  def check_coverage_concepts(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> list[Finding]:
      """Check id "coverage.concepts": plan-wide concept coverage.

      Calls concept_coverage(conn, plan_uuid) to get a CoverageReport(missing,
      extra). Every entry of report.missing produces one Finding with
      check_id "coverage.concepts", severity "error", artifact_path "plan",
      and a message naming the missing concept and stating it is missing.
      Every entry of report.extra produces one Finding with the same
      check_id and artifact_path "plan", naming the extra concept and
      stating it is extra.
      """
      findings: list[Finding] = []
      report = concept_coverage(conn, plan_uuid)
      for missing in report.missing:
          findings.append(
              Finding("coverage.concepts", "error", "plan", f"concept '{missing}' missing")
          )
      for extra in report.extra:
          findings.append(
              Finding("coverage.concepts", "error", "plan", f"concept '{extra}' extra")
          )
      return findings


  def check_coverage_gs(
      conn: psycopg.Connection, plan_uuid: uuid.UUID, gs_step_id: str | None
  ) -> list[Finding]:
      """Check id "coverage.gs": per-global-step concept coverage.

      Calls gs_coverage(conn, plan_uuid) to get a dict[str, CoverageReport]
      keyed by GS step_id. When gs_step_id is None, every (step_id, report)
      pair of the dict is processed (plan scope: every GS is checked). When
      gs_step_id is not None, only the (gs_step_id, report) pair is
      processed if gs_step_id is a key of the dict, otherwise nothing is
      processed (branch scope: only the branch's own GS is checked). For
      every processed (step_id, report) pair, every entry of report.missing
      produces one Finding with check_id "coverage.gs", severity "error",
      artifact_path equal to step_id (the GS step_id, not
      artifact_path_of — a bare GS step_id is already its own artifact
      path), and a message naming the missing concept. report.extra is
      never used by this check: for coverage.gs only the missing list
      exists (a GS is required to cover its concept set; extra concepts are
      not a coverage.gs concern).
      """
      findings: list[Finding] = []
      reports = gs_coverage(conn, plan_uuid)
      if gs_step_id is None:
          items = list(reports.items())
      elif gs_step_id in reports:
          items = [(gs_step_id, reports[gs_step_id])]
      else:
          items = []
      for step_id, report in items:
          for missing in report.missing:
              findings.append(
                  Finding("coverage.gs", "error", step_id, f"concept '{missing}' missing")
              )
      return findings


  def check_coverage_labels(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> list[Finding]:
      """Check id "coverage.labels": plan-wide paragraph label coverage.

      Calls label_coverage(conn, plan_uuid) to get a CoverageReport(missing,
      extra). Every entry of report.missing produces one Finding with
      check_id "coverage.labels", severity "error", artifact_path "plan",
      and a message naming the missing label and stating it is missing.
      Every entry of report.extra produces one Finding with the same
      check_id and artifact_path "plan", naming the extra label and stating
      it is extra.
      """
      findings: list[Finding] = []
      report = label_coverage(conn, plan_uuid)
      for missing in report.missing:
          findings.append(
              Finding("coverage.labels", "error", "plan", f"label '{missing}' missing")
          )
      for extra in report.extra:
          findings.append(
              Finding("coverage.labels", "error", "plan", f"label '{extra}' extra")
          )
      return findings


  def check_coverage_relations(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> list[Finding]:
      """Check id "coverage.relations": plan-wide relation coverage.

      Calls relation_coverage(conn, plan_uuid) to get a
      CoverageReport(missing, extra). Every entry of report.missing produces
      one Finding with check_id "coverage.relations", severity "error",
      artifact_path "plan", and a message naming the missing relation and
      stating it is missing. Every entry of report.extra produces one
      Finding with the same check_id and artifact_path "plan", naming the
      extra relation and stating it is extra.
      """
      findings: list[Finding] = []
      report = relation_coverage(conn, plan_uuid)
      for missing in report.missing:
          findings.append(
              Finding("coverage.relations", "error", "plan", f"relation '{missing}' missing")
          )
      for extra in report.extra:
          findings.append(
              Finding("coverage.relations", "error", "plan", f"relation '{extra}' extra")
          )
      return findings
  ```

