  ```python
  def run_gate(
      conn: psycopg.Connection,
      plan_uuid: uuid.UUID,
      branch: Branch | None = None,
      fail_fast: bool = False,
  ) -> tuple[Report, Verdict]:
      """Run the mechanical gate (C-012) over ``plan_uuid``, implementing the
      normative algorithm (C-036) exactly.

      Loads the tree once via load_tree(conn, plan_uuid), then computes
      steps = scope_steps(tree, branch). Iterates GROUP_ORDER in order; for
      each group, runs every check function belonging to that group (listed
      below) passing (tree, steps), or (tree, steps, branch) for
      parse.sanity_counts, and passing (conn, plan_uuid, ...) for the
      coverage group as described next. Collects every group's findings and
      always extends run_check_ids with CHECK_IDS[group] regardless of
      whether every check in the group was actually executed (this matters
      for the coverage group in branch scope, see below).

      Group to check-function mapping (fixed order within each group,
      matching CHECK_IDS):
      - parse: check_parse_required_fields, check_parse_inputs_outputs,
        check_parse_target_file, check_parse_sanity_counts(tree, steps,
        branch).
      - identity: check_identity_step_id, check_identity_slug,
        check_identity_concept_id, check_identity_label.
      - uniqueness: check_uniqueness_step_id, check_uniqueness_concept_id,
        check_uniqueness_label, check_uniqueness_priority.
      - references: check_references_depends_on, check_references_concepts,
        check_references_relations, check_references_source_labels.
      - coverage: when branch is None, runs check_coverage_concepts(conn,
        plan_uuid), check_coverage_gs(conn, plan_uuid, None),
        check_coverage_labels(conn, plan_uuid), check_coverage_relations(conn,
        plan_uuid) — all four coverage checks execute in plan scope. When
        branch is not None, runs only check_coverage_gs(conn, plan_uuid,
        branch.gs.step_id); the other three coverage check ids
        ("coverage.concepts", "coverage.labels", "coverage.relations") are
        still appended to run_check_ids (via CHECK_IDS["coverage"]) but no
        finding is ever produced for them in branch scope, so build_report
        reports them as passed with an empty finding list — this is exactly
        the required behaviour: those three checks are plan-wide set
        equalities, not branch properties, so in branch scope they are
        included in the report as passed without being computed.

      fail_fast behaviour: after processing a group (always processing the
      whole group — every check in it — never stopping mid-group), if
      fail_fast is True and that group produced at least one finding, the
      loop stops; groups after that one are not processed at all and their
      check ids are excluded from run_check_ids (and therefore from the
      report). This is fail-fast only at the group boundary: partial output
      stays deterministic because a whole group is always either fully run
      or not run at all.

      After the loop: findings are sorted by (artifact_path, check_id) —
      this is the fixed published sort order (occurrences are always
      classified by artifact path, never by bare step number). A Report is
      built via build_report(run_check_ids, findings_sorted); two runs over
      the same tree state produce byte-identical run_check_ids and
      byte-identical sorted findings, hence byte-identical
      render_json(report) output.

      The returned Verdict has kind="gate"; scope is "plan" when branch is
      None, otherwise artifact_path_of(tree.steps, branch.atomic) (the
      atomic step's own artifact path, per the C-020 rule that a verdict is
      bound to the exact scope it was computed for); revision_uuid is
      current_head_revision(conn, plan_uuid); green is report.green; payload
      is {"json": render_json(report)}. This function reads plan data only
      and stores nothing.
      """
      tree = load_tree(conn, plan_uuid)
      steps = scope_steps(tree, branch)
      run_check_ids: list[str] = []
      findings: list[Finding] = []
      for group in GROUP_ORDER:
          group_check_ids = CHECK_IDS[group]
          group_findings: list[Finding] = []
          if group == "parse":
              group_findings.extend(check_parse_required_fields(tree, steps))
              group_findings.extend(check_parse_inputs_outputs(tree, steps))
              group_findings.extend(check_parse_target_file(tree, steps))
              group_findings.extend(check_parse_sanity_counts(tree, steps, branch))
          elif group == "identity":
              group_findings.extend(check_identity_step_id(tree, steps))
              group_findings.extend(check_identity_slug(tree, steps))
              group_findings.extend(check_identity_concept_id(tree, steps))
              group_findings.extend(check_identity_label(tree, steps))
          elif group == "uniqueness":
              group_findings.extend(check_uniqueness_step_id(tree, steps))
              group_findings.extend(check_uniqueness_concept_id(tree, steps))
              group_findings.extend(check_uniqueness_label(tree, steps))
              group_findings.extend(check_uniqueness_priority(tree, steps))
          elif group == "references":
              group_findings.extend(check_references_depends_on(tree, steps))
              group_findings.extend(check_references_concepts(tree, steps))
              group_findings.extend(check_references_relations(tree, steps))
              group_findings.extend(check_references_source_labels(tree, steps))
          elif group == "coverage":
              if branch is None:
                  group_findings.extend(check_coverage_concepts(conn, plan_uuid))
                  group_findings.extend(check_coverage_gs(conn, plan_uuid, None))
                  group_findings.extend(check_coverage_labels(conn, plan_uuid))
                  group_findings.extend(check_coverage_relations(conn, plan_uuid))
              else:
                  group_findings.extend(
                      check_coverage_gs(conn, plan_uuid, branch.gs.step_id)
                  )
          run_check_ids.extend(group_check_ids)
          findings.extend(group_findings)
          if fail_fast and group_findings:
              break
      findings_sorted = sorted(findings, key=lambda f: (f.artifact_path, f.check_id))
      report = build_report(run_check_ids, findings_sorted)
      scope_label = "plan" if branch is None else artifact_path_of(tree.steps, branch.atomic)
      verdict = Verdict(
          kind="gate",
          scope=scope_label,
          revision_uuid=current_head_revision(conn, plan_uuid),
          green=report.green,
          payload={"json": render_json(report)},
      )
      return report, verdict
  ```

