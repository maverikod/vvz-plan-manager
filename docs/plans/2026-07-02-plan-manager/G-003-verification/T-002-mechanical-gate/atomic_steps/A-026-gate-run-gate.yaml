  MRS excerpt (only the concepts relevant to this AS):

  - C-012 MechanicalGate — Deterministic binary verification layer catching
    every mechanical defect before semantics. Properties: fixed check order
    parse, identity, uniqueness, references, coverage; byte-identical reports
    for the same tree state; fail-fast only at group boundary; per-branch
    gating, precondition for any semantic measurement; parser sanity gates
    make parsing regressions fail loudly instead of passing silently.
  - C-036 NormativeAlgorithmSet — The binding algorithm specifications that
    lower levels refine into code without semantic deviation. Properties:
    deviations escalate to the HRS; open parameters have named defaults and
    are configuration.
  - C-020 Verdict — Gate or score result bound to the exact revision and
    scope it was computed for. Properties: fresh iff recorded revision
    equals current revision; comparison never by timestamp.
  - C-017 Finding — Ephemeral result unit of gate and scoring runs with
    check id, severity, artifact path, and message. Properties: aggregated
    into reports; never stored as a plan artifact.
  - C-008 Branch — Addressable derived view of one path HRS-slice -> GS -> TS
    -> AS; the unit of verification and prompt assembly. Properties: never
    materialized as a stored artifact; a mechanically clean branch is
    measurable while siblings are broken.

