  build_report(check_ids, findings) is assumed (per its sibling contract) to
  compute, for every check_id in check_ids, whether that check passed
  (no Finding in ``findings`` has that check_id) or failed (at least one
  Finding has that check_id), and report.green is True iff every check
  passed; this function relies on that contract and performs no additional
  pass/fail computation itself.

