    Given a conn and plan_uuid for a plan with no mechanical defects,
    run_gate(conn, plan_uuid) returns (report, verdict) where report.green is
    True, report's check list covers every id in the concatenation of
    CHECK_IDS[g] for g in GROUP_ORDER, and verdict.kind == "gate", verdict.
    scope == "plan", verdict.green == report.green, verdict.payload["json"]
