    `EmbeddingUnavailable("response JSON missing 'embedding' key")`.
  - If `parsed["embedding"]` is not a `list`, raise
    `EmbeddingUnavailable("'embedding' value is not a list")`.
  - Otherwise return `parsed["embedding"]`.
  - Use no HTTP client other than the standard-library `urllib.request`
    and `urllib.error` modules.
  - Do not modify the module docstring, the imports, the
