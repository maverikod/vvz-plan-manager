prompt: |
  Create the file plan_manager/verify/finding.py. This file does not exist
  yet; do not assume any pre-existing content.

  Operation: create_file at path plan_manager/verify/finding.py.

  Write exactly the following as the full initial content of the file:

  """Ephemeral result types for gate and scoring runs (C-017 Finding).

  Findings are aggregated into reports and returned to the caller. Nothing in
  this module is ever persisted as a plan artifact.
  """

  from __future__ import annotations

  from dataclasses import dataclass

  SEVERITIES = frozenset({"error", "warning"})


  @dataclass(frozen=True)
  class Finding:
      """A single ephemeral result unit of a gate or scoring run.

      Attributes:
          check_id: Identifier of the check that produced this finding.
          severity: One of the values in SEVERITIES ("error" or "warning").
          artifact_path: Branch artifact path the finding is anchored to.
          message: Human-readable description of the finding.
      """

      check_id: str
      severity: str
      artifact_path: str
      message: str

  Imports required: `from __future__ import annotations` and
  `from dataclasses import dataclass`. No other imports.

  Exact signatures:
  - Module-level constant `SEVERITIES: frozenset[str]` bound to
    `frozenset({"error", "warning"})`.
  - `@dataclass(frozen=True) class Finding:` with fields, in this order and
    with these exact type annotations: `check_id: str`, `severity: str`,
    `artifact_path: str`, `message: str`. No default values. No methods
    beyond the dataclass-generated ones.

  Docstring text: use the module docstring and the class docstring exactly
  as shown above, including the "Attributes:" section with the four bullet
  lines exactly as written.

  Constraints:
  - The file must contain nothing beyond what is shown above: no additional
    classes, functions, constants, or imports.
  - `severity` is typed `str` at the dataclass level; SEVERITIES lists the
    two legal values but this module performs no membership validation in
    this AS.
  - Preserve blank-line spacing exactly as shown: one blank line between the
    module docstring and the `from __future__` import line, one blank line
    between the two import lines, one blank line before SEVERITIES, two
    blank lines before the `@dataclass` decorator line, one blank line
    between the class docstring and the first field.

  MRS excerpt (concept relevant to this AS):
