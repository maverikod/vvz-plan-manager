  `raise VerdictError(f"invalid Verdict kind: {self.kind}")` line) by
  exactly two blank lines:

  def current_head_revision(conn: psycopg.Connection, plan_uuid: uuid.UUID) -> uuid.UUID | None:
      """Look up the current head revision of a plan.

      Args:
          conn: Open psycopg 3 connection.
          plan_uuid: UUID identity of the plan row to look up.

      Returns:
          The value of plan.head_revision_uuid for the row where
          plan.uuid = plan_uuid, which may be None.

      Raises:
          VerdictError: If no row in table plan has uuid = plan_uuid. The
              error message names the plan_uuid.
      """
      with conn.cursor() as cur:
          cur.execute("SELECT head_revision_uuid FROM plan WHERE uuid = %s", (plan_uuid,))
          row = cur.fetchone()
      if row is None:
          raise VerdictError(f"no plan with uuid: {plan_uuid}")
      return row[0]

