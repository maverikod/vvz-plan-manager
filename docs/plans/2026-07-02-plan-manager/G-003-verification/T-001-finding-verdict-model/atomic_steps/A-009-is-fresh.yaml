    `return verdict.revision_uuid == current_revision_uuid`.
  - Equality is strict Python `==` comparison between `uuid.UUID` values (or
    `None`); no normalization, no string conversion, no tolerance window.
  - No clock, timestamp, or duration is read or compared anywhere in this
    function.
  - Do not add any other function or class in this AS.
  - Everything above `def is_fresh` in the file must remain byte-identical
