  def render_json(report: Report) -> str:
      """Render a Report as its canonical JSON form.

      Args:
          report: The Report to render.

      Returns:
          The canonical JSON string (via canonical_json) of a dict with keys
          "green" (report.green) and "checks" (a list with one entry per
          CheckResult in report.checks, each an object with keys "check_id",
          "passed", and "findings" — the latter a list with one entry per
          Finding in that check's findings, each an object with keys
          "check_id", "severity", "artifact_path", "message"). Byte-identical
          for the same report content.
      """
      return canonical_json(
          {
              "green": report.green,
              "checks": [
                  {
                      "check_id": check.check_id,
                      "passed": check.passed,
                      "findings": [
                          {
                              "check_id": finding.check_id,
                              "severity": finding.severity,
                              "artifact_path": finding.artifact_path,
                              "message": finding.message,
                          }
                          for finding in check.findings
                      ],
                  }
                  for check in report.checks
              ],
          }
      )

