    case statement having exactly a "remove)" arm that runs only
    "systemctl daemon-reload" (preserving all of /etc/planmgr,
    /var/planmgr, /var/log/planmgr), and a "purge)" arm that runs, in
    order, "rm -rf /etc/planmgr /var/log/planmgr /var/planmgr", "userdel
    planmgruser || true", "groupdel planmgrgrp || true", and "systemctl
    daemon-reload". No other argument value triggers directory deletion,
    and the script ends with "exit 0".
