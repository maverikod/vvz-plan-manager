step_id: A-005
parent_tactical_step: T-004
name: prerm-script
target_file: packaging/deb/prerm
operation: create_file
priority: 1
depends_on: []
concepts: [C-032, C-033]
prompt: |
  Target file: packaging/deb/prerm (new file; the file does not exist
  yet).
  Operation: create_file.

  Write a Debian package prerm maintainer script: a POSIX sh script
  (shebang #!/bin/sh) that starts with "set -e" and stops and disables the
  running service and removes the running container, leaving all mounted
  host state (the /etc/planmgr, /var/planmgr, and /var/log/planmgr
  directory contents) untouched.

  Exact required file content (write it verbatim):

  #!/bin/sh
  set -e

  systemctl stop planmgr.service || true
  systemctl disable planmgr.service || true
  docker rm -f planmgr || true

  exit 0

  Constraints (binding):
  - The script is POSIX sh (no bashisms); it begins with the shebang line
    "#!/bin/sh" then "set -e" on the next line.
  - Exactly three commands run, in this order, each suffixed with
    "|| true" so a failure of any one of them (for example the service or
    container already being stopped or absent) does not abort the script
    under "set -e": "systemctl stop planmgr.service", "systemctl disable
    planmgr.service", "docker rm -f planmgr".
  - The script does not delete, move, or modify any file under
    /etc/planmgr, /var/planmgr, or /var/log/planmgr; it touches only the
    systemd service unit named planmgr.service (by name, through
    systemctl) and the container named planmgr (by name, through docker).
  - The script does not reference the systemd unit file's own content,
    the container image, or any database operation.
  - The script ends with "exit 0".

  MRS excerpt (only the concepts relevant to this AS):
  - concept_id: C-032
    name: InstallPackage
    definition: Ubuntu deb package that provisions identity, directories,
      configuration, image, and container on install.
    properties:
    - conffile semantics with standard overwrite prompt
    - verifies and pulls the required image version from Docker Hub
    - renders server config from /etc/default/planmgr operator settings
  - concept_id: C-033
    name: ServiceUnit
    definition: systemd unit owning the container lifecycle, running as
      the dedicated host user.
    properties:
    - environment from /etc/default/planmgr; restart on failure;
      readiness via /health
verification:
  type: static_analysis
  target: packaging/deb/prerm
  expected: >
    "sh -n packaging/deb/prerm" reports no syntax errors. The script
    starts with "#!/bin/sh" then "set -e", and runs exactly the three
    commands "systemctl stop planmgr.service || true", "systemctl disable
    planmgr.service || true", and "docker rm -f planmgr || true" in that
    order, then "exit 0". No command in the script deletes or modifies
    any path under /etc/planmgr, /var/planmgr, or /var/log/planmgr.
status: done
