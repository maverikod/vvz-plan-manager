    ${PLANMGR_IMAGE_REPO}:${PLANMGR_IMAGE_VERSION}; an ExecStartPost line
    that polls http://localhost:${PLANMGR_PORT}/health in a retry loop; an
    ExecStop line running "docker stop planmgr"; Restart=on-failure and
    RestartSec=5. [Install] contains WantedBy=multi-user.target. Each
    directive group is preceded by a comment naming its GS role.
