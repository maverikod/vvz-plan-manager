concepts: [C-029, C-034, C-035, C-027]
prompt: |
  Target file: docker/entrypoint.sh (repository path docker/entrypoint.sh).
  Operation: create_file. The file does not exist yet; do not assume any
  pre-existing content.

  Write the file with EXACTLY the following content, byte for byte:

  #!/bin/sh
  # Fixed startup order for the ContainerDeployment entrypoint:
  #   1. PostgreSQL      - start the database server over the mounted data
  #                         directory, running initdb first if it is empty.
  #   2. Readiness        - poll until PostgreSQL accepts connections.
  #   3. Initialization   - run the idempotent database initializer (role,
  #                         database, schema migrations); safe to re-run,
  #                         refuses to damage an existing database.
  #   4. Server           - exec the plan_manager server process so it
  #                         replaces this shell as PID 1 and its exit status
  #                         propagates to the container unchanged.
  set -eu

  # 1. PostgreSQL: initialize the data directory on first run (PG_VERSION is
  # absent from an empty or not-yet-initialized $PGDATA), then start the
  # PostgreSQL server in the background against the mounted $PGDATA,
  # logging to the mounted log directory.
  if [ ! -f "$PGDATA/PG_VERSION" ]; then
      initdb -D "$PGDATA"
  fi
  pg_ctl -D "$PGDATA" -l /var/log/planmgr/postgres.log start

  # 2. Readiness: poll pg_isready once per second, up to 30 attempts. Fail
  # loudly and stop the container if PostgreSQL never becomes ready.
  i=0
  while [ "$i" -lt 30 ]; do
      if pg_isready -q; then
          break
      fi
      i=$((i + 1))
      sleep 1
  done
  if [ "$i" -ge 30 ]; then
      echo "entrypoint: PostgreSQL did not become ready within 30 seconds" >&2
      exit 1
  fi

  # 3. Initialization: idempotent role/database/schema-migration setup
  # shipped in-image at /opt/plan_manager_db/init.sh. $PGDATA is already
  # initialized by step 1 above, so this script's own initdb guard is a
  # no-op; it only creates the role, the database, and applies migrations,
  # and refuses to act if an existing database would be damaged.
  /opt/plan_manager_db/init.sh

  # 4. Server: exec (not a plain call) so the server process replaces this
  # shell as PID 1, receives container signals directly, and its exit code
  # becomes the container's exit code.
  exec python -m plan_manager.main --config /etc/planmgr/config.json

  Constraints (all mandatory, no deviation):
  - The file is a POSIX shell script (#!/bin/sh shebang) and sets
    `set -eu` as its first executable line: -e aborts on any unhandled
    non-zero exit status, -u aborts on any reference to an unset variable.
  - The four stages run in exactly this order and are labeled in comments
    exactly as "PostgreSQL", "Readiness", "Initialization", "Server", as
    shown above; no stage is reordered, skipped, or merged.
  - Stage 1 uses the environment variable $PGDATA (already set to
    /var/planmgr/postgres by the image's ENV PGDATA declaration; this
    script only reads it, it does not set it) to decide, by testing for the
    absence of the file "$PGDATA/PG_VERSION", whether to run
    `initdb -D "$PGDATA"` before starting the server. The server is started
    with `pg_ctl -D "$PGDATA" -l /var/log/planmgr/postgres.log start`,
    logging to the mounted /var/log/planmgr directory.
  - Stage 2 polls with `pg_isready -q` (no arguments beyond -q; it targets
    the local default PostgreSQL socket) in a loop bounded at exactly 30
    iterations, sleeping 1 second between attempts, incrementing a counter
    variable named `i`. Reaching 30 iterations without pg_isready succeeding
    prints a message beginning "entrypoint: PostgreSQL did not become
    ready" to standard error and exits the script with status 1.
  - Stage 3 invokes the fixed in-image path /opt/plan_manager_db/init.sh
    with no arguments. This path and script are produced by a sibling
    tactical step and are not created by this AS; this AS only invokes the
    already-present executable at that absolute path.
  - Stage 4 invokes `exec python -m plan_manager.main --config
    /etc/planmgr/config.json` — the `exec` keyword is mandatory so the
    Python process replaces the shell process rather than running as a
    child of it.
  - Do not add any command, stage, option, or comment beyond what is listed
    above.

  MRS excerpt (concept definitions and relations relevant to this AS):

  - concept_id: C-029
    name: ContainerDeployment
    definition: Single container image hosting the server process and its PostgreSQL instance with host-mounted state.
    properties:
    - entrypoint starts PostgreSQL, waits readiness, launches the server
    - fixed mounts /etc/planmgr, /var/planmgr, /var/log/planmgr
    - one exposed port; healthcheck against /health

  - concept_id: C-034
    name: DbInitializer
    definition: Idempotent database initialization commands shipped with the package.
    properties:
    - initdb on empty data directory, role and database creation, schema migrations
    - sole owner of schema DDL as SQL migrations; runtime code never emits DDL
    - refuses to damage an existing database

  - concept_id: C-035
    name: Database
    definition: In-container PostgreSQL with pgvector serving as the single source of truth for all plan data.
    properties:
    - entities as rows; referential integrity at write time
    - every stored entity carries an immutable UUID identity; human-readable ids are scoped names mapped to it
    - hosts the version store, locks, and embedding cache
    - accessed via psycopg 3 with plain SQL; no ORM; runtime code never emits DDL

  - concept_id: C-027
    name: ServerRuntime
    definition: Adapter-owned runtime hosting the command registry, transport, queue, and bootstrap sequence.
    properties:
    - entry point main --config; AppFactory create_app; hypercorn engine
    - adapter owns JSON-RPC, health, commands, heartbeat, OpenAPI surface
    - hook-based registration; auto-import modules for spawned workers
    - long operations use the adapter queue with job semantics
    - implemented in Python 3.12+; production package root plan_manager/ at the repository root, modules as dotted paths beneath it

  Relevant relations:
  - { from_concept: C-029, to_concept: C-035, type: owns }
  - { from_concept: C-029, to_concept: C-027, type: owns }
  - { from_concept: C-034, to_concept: C-035, type: uses }
