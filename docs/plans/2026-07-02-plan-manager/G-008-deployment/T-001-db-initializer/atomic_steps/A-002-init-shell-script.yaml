  type: static_analysis
  target: plan_manager_db/init.sh
  expected: >
    Running "sh -n plan_manager_db/init.sh" reports no syntax errors. The
    file begins with "#!/bin/sh" followed by "set -eu". All five environment
    variables (PGDATA, PLANMGR_DB, PLANMGR_DB_USER, PLANMGR_SECRETS,
    MIGRATIONS_DIR) are assigned with "${VAR:-default}" defaults matching
    the values specified. Exactly one guarded initdb branch exists that
    distinguishes an already-initialized data directory (PG_VERSION present,
    skip), a non-empty non-cluster directory (error exit 1 with the data
    directory message, no initdb or mkdir call reached), and an empty or
    absent directory (mkdir -p then initdb). Exactly one "pg_isready -q"
    check exists guarding a clear stderr error and exit 1 on failure, with
    no call anywhere in the file to pg_ctl or pg_ctlcluster. The secrets
    file is checked with "[ ! -s ... ]" before being read, erroring out on a
    missing or empty file. Role and database creation are each guarded by a
    SELECT-based existence check against pg_roles / pg_database before the
    corresponding CREATE statement runs. schema_migration is created with
    CREATE TABLE IF NOT EXISTS. The migration loop applies each
    "$MIGRATIONS_DIR"/*.sql file exactly once via "psql -1 -f", skipping
    filenames already present in schema_migration, and records each newly
    applied filename in schema_migration immediately after applying it. The
    script's final statement is "exit 0" following a report line that
    includes role_created, db_created, migrations_applied, and
    migrations_skipped counts.
