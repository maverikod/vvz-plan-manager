     c. `key = (step.fields["target_file"], step.parent_step_uuid)`.
     d. `groups.setdefault(key, []).append(node_uuid)`.
     e. `for group_uuids in groups.values():` compute
        `ordered = sorted(group_uuids, key=lambda u: nodes[u].fields["priority"])`.
     f. `for lower_uuid, higher_uuid in zip(ordered, ordered[1:]):` add
        `edges.add((lower_uuid, higher_uuid))`.
  4. `return edges` as the final statement.
