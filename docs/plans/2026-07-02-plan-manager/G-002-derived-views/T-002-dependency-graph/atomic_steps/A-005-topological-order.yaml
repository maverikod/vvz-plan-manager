    def topological_order(
        nodes: dict[uuid.UUID, Step],
        edges: set[tuple[uuid.UUID, uuid.UUID]],
    ) -> tuple[list[uuid.UUID], list[uuid.UUID]]:

  Docstring (Google style, use this exact text and structure):

    """Compute Kahn's topological order with deterministic tie-break.

    At every extraction step, among the nodes currently ready (all
    prerequisites already extracted), the node with the smallest
    tie_break_key(nodes, node_uuid) is extracted next.

    Args:
        nodes: All steps of the plan, keyed by uuid.
        edges: The edge set as returned by build_edges: each edge is
            (prerequisite_uuid, dependent_uuid).

    Returns:
        A 2-tuple (order, cycle_nodes). order is the list of node uuids
        in extraction order. When every node is extracted, cycle_nodes
        is []. When the ready set becomes empty before all nodes are
        extracted, order holds the extracted prefix and cycle_nodes
        holds the remaining (residual) node uuids sorted ascending by
        tie_break_key.
    """

  Implementation constraints, all explicit:
  1. `indegree: dict[uuid.UUID, int] = {u: 0 for u in nodes}`.
  2. `dependents_map: dict[uuid.UUID, list[uuid.UUID]] = {u: [] for u in nodes}`.
  3. `for prereq_uuid, dependent_uuid in edges:` increment
     `indegree[dependent_uuid] += 1` and append
     `dependents_map[prereq_uuid].append(dependent_uuid)`.
  4. `ready = [u for u, deg in indegree.items() if deg == 0]`.
  5. `order: list[uuid.UUID] = []`.
  6. `remaining_indegree = dict(indegree)`.
  7. `while ready:` loop body, in this exact order:
     a. `ready.sort(key=lambda u: tie_break_key(nodes, u))`.
     b. `current = ready.pop(0)`.
     c. `order.append(current)`.
     d. `for dependent_uuid in dependents_map[current]:` decrement
        `remaining_indegree[dependent_uuid] -= 1`; when the result
        `== 0`, `ready.append(dependent_uuid)`.
  8. After the loop: `ordered_set = set(order)`.
  9. `residual = [u for u in nodes if u not in ordered_set]`.
  10. `if not residual: return order, []`.
  11. `residual.sort(key=lambda u: tie_break_key(nodes, u))`.
  12. `return order, residual` as the final statement.
  13. This function calls `tie_break_key`, which is already defined
      above in this same file.
  14. No other functions, statements, or helper definitions are added
      in this AS.
  15. No comments beyond the docstring.

