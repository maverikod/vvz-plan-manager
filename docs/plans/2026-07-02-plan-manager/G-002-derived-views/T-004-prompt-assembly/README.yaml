step_id: T-004
parent_global_step: G-002
name: prompt-assembly
description: >
  Create the Prompt (C-011), the ephemeral assembled executor input for one atomic
  step, implementing the normative assembly algorithm (C-036) exactly. Assembly is
  a pure deterministic function of the plan tree consuming one branch view (C-008):
  concatenation by reference in the fixed order (1) the MRS excerpt holding the
  definitions and relations of exactly the concepts (C-003) the atomic step
  declares, ascending by concept identifier, (2) the HRS slice of the branch in
  document order, (3) the parent global step content, (4) the parent tactical step
  content, (5) the atomic-step delta. The engine resolves declared references
  only; it never adds, drops, or reorders content by judgement, and the same tree
  state yields a byte-identical prompt. The assembled prompt carries a
  deterministic token estimate compared against the plan's user-set context
  budget, reporting the estimate, the budget, and whether the estimate exceeds the
  budget. Prompts are ephemeral: a dump operation materializes the prompts of a
  plan as a derived snapshot for human reading and handoff, and a snapshot is
  never read back as input to any check; the server never executes prompts,
  orchestrates coder models, or tracks code implementation.
concepts: [C-011, C-008, C-003, C-036]
inputs:
- name: branch_view
  type: in-memory derived view
  description: >
    One resolved branch (C-008) holding the atomic step, its parent tactical and
    global steps, and the HRS slice, consumed as the assembly source.
- name: mrs_concept_entries
  type: stored plan data
  description: >
    The MRS concept (C-003) definitions and relations of exactly the concepts the
    atomic step declares, read from the database at assembly time.
- name: context_budget
  type: plan datum
  description: >
    The plan's user-set context budget in tokens against which the assembled
    prompt's token estimate is compared.
outputs:
- name: assembled_prompt
  type: ephemeral text
  description: >
    The byte-identical deterministic concatenation of the five fixed parts for one
    atomic step, produced on demand and never stored.
- name: token_estimate_report
  type: computed measure
  description: >
    The deterministic token estimate of the assembled prompt, the plan's context
    budget, and the exceeds-budget verdict.
- name: prompt_dump_snapshot
  type: derived artifact
  description: >
    The write-only materialization of the plan's assembled prompts as a snapshot
    for human reading and handoff, never read back as input to any check.
atomic_steps: [A-001, A-002, A-003, A-004, A-005, A-006]
status: draft
