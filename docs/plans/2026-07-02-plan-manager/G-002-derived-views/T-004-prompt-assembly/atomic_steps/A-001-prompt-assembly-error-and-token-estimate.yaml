prompt: |
  Target file: plan_manager/views/prompt_assembly.py
  Operation: create_file

  This file does not exist yet. Create it with exactly the following content —
  a module docstring, one exception class, and one function. No other content,
  no other imports, no other symbols.

  Required full content of the file after this step:

  """Deterministic prompt assembly for atomic steps (C-011), per the normative
  assembly algorithm (C-036).
  """


  class PromptAssemblyError(ValueError):
      """Raised when a declared concept_id has no matching concept row in the plan."""


  def token_estimate(text: str) -> int:
      """Deterministic character-based estimate of the token count of text.

      Computed as (len(text) + 3) // 4, per the normative token estimate algorithm.

      Args:
          text: The text to estimate.

      Returns:
          The estimated token count.
      """
      return (len(text) + 3) // 4

  Exact requirements:
  - Module docstring: exactly the two-line text shown above, as a triple-quoted
    string, followed by exactly two blank lines before the class definition.
  - Class PromptAssemblyError: subclasses the built-in ValueError. Body is a
    single-line docstring, exact text: "Raised when a declared concept_id has
    no matching concept row in the plan." No __init__, no other methods, no
    other attributes. Followed by exactly two blank lines before the function.
  - Function signature exactly: def token_estimate(text: str) -> int:
  - Function docstring: exactly the text shown above (summary line, blank
    line, one explanation line, blank line, "Args:" section with one "text:"
    entry, blank line, "Returns:" section with one line), in Google
    docstring style.
  - Function body: exactly one statement, `return (len(text) + 3) // 4`. This
    is the deterministic, normative token-estimate formula for C-011: the
    estimate is a pure function of character length, with no other tokenizer
    or external call involved.
  - No imports of any kind are required or permitted for this file version.
  - No trailing whitespace; end the file with a single trailing newline after
    the last line shown.
  - Do not add a `__all__`, no `if __name__ == "__main__"` block, no other
