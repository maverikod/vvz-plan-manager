acceptance_criteria:
- MISSING_FILE returned when required file does not exist (no editor call)
- call_editor_validate checks result.success before result.status
- result.success=False yields VALIDATE_ERROR (not empty errors list)
- Missing result.success field yields EDITOR_CONTRACT_VIOLATION
- EMPTY_FILE returned when editor reports empty
- STUB_FILE returned when editor reports stub
- HTTP timeout -> EDITOR_TIMEOUT entry (non-fatal, walk continues)
- HTTP failure -> EDITOR_UNAVAILABLE entry (non-fatal, walk continues)
- validate_plan_tree covers all nodes in the tree
