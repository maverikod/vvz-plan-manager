technical_specification_excerpt: "plan_validate(plan_id) -> {errors, count, clean}\n\
  plan_validate_node(plan_id, node_id) -> {errors, count, clean}\nerrors: list of\
  \ {node_id, error_code, message}\nError codes: MISSING_FILE, EMPTY_FILE, STUB_FILE,\
  \ VALIDATE_ERROR,\n             EDITOR_TIMEOUT, EDITOR_UNAVAILABLE, EDITOR_CONTRACT_VIOLATION\n\
  MISSING_FILE: plan_manager checks file existence directly on disk.\nEMPTY_FILE,\
  \ STUB_FILE: from editor.validate_file HTTP call.\n"
editor_identity: 'The editor is yaml_editor MCP server (project yaml_editor,

  project_id: 84ec55c8-cefd-480d-beb6-fa1d35e60362).

  yaml_editor is built on mcp_proxy_adapter and exposes an AbstractFormatter-based

  validate_file HTTP endpoint. For .yaml/.yml files it uses the YAML formatter;

  for other files it uses the text formatter or ForeignFormatter.

  plan_manager does NOT call yaml_editor via MCP; it calls via direct HTTP OpenAPI.

  '
editor_validate_file_contract: "HTTP GET <editor_api_url>/validate?file=<absolute_path>\n\
  \nyaml_editor response shape (nested success semantics from mcp-proxy-adapter):\n\
  \  {\n    \"success\": <bool>,           # top-level transport success\n    \"result\"\
  : {\n      \"success\": <bool>,         # MUST be checked; false = content validation\
  \ failed\n      \"status\": \"present\" | \"empty\" | \"stub\" | \"error\",\n  \
  \    \"message\": \"<str>\",\n      \"diagnostics\": [...]       # optional per-line\
  \ issues from formatter\n    }\n  }\n\nCRITICAL: HTTP 200 alone is NOT success.\n\
  plan_manager MUST check result.success before reading result.status:\n  - result.success=True,\
  \ status=present  -> no error\n  - result.success=True, status=empty    -> EMPTY_FILE\n\
  \  - result.success=True, status=stub     -> STUB_FILE\n  - result.success=True,\
  \ status=error    -> VALIDATE_ERROR (non-blocking warning)\n  - result.success=False\
  \                 -> VALIDATE_ERROR with editor message\n  - Missing result.success\
  \ field         -> EDITOR_CONTRACT_VIOLATION\n  - requests.Timeout             \
  \        -> EDITOR_TIMEOUT\n  - requests.RequestException            -> EDITOR_UNAVAILABLE\n\
  \nHTTP errors and timeouts are non-fatal:\n  Include as an error entry in the errors\
  \ list with the appropriate error_code.\n  Do NOT abort the full validate_plan_tree\
  \ walk.\n"
global_step_context: 'G-001: MCP API surface. plan_manager owns tree walk and existence
  checks.

  Content validation delegated to yaml_editor.validate_file.

  list_children from G-001/T-003/A-001 (nav_shared.py).

  '
tactical_step_context: "T-008: Validate.\nA-001 owns validator helpers in plan_manager/commands/plan_validate.py.\n\
  A-002 owns two command classes in the same file.\n\nHelpers to implement:\n\ncall_editor_validate(file_path:\
  \ Path, editor_api_url: str) -> dict\n  GET editor_api_url/validate?file=str(file_path),\
  \ timeout=5.\n  MUST check nested result.success:\n    result = data.get(\"result\"\
  , {})\n    if \"success\" not in result:\n        return {\"error_code\": \"EDITOR_CONTRACT_VIOLATION\"\
  , \"message\": \"...\"}\n    if not result[\"success\"]:\n        return {\"error_code\"\
  : \"VALIDATE_ERROR\", \"message\": result.get(\"message\", \"\")}\n    return {\"\
  status\": result.get(\"status\"), \"message\": result.get(\"message\", \"\")}\n\
  \  On requests.Timeout:\n      return {\"error_code\": \"EDITOR_TIMEOUT\", \"message\"\
  : \"...\"}\n  On requests.RequestException:\n      return {\"error_code\": \"EDITOR_UNAVAILABLE\"\
  , \"message\": str(e)}\n\nvalidate_node(plans_root, plan_id, node_id, editor_api_url)\
  \ -> list[dict]\n  Resolve required file path. If missing -> [{node_id, MISSING_FILE,\
  \ msg}].\n  Call call_editor_validate. Map status:\n    \"present\"            \
  \  -> []\n    \"empty\"                -> [{node_id, EMPTY_FILE, msg}]\n    \"stub\"\
  \                 -> [{node_id, STUB_FILE, msg}]\n    \"error\"                ->\
  \ [{node_id, VALIDATE_ERROR, msg}]\n    error_code present     -> [{node_id, error_code,\
  \ msg}]\n\nvalidate_plan_tree(plans_root, plan_id, editor_api_url) -> list[dict]\n\
  \  Walk all nodes via list_children recursively.\n  Collect validate_node results\
  \ for each node.\n  Return flat list of all errors.\n"
