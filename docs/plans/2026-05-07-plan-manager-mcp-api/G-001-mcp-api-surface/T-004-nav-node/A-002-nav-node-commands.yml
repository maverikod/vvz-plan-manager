technical_specification_excerpt: 'plan_parent(plan_id, node_id) -> parent node record
  or null

  plan_children(plan_id, node_id) -> list of child node records (empty for leaf)

  plan_next(plan_id, node_id) -> next sibling node record or null

  plan_prev(plan_id, node_id) -> previous sibling node record or null

  All: lock_status in every node record. Disk-read only. No session.

  '
global_step_context: 'G-001: MCP API surface. nav_shared from T-003/A-001. lock_checker
  from T-002/A-001.

  Navigation helpers from T-004/A-001 in same file.

  '
tactical_step_context: "T-004: Navigation node traversal.\nA-002 implements four command\
  \ classes in plan_manager/commands/plan_nav_node.py.\nA-001 (same file) provides\
  \ get_parent_node_id and get_sibling_node_ids.\n\nCommand patterns:\n  plan_parent.execute():\n\
  \    parent_id = get_parent_node_id(node_id)\n    if parent_id is None: return null\n\
  \    return build_node_record(plans_root, plan_id, parent_id, editor_lock_dir)\n\
  \n  plan_children.execute():\n    children = list_children(plans_root, plan_id,\
  \ node_id)\n    return [build_node_record(..., c, ...) for c in children]\n\n  plan_next.execute()\
  \ / plan_prev.execute():\n    _, next_id = get_sibling_node_ids(...)\n    return\
  \ build_node_record for sibling or null\n"
