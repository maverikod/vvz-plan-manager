format: tactical_step
status: pending
step_id: T-004
name: nav-node
title: Navigation -- node traversal
parent_step_id: G-001
parent_step_name: mcp-api-surface
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml
- docs/plans/2026-05-07-plan-manager-mcp-api/G-001-mcp-api-surface/README.yaml
intent: 'Implement read-only single-node traversal commands: plan_parent, plan_children,

  plan_next, plan_prev. These traverse the plan tree relative to a given node_id.

  No session required. Every node response includes lock_status.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  lock_status: 'lock_status from lock_checker.get_lock_status (T-002). Values: locked_by_editor
    or unlocked.

    '
depends_on:
- T-001
- T-002
- T-003
responsibilities:
- plan_parent: return parent node record or null for root
- plan_children: return direct child node records (empty list for leaf)
- plan_next: return next sibling or null at boundary
- plan_prev: return previous sibling or null at boundary
- Return null or empty list for missing relatives; never raise error for boundary
- lock_status in every returned node record
- All commands disk-read only; no writes
owned_code_paths:
- plan_manager/commands/plan_nav_node.py
owned_test_paths:
- tests/test_nav_node.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/nav_shared.py (read-only; owned by T-003)
- plan_manager/lock_checker.py (read-only; owned by T-002)
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: node-navigator
  summary: get_parent_node_id and get_sibling_node_ids helpers
- id: A-002
  name: nav-node-commands
  summary: PlanParentCommand, PlanChildrenCommand, PlanNextCommand, PlanPrevCommand
model_assignment_spec:
  task: 'Implement plan_parent, plan_children, plan_next, plan_prev MCP commands.

    All are disk-read only. Required params: plan_id, node_id.

    Return null or empty list for missing relatives.

    Every node record must include lock_status from lock_checker.

    Use nav_shared utilities from T-003.

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_nav_node.py
  - tests/test_nav_node.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/nav_shared.py (read-only)
  - plan_manager/lock_checker.py (read-only)
  - .venv/
  consumed_contracts:
  - resolve_node_id from T-001 (plan_manager/path_resolver.py)
  - get_lock_status from T-002 (plan_manager/lock_checker.py)
  - build_node_record, list_children from T-003 (plan_manager/commands/nav_shared.py)
  deliverables:
  - PlanParentCommand, PlanChildrenCommand, PlanNextCommand, PlanPrevCommand
  - null for parent of root; empty list for leaf children; null at siblings boundary
  - lock_status in every node record
verification:
- plan_parent of G-level node returns spec node
- plan_parent of root returns null
- plan_children of root returns all G nodes
- plan_next/plan_prev at boundary return null
- lock_status present in all returned records
acceptance_criteria:
- All four commands callable without session
- Boundary cases return null cleanly
- lock_status always present
observations_template:
- Did plan_parent correctly identify the parent node?
- Did plan_children return all direct children?
- Did plan_next/plan_prev handle boundaries correctly with null?
- Was lock_status present in all node records?
