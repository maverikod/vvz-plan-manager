technical_specification_excerpt: "Plan Manager MCP API implements structured-tree\
  \ plan editor. Plans are git repositories on disk.\nNode IDs are stable string identifiers\
  \ mapped to files/directories by numeric prefix.\n\nPath Resolution Rules:\n- spec:\
  \ \"README.md\" (at plan root)\n- G-NNN: \"G-NNN-*/README.md\" (numeric prefix only,\
  \ ignore slug)\n- G-NNN/T-NNN: \"G-NNN-*/T-NNN-*/index.md\" \n- G-NNN/T-NNN/A-NNN:\
  \ \"G-NNN-*/T-NNN-*/A-NNN-*.md\"\n\nResolution uses numeric prefix only. Slug after\
  \ dash ignored for matching.\nTreat duplicate numeric prefixes at any level as validation\
  \ error.\nplans_root configured in server config, NOT passed as MCP command parameter.\n"
global_step_context: 'G-001: MCP API surface

  Define and implement the complete public MCP command surface for plan_manager.

  Node IDs are stable string identifiers mapped to files and directories by numeric
  prefix.

  All other G-001 tactical steps depend on this foundation module for path resolution.

  '
tactical_step_context: 'T-001: Node ID model

  Implement deterministic mapping between public node_id strings and files/directories

  in a plan git repository. Pure utility modules with no MCP dependency.


  T-001 delivers two files:

  - plan_manager/node_id.py: NodeId dataclass, parse_node_id function

  - plan_manager/path_resolver.py: resolve_node_id function with foundation helpers


  Path resolution must handle:

  - Directory scanning with numeric prefix matching

  - Duplicate prefix detection and error reporting

  - File existence validation

  - Cross-platform path operations

  '
atomic_operation: Implement directory scanning and numeric prefix matching utilities
