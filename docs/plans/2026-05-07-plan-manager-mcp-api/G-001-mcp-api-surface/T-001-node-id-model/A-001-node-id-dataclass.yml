technical_specification_excerpt: "Plan Manager MCP API implements structured-tree\
  \ plan editor. Plans are git repositories on disk.\nNode IDs are stable string identifiers\
  \ mapped to files and directories by numeric prefix.\nFramework: mcp_proxy_adapter\
  \ handles routing, validation, serialization, error wrapping.\n\nNode ID Format:\n\
  - spec: \"README.md\" \n- G-NNN: \"G-NNN-*/README.md\"\n- G-NNN/T-NNN: \"G-NNN-*/T-NNN-*/index.md\"\
  \n- G-NNN/T-NNN/A-NNN: \"G-NNN-*/T-NNN-*/A-NNN-*.md\"\n\nResolution uses numeric\
  \ prefix only. Slug after the dash is ignored for matching.\nplans_root configured\
  \ in server config, NOT passed as MCP command parameter.\n"
global_step_context: 'G-001: MCP API surface

  Define and implement the complete public MCP command surface for plan_manager.

  Node IDs are stable string identifiers mapped to files and directories by numeric
  prefix.

  In-memory buffer commands prefixed buf_* distinguish from disk-read navigation commands.

  All other G-001 tactical steps depend on this foundation module for path resolution.

  '
tactical_step_context: 'T-001: Node ID model

  Implement deterministic mapping between public node_id strings and files/directories

  in a plan git repository. Pure utility modules with no MCP dependency.


  Responsibilities:

  - Define node_id grammar for forms: spec, G-NNN, G-NNN/T-NNN, G-NNN/T-NNN/A-NNN

  - Parse and validate node_id strings

  - Resolve node_id to concrete file path using numeric prefix only

  - Treat duplicate numeric prefixes as validation error

  - Accept plans_root as resolved Path from caller (not from MCP params)

  '
