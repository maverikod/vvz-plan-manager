intent: 'Implement the lock-checker module that plan_manager uses to determine whether

  a node or any of its descendants is currently locked by the external editor.

  This check is required before any tree mutation (delete, move).

  plan_manager never creates or removes lock files; it only reads them.

  '
context_from_technical_spec:
  editor_lock_convention: "The editor places a lock file when it opens a file for\
    \ editing.\nLock file path: <editor_lock_dir>/<escaped_file_path>.lock\nwhere\
    \ escaped_file_path replaces path separators with double-underscore.\nLock file\
    \ JSON content: {\"pid\": <int>, \"node_id\": \"<str>\", \"file\": \"<str>\"}\n\
    A node is considered locked when:\n  1. The lock file exists, AND\n  2. os.kill(pid,\
    \ 0) does not raise (process is alive)\nIf the lock file exists but the process\
    \ is dead, the node is treated as unlocked\n(stale lock). plan_manager never cleans\
    \ up stale locks.\n"
  lock_status_values:
    locked_by_editor: lock file exists and PID is alive
    unlocked: no lock file, or lock file exists but PID is dead (stale)
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  editor_lock_dir_convention: 'editor_lock_dir resolved from PlanManagerConfigSection.editor_lock_dir.

    Never passed as MCP command parameter.

    '
depends_on:
- T-001
responsibilities:
- Implement is_node_locked(plans_root, plan_id, node_id, editor_lock_dir) -> bool
- Implement get_lock_status(plans_root, plan_id, node_id, editor_lock_dir) -> str
- Implement check_subtree_unlocked(plans_root, plan_id, node_id, editor_lock_dir)
  raising NODE_LOCKED if node or any descendant is locked
- Determine lock file path from node file path and editor_lock_dir
- Check PID liveness with os.kill(pid, 0)
- Treat stale locks (dead PID) as unlocked
owned_code_paths:
- plan_manager/lock_checker.py
owned_test_paths:
- tests/test_lock_checker.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: lock-checker
  summary: is_node_locked, get_lock_status, check_subtree_unlocked in lock_checker.py
model_assignment_spec:
  task: 'Implement plan_manager/lock_checker.py with three functions:

    is_node_locked, get_lock_status, and check_subtree_unlocked.

    The module reads editor lock files from editor_lock_dir and checks PID liveness.

    It never writes or deletes lock files.

    editor_lock_dir comes from PlanManagerConfigSection, never from MCP params.

    '
  allowed_edit_paths:
  - plan_manager/lock_checker.py
  - tests/test_lock_checker.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/ (any file)
  - .venv/
  consumed_contracts:
  - resolve_node_id from T-001 (plan_manager/path_resolver.py)
  deliverables:
  - is_node_locked(plans_root, plan_id, node_id, editor_lock_dir) -> bool
  - get_lock_status(plans_root, plan_id, node_id, editor_lock_dir) -> str (locked_by_editor
    or unlocked)
  - check_subtree_unlocked(plans_root, plan_id, node_id, editor_lock_dir) raising
    NODE_LOCKED
  - Lock file path formula documented inline
verification:
- is_node_locked returns True when lock file exists and PID is alive
- is_node_locked returns False when lock file does not exist
- is_node_locked returns False when lock file exists but PID is dead
- check_subtree_unlocked raises NODE_LOCKED when any descendant is locked
- check_subtree_unlocked passes when all nodes in subtree are unlocked
acceptance_criteria:
- Stale locks (dead PID) treated as unlocked
- check_subtree_unlocked covers node itself and all descendants
- No lock files are created, modified, or deleted by this module
observations_template:
- Does is_node_locked correctly detect live PID via os.kill?
- Are stale locks (dead PID) correctly treated as unlocked?
- Does check_subtree_unlocked walk all descendants before clearing?
