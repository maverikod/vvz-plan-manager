technical_specification_excerpt: "plan_delete_node(plan_id, node_id) -> {success,\
  \ deleted_node_id, commit_sha}\nplan_move_node(plan_id, node_id, target_node_id)\
  \ -> {success, new_node_id, commit_sha}\nLock check BEFORE any filesystem/git operation:\n\
  \  check_subtree_unlocked(plans_root, plan_id, node_id, editor_lock_dir)\n  Raises\
  \ NODE_LOCKED if any node in subtree is locked.\nNODE_NOT_FOUND if source node does\
  \ not exist.\nMOVE_CONFLICT if destination already exists.\nplans_root and editor_lock_dir\
  \ from config; never from MCP params.\n"
global_step_context: 'G-001: MCP API surface.

  check_subtree_unlocked from G-001/T-002/A-001 (plan_manager/lock_checker.py).

  git helpers from G-001/T-007/A-001 in same file.

  '
tactical_step_context: "T-007: Structure mutate.\nA-002 owns two command classes in\
  \ plan_manager/commands/plan_mutate.py.\nA-001 (same file) provides git_rm_node,\
  \ git_mv_node, resolve_node_path.\n\nplan_delete_node.execute():\n  1. check_subtree_unlocked(plans_root,\
  \ plan_id, node_id, editor_lock_dir)\n  2. node_path = resolve_node_path(plans_root,\
  \ plan_id, node_id)\n  3. If not node_path.exists(): raise NodeNotFoundError\n \
  \ 4. sha = git_rm_node(plan_dir, node_path)\n  5. Return {success: True, deleted_node_id:\
  \ node_id, commit_sha: sha}\n\nplan_move_node.execute():\n  1. check_subtree_unlocked(plans_root,\
  \ plan_id, node_id, editor_lock_dir)\n  2. src = resolve_node_path(plans_root, plan_id,\
  \ node_id)\n  3. dst = resolve_node_path(plans_root, plan_id, target_node_id)\n\
  \  4. If not src.exists(): raise NodeNotFoundError\n  5. If dst.exists(): raise\
  \ MoveConflictError\n  6. sha = git_mv_node(plan_dir, src, dst)\n  7. Return {success:\
  \ True, new_node_id: target_node_id, commit_sha: sha}\n"
