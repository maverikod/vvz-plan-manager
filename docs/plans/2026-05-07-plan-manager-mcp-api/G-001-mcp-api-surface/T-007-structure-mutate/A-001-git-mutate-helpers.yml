technical_specification_excerpt: "plan_delete_node(plan_id, node_id) -> {success,\
  \ deleted_node_id, commit_sha}\nplan_move_node(plan_id, node_id, target_node_id)\
  \ -> {success, new_node_id, commit_sha}\nBoth require lock check before any filesystem/git\
  \ operation.\nNODE_LOCKED if any node in subtree is locked by editor.\nNODE_NOT_FOUND\
  \ if source does not exist.\nMOVE_CONFLICT if destination already exists (plan_move_node).\n\
  plans_root and editor_lock_dir from server config; never from MCP params.\nGit:\n\
  \  plan_delete_node: git rm -r <node_path>; git commit\n  plan_move_node: git mv\
  \ <src> <dst>; git commit\nBoth commit to plan main branch.\n"
global_step_context: 'G-001: MCP API surface. plan_manager owns tree structure.

  lock_checker from G-001/T-002 provides check_subtree_unlocked.

  Lock check must run BEFORE any filesystem or git operation.

  '
tactical_step_context: "T-007: Structure mutate.\nA-001 owns git helper functions\
  \ in plan_manager/commands/plan_mutate.py.\nA-002 owns two command classes in the\
  \ same file.\n\nHelpers to implement:\n\ngit_rm_node(plan_dir, node_path) -> str\n\
  \  node_path: absolute path of node directory or file within plan_dir.\n  subprocess:\
  \ git -C plan_dir rm -r --cached <relative_node_path>\n  subprocess: remove from\
  \ filesystem: shutil.rmtree or os.remove\n  subprocess: git -C plan_dir commit -m\
  \ \"Delete node <node_id>\"\n  Return commit sha.\n\ngit_mv_node(plan_dir, src_path,\
  \ dst_path) -> str\n  src_path, dst_path: absolute paths within plan_dir.\n  subprocess:\
  \ git -C plan_dir mv <rel_src> <rel_dst>\n  subprocess: git -C plan_dir commit -m\
  \ \"Move node <src_id> to <dst_id>\"\n  Return commit sha.\n\nresolve_node_path(plans_root,\
  \ plan_id, node_id) -> Path\n  Use resolve_node_id. Return parent directory for\
  \ G/T level, file path for A level.\n"
