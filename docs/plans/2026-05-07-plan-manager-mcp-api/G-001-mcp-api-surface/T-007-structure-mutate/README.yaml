format: tactical_step
status: pending
step_id: T-007
name: structure-mutate
title: Structure -- delete and move nodes
parent_step_id: G-001
parent_step_name: mcp-api-surface
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml
- docs/plans/2026-05-07-plan-manager-mcp-api/G-001-mcp-api-surface/README.yaml
intent: 'Implement plan_delete_node and plan_move_node: structural mutations on the
  plan tree.

  Both require a lock check before proceeding: if the target node or any of its

  descendants is currently locked by the editor, the operation is rejected.

  plan_delete_node removes the node directory/file and commits via git rm.

  plan_move_node renames/relocates the node and commits via git mv.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  lock_check_requirement: 'Before any structural mutation, call check_subtree_unlocked(plans_root,
    plan_id,

    node_id, editor_lock_dir). If any node in the subtree is locked, raise NODE_LOCKED.

    editor_lock_dir from PlanManagerConfigSection; never from MCP params.

    '
  git_scope: 'plan_delete_node: git rm -r <node_path>; git commit -m "Delete node
    <node_id>"

    plan_move_node: git mv <src_path> <dst_path>; git commit -m "Move node <src> to
    <dst>"

    Both commit to plan main branch.

    '
  node_id_format: 'G-NNN-<slug>/README.md for global; G-NNN-*/T-NNN-<slug>/index.md
    for tactical;

    G-NNN-*/T-NNN-*/A-NNN-<slug>.md for atomic. Numeric prefix preserved on move.

    '
depends_on:
- T-001
- T-002
responsibilities:
- plan_delete_node: check lock, then git rm -r + git commit
- plan_move_node: check lock on source subtree, then git mv + git commit
- Reject with NODE_LOCKED if any node in the subtree is locked by editor
- Reject with NODE_NOT_FOUND if source node does not exist
- Reject with MOVE_CONFLICT if destination already exists
- Return success, affected_node_id, commit_sha
non_goals:
- Moving content between files (editor responsibility)
- Merging or splitting node content
- Any operation that reads or writes file body content
owned_code_paths:
- plan_manager/commands/plan_mutate.py
owned_test_paths:
- tests/test_plan_mutate.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/plan_add.py
- plan_manager/commands/plan_create.py
- plan_manager/lock_checker.py (read-only; owned by T-002)
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: git-mutate-helpers
  summary: git_rm_node and git_mv_node helpers performing filesystem + git operations
- id: A-002
  name: mutate-commands
  summary: PlanDeleteNodeCommand and PlanMoveNodeCommand with lock check
model_assignment_spec:
  task: 'Implement plan_delete_node and plan_move_node MCP commands.

    Both must call check_subtree_unlocked before any filesystem or git operation.

    plan_delete_node: git rm -r + git commit.

    plan_move_node: git mv + git commit. Reject if destination exists.

    plans_root and editor_lock_dir from config; never from params.

    Returns success, affected_node_id, commit_sha.

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_mutate.py
  - tests/test_plan_mutate.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/lock_checker.py (read-only)
  - plan_manager/commands/plan_add.py
  - plan_manager/commands/plan_create.py
  - .venv/
  consumed_contracts:
  - resolve_node_id from T-001 (plan_manager/path_resolver.py)
  - check_subtree_unlocked from T-002 (plan_manager/lock_checker.py)
  deliverables:
  - PlanDeleteNodeCommand with required plan_id and node_id
  - PlanMoveNodeCommand with required plan_id, node_id, target_node_id
  - NODE_LOCKED raised before any git operation when subtree has locked nodes
  - NODE_NOT_FOUND raised when source does not exist
  - MOVE_CONFLICT raised when destination already exists
  - Returns success, affected_node_id, commit_sha
verification:
- plan_delete_node removes node directory from repo and commits
- plan_move_node renames node directory in repo and commits
- Both return NODE_LOCKED when any descendant is locked by editor
- Both raise NODE_NOT_FOUND for missing source
- plan_move_node raises MOVE_CONFLICT when destination exists
acceptance_criteria:
- Lock check runs before any filesystem or git operation
- Exactly one git commit produced per successful mutation
- No file body content is read or written
observations_template:
- Was NODE_LOCKED raised before any git operation when a node was locked?
- Did plan_delete_node correctly remove the node and all descendants?
- Did plan_move_node correctly rename the node directory?
- Was exactly one commit produced per operation?
