technical_specification_excerpt: 'plan_add_global(plan_id, slug) -> {new_node_id,
  created_path, commit_sha}

  plan_add_tactical(plan_id, parent_node_id, slug) -> {new_node_id, created_path,
  commit_sha}

  plan_add_atomic(plan_id, parent_node_id, slug) -> {new_node_id, created_path, commit_sha}

  Creates stub file (# <slug>\n) + git add + git commit on plan main.

  Numeric prefix N auto-allocated (next available in target dir).

  NODE_NOT_FOUND if parent does not exist.

  No lock check (new nodes cannot be locked yet).

  plans_root from server config; never from MCP params.

  Editor fills stub content later via editor.open().

  '
