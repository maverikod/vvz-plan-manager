format: tactical_step
status: pending
step_id: T-006
name: structure-add
title: Structure -- add nodes
parent_step_id: G-001
parent_step_name: mcp-api-surface
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml
- docs/plans/2026-05-07-plan-manager-mcp-api/G-001-mcp-api-surface/README.yaml
intent: 'Implement plan_add_global, plan_add_tactical, plan_add_atomic: commands that

  add new node directories and stub .md files directly to disk in the plan git repo.

  Each command creates a stub file (heading only) and commits it to git main branch.

  No session required. No lock check needed (new nodes have no existing lock).

  The editor fills in the stub content later.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  node_id_format: 'G-NNN-<slug>/README.md for global nodes.

    G-NNN-<slug>/T-NNN-<slug>/index.md for tactical nodes.

    G-NNN-<slug>/T-NNN-<slug>/A-NNN-<slug>.md for atomic nodes.

    Numeric prefixes must be unique within each directory level.

    '
  git_scope: 'plan_add_*: git add <stub_file>; git commit -m "Add node <node_id>"

    Stub content: # <slug>\n (heading only; editor fills body later)

    '
  editor_boundary: 'plan_manager creates stub files. The editor is not involved in
    creation.

    The model will call editor.open() to fill in content after node creation.

    '
  lock_check: 'No lock check needed for add operations. New nodes cannot be locked
    yet.

    The parent node lock_status is informational only; add is not blocked by parent
    lock.

    '
depends_on:
- T-001
responsibilities:
- plan_add_global: create G-NNN-<slug>/ with README.md stub; commit to main
- plan_add_tactical: create T-NNN-<slug>/ with index.md stub under G dir; commit to
    main
- plan_add_atomic: create A-NNN-<slug>.md stub under T dir; commit to main
- Auto-allocate next available numeric prefix within target directory
- Reject with NODE_NOT_FOUND if parent node does not exist
- Return new node_id, created_path, commit_sha
non_goals:
- Vectorization of new stub files is G-004 scope
- Validation of node content is T-008 scope
- Reading or writing file body content beyond the heading stub
owned_code_paths:
- plan_manager/commands/plan_add.py
owned_test_paths:
- tests/test_plan_add.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/plan_create.py
- plan_manager/commands/plan_mutate.py
- plan_manager/vectorization/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: node-template-gen
  summary: allocate_next_prefix and generate_*_stub helpers; commit_addition
- id: A-002
  name: structure-add-commands
  summary: PlanAddGlobalCommand, PlanAddTacticalCommand, PlanAddAtomicCommand
model_assignment_spec:
  task: 'Implement plan_add_global, plan_add_tactical, plan_add_atomic MCP commands.

    All three write a stub file (heading only) to the plan git repo and commit.

    Numeric prefix auto-allocated (next available N in target dir).

    Parent existence checked before creating child.

    plans_root from config; never from params.

    Returns new_node_id, created_path, commit_sha.

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_add.py
  - tests/test_plan_add.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/plan_create.py
  - plan_manager/commands/plan_mutate.py
  - plan_manager/vectorization/
  - .venv/
  consumed_contracts:
  - resolve_node_id from T-001 (plan_manager/path_resolver.py)
  deliverables:
  - Three command classes sharing plan_add.py module
  - Numeric prefix auto-allocated
  - Parent existence check before creating child
  - Returns new_node_id, created_path, commit_sha
  - Stub file content: '# <slug>\n'
verification:
- plan_add_global creates G-NNN-<slug>/README.md and commits to main
- plan_add_tactical creates T-NNN-<slug>/index.md under correct G dir
- plan_add_atomic creates A-NNN-<slug>.md under correct T dir
- Numeric prefixes auto-increment correctly
- Non-existent parent returns NODE_NOT_FOUND
acceptance_criteria:
- All three add commands produce exactly one commit on plan main per call
- Numeric prefix uniqueness enforced within each directory level
- Missing parent rejected with stable error code
observations_template:
- Did plan_add_global create the correct directory and stub file?
- Did plan_add_tactical find and use the correct parent G directory?
- Did plan_add_atomic create the .md stub in the correct T directory?
- Was numeric prefix allocated correctly?
