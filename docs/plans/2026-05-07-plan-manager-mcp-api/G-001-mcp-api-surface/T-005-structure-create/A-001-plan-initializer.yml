technical_specification_excerpt: 'plan_create(plan_id, title?) -> {plan_id, repo_path,
  commit_sha}

  Creates git repo under plans_root/<plan_id>/ with README.md stub and initial commit.

  Stub content: # <title or plan_id>\n (heading only; editor fills body later).

  Reject PLAN_ALREADY_EXISTS if plan_id directory already exists.

  plans_root from server config; never from MCP params.

  Git: git init; git add README.md; git commit -m "Initialize plan"

  Editor is NOT involved; model calls editor.open() separately later.

  '
