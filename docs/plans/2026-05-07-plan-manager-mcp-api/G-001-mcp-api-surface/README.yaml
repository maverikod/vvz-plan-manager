format: global_step
status: pending
step_id: G-001
name: mcp-api-surface
title: MCP API surface
parent_plan: 2026-05-07-plan-manager-mcp-api
parent_step_id: null
intent: 'Define and implement the complete public MCP command surface for plan_manager.

  plan_manager owns tree structure only: node IDs, file paths, navigation, node

  creation/deletion/movement, and validation orchestration.

  File content is the exclusive domain of the external editor MCP server.

  Git is used only for structural commits (add/rm/mv nodes).

  '
depends_on: []
responsibilities:
- Define the node ID grammar, parsing rules, and path resolution
- Implement lock-file check before any tree mutation (delete, move)
- Implement all read-only navigation commands (plan_*)
- Implement plan node creation commands (stub file + git commit)
- Implement plan node deletion and move commands (git rm/mv + lock check)
- Implement plan validation (walk tree + delegate file content check to editor)
non_goals:
- Do not implement buf_* commands (session, buffer, worktree, flush, history, diff)
- Do not read or write file body content directly
- Do not manage editor sessions or advisory locks (editor owns them)
- Do not implement vectorization (G-004)
- Do not implement semantics analysis (G-003)
- Do not implement service diagnostics (G-005)
editor_boundary: 'The editor MCP server is a separate process on the same filesystem.

  plan_manager does NOT call editor commands. The AI model calls both servers.

  plan_manager reads lock files created by the editor to determine lock_status.

  Lock file path convention: <editor_lock_dir>/<node_file_path_escaped>.lock

  Lock file content: JSON {"pid": <int>, "node_id": "<str>", "file": "<str>"}

  plan_manager checks: file exists AND os.kill(pid, 0) succeeds -> locked.

  plan_manager NEVER creates or deletes lock files.

  '
git_scope: "plan_manager commits to git only on structural changes:\n  plan_create\
  \     -> git init; git add README.md; git commit\n  plan_add_*      -> git add <stub>;\
  \ git commit\n  plan_delete_node -> git rm -r <path>; git commit\n  plan_move_node\
  \   -> git mv <src> <dst>; git commit\nContent changes are written by the editor\
  \ (editor.save).\nThe editor may or may not commit content; plan_manager does not\
  \ care.\n"
tactical_decomposition:
- id: T-001
  name: node-id-model
  summary: node ID grammar, parsing, path resolution
- id: T-002
  name: lock-checker
  summary: check editor lock file and PID liveness before any tree mutation
- id: T-003
  name: nav-list-tree
  summary: plan_list, plan_tree, plan_status
- id: T-004
  name: nav-node
  summary: plan_parent, plan_children, plan_next, plan_prev
- id: T-005
  name: structure-create
  summary: plan_create (git init + README.md stub + initial commit)
- id: T-006
  name: structure-add
  summary: plan_add_global, plan_add_tactical, plan_add_atomic (stub file + git add
    + git commit)
- id: T-007
  name: structure-mutate
  summary: plan_delete_node (git rm + commit), plan_move_node (git mv + commit); lock
    check required
- id: T-008
  name: validate
  summary: plan_validate and plan_validate_node; walk tree + call editor.validate_file
    per node
implementation_notes: 'T-001 is the foundation; all other tactical steps depend on
  it.

  T-002 must be implemented before T-007 (structure-mutate requires lock check).

  T-003 and T-004 can be implemented in parallel after T-001.

  T-005 and T-006 can be implemented in parallel after T-001.

  T-007 requires T-001 and T-002.

  T-008 requires T-001 and T-003 (needs tree walk from nav_shared).

  The editor.validate_file call in T-008 is an OpenAPI HTTP call to the editor server;

  the editor_lock_dir and editor_api_url come from PlanManagerConfigSection.

  '
model_assignment_spec: 'Global step: implement the 8 tactical steps in order of dependency.

  Each tactical step contains specific commands and detailed assignment scope.

  The assignment is distributed across tactical README.yaml files under this global
  step.

  '
observations_template:
- Do plan_* navigation commands return lock_status in every node record?
- Are tree mutations (delete, move) rejected when any affected node is locked?
- Does git log show exactly one commit per structural operation?
- Does plan_validate correctly aggregate editor.validate_file results?
