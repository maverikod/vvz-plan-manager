format: global_step
status: pending
step_id: G-005
name: service-diagnostics
title: Service diagnostics
parent_plan: 2026-05-07-plan-manager-mcp-api
parent_step_id: null
intent: 'Provide a single command surface for observing service state: vectorization

  progress per plan, git repository health, and background worker status.

  Session tracking is not part of plan_manager (sessions belong to the editor).

  All commands are read-only and require no session.

  '
scope_distinction: 'plan_service_status (T-003) is the service-level diagnostic command.

  It aggregates health data across all plans and the running service.

  plan_status (G-001/T-003) is a navigation command for per-node fill status.

  Do not confuse the two.

  '
depends_on:
- G-001
- G-004
responsibilities:
- Collect per-plan node counts and vectorization coverage
- Collect git repository health metrics per plan
- Collect background worker state from G-004/T-002
- Expose lock file count per plan (how many nodes currently locked by editor)
- Aggregate into plan_service_status MCP command
non_goals:
- Session tracking (no sessions in plan_manager; editor owns them)
- Detailed per-session lock information (lock_status on individual nodes is provided
  by navigation commands in G-001)
tactical_decomposition:
- id: T-001
  name: plan-stats
  summary: node counts by level, vectorization coverage, lock file count per plan
- id: T-002
  name: git-health
  summary: repo size, loose objects, last commit timestamp per plan
- id: T-003
  name: status-command
  summary: plan_service_status MCP command aggregating plan-stats, git-health, worker
    state
implementation_notes: 'T-001 and T-002 are pure data-access modules with no MCP command.

  T-003 is the only MCP command in G-005; it calls T-001 and T-002 collectors

  plus reads worker state from G-004/T-002 (VectorizationWorker).

  Lock file count in T-001: count .lock files in editor_lock_dir matching this plan''s
  files.

  '
model_assignment_spec: 'Implement T-001, T-002 as pure collectors, then T-003 as the
  aggregating command.

  '
observations_template:
- Does plan_service_status return plan-stats, git-health, and worker-status sections?
- Does plan_stats correctly report vectorization coverage (vectorized/outdated/missing)?
- Does lock_file_count in plan_stats reflect actual editor lock files for that plan?
- Is plan_service_status clearly distinct from plan_status by name and schema?
summary: 'Provide a single command surface for observing service state: plan node

  counts and vectorization coverage (via code_analysis DB), git repository

  health per plan, and code_analysis DB connectivity status.

  No session tracking (sessions are the editor''s domain).

  All commands are read-only and require no session.

  '
