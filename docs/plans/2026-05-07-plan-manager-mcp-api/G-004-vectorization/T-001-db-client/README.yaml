model_assignment_spec:
  task: "Implement plan_manager/code_analysis_client.py.\nCodeAnalysisDbClient(config:\
    \ PlanManagerConfigSection):\n  connect() -> opens psycopg3 connection\n  execute_query(sql:\
    \ str, params: tuple) -> list[dict]\n  close() -> closes connection\nConnection\
    \ built from DSN or individual fields.\nPassword resolved from env var if code_analysis_db_password_env\
    \ is set.\nNo writes. No MCP command here.\n"
  allowed_edit_paths:
  - plan_manager/code_analysis_client.py
  - tests/test_code_analysis_client.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/
  - .venv/
