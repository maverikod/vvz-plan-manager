  deliverables:
  - CodeAnalysisDbClient class with connect/execute_query/close
  - DB_UNAVAILABLE exception when connection fails
  - Returns rows as list[dict]
verification:
- execute_query returns correct rows for a known SELECT query
- connect raises DB_UNAVAILABLE when postgres is unreachable
- Password correctly resolved from environment variable
- No writes accepted (SELECT-only enforcement)
acceptance_criteria:
- Read-only connection established from config
- execute_query returns list of dicts
- No MCP command created in this step
observations_template:
