intent: 'Implement CodeAnalysisDbClient: a thin read-only psycopg3 client for the

  code_analysis postgres database. Provides execute_query() and close().

  All operations are SELECT-only. Connection config comes from PlanManagerConfigSection.

  This client is shared by G-003 (semantic search/duplicates) and G-005 (diagnostics).

  '
context_from_technical_spec:
  framework: 'No MCP command in this step. Pure utility module.

    Do not patch mcp_proxy_adapter internals.

    '
  config_system: "Connection config from PlanManagerConfigSection (G-006/T-001):\n\
    \  code_analysis_db_dsn: optional DSN string (takes priority if set)\n  code_analysis_db_host:\
    \ default localhost\n  code_analysis_db_port: default 5432\n  code_analysis_db_name:\
    \ required database name\n  code_analysis_db_user: default postgres\n  code_analysis_db_password_env:\
    \ env var name for password\nUse psycopg3 (psycopg package). Read-only: no INSERT/UPDATE/DELETE/DDL.\n"
depends_on:
- G-006/T-001
responsibilities:
- Implement CodeAnalysisDbClient with connect(config), execute_query(sql, params),
  close()
- Build psycopg3 connection from DSN or individual config fields
- Resolve password from env var when code_analysis_db_password_env is set
- All queries are SELECT-only; raise if DDL or DML attempted (guard optional)
- Return rows as list of dicts
- No MCP command in this step
