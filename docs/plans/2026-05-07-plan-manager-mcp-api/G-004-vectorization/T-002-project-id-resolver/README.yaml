format: tactical_step
status: pending
step_id: T-002
name: project-id-resolver
title: Plan project_id resolver
parent_step_id: G-004
parent_step_name: code-analysis-client
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml
- docs/plans/2026-05-07-plan-manager-mcp-api/G-004-vectorization/README.yaml
intent: 'Implement resolve_plan_project_id: given plans_root, find the code_analysis

  project UUID that corresponds to the plan_manager project (the project whose

  root_path matches the plans_root parent or the plans_root directory itself).

  This UUID is used by G-003 and G-005 to scope all DB queries to the correct

  code_analysis project.

  '
context_from_technical_spec:
  code_analysis_db: "The code_analysis DB has a projects table:\n  SELECT id, root_path\
    \ FROM projects WHERE deleted = false\nplan_manager is registered as a project\
    \ with root_path =\n/home/vasilyvz/projects/tools/plan_manager (or similar).\n\
    Plans are stored under plans_root which is inside the plan_manager project.\n\
    So: resolve by SELECT id FROM projects WHERE root_path = <plan_manager_root_path>.\n\
    plan_manager_root_path can be derived from plans_root config by walking up\nuntil\
    \ a match is found in the projects table, or by explicit config field.\n"
  plans_root_convention: 'plans_root from PlanManagerConfigSection; never from MCP
    params.

    plan_manager_project_id resolved once at startup and cached.

    '
depends_on:
- G-004/T-001
responsibilities:
- Query code_analysis DB projects table to find project UUID for plan_manager
- Cache result at startup to avoid repeated DB queries on every search
- Raise PROJECT_NOT_REGISTERED if no matching project found
- No MCP command in this step
owned_code_paths:
- plan_manager/code_analysis_client.py
owned_test_paths:
- tests/test_code_analysis_client.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: project-id-resolver
  summary: resolve_plan_project_id(plans_root, client) -> UUID; startup cache
model_assignment_spec:
  task: 'Add resolve_plan_project_id function to plan_manager/code_analysis_client.py.

    resolve_plan_project_id(plans_root: Path, client: CodeAnalysisDbClient) -> str
    (UUID).

    Query: SELECT id, root_path FROM projects WHERE deleted = false.

    Match: find the project whose root_path is a parent of plans_root or equals plans_root.

    Raise PROJECT_NOT_REGISTERED if no match found.

    Cache result in a module-level dict keyed by plans_root string.

    No MCP command. Added to same file as T-001.

    '
  allowed_edit_paths:
  - plan_manager/code_analysis_client.py
  - tests/test_code_analysis_client.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/
  - .venv/
  consumed_contracts:
  - CodeAnalysisDbClient from G-004/T-001 (plan_manager/code_analysis_client.py)
  deliverables:
  - resolve_plan_project_id(plans_root, client) -> str UUID
  - PROJECT_NOT_REGISTERED exception when no match found
  - Module-level cache keyed by plans_root string
verification:
- resolve_plan_project_id returns correct UUID for known plans_root
- PROJECT_NOT_REGISTERED raised when plans_root has no matching project
- Result is cached after first successful resolution
acceptance_criteria:
- Correct project UUID returned for plans_root
- No repeated DB queries after first successful resolution
- No MCP command created in this step
observations_template:
- Did resolve_plan_project_id return the correct project UUID?
- Was PROJECT_NOT_REGISTERED raised when no project matched plans_root?
- Was the result cached after first call?
