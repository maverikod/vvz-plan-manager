format: tactical_step
status: pending
step_id: T-001
name: plan-search
title: Semantic plan search
parent_step_id: G-003
parent_step_name: semantic-analysis
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml (technical_spec.node_id_format,
  technical_spec.plans_root_convention, technical_spec.config_system)
- docs/plans/2026-05-07-plan-manager-mcp-api/G-003-semantic-analysis/README.yaml
intent: 'Implement plan_search: a semantic search command that proxies to the

  code_analysis semantic_search HTTP API, filters results to the target

  plan directory, and maps file_path back to node_id via path_resolver.

  No vectorization or embedding in plan_manager - code_analysis owns that.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping.

    Command classes implement get_schema(), validate_params(), execute(), get_metadata().

    Do not patch mcp_proxy_adapter internals.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  code_analysis_integration: "plan_search calls code_analysis HTTP OpenAPI endpoint:\n\
    POST <code_analysis_api_url>/api/jsonrpc\nbody: {\"jsonrpc\":\"2.0\",\"method\"\
    :\"semantic_search\",\n       \"params\":{\"project_id\":<plan_manager_project_id>,\"\
    query\":<query>,\"limit\":<limit*3>}}\nNested success semantics: HTTP 200 is NOT\
    \ success alone.\nMust check result.success == True before reading result.data.results.\n\
    Filter results: keep only items where file_path contains plans_root/<plan_id>/.\n\
    Map file_path to node_id using resolve_node_id from G-001/T-001.\ncode_analysis_api_url\
    \ from PlanManagerConfigSection; never from MCP params.\nplan_manager_project_id\
    \ from resolve_plan_project_id (G-004/T-002).\n"
depends_on:
- G-001/T-001
- G-004/T-001
- G-004/T-002
responsibilities:
- Call code_analysis semantic_search HTTP API with plan_manager project_id
- Filter results to plans_root/<plan_id>/ path prefix
- Map each matching file_path to node_id using path_resolver
- Return list of {node_id, score, chunk_text, source_lines_start, source_lines_end,
  file_path}
- Handle code_analysis API errors non-fatally (return error with SEARCH_UNAVAILABLE)
- Disk-read only; no session required
owned_code_paths:
- plan_manager/commands/plan_search.py
owned_test_paths:
- tests/test_plan_search.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/nav_shared.py
- plan_manager/similarity.py
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: search-proxy
  summary: HTTP call to code_analysis semantic_search; response parsing and error
    handling
- id: A-002
  name: result-filter-map
  summary: filter by plan path, map file_path to node_id, build result records
- id: A-003
  name: plan-search-command
  summary: PlanSearchCommand MCP command class
model_assignment_spec:
  task: 'Implement plan_search MCP command in plan_manager/commands/plan_search.py.

    Required params: plan_id, query. Optional: limit (default 10, max 50).

    Call code_analysis HTTP API (semantic_search), filter results to plan path,

    map file_path to node_id. Return list of search hits.

    code_analysis_api_url and plans_root from PlanManagerConfigSection.

    plan_manager_project_id from resolve_plan_project_id (G-004/T-002).

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_search.py
  - tests/test_plan_search.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/nav_shared.py
  - plan_manager/similarity.py
  - .venv/
  consumed_contracts:
  - resolve_node_id from G-001/T-001 (plan_manager/path_resolver.py)
  - CodeAnalysisDbClient from G-004/T-001 (plan_manager/code_analysis_client.py)
  - resolve_plan_project_id from G-004/T-002 (plan_manager/code_analysis_client.py)
  - 'code_analysis HTTP API: POST <code_analysis_api_url>/api/jsonrpc -> semantic_search'
  deliverables:
  - PlanSearchCommand with required plan_id and query, optional limit (1-50, default
    10)
  - Returns list of {node_id, score, chunk_text, source_lines_start, source_lines_end,
    file_path}
  - SEARCH_UNAVAILABLE error when code_analysis API is unreachable (non-fatal)
  - Empty list when no results match the plan path filter
verification:
- plan_search returns results with node_ids from the correct plan directory
- plan_search returns empty list when no chunks match plan path
- plan_search returns SEARCH_UNAVAILABLE when code_analysis API is down
- node_ids in results resolve correctly via path_resolver
- No writes to disk during search
acceptance_criteria:
- All returned node_ids are valid for the requested plan_id
- Results ranked by score descending
- No session required; disk-read only
- code_analysis API errors do not crash the command
observations_template:
- Did plan_search return results with correct node_ids from the plan?
- Were results correctly filtered to the plan path?
- Was SEARCH_UNAVAILABLE returned cleanly when code_analysis was unreachable?
- Were results ranked by score descending?
