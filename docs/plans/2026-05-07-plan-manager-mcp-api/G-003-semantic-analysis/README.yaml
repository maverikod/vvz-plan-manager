format: global_step
status: pending
step_id: G-003
name: semantic-analysis
title: Semantic analysis
parent_plan: 2026-05-07-plan-manager-mcp-api
parent_step_id: null
intent: 'Implement semantic search and duplicate detection for plan nodes.

  Vectorization and chunking are NOT owned by plan_manager - they are performed

  by the code_analysis background worker which indexes all files under plans_root.

  plan_manager only reads from the code_analysis postgres database via the

  read-only DB client from G-004, and maps file_path results back to node_ids.

  '
depends_on:
- G-001
- G-004
responsibilities:
- 'plan_search: given query text, proxy to code_analysis semantic_search via HTTP,
  filter results to plan path, map file_path to node_id'
- 'plan_find_duplicates: load chunk embeddings from code_analysis DB for the plan,
  compute cosine similarity matrix in numpy, return pairs above threshold'
non_goals:
- Do not implement vectorization or chunking (owned by code_analysis worker)
- Do not maintain .vec files or any embedding files in the plan git repo
- Do not run an embedding service or call embed_url directly
- Do not implement a FAISS index (owned by code_analysis)
code_analysis_integration:
  search_strategy: 'plan_search calls code_analysis HTTP API: GET <code_analysis_api_url>/api/jsonrpc

    with command semantic_search(project_id=<plan_manager_project_id>, query, limit).

    Results are filtered to file_path containing plans_root/<plan_id>/.

    file_path is then mapped to node_id via path_resolver (G-001/T-001).

    '
  duplicate_strategy: "plan_find_duplicates queries code_analysis postgres DB directly:\n\
    SELECT chunk_uuid, embedding_vector, file_path FROM code_chunks\nJOIN files ON\
    \ files.id = code_chunks.file_id\nWHERE files.project_id = <plan_manager_project_id>\n\
    \  AND files.path LIKE '%/<plan_id>/%'\n  AND embedding_vector IS NOT NULL\nThen\
    \ builds cosine similarity matrix in numpy over loaded vectors.\nNo FAISS needed\
    \ at plan scale (hundreds of nodes at most).\n"
  project_id_source: 'plan_manager_project_id is resolved once at startup from the
    code_analysis

    projects table by matching root_path to plans_root parent directory.

    Resolved by G-004/T-002 (resolve_plan_project_id).

    '
tactical_decomposition:
- id: T-001
  name: plan-search
  summary: 'plan_search: HTTP proxy to code_analysis semantic_search, file_path filter,
    node_id mapping'
- id: T-002
  name: plan-find-duplicates
  summary: 'plan_find_duplicates: read embedding_vector from code_analysis DB, numpy
    cosine similarity, threshold filter'
implementation_notes: 'T-001 and T-002 can be implemented in parallel after G-004
  is complete.

  Both depend on G-004/T-002 (project_id resolver) and G-001/T-001 (node_id/path resolver).

  code_analysis_api_url comes from PlanManagerConfigSection (G-006/T-001).

  '
observations_template:
- Does plan_search return node_ids from the correct plan directory?
- Does plan_search correctly map file_path back to node_id using path_resolver?
- Does plan_find_duplicates correctly load embedding_vector TEXT from DB and parse
  as float32?
- Are duplicate pairs correctly ranked by cosine similarity score?
