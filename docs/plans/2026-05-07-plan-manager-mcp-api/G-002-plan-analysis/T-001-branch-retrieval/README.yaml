format: tactical_step
status: pending
step_id: T-001
name: branch-retrieval
title: Branch retrieval
parent_step_id: G-002
parent_step_name: plan-analysis
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml (technical_spec.node_id_format,
  technical_spec.plans_root_convention, technical_spec.framework)
- docs/plans/2026-05-07-plan-manager-mcp-api/G-002-plan-analysis/README.yaml
intent: 'Implement plan_branch: given a plan_id and node_id, return the full branch

  context for that node. The branch context is the ordered list of ancestor nodes

  from the plan spec (root README.md) down to and including the requested node.

  This is the primary input assembly command for AI executors working on a

  specific atomic step.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping. Command classes implement get_schema(), validate_params(), execute(),
    get_metadata(). Do not patch mcp_proxy_adapter internals.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
  node_id_format: 'spec -> G-NNN -> G-NNN/T-NNN -> G-NNN/T-NNN/A-NNN is the ancestor
    chain. spec maps to README.md at plan root. G maps to G-NNN-*/README.md, etc.

    '
depends_on:
- G-001/T-001
- G-001/T-003
responsibilities:
- Resolve node_id to its concrete path in the plan repo
- Walk ancestor chain from spec to node_id (spec -> G -> T -> A as applicable)
- Read and return the content of each ancestor node file
- Include lock_status for each node in the chain
- Return the chain as an ordered list of {node_id, file_path, content, lock_status}
- Disk-read only; no session required
owned_code_paths:
- plan_manager/commands/plan_branch.py
owned_test_paths:
- tests/test_plan_branch.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/buf_open.py
- plan_manager/commands/buf_flush.py
- plan_manager/vectorization/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: ancestor-walker
  summary: walk up dependency chain from node to spec root
- id: A-002
  name: branch-command
  summary: plan_branch command class
model_assignment_spec:
  task: 'Implement plan_branch MCP command for Plan Manager. Required params: plan_id,

    node_id. Returns an ordered list of ancestor context records from spec (root

    README.md) down to the requested node. Each record contains node_id, file_path

    relative to plan repo, content string, and lock_status. Disk-read only.

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_branch.py
  - tests/test_plan_branch.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/buf_open.py
  - plan_manager/commands/buf_flush.py
  - plan_manager/vectorization/
  - .venv/
  consumed_contracts:
  - resolve_node_id from G-001/T-001 (plan_manager/path_resolver.py)
  - list_children and build_node_record from G-001/T-003 (plan_manager/commands/nav_shared.py)
  deliverables:
  - PlanBranchCommand with required plan_id and node_id
  - Returns list of {node_id, file_path, content, lock_status} in ancestor order
  - spec (README.md) always first in list
  - Requested node always last in list
verification:
- plan_branch for a G node returns [spec, G]
- plan_branch for a T node returns [spec, G, T]
- plan_branch for an A node returns [spec, G, T, A]
- lock_status present in every chain record
acceptance_criteria:
- Chain is always in ancestor-first order
- Content of each ancestor file is included
- No session required; disk-read only
observations_template:
- Did plan_branch return the correct ancestor chain for each node level?
- Is spec always the first element and requested node always the last?
- Is lock_status present in all chain records?
