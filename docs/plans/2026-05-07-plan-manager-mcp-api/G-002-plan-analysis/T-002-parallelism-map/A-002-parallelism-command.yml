technical_specification_excerpt: 'Plan Manager MCP API - plan_parallelism command:

  plan_parallelism(plan_id, root_node_id?) -> {waves, cycle_error}

  - plan_id: string, required

  - root_node_id: string, optional, limits analysis scope to subtree

  - waves: list of lists of node_ids in topological order

  - cycle_error: null or {nodes: [node_id, ...]} when cycle detected

  - Disk-read only; no session required

  - plans_root from server config; never from MCP command params

  '
global_step_context: 'G-002: Plan analysis.

  plan_parallelism is the public MCP command for dependency wave analysis.

  DAG library provided by G-002/T-002/A-001 in plan_manager/dep_graph.py.

  Node ID resolution from G-001/T-001 (plan_manager/path_resolver.py).

  '
tactical_step_context: "T-002: Parallelism map.\nThis atomic step A-002 owns plan_manager/commands/plan_parallelism.py.\n\
  A-001 owns plan_manager/dep_graph.py (the DAG library).\n\nConsumed contracts:\n\
  \  DAGBuilder, topological_waves, read_node_depends_on from plan_manager/dep_graph.py\
  \ (A-001)\n  resolve_node_id from plan_manager/path_resolver.py (G-001/T-001)\n\n\
  execute() workflow:\n  1. Resolve plans_root from server config\n  2. Walk all nodes\
  \ in plan (optionally scoped to root_node_id subtree)\n  3. For each node: read\
  \ depends_on via read_node_depends_on\n  4. Build DAG using DAGBuilder\n  5. Try\
  \ topological_waves(dag):\n     On success: return {waves: waves, cycle_error: null}\n\
  \     On DependencyCycleError: return {waves: [], cycle_error: {nodes: error.nodes}}\n"
