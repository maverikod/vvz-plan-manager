format: tactical_step
status: pending
step_id: T-002
name: parallelism-map
title: Parallelism map
parent_step_id: G-002
parent_step_name: plan-analysis
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml (technical_spec.node_id_format,
  technical_spec.plans_root_convention, technical_spec.framework)
- docs/plans/2026-05-07-plan-manager-mcp-api/G-002-plan-analysis/README.yaml
intent: 'Implement plan_parallelism: analyse the dependency edges declared across
  plan

  nodes and return groups of nodes that can be executed in parallel. The result

  is a list of parallel waves, where each wave is a set of node_ids with no

  mutual dependencies. Disk-read only; no session required.

  '
context_from_technical_spec:
  framework: 'mcp_proxy_adapter handles routing, validation, serialization, error
    wrapping. Command classes implement get_schema(), validate_params(), execute(),
    get_metadata(). Do not patch mcp_proxy_adapter internals.

    '
  plans_root_convention: 'plans_root resolved from server config; never from MCP command
    params.

    '
depends_on:
- G-001/T-001
- G-002/T-001
responsibilities:
- Parse depends_on fields from node files across the plan
- Build a dependency graph (DAG) over node_ids
- Compute topological sort and group into parallel waves
- Return ordered list of waves, each wave a list of node_ids
- Detect and report cycles as DEPENDENCY_CYCLE error
- Disk-read only; no session required
owned_code_paths:
- plan_manager/commands/plan_parallelism.py
- plan_manager/dep_graph.py
owned_test_paths:
- tests/test_plan_parallelism.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- plan_manager/commands/buf_open.py
- plan_manager/commands/buf_flush.py
- plan_manager/vectorization/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: dependency-analyzer
  summary: analyze depends_on edges, build dependency graph
- id: A-002
  name: parallelism-command
  summary: plan_parallelism command class
model_assignment_spec:
  task: 'Implement plan_parallelism MCP command and dep_graph.py module for Plan Manager.

    Required params: plan_id. Optional: root_node_id (limit scope). Reads depends_on

    from node files, builds a DAG, computes parallel wave groups via topological sort.

    Returns {waves: [[node_id, ...], ...], cycle_error: null | {nodes: [...]}}.

    Disk-read only.

    '
  allowed_edit_paths:
  - plan_manager/commands/plan_parallelism.py
  - plan_manager/dep_graph.py
  - tests/test_plan_parallelism.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - plan_manager/commands/buf_open.py
  - plan_manager/commands/buf_flush.py
  - plan_manager/vectorization/
  - .venv/
  consumed_contracts:
  - resolve_node_id from G-001/T-001 (plan_manager/path_resolver.py)
  deliverables:
  - PlanParallelismCommand with required plan_id and optional root_node_id
  - dep_graph.py with DAGBuilder and topological_waves() function
  - DEPENDENCY_CYCLE error with involved node list
  - Returns waves list (each wave a list of independent node_ids)
verification:
- plan_parallelism returns correct wave groups for a plan with known deps
- Cycle detection returns DEPENDENCY_CYCLE with the cycle node list
- Nodes with no depends_on appear in wave 1
acceptance_criteria:
- Wave ordering is valid (all deps of wave N appear in waves before N)
- Cycle detection is correct and reports all nodes in the cycle
- No session required; disk-read only
observations_template:
- Did plan_parallelism produce correct wave groupings?
- Did cycle detection fire correctly for a plan with circular deps?
- Were nodes with no depends_on placed in wave 1?
