technical_specification_excerpt: 'Plan Manager MCP API - plan_parallelism:

  - Reads depends_on fields from node files across the plan

  - Builds a dependency DAG over node_ids

  - Computes topological sort grouped into parallel waves

  - Returns ordered list of waves; each wave is a list of independent node_ids

  - Detects cycles and returns DEPENDENCY_CYCLE error with involved nodes

  - Disk-read only; no session required

  - plans_root from server config; never from MCP command params

  '
global_step_context: 'G-002: Plan analysis.

  plan_parallelism analyses dependency edges across plan nodes.

  dep_graph.py is the shared DAG library; plan_parallelism.py is the MCP command.

  Node ID resolution provided by G-001/T-001 (plan_manager/path_resolver.py).

  '
