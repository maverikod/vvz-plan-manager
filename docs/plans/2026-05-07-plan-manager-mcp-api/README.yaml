format: plan_root
status: in_progress
plan_id: 2026-05-07-plan-manager-mcp-api
plan_name: Plan Manager MCP API
created: '2026-05-07'
source_plan: docs/plans/2026-05-06-plan-manager-mcp-api
technical_spec:
  summary: "Implement the Plan Manager MCP API as a structured-tree plan editor.\n\
    Plans are git repositories on disk. plan_manager owns the tree structure:\nnode
    creation, deletion, movement, navigation, and validation.\nFile content is owned
    by the external editor MCP server (separate process,\nshared filesystem). plan_manager
    never reads or writes file content directly\nexcept to create stub files on node
    addition. Git is used only for structural\noperations: git add/rm/mv/commit when
    nodes are created, deleted, or moved.\nAll commands are built on mcp_proxy_adapter.\n"
  framework: mcp_proxy_adapter
  framework_responsibilities:
  - validates incoming JSON-RPC params against get_schema()
  - generates usage examples from get_schema() via _generate_examples()
  - builds help output from name, descr, get_schema(), get_metadata()
  - routes requests to execute() and serializes result via to_dict()
  - handles all error wrapping into JSON-RPC 2.0 format
  - registers the service in the proxy at startup via registration section in 
    JSON config
  command_class_responsibilities:
  - correct class attributes and schema
  - get_metadata() for AI discovery (separate from schema)
  - validate_params() for semantic checks beyond schema
  - execute() returning SuccessResult or ErrorResult
  node_id_format:
    spec: README.md
    G-001: G-001-*/README.md
    G-001/T-002: G-001-*/T-002-*/index.md
    G-001/T-002/A-003: G-001-*/T-002-*/A-003-*.md
  vector_file_convention: "Vectorization and chunking of plan .yaml/.md files is performed
    by the\ncode_analysis background worker, which indexes all files under plans_root\n\
    as part of the plan_manager project. plan_manager does NOT produce .vec\nfiles.
    Chunk embeddings are read from the code_analysis postgres DB via\nCodeAnalysisDbClient
    (G-004) when plan_search or plan_find_duplicates is called.\n"
  plans_root_convention: "plans_root is configured once in the server config (PlanManagerConfigSection.plans_root,\n\
    default ./plans) and is NOT passed as a parameter in any MCP command.\nAll commands
    resolve plans_root from config automatically.\n"
  editor_integration:
    role: "The editor is yaml_editor — a separate MCP server (yaml_editor project,\n\
      project_id: 84ec55c8-cefd-480d-beb6-fa1d35e60362) on the same filesystem.\n\
      plan_manager does NOT call the editor directly via MCP. The AI model uses both\n\
      MCP servers simultaneously. plan_manager communicates with yaml_editor only\n\
      through direct HTTP OpenAPI calls to editor_api_url.\n"
    editor_identity: "yaml_editor MCP server. Project root: /home/vasilyvz/projects/tools/yaml_editor.\n\
      Built on mcp_proxy_adapter. Provides AbstractFormatter-based formatters\nfor
      text (.txt, .md) and YAML (.yaml, .yml) content.\n"
    editor_commands:
    - open
    - save
    - save_as
    - close
    - copy
    - cut
    - paste
    - find
    - find_one
    - list
    - validate_file
    boundary: "File existence and tree structure: plan_manager responsibility.\nFile
      content (read, write, history, undo/redo, clipboard): editor responsibility.\n\
      plan_validate and plan_status delegate per-file content checks to editor.validate_file.\n"
    validate_file_contract:
      description: "plan_manager calls editor.validate_file(file_path) via HTTP GET
        to check file content.\nThe editor uses its YAML formatter (AbstractFormatter.validate_content)
        internally.\nThe response follows nested success/error semantics from mcp-proxy-adapter:\n\
        \  - Transport HTTP 200 alone is NOT success.\n  - Must check nested result.success
        field.\n  - result.success=false -> local failure with editor error code.\n\
        \  - Missing result.success -> FOREIGN_FORMATTER_CONTRACT_VIOLATION.\n  -
        Timeout -> EDITOR_TIMEOUT.\n  - HTTP/transport failure -> EDITOR_UNAVAILABLE.\n"
      http_call: GET <editor_api_url>/validate?file=<absolute_path>
      response_shape:
        success: bool (top-level transport success)
        result:
          success: bool (MUST be checked; false = content validation failed)
          status: present | empty | stub | error
          message: human-readable explanation
          diagnostics: optional list of per-line diagnostics from formatter
      status_to_error_code:
        present: no error
        empty: EMPTY_FILE
        stub: STUB_FILE
        error: VALIDATE_ERROR (non-blocking warning)
      error_handling: "HTTP errors and timeouts are non-fatal for plan_validate and
        plan_status.\nReturn EDITOR_UNAVAILABLE or EDITOR_TIMEOUT in node error_code;\n\
        do not abort the full validation walk. Log and continue."
    lock_convention: "When the editor opens a file it places a lock file at a well-known
      path.\nThe lock file contains the PID of the editor process.\nplan_manager checks
      for this lock file and whether the PID is alive before\nany mutation that would
      affect a locked node or its descendants.\nIf the node or any descendant is locked,
      the mutation is rejected with\nNODE_LOCKED error. plan_manager never creates
      or removes lock files.\n"
    git_scope: "plan_manager uses git only for structural commits:\n  - plan_create:
      git init + initial commit with README.md stub\n  - plan_add_global/tactical/atomic:
      git add <stub_file> + git commit\n  - plan_delete_node: git rm -r <node_path>
      + git commit\n  - plan_move_node: git mv <src> <dst> + git commit\nContent changes
      (file body) are written by the editor via editor.save.\nThe editor is responsible
      for committing content if it integrates with git;\nplan_manager does not commit
      content changes.\n"
  scope:
  - stable node identifiers mapped to plan files and directories
  - lock-aware tree mutation (delete, move) guarded by editor lock check
  - read-only navigation with lock_status on every node
  - creation of plan nodes (stub files committed to git)
  - validation of plan structure (node existence) and content (via 
    editor.validate_file)
  - semantic search over plan nodes via code_analysis semantic_search proxy 
    (plan_search)
  - semantic duplicate detection via cosine similarity of chunk embeddings from 
    code_analysis DB
  - service diagnostics for vectorization coverage, git health, and 
    code_analysis DB connectivity
  config_system:
    format: JSON only
    adapter_components:
    - 'ConfigLoader: core/config/config_loader.py'
    - 'SimpleConfigGenerator: core/config/simple_config_generator.py'
    - 'SimpleConfigValidator: core/config/simple_config_validator.py'
    - 'SimpleConfigModel: core/config/simple_config.py'
    plan_manager_extensions:
    - 'PlanManagerConfigSection: Pydantic section added to SimpleConfigModel'
    - 'PlanManagerConfigValidator: calls SimpleConfigValidator first, then adds own
      checks'
    - 'PlanManagerConfigGenerator: calls SimpleConfigGenerator, injects plan_manager
      section'
    config_fields:
      editor_api_url: http://localhost:<port> (base URL of yaml_editor OpenAPI 
        HTTP endpoint)
      editor_lock_dir: /tmp/editor_locks
      embed_model: default
      embed_url: http://localhost:8001/embed
      plans_root: /path/to/plans
      code_analysis_api_url: http://localhost:15000 (base URL of code_analysis 
        OpenAPI HTTP endpoint; used for plan_search and plan_find_duplicates)
  executor_rules:
  - Work one atomic file at a time; do not load the whole plan into context
  - For each atomic task read exactly root README.yaml, parent G README.yaml, 
    parent T README.yaml, current A yaml, and explicitly listed dependency files
  - Do not infer hidden requirements; implement only commands, files, and 
    contracts named in the current atomic file
  - Preserve command names exactly; navigation commands use plan_*
  - plan_manager must not patch mcp_proxy_adapter internals
  - Do not edit .venv, site-packages, generated caches, or installed 
    dependencies
  - Validate each implemented command by real MCP execution and a separate read 
    command
  - Never read or write file content directly; content is the editor's domain
  success_criteria:
  - all commands have stable input/output contracts
  - plan_manager never reads or writes file body content
  - tree mutations (delete, move) are rejected when any affected node is locked 
    by editor
  - navigation commands are read-only; no session required
  - every node response includes lock_status (locked_by_editor or unlocked)
  - plan_search proxies to code_analysis semantic_search and maps results to 
    node_id
  - plan_find_duplicates reads chunk embeddings from code_analysis DB via 
    read-only psycopg3 client
  - semantic search and duplicate detection operate on vectors produced by 
    code_analysis worker (no own vectorization)
  - plan_service_status reports code_analysis DB connectivity, git health, and 
    plan node counts
  - proxy registration is fully automatic via registration config section
  - config is JSON only; plan_manager config extends adapter config system with 
    code_analysis_api_url
  - plan_validate orchestrates editor.validate_file per node and aggregates 
    results
  - git commits happen only on structural changes (add/delete/move node)
  requirements_formalization_addendum:
    summary: Before a plan reaches global steps, plan_manager must support a 
      requirements-intake and formalization workflow. Users may provide 
      requirements in a non-linear, incremental form; the tool must preserve raw
      input, help interview the user, structure it into HRS, extract a minimal 
      MRS concept basis, and only then compose global steps.
    workflow:
    - 'raw intake: user adds thoughts and requirements as they arise, without requiring
      logical order'
    - 'interview: a top model asks clarifying questions, identifies gaps, contradictions,
      optional/non-binding material, and records answers'
    - 'HRS structuring: raw requirements are consolidated into a structured human-readable
      specification with addressable line ranges and semantic blocks'
    - 'HRS review: the structured HRS is discussed with the user, corrected, and frozen
      before formal projection'
    - 'MRS extraction: a minimal set of concepts and relations is extracted; concepts
      are included only when needed to define formal steps, plan structure, or verification'
    - 'GS composition: up to ten global steps are produced; each GS is linked to HRS
      ranges/blocks and to the relevant MRS slice'
    - 'GS handoff: work up to and including GS is expected to use top models; lower
      levels may be expanded by cheaper models'
    required_artifacts:
    - RawRequirement records for unordered user input
    - Question and Answer records for the interview
    - HRSBlock records mapped to source_spec.md line ranges
    - MRSConcept and MRSRelation records with source HRS blocks
    - GlobalStep records linked to HRS ranges and MRS concepts/relations
    - CoverageMap showing HRS block coverage by GS
    global_step_requirement: Each GS must be chosen and written so that HRS plus
      MRS_SUMM(GSn) provides an exact description of the task slice and does not
      require further clarification from the human when expanded into tactical 
      and atomic steps.
    hrs_block_mapping: After structuring, HRS is split into line ranges and 
      semantic blocks. Each GS must reference the HRS block(s) and concrete 
      source ranges it covers. This block mapping is the practical basis for 
      coverage checks and later cascade invalidation.
    model_tier_policy:
      top_models: Used for raw intake, interview, HRS structuring, HRS review, 
        MRS extraction, and GS composition.
      cheaper_models: Used after GS freeze for tactical steps, atomic steps, and
        coder prompts, relying on the GS package rather than new human 
        clarification.
    prompt_implications:
    - Prompts for plan creation must include an intake/interview phase before 
      HRS finalization.
    - Prompts must instruct the model not to invent order from unordered 
      requirements until after clarification and structuring.
    - Prompts must require HRS block/range mapping before MRS and GS generation.
    - 'Prompts must enforce minimality of MRS concepts: no concept unless needed for
      formal planning or verification.'
    - Prompts must require every GS to include an MRS_SUMM slice and HRS 
      block/range references.
    - Prompts must state that GS quality is judged by whether cheaper models can
      continue from HRS + MRS_SUMM(GS) without asking the human.
    - Prompts must preserve every accepted HRS block through the MRS and GS 
      stages, either as covered content or as an explicitly justified 
      non-binding block.
global_steps:
- id: G-001
  name: mcp-api-surface
  title: MCP API surface
  summary: "Define and implement the complete public MCP command surface for plan_manager.\n\
    plan_manager owns tree structure only. File content is the editor's domain.\n\
    Node lock_status is read from editor lock files on the shared filesystem.\n"
  depends_on: []
  tactical_steps:
  - id: T-001
    name: node-id-model
    summary: node ID grammar, parsing, path resolution
  - id: T-002
    name: lock-checker
    summary: check editor lock file and PID before any tree mutation
  - id: T-003
    name: nav-list-tree
    summary: plan_list, plan_tree, plan_status
  - id: T-004
    name: nav-node
    summary: plan_parent, plan_children, plan_next, plan_prev
  - id: T-005
    name: structure-create
    summary: plan_create (git init + README.md stub)
  - id: T-006
    name: structure-add
    summary: plan_add_global, plan_add_tactical, plan_add_atomic (stub + git 
      add/commit)
  - id: T-007
    name: structure-mutate
    summary: plan_delete_node (git rm + commit), plan_move_node (git mv + 
      commit); lock check required
  - id: T-008
    name: validate
    summary: plan_validate (walk tree + editor.validate_file per node), 
      plan_validate_node
- id: G-002
  name: plan-analysis
  title: Plan analysis
  summary: "Implement analytical commands over the plan graph: branch retrieval for\n\
    AI executor context assembly and parallelism mapping for scheduling.\n"
  depends_on:
  - G-001
  tactical_steps:
  - id: T-001
    name: branch-retrieval
    summary: plan_branch (ancestor chain from spec to node_id)
  - id: T-002
    name: parallelism-map
    summary: plan_parallelism (DAG + topological waves)
- depends_on:
  - G-004
  id: G-003
  name: semantic-analysis
  summary: plan_search (semantic search via code_analysis) and 
    plan_find_duplicates (cosine similarity via code_analysis DB)
  tactical_steps:
  - id: T-001
    name: plan-search
    summary: 'plan_search: proxy to code_analysis semantic_search, filter by plan
      path, map file_path to node_id'
  - id: T-002
    name: plan-find-duplicates
    summary: 'plan_find_duplicates: load embeddings from code_analysis DB, cosine
      similarity, threshold filter'
  title: Semantic analysis
- depends_on:
  - G-001
  id: G-004
  implementation_order_note: No vectorization worker or .vec files. 
    code_analysis server owns chunking and vectorization. G-004 only provides 
    the read-only DB client and project_id resolver that G-003 and G-005 use.
  name: code-analysis-client
  summary: Read-only psycopg3 client for code_analysis postgres DB; project_id 
    resolver (plan path -> project_id)
  tactical_steps:
  - id: T-001
    name: db-client
    summary: 'CodeAnalysisDbClient: read-only psycopg3 connection from code_analysis_api_url
      config'
  - id: T-002
    name: project-id-resolver
    summary: resolve_plan_project_id(plan_id) -> UUID using files/projects 
      tables
  title: Code analysis DB client
- id: G-005
  name: service-diagnostics
  title: Service diagnostics
  summary: "Provide a single command surface for observing service state: vectorization\n\
    progress per plan, git repository health, and background worker status.\nNo session
    tracking (sessions are the editor's domain).\nAll commands are read-only and require
    no session.\n"
  scope_distinction: "plan_service_status (T-003) is the service-level diagnostic
    command.\nplan_status (G-001/T-003) is a navigation command for per-node fill
    status.\nDo not confuse the two.\n"
  depends_on:
  - G-001
  - G-004
  tactical_steps:
  - id: T-001
    name: plan-stats
    summary: node counts by level, vectorization coverage per plan
  - id: T-002
    name: git-health
    summary: repo size, loose objects, last commit, lock file count
  - id: T-003
    name: status-command
    summary: plan_service_status aggregating plan-stats and git-health plus 
      worker state
- id: G-006
  name: config-system
  title: Config system
  summary: "Extend the adapter config system for plan_manager-specific settings.\n\
    Config format: JSON only. plan_manager adds its own config section on top;\ndoes
    not replace adapter infrastructure.\n"
  implementation_order_note: "Implement T-001 first to define the config model, then
    T-002 (validator),\nthen T-003 (generator). T-001 has no dependency on G-001 and
    can be\nimplemented in parallel with G-001.\n"
  adapter_components_do_not_reimplement:
  - 'ConfigLoader: core/config/config_loader.py'
  - 'SimpleConfigGenerator: core/config/simple_config_generator.py'
  - 'SimpleConfigValidator: core/config/simple_config_validator.py'
  - 'SimpleConfigModel: core/config/simple_config.py'
  depends_on: []
  tactical_steps:
  - id: T-001
    name: config-section
    summary: PlanManagerConfigSection Pydantic model
  - id: T-002
    name: config-validator
    summary: PlanManagerConfigValidator extends SimpleConfigValidator
  - id: T-003
    name: config-generator
    summary: PlanManagerConfigGenerator extends SimpleConfigGenerator
implementation_order:
- G-006 and G-001 can start in parallel (no shared dependencies)
- G-004 after G-001 (DB client needs node_id resolver from G-001)
- G-002 after G-001
- G-005 after G-001 and G-004
- G-003 after G-004 (semantic search uses DB client from G-004)
