format: tactical_step
status: pending
step_id: T-001
name: config-section
title: PlanManagerConfigSection Pydantic model
parent_step_id: G-006
parent_step_name: config-system
source_documents:
- docs/plans/2026-05-07-plan-manager-mcp-api/README.yaml (technical_spec.config_system,
  technical_spec.plans_root_convention)
- docs/plans/2026-05-07-plan-manager-mcp-api/G-006-config-system/README.yaml
intent: 'Implement PlanManagerConfigSection: a Pydantic model that adds plan_manager

  specific fields to the adapter config system. This is the foundational config

  model that all other plan_manager components consume for plans_root, editor_lock_dir,

  editor_api_url, embed_url, and embed_model.

  '
context_from_technical_spec:
  config_system: 'Config format is JSON only. plan_manager adds its own config section
    on top of the adapter config system; it does not replace it. Adapter components
    (ConfigLoader, SimpleConfigModel, SimpleConfigGenerator, SimpleConfigValidator)
    must NOT be reimplemented.

    '
  adapter_components_do_not_touch:
  - core/config/config_loader.py
  - core/config/simple_config_generator.py
  - core/config/simple_config_validator.py
  - core/config/simple_config.py
  config_fields:
    code_analysis_api_url: base URL of code_analysis OpenAPI HTTP endpoint (for plan_search)
    code_analysis_db_dsn: optional postgres DSN (takes priority over individual fields)
    code_analysis_db_host: postgres host (default localhost)
    code_analysis_db_name: postgres database name (required if no DSN)
    code_analysis_db_password_env: env var name containing DB password
    code_analysis_db_port: postgres port (default 5432)
    code_analysis_db_user: postgres user (default postgres)
    editor_api_url: URL of external editor MCP server OpenAPI endpoint
    editor_lock_dir: path where editor places lock files (default /tmp/editor_locks)
    embed_model: model name for embedding service (default default)
    embed_url: URL of external embedding service
    plans_root: path to plan git repos directory (default ./plans)
  implementation_order: 'Implement T-001 first; T-002 and T-003 reference this model.
    T-001 has no dependency on G-001 and can run in parallel with G-001.

    '
depends_on: []
responsibilities:
- Define PlanManagerConfigSection Pydantic model with all five config fields
- Provide sensible defaults for all optional fields
- Integrate with SimpleConfigModel as an extension section
- Config format is JSON only; no YAML or TOML support
- The registration section in the JSON config enables mcp_proxy_adapter to auto-register
  plan_manager at startup; PlanManagerConfigSection must be compatible with adapter
  registration config structure
non_goals:
- Do not reimplement adapter ConfigLoader, SimpleConfigModel, or SimpleConfigValidator
- Do not add non-JSON config format support
owned_code_paths:
- plan_manager/config/config_section.py
owned_test_paths:
- tests/test_config_section.py
owned_docs_paths: []
forbidden_paths:
- mcp_proxy_adapter/
- core/config/config_loader.py
- core/config/simple_config.py
- core/config/simple_config_generator.py
- core/config/simple_config_validator.py
- plan_manager/commands/
- .venv/
- tests/ (only files listed in owned_test_paths are allowed)
atomic_steps:
- id: A-001
  name: config-section
  summary: PlanManagerConfigSection Pydantic model with all five config fields
model_assignment_spec:
  task: "Implement plan_manager/config/config_section.py.\nPlanManagerConfigSection(BaseModel):\n\
    \  plans_root: str = \"./plans\"\n  editor_lock_dir: str = \"/tmp/editor_locks\"\
    \n  editor_api_url: str  # required\n  embed_url: str  # required\n  embed_model:\
    \ str = \"default\"\n  code_analysis_api_url: str  # required; for plan_search\
    \ HTTP proxy\n  code_analysis_db_dsn: Optional[str] = None  # takes priority if\
    \ set\n  code_analysis_db_host: str = \"localhost\"\n  code_analysis_db_port:\
    \ int = 5432\n  code_analysis_db_name: Optional[str] = None  # required if no\
    \ DSN\n  code_analysis_db_user: str = \"postgres\"\n  code_analysis_db_password_env:\
    \ Optional[str] = None\nExtend SimpleConfigModel to include this section.\nJSON-only;\
    \ no YAML or TOML.\n"
  allowed_edit_paths:
  - plan_manager/config/config_section.py
  - tests/test_config_section.py
  forbidden_edit_paths:
  - mcp_proxy_adapter/ (any file)
  - core/config/config_loader.py
  - core/config/simple_config.py
  - core/config/simple_config_generator.py
  - core/config/simple_config_validator.py
  - plan_manager/commands/
  - .venv/
  deliverables:
  - PlanManagerConfigSection Pydantic model with five fields and defaults
  - Integration with SimpleConfigModel as extension section
verification:
- PlanManagerConfigSection parses a valid JSON config correctly
- Default values applied when optional fields are absent
- editor_api_url and embed_url required fields raise ValidationError when missing
- SimpleConfigModel extended with plan_manager section
acceptance_criteria:
- All five config fields present with correct types and defaults
- Config is JSON only
- Adapter components not modified
observations_template:
- Did PlanManagerConfigSection parse a complete JSON config correctly?
- Were defaults applied for missing optional fields?
- Was embed_url correctly required?
