  \ str, default ./plans\n    Path to plan git repos directory.\n  embed_url: str,\
  \ required\n    URL of external embedding service.\n  embed_model: str, default\
  \ default\n    Model name for embedding service.\n  editor_lock_dir: str, default\
  \ /tmp/editor_locks\n    Directory where the editor places lock files.\n    plan_manager\
  \ reads these files to detect locked nodes.\n  editor_api_url: str, required\n \
