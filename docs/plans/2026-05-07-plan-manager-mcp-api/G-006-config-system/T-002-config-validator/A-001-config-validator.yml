technical_specification_excerpt: 'Plan Manager MCP API - config validator:

  - PlanManagerConfigValidator extends SimpleConfigValidator

  - Call super().validate() first, then add plan_manager checks

  - Check plans_root is a directory or can be created

  - Check tmpfs_root is writable

  - Check default_ttl is a positive integer (greater than 0)

  - Check embed_url is a non-empty URL string (format check only; no HTTP call)

  - Return list of error strings; empty list means valid

  - Do not reimplement SimpleConfigValidator internals

  - Do not make live HTTP calls to embed_url

  '
